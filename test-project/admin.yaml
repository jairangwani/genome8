      - node: auth/UserContextLoader
        action: Loads admin user context
      - node: AdminAuthorizationGuard
        action: Confirms admin role
      - node: AdminInputValidator
        action: Validates the task ID is a well-formed UUID — passes
      - node: CrossUserTaskReader
        action: Queries for task by ID — no record found
      - node: AdminTargetExistsRule
        action: Target task does not exist — triggers 404 response
      - node: AdminAuditLogger
        action: Records the not-found access with admin ID and target task ID
      - node: AdminAuditEntry
        action: Created with action type task_detail_not_found, target ID, and timestamp
      - node: AdminErrorResponse
        action: Assembled with 404 Not Found — task does not exist message
      - node: gateway/ResponseFormatter
        action: Formats the error response
      - node: _actors/Admin
        action: Receives 404 Not Found

  AdminUserTasksTargetNotFound:
    steps:
      - node: _actors/Admin
        action: Requests tasks for a user ID that does not exist
      - node: gateway/RequestRouter
        action: Routes request to AdminUserTasksEndpoint
      - node: AdminUserTasksEndpoint
        action: Receives GET /admin/users/:id/tasks request
      - node: auth/TokenValidator
        action: Validates the session token
      - node: auth/UserContextLoader
        action: Loads admin user context
      - node: AdminAuthorizationGuard
        action: Confirms admin role
      - node: AdminInputValidator
        action: Validates the user ID is a well-formed UUID — passes
      - node: users/UserReader
        action: Queries for user by ID — no record found
      - node: AdminTargetExistsRule
        action: Target user does not exist — triggers 404 before loading tasks
      - node: AdminAuditLogger
        action: Records the not-found access attempt
      - node: AdminAuditEntry
