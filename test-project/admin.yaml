      - node: gateway/RequestRouter
        action: Routes each request to users/ListUsersEndpoint
      - node: users/ListUsersEndpoint
        action: Receives rapid sequential requests
      - node: AdminAuthorizationGuard
        action: Confirms admin role — passes for each request
      - node: AdminRateLimitRule
