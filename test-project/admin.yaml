        action: Confirms admin role
      - node: AdminInputValidator
        action: Validates user ID format — valid UUID
      - node: users/UserReader
        action: Queries for user X — user was deleted between the list and detail requests (race condition)
      - node: AdminTargetExistsRule
        action: User X no longer exists — triggers 404
      - node: AdminAuditLogger
        action: Records the race condition access attempt
      - node: AdminAuditEntry
        action: Created with action type user_tasks_race_condition, target user ID, and deletion timestamp
      - node: AdminErrorResponse
