      - node: FilterDateRangeRule
        action: start (2025-12-31) is after end (2025-01-01) — invalid range
      - node: AdminErrorResponse
        action: "Assembled with 400 Bad Request — {dateRange: 'start must be before or equal to end'}"
      - node: gateway/ResponseFormatter
        action: Formats the validation error response
      - node: _actors/Admin
        action: Receives 400 with date range validation error

  AdminFilterMalformedDate:
    steps:
      - node: _actors/Admin
