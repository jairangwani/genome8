  AdminDashboardAggregationTimeout:
    steps:
      - node: _actors/Admin
        action: Requests the admin dashboard during a period of high database load
      - node: gateway/RequestRouter
        action: Routes request to AdminDashboardEndpoint
      - node: AdminDashboardEndpoint
        action: Receives GET /admin/dashboard request
      - node: auth/TokenValidator
        action: Validates the session token
      - node: AdminAuthorizationGuard
        action: Confirms admin role
      - node: DashboardAggregator
        action: Begins querying user and task tables for summary statistics
      - node: AdminQueryTimeoutEnforcer
        action: Monitors query execution time against AdminQueryTimeoutConfig dashboard threshold of 5s
      - node: AdminQueryTimeoutConfig
        action: Dashboard aggregation timeout is 5 seconds
      - node: AdminQueryTimeoutEnforcer
        action: Query exceeds 5s threshold — aborts the database query
      - node: AdminCacheInvalidator
        action: Checks for previously cached dashboard data
      - node: StaleDashboardIndicator
        action: Stale cached data exists — marks response as serving stale data
      - node: DashboardSummary
        action: Populated from stale cache with staleness indicator attached
      - node: AdminAuditLogger
        action: Records dashboard timeout with fallback to stale cache
      - node: AdminAuditEntry
        action: Created with action type dashboard_timeout_stale_fallback and cache age
      - node: gateway/ResponseFormatter
        action: Formats the stale DashboardSummary with staleness metadata in response headers
      - node: _actors/Admin
        action: Receives stale dashboard data with indicator that data may be outdated

  AdminDashboardNoCacheFallbackTimeout:
    steps:
      - node: _actors/Admin
        action: Requests the admin dashboard during high load with no cached data available
      - node: gateway/RequestRouter
        action: Routes request to AdminDashboardEndpoint
      - node: AdminDashboardEndpoint
        action: Receives GET /admin/dashboard request
      - node: auth/TokenValidator
        action: Validates the session token
      - node: AdminAuthorizationGuard
        action: Confirms admin role
      - node: DashboardAggregator
        action: Begins querying — database under heavy load
      - node: AdminQueryTimeoutEnforcer
        action: Query exceeds 5s threshold — aborts
      - node: AdminCacheInvalidator
        action: Checks for cached data — no cache exists (first request or cache expired)
      - node: AdminAuditLogger
        action: Records dashboard timeout with no cache fallback available
      - node: AdminAuditEntry
        action: Created with action type dashboard_timeout_no_cache
      - node: AdminErrorResponse
        action: Assembled with 503 Service Unavailable — dashboard temporarily unavailable
      - node: gateway/ResponseFormatter
        action: Formats the 503 error response with Retry-After header
      - node: _actors/Admin
        action: Receives 503 Service Unavailable — retry later

  AdminAuditLogWriteFails:
    steps:
      - node: _actors/Admin
        action: Requests admin dashboard — routine operation
      - node: AdminDashboardEndpoint
        action: Receives and processes the request normally
      - node: AdminAuthorizationGuard
        action: Confirms admin role — proceeds
      - node: DashboardAggregator
        action: Successfully compiles dashboard statistics
      - node: DashboardSummary
        action: Assembled with current data
      - node: AdminAuditLogger
        action: Attempts to write audit entry — primary audit store connection fails
      - node: AuditWriteFailureEvent
        action: Emitted with failure reason (primary store connection timeout)
      - node: AdminAuditFailoverWriter
        action: Attempts to write to secondary audit store — secondary also fails
      - node: AuditWriteFailureEvent
        action: Updated with failover failure — both stores unavailable
      - node: AuditFailClosedRule
        action: Audit cannot be written — fail-closed policy rejects the entire request
      - node: AdminAuditLogger
        action: Records the audit system failure itself via emergency logging channel
      - node: AdminErrorResponse
        action: Assembled with 503 Service Unavailable — audit system unavailable
      - node: gateway/ResponseFormatter
        action: Formats the 503 error response
      - node: _actors/Admin
        action: Receives 503 — request denied because audit trail could not be maintained

  AdminAuditLogWriteFailsWithFallback:
    steps:
      - node: _actors/Admin
        action: Requests admin user list — routine operation
      - node: AdminAuthorizationGuard
        action: Confirms admin role — proceeds
      - node: users/UserLister
        action: Successfully retrieves user records
      - node: AdminAuditLogger
        action: Attempts to write audit entry — primary store connection fails
      - node: AuditWriteFailureEvent
        action: Emitted with primary failure reason
      - node: AdminAuditFailoverWriter
        action: Attempts to write to secondary audit store — secondary succeeds
      - node: AdminAuditEntry
        action: Written to failover store with failover flag indicating non-primary storage
      - node: AdminAuditRequiredRule
        action: Audit entry exists (in failover) — request may proceed
      - node: gateway/ResponseFormatter
        action: Formats the user list response normally
      - node: _actors/Admin
        action: Receives user list — unaware that audit was written to failover (transparent recovery)

  AdminPaginationInvalidParams:
    steps:
      - node: _actors/Admin
        action: Sends GET /admin/users?page=0&limit=-5 with invalid pagination parameters
      - node: gateway/RequestRouter
        action: Routes request to users/ListUsersEndpoint
      - node: users/ListUsersEndpoint
        action: Receives the request
      - node: auth/TokenValidator
        action: Validates the session token
      - node: AdminAuthorizationGuard
        action: Confirms admin role
      - node: AdminInputValidator
        action: Validates pagination parameters against PaginationBoundsRule
      - node: PaginationBoundsRule
        action: "page=0 violates >= 1 constraint; limit=-5 violates 1-100 range — both invalid"
      - node: AdminErrorResponse
        action: "Assembled with 400 Bad Request and field-level errors: {page: 'must be >= 1', limit: 'must be between 1 and 100'}"
      - node: gateway/ResponseFormatter
        action: Formats the validation error response
      - node: _actors/Admin
        action: Receives 400 with specific field validation errors

  AdminPaginationExceedsLimit:
    steps:
      - node: _actors/Admin
        action: Sends GET /admin/tasks?page=1&limit=500 requesting 500 results per page
      - node: gateway/RequestRouter
