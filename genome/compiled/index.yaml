      - PropagateUnresolvedRefsAcrossLevels (step 4)
      - PropagateUnresolvedRefsAcrossLevels (step 5)
      - EndToEndDeepHierarchy (step 12)
    triggered_by_actors:
      - _actors/ParentEngine
      - _actors/ChildEngine
    cross_module_connections:
      - compilation/WarningReport
