      - TriggerTargetedReconvergence (step 10)
      - SyncAfterEventDetection (step 35)
      - NarrowRippleScopeBeforePropagation (step 7)
      - NarrowRippleScopeBeforePropagation (step 8)
      - EndToEndRipplePropagation (step 28)
      - HandleConcurrentDependencyRipples (step 26)
