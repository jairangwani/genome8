      - MergeChildGraphs (step 5)
      - EndToEndHierarchySplit (step 17)
      - FlattenGrandchildInterfacesIntoChild (step 8)
      - EndToEndDeepHierarchy (step 18)
      - HandleHighChildCountHierarchy (step 16)
    triggered_by_actors:
