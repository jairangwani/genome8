      - SyncAfterEventDetection (step 8)
      - DetectAndBlockOscillation (step 4)
      - DetectAndBlockOscillation (step 5)
      - EndToEndRipplePropagation (step 6)
      - HandleConcurrentDependencyRipples (step 3)
      - HandleConcurrentDependencyRipples (step 4)
