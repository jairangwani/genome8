        action: runs full compilation and reports errors and warnings
        step_number: 10
      - node: compilation/CompilationResult
        action: provides error count, warning count, and details
        step_number: 11
      - node: convergence/BoundedCreationLoop
        action: repeats module creation and compile for each remaining module in build order
        step_number: 12
      - node: convergence/NeverOpenEndedLoop
        action: ensures the loop is bounded by the module list, not open-ended
        step_number: 13
      - node: convergence/ConvergenceState
        action: records all modules created and last compilation result
        step_number: 14
    modules_touched:
      - convergence
      - excerpt
      - _actors
      - graph
      - compilation
  PerspectiveEnrichmentPipeline:
    name: PerspectiveEnrichmentPipeline
    module: convergence
    actor: _actors/LLMWorker
    steps:
      - node: convergence/ConvergenceState
        action: indicates all modules have been created and initial compilation passed
        step_number: 1
      - node: convergence/MapPerspectives
        action: identifies which perspectives are relevant to each module based on its domain
        step_number: 2
      - node: convergence/BoundedCreationRule
        action: enforces that enrichment is bounded by modules times relevant perspectives
        step_number: 3
      - node: excerpt/SelectTargetModule
        action: selects the first module to examine
        step_number: 4
      - node: excerpt/AssembleExcerpt
        action: builds a focused excerpt of the module and its cross-module connections
        step_number: 5
      - node: excerpt/ExcerptOutput
        action: provides the assembled excerpt for the LLM to analyze
        step_number: 6
      - node: convergence/ExamineFromPerspective
        action: delegates to LLM to examine the module from the first relevant perspective
        step_number: 7
      - node: _actors/LLMWorker
        action: reads the excerpt and perspective definition to identify missing nodes and journeys
        step_number: 8
      - node: graph/ModuleFile
        action: stores the updated module with added nodes and journeys
        step_number: 9
      - node: convergence/CompileCheck
        action: invokes compile.ts to validate the enriched module against the full graph
        step_number: 10
      - node: _actors/Compiler
        action: runs compilation and reports any errors introduced by the enrichment
        step_number: 11
      - node: compilation/CompilationResult
        action: provides error count and details after the perspective pass
        step_number: 12
      - node: convergence/ExamineFromPerspective
        action: delegates to LLM for the next relevant perspective on the same module
        step_number: 13
      - node: _actors/LLMWorker
        action: examines the module from the next perspective and adds further missing content
        step_number: 14
      - node: convergence/CompileCheck
        action: recompiles after the second perspective pass
        step_number: 15
      - node: convergence/BoundedCreationLoop
        action: repeats for each remaining module-perspective pair until all are examined
        step_number: 16
      - node: convergence/NeverOpenEndedLoop
        action: ensures perspective enrichment terminates after all mapped pairs are processed
        step_number: 17
      - node: convergence/ConvergenceState
        action: records that perspective enrichment is complete for all modules
        step_number: 18
    modules_touched:
      - convergence
      - excerpt
      - _actors
      - graph
      - compilation
  ConvergenceCheck:
    name: ConvergenceCheck
    module: convergence
    actor: _actors/Compiler
