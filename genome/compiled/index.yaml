      - SpawnAndWaitForChildren (step 4)
      - ContinueWithoutSplit (step 2)
      - EndToEndHierarchySplit (step 2)
      - RecursiveChildSplit (step 2)
      - EnforceDepthLimitAtMaxLevel (step 2)
      - EndToEndDeepHierarchy (step 2)
      - EndToEndDeepHierarchy (step 6)
    triggered_by_actors:
