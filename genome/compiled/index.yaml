      - ValidateAndAcceptResult (step 1)
      - WorkerCreatesModuleFile (step 8)
      - WorkerEnrichesFromPerspective (step 9)
      - HandleFailedToolCall (step 5)
      - RecoverPartialWorkAfterCrash (step 5)
      - ValidateNoOutOfScopeChanges (step 1)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - _actors/LLMWorker
      - convergence/ConvergenceState
    referenced_in_modules:
      - llm
      - _actors
      - convergence
  llm/SystemPrompt:
    module: llm
    type: artifact
    description: >-
      the instruction template sent at initialization that defines the worker's genome role, YAML format rules, node
      types, step format, and operational constraints
    preceded_by:
      - llm/NativeToolSet
      - llm/TaskPayload
      - llm/SpawnWorkerProcess
      - llm/ReplaceAfterNCompactions
    followed_by:
      - llm/InjectSystemPrompt
      - llm/ReinjectSystemPromptAfterCompaction
    in_journeys:
      - SpawnAndInitializeWorker (step 7)
      - SanitizeContextBeforeSend (step 6)
      - ProactivelyReplaceStaleWorker (step 9)
      - ReinjectAfterHeavyCompaction (step 5)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/CrashReport:
    module: llm
    type: artifact
    description: >-
      structured failure record containing exit code, last task payload, partial output collected, error details, and
      tool call history at time of failure
    preceded_by:
      - llm/DrainPartialOutput
      - llm/TaskPayload
      - llm/ShutdownWorker
    followed_by:
      - llm/CleanupFailedSession
      - llm/ShutdownWorker
      - llm/TaskPayload
      - llm/SingleWorkerConstraint
      - convergence/DetectWorkerFailure
    in_journeys:
      - DetectAndReportProcessCrash (step 5)
      - DetectAndReportStreamFailure (step 6)
      - DetectAndReportTimeout (step 6)
      - RecoverPartialWorkAfterCrash (step 1)
      - CleanupAndPrepareForRespawn (step 1)
      - DetectAndStopToolLoop (step 6)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - convergence/DetectWorkerFailure
    referenced_in_modules:
      - llm
      - convergence
  llm/CompactionCounter:
    module: llm
    type: artifact
    description: >-
      tracks the number of compaction events, estimated context quality level, and total task count for the current
      worker session
    preceded_by:
      - llm/InjectSystemPrompt
      - llm/TrackCompactionCount
    followed_by:
      - llm/WorkerSession
      - llm/ReplaceAfterNCompactions
    in_journeys:
      - SpawnAndInitializeWorker (step 9)
      - HandleContextCompaction (step 5)
      - ProactivelyReplaceStaleWorker (step 1)
      - ProactivelyReplaceStaleWorker (step 11)
      - ReinjectAfterHeavyCompaction (step 3)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/AlwaysOpus:
    module: llm
    type: rule
    description: the worker always uses Opus model with 1M context window, no model selection or fallback
    preceded_by:
      - llm/SpawnWorkerProcess
    followed_by:
      - llm/NoPrintMode
    in_journeys:
      - SpawnAndInitializeWorker (step 3)
    triggered_by_actors: []
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/NoSessionManagement:
    module: llm
    type: rule
    description: convergence.ts does not manage sessions — Claude handles its own context compaction transparently
    preceded_by:
      - llm/WorkerSession
    followed_by:
      - llm/HandleCompaction
    in_journeys:
      - HandleContextCompaction (step 2)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/NoPrintMode:
    module: llm
    type: rule
    description: worker uses interactive mode with native tools, never --print mode which lacks tool access
    preceded_by:
      - llm/AlwaysOpus
    followed_by:
      - llm/StreamJsonProtocol
    in_journeys:
      - SpawnAndInitializeWorker (step 4)
    triggered_by_actors: []
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/WorkerCreatesCodeOrchestrates:
    module: llm
    type: rule
    description: the worker only creates content when asked — it never decides when to act, code orchestrates all decisions
    preceded_by:
      - llm/StreamJsonProtocol
    followed_by:
      - _actors/LLMWorker
    in_journeys:
      - SendTaskToWorker (step 8)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - _actors/LLMWorker
    referenced_in_modules:
      - llm
      - _actors
  llm/SingleWorkerConstraint:
    module: llm
    type: rule
    description: only one worker process may exist at a time, cleanup must fully complete before any respawn can begin
    preceded_by:
      - llm/CrashReport
      - llm/CleanupFailedSession
    followed_by:
      - llm/CleanupFailedSession
      - llm/SpawnWorkerProcess
    in_journeys:
      - CleanupAndPrepareForRespawn (step 2)
      - ProactivelyReplaceStaleWorker (step 7)
    triggered_by_actors: []
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/AllowedWritePaths:
    module: llm
    type: rule
    description: >-
      worker may only write to genome/modules/ during creation and enrichment, genome/generated/ during codegen, and
      genome/tests/ during testgen — all other paths are rejected
    preceded_by:
      - llm/WriteFile
    followed_by:
      - llm/ScopeWritesToAllowedPaths
    in_journeys:
      - BlockPathTraversalWrite (step 3)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/NoBashNetworkAccess:
    module: llm
    type: rule
    description: >-
      worker Bash tool calls must never use network commands (curl, wget, nc, ssh) or spawn background processes or
      delete files outside the output directory
    preceded_by:
      - llm/RunBash
    followed_by:
      - llm/FilterBashCommands
    in_journeys:
      - BlockDangerousBashCommand (step 3)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/SingleFilePerTask:
    module: llm
    type: rule
    description: >-
      each task assigns the worker exactly one target file to create or edit, any write to a different path is treated
      as a scope violation
    preceded_by:
      - llm/TaskResult
    followed_by:
      - llm/ValidateOutputScope
    in_journeys:
      - ValidateNoOutOfScopeChanges (step 2)
    triggered_by_actors: []
    cross_module_connections: []
    referenced_in_modules:
      - llm
  llm/PayloadSizeBudget:
    module: llm
    type: rule
    description: >-
      task payloads must not exceed the maximum message size and context is truncated by priority to meet the budget,
      preserving system prompt and target module above all else
    preceded_by:
      - hierarchy/CompactSplitDecisionContext
      - llm/BuildTaskContext
    followed_by:
      - _actors/LLMWorker
      - llm/PrioritizeContextByRelevance
    in_journeys:
      - CompactContextForLargeSplitDecision (step 6)
      - TruncateOversizedPayload (step 4)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - hierarchy/CompactSplitDecisionContext
      - _actors/LLMWorker
    referenced_in_modules:
      - llm
      - hierarchy
      - _actors
  llm/ReplaceAfterNCompactions:
    module: llm
    type: rule
    description: >-
      worker is proactively replaced after N compaction events to maintain output quality rather than waiting for
      observable degradation
    preceded_by:
      - llm/CompactionCounter
    followed_by:
      - llm/TrackCompactionCount
      - llm/SystemPrompt
    in_journeys:
      - ProactivelyReplaceStaleWorker (step 2)
      - ReinjectAfterHeavyCompaction (step 4)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - llm
  organization/ReadSpecFile:
    module: organization
    type: process
    description: reads spec.md from disk as the input for organizational analysis
    preceded_by:
      - convergence/ReadSpec
      - convergence/SpecFile
      - convergence/TargetedReconvergence
      - sync/CompareStoredHash
    followed_by:
      - organization/IdentifyModules
      - organization/ParseSpecSections
      - _actors/LLMWorker
      - organization/HandleMissingSpecFile
    in_journeys:
      - SpecChangeOnSelf (step 4)
      - AnalyzeSpecAndWriteOrganization (step 3)
      - UpdateOrganizationAfterReconvergence (step 2)
      - HandleMissingSpec (step 2)
      - DetectSpecChangeToOrganizationSections (step 2)
      - DiffModuleListForIncrementalUpdate (step 2)
    triggered_by_actors:
      - _actors/ReturningOwner
      - _actors/LLMWorker
      - _actors/ProjectOwner
    cross_module_connections:
      - convergence/ReadSpec
      - convergence/SpecFile
      - convergence/TargetedReconvergence
      - _actors/LLMWorker
      - sync/CompareStoredHash
    referenced_in_modules:
      - organization
      - convergence
      - _actors
      - sync
  organization/ParseSpecSections:
    module: organization
    type: process
    description: splits the spec into numbered sections so each module can reference which sections it covers
    preceded_by:
      - organization/ReadSpecFile
    followed_by:
      - organization/SpecSectionIndex
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 4)
      - DetectSpecChangeToOrganizationSections (step 3)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/IdentifyScope:
    module: organization
    type: process
    description: extracts a 1-2 sentence scope statement describing what the project is and does
    preceded_by:
      - _actors/LLMWorker
    followed_by:
      - organization/IdentifyModules
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 8)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - _actors/LLMWorker
    referenced_in_modules:
      - organization
      - _actors
  organization/IdentifyModules:
    module: organization
    type: process
    description: analyzes the spec to discover all independent concerns, each becoming a named module with a description
    preceded_by:
      - _actors/ResourceExhauster
      - convergence/ReadSpec
      - organization/ReadSpecFile
      - organization/IdentifyScope
      - organization/DetectNewModulesInSpec
      - organization/ModuleList
      - _actors/LLMWorker
    followed_by:
      - organization/ModuleList
      - actors/DiscoverFromActivities
      - _actors/LLMWorker
      - sync/FindAffectedModules
      - convergence/DiscoverActors
      - organization/HandleEmptyModuleList
      - organization/DetectSelfReferentialModules
      - organization/AnalyzeDependencies
    in_journeys:
      - ResourceExhaustionDefense (step 2)
      - NewProjectAdoption (step 5)
      - MigratingProjectBootstrap (step 4)
      - SpecChangeOnSelf (step 5)
      - AnalyzeSpecAndWriteOrganization (step 9)
      - UpdateOrganizationAfterReconvergence (step 5)
      - ProvideOrganizationForActorDiscovery (step 3)
      - RecoverFromSpecCoverageGap (step 6)
      - RecoverFromEmptyModuleList (step 2)
      - RecoverFromEmptyModuleList (step 7)
      - OrganizationRecognizesSelf (step 2)
      - DetectSpecChangeToOrganizationSections (step 10)
      - ValidateInfrastructureModulesPresent (step 1)
      - DiffModuleListForIncrementalUpdate (step 3)
      - BreakSystemIntoScopedPieces (step 3)
    triggered_by_actors:
      - _actors/ResourceExhauster
      - _actors/NewProjectAdopter
      - _actors/MigratingProject
      - _actors/ReturningOwner
      - _actors/LLMWorker
      - _actors/ProjectOwner
    cross_module_connections:
      - _actors/ResourceExhauster
      - convergence/ReadSpec
      - actors/DiscoverFromActivities
      - _actors/LLMWorker
      - sync/FindAffectedModules
      - convergence/DiscoverActors
    referenced_in_modules:
      - organization
      - _actors
      - convergence
      - actors
      - sync
  organization/AnalyzeDependencies:
    module: organization
    type: process
    description: determines which modules depend on which others and produces a build order
    preceded_by:
      - organization/ModuleList
      - _actors/LLMWorker
      - organization/ModuleSpecSectionMap
      - organization/IdentifyModules
    followed_by:
      - organization/DependencyGraph
      - convergence/ModuleCreation
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 11)
      - UpdateOrganizationAfterReconvergence (step 7)
      - RecoverFromCircularDependency (step 7)
      - RecoverFromEmptyModuleList (step 9)
      - OrganizationRecognizesSelf (step 7)
      - BreakSystemIntoScopedPieces (step 4)
    triggered_by_actors:
      - _actors/LLMWorker
      - _actors/ProjectOwner
    cross_module_connections:
      - _actors/LLMWorker
      - convergence/ModuleCreation
    referenced_in_modules:
      - organization
      - _actors
      - convergence
  organization/AnalyzeIndependence:
    module: organization
    type: process
    description: >-
      classifies modules by how standalone they are — fully independent, standalone with dependencies, or tightly
      coupled
    preceded_by:
      - organization/DependencyGraph
    followed_by:
      - organization/IndependenceClassification
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 13)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/AssembleOrganization:
    module: organization
    type: process
    description: combines scope, modules, dependencies, and independence into the final ORGANIZATION.md structure
    preceded_by:
      - organization/ModuleSpecSectionMap
      - organization/ValidateLLMOrganizationOutput
      - organization/ValidateBuildOrder
    followed_by:
      - organization/WriteOrganizationFile
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 17)
      - UpdateOrganizationAfterReconvergence (step 11)
      - RecoverFromMalformedOrganization (step 10)
      - RecoverFromCircularDependency (step 10)
      - HandleOrganizationWriteError (step 1)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/WriteOrganizationFile:
    module: organization
    type: process
    description: writes the assembled organization to ORGANIZATION.md on disk
    preceded_by:
      - organization/AssembleOrganization
      - organization/HandleOrganizationWriteFailure
    followed_by:
      - organization/OrganizationFile
      - organization/HandleOrganizationWriteFailure
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 18)
      - UpdateOrganizationAfterReconvergence (step 12)
      - ValidateOrganizationBeforeProceeding (step 1)
      - HandleOrganizationWriteError (step 2)
      - HandleOrganizationWriteError (step 6)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/AssignSpecSectionsToModules:
    module: organization
    type: process
    description: >-
      maps each identified module to the spec section numbers it covers based on the module's domain and the section
      content
    preceded_by:
      - organization/IndependenceClassification
      - organization/DependencyGraph
      - organization/ModuleList
    followed_by:
      - organization/ModuleSpecSectionMap
    in_journeys:
      - AnalyzeSpecAndWriteOrganization (step 15)
      - UpdateOrganizationAfterReconvergence (step 9)
      - RecoverFromSpecCoverageGap (step 8)
      - OrganizationRecognizesSelf (step 5)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/ValidateBuildOrder:
    module: organization
    type: process
    description: checks the dependency graph for circular dependencies and confirms a valid topological ordering exists
    preceded_by:
      - organization/DependencyGraph
      - organization/ValidateBuildOrder
    followed_by:
      - organization/ValidateBuildOrder
      - convergence/ConvergenceState
      - organization/RepairCircularDependency
      - organization/AssembleOrganization
    in_journeys:
      - ValidateOrganizationBeforeProceeding (step 8)
      - ValidateOrganizationBeforeProceeding (step 9)
      - RecoverFromCircularDependency (step 2)
      - RecoverFromCircularDependency (step 9)
      - OrganizationRecognizesSelf (step 9)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - convergence/ConvergenceState
    referenced_in_modules:
      - organization
      - convergence
  organization/ValidateSpecCoverage:
    module: organization
    type: process
    description: checks that every numbered spec section is covered by at least one module ensuring no requirements are dropped
    preceded_by:
      - organization/ModuleList
      - organization/SpecSectionIndex
      - organization/ModuleSpecSectionMap
    followed_by:
      - organization/SpecSectionIndex
      - organization/DependencyGraph
      - organization/RepairSpecCoverageGap
    in_journeys:
      - ValidateOrganizationBeforeProceeding (step 4)
      - ValidateOrganizationBeforeProceeding (step 6)
      - RecoverFromSpecCoverageGap (step 1)
      - RecoverFromSpecCoverageGap (step 10)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/DetectNewModulesInSpec:
    module: organization
    type: process
    description: >-
      compares the current module list against the spec to find newly added concerns that would require new modules
      during reconvergence
    preceded_by:
      - _actors/LLMWorker
    followed_by:
      - organization/IdentifyModules
    in_journeys:
      - UpdateOrganizationAfterReconvergence (step 4)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - _actors/LLMWorker
    referenced_in_modules:
      - organization
      - _actors
  organization/ProvideSpecSectionsToExcerpt:
    module: organization
    type: process
    description: >-
      supplies each module's assigned spec_sections to the excerpt generator so workers know which spec sections are
      relevant to their module
    preceded_by:
      - organization/ModuleSpecSectionMap
    followed_by:
      - excerpt/SelectTargetModule
    in_journeys:
      - ProvideSpecSectionsForModuleCreation (step 3)
    triggered_by_actors: []
    cross_module_connections:
      - excerpt/SelectTargetModule
    referenced_in_modules:
      - organization
      - excerpt
  organization/HandleMissingSpecFile:
    module: organization
    type: process
    description: >-
      detects that spec.md does not exist or is unreadable on disk and reports a fatal error blocking the convergence
      pipeline
    preceded_by:
      - organization/ReadSpecFile
      - organization/HandleMissingSpecFile
    followed_by:
      - organization/HandleMissingSpecFile
      - convergence/ConvergenceState
    in_journeys:
      - HandleMissingSpec (step 3)
      - HandleMissingSpec (step 4)
    triggered_by_actors:
      - _actors/ProjectOwner
    cross_module_connections:
      - convergence/ConvergenceState
    referenced_in_modules:
      - organization
      - convergence
  organization/ValidateLLMOrganizationOutput:
    module: organization
    type: process
    description: >-
      checks that the LLM-produced organization contains all required sections — scope, module list with names and
      descriptions, dependency graph, and independence classification
    preceded_by:
      - _actors/LLMWorker
      - organization/ValidateLLMOrganizationOutput
    followed_by:
      - organization/ValidateLLMOrganizationOutput
      - llm/SendTask
      - organization/AssembleOrganization
    in_journeys:
      - RecoverFromMalformedOrganization (step 2)
      - RecoverFromMalformedOrganization (step 3)
      - RecoverFromMalformedOrganization (step 4)
      - RecoverFromMalformedOrganization (step 5)
      - RecoverFromMalformedOrganization (step 6)
      - RecoverFromMalformedOrganization (step 9)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - _actors/LLMWorker
      - llm/SendTask
    referenced_in_modules:
      - organization
      - _actors
      - llm
  organization/RepairCircularDependency:
    module: organization
    type: process
    description: >-
      sends the detected cycle path back to the LLM with an error message so it can propose a corrected dependency
      ordering
    preceded_by:
      - organization/ValidateBuildOrder
      - organization/RepairCircularDependency
    followed_by:
      - organization/RepairCircularDependency
      - llm/SendTask
    in_journeys:
      - RecoverFromCircularDependency (step 3)
      - RecoverFromCircularDependency (step 4)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - llm/SendTask
    referenced_in_modules:
      - organization
      - llm
  organization/RepairSpecCoverageGap:
    module: organization
    type: process
    description: >-
      sends the list of uncovered spec sections back to the LLM to either assign them to existing modules or propose new
      modules to cover them
    preceded_by:
      - organization/ValidateSpecCoverage
      - organization/RepairSpecCoverageGap
    followed_by:
      - organization/RepairSpecCoverageGap
      - llm/SendTask
    in_journeys:
      - RecoverFromSpecCoverageGap (step 2)
      - RecoverFromSpecCoverageGap (step 3)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - llm/SendTask
    referenced_in_modules:
      - organization
      - llm
  organization/HandleEmptyModuleList:
    module: organization
    type: process
    description: >-
      detects that the LLM identified zero modules from the spec and retries with an explicit prompt explaining the
      expected output format
    preceded_by:
      - organization/IdentifyModules
      - organization/HandleEmptyModuleList
    followed_by:
      - organization/HandleEmptyModuleList
      - llm/SendTask
    in_journeys:
      - RecoverFromEmptyModuleList (step 3)
      - RecoverFromEmptyModuleList (step 4)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - llm/SendTask
    referenced_in_modules:
      - organization
      - llm
  organization/HandleOrganizationWriteFailure:
    module: organization
    type: process
    description: >-
      detects a disk write failure when creating ORGANIZATION.md and retries the write or reports the error to
      convergence
    preceded_by:
      - organization/WriteOrganizationFile
      - organization/HandleOrganizationWriteFailure
    followed_by:
      - organization/HandleOrganizationWriteFailure
      - organization/WriteOrganizationFile
    in_journeys:
      - HandleOrganizationWriteError (step 3)
      - HandleOrganizationWriteError (step 4)
      - HandleOrganizationWriteError (step 5)
    triggered_by_actors: []
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/DetectSelfReferentialModules:
    module: organization
    type: process
    description: >-
      identifies modules in the list that describe parts of the convergence pipeline itself such as organization,
      convergence, compilation, and graph
    preceded_by:
      - organization/IdentifyModules
      - organization/ModuleList
    followed_by:
      - organization/ModuleList
      - organization/ValidateMetaModulePresence
    in_journeys:
      - OrganizationRecognizesSelf (step 3)
      - ValidateInfrastructureModulesPresent (step 3)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/ValidateMetaModulePresence:
    module: organization
    type: process
    description: >-
      checks that all required infrastructure modules are present in the module list when the spec describes a
      self-referential system like genome
    preceded_by:
      - organization/DetectSelfReferentialModules
      - organization/ValidateMetaModulePresence
    followed_by:
      - organization/ValidateMetaModulePresence
      - llm/SendTask
    in_journeys:
      - ValidateInfrastructureModulesPresent (step 4)
      - ValidateInfrastructureModulesPresent (step 5)
      - ValidateInfrastructureModulesPresent (step 6)
      - ValidateInfrastructureModulesPresent (step 7)
      - ValidateInfrastructureModulesPresent (step 8)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections:
      - llm/SendTask
    referenced_in_modules:
      - organization
      - llm
  organization/DetectSpecChangeToOwnSections:
    module: organization
    type: process
    description: >-
      determines whether changed spec sections overlap with the sections organization itself covers, indicating the
      organization step must re-analyze its own structure
    preceded_by:
      - organization/SpecSectionIndex
      - organization/DetectSpecChangeToOwnSections
    followed_by:
      - organization/DetectSpecChangeToOwnSections
      - organization/ModuleSpecSectionMap
    in_journeys:
      - DetectSpecChangeToOrganizationSections (step 5)
      - DetectSpecChangeToOrganizationSections (step 6)
    triggered_by_actors:
      - _actors/LLMWorker
    cross_module_connections: []
    referenced_in_modules:
      - organization
  organization/DiffModuleListAgainstExisting:
    module: organization
    type: process
    description: >-
      compares the newly identified module list against module YAML files already on disk to detect additions, removals,
      and renames
    preceded_by:
      - organization/ModuleList
      - organization/DiffModuleListAgainstExisting
    followed_by:
      - organization/DiffModuleListAgainstExisting
      - organization/PreserveExistingModulesOnReorganize
    in_journeys:
      - DiffModuleListForIncrementalUpdate (step 5)
      - DiffModuleListForIncrementalUpdate (step 6)
      - DiffModuleListForIncrementalUpdate (step 7)
