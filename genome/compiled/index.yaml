      - hierarchy/ChildConcurrencyLimit
    in_journeys:
      - HandleHighChildCountHierarchy (step 3)
      - HandleHighChildCountHierarchy (step 4)
      - HandleHighChildCountHierarchy (step 5)
      - HandleHighChildCountHierarchy (step 6)
