      - hierarchy/CollectChildInterfaces
      - graph/CompiledIndex
      - hierarchy/MergeChildGraphsIntoParent
    in_journeys:
      - MergeChildInterfacesIncrementally (step 3)
      - MergeChildInterfacesIncrementally (step 4)
      - MergeChildInterfacesIncrementally (step 6)
      - MergeChildInterfacesIncrementally (step 7)
      - MergeChildInterfacesIncrementally (step 8)
      - HandleHighChildCountHierarchy (step 15)
    triggered_by_actors:
