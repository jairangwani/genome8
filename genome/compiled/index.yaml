        action: runs sync to identify stale modules, then compile + audit on only those modules
        step_number: 6
      - node: _actors/Compiler
        action: validates only the stale modules
        step_number: 7
      - node: _actors/Auditor
        action: audits only the affected coverage areas
        step_number: 8
      - node: convergence/TriggerPublish
        action: re-publishes the updated interface after targeted reconvergence
        step_number: 9
      - node: convergence/EnterSleepMode
        action: returns to zero-cost sleep waiting for the next event
        step_number: 10
    modules_touched:
      - convergence
      - _actors
  RecoverFromCreationFailure:
    name: RecoverFromCreationFailure
    module: convergence
    actor: _actors/LLMWorker
    steps:
      - node: convergence/ModuleCreation
        action: delegates to LLM to create a module
        step_number: 1
      - node: _actors/LLMWorker
        action: writes a module YAML file that contains errors
        step_number: 2
      - node: graph/ModuleFile
        action: stores the problematic module on disk
        step_number: 3
      - node: convergence/CompileCheck
        action: invokes compile.ts on the new module
        step_number: 4
      - node: _actors/Compiler
        action: reports compilation errors in the new module
        step_number: 5
      - node: compilation/CompilationResult
        action: provides non-zero error count with specific error details
        step_number: 6
      - node: compilation/ErrorReport
        action: lists each error with type, location, and message
        step_number: 7
      - node: convergence/BoundedRetryRule
        action: checks that retry count has not exceeded the cap for this module
        step_number: 8
      - node: convergence/RetryModuleCreation
        action: packages the error report as context for a second creation attempt
        step_number: 9
      - node: excerpt/ExcerptOutput
        action: provides the same excerpt used in the original attempt
        step_number: 10
      - node: _actors/LLMWorker
        action: reads the error report and excerpt to create a corrected module
        step_number: 11
      - node: graph/ModuleFile
        action: overwrites the failed module with the corrected version
        step_number: 12
      - node: convergence/CompileCheck
        action: recompiles the corrected module against the graph
        step_number: 13
      - node: _actors/Compiler
        action: validates the corrected module
        step_number: 14
      - node: compilation/CompilationResult
        action: provides the recompilation result
        step_number: 15
      - node: convergence/BoundedCreationLoop
        action: proceeds to the next module if compilation now passes
        step_number: 16
      - node: convergence/ConvergenceState
        action: records the retry outcome and updates module completion status
        step_number: 17
    modules_touched:
      - convergence
      - _actors
      - graph
      - compilation
      - excerpt
  RecoverFromFixRegression:
    name: RecoverFromFixRegression
    module: convergence
    actor: _actors/LLMWorker
    steps:
      - node: convergence/AuditGapFix
        action: applies a targeted fix to a module
        step_number: 1
      - node: _actors/LLMWorker
        action: edits the module to close a coverage gap
        step_number: 2
      - node: graph/ModuleFile
        action: stores the edited module on disk
        step_number: 3
      - node: convergence/RecompileAfterFix
        action: runs compile.ts on the patched graph
        step_number: 4
      - node: _actors/Compiler
        action: detects new compilation errors introduced by the fix
        step_number: 5
      - node: compilation/CompilationResult
        action: provides non-zero error count indicating regression
        step_number: 6
      - node: compilation/ErrorReport
        action: lists the new errors caused by the fix
        step_number: 7
      - node: convergence/RollbackFailedFix
        action: reverts the module file to its pre-fix state from the last known good version
        step_number: 8
      - node: graph/ModuleFile
        action: restores the original module content before the fix
        step_number: 9
      - node: convergence/BoundedRetryRule
        action: checks that retry count has not exceeded the cap for this fix
        step_number: 10
      - node: convergence/AuditGapFix
        action: builds a new fix prompt including the regression error details
        step_number: 11
      - node: _actors/LLMWorker
        action: reads the error report and original gap to produce a fix that avoids the regression
        step_number: 12
      - node: graph/ModuleFile
        action: stores the revised fix on disk
        step_number: 13
      - node: convergence/RecompileAfterFix
        action: recompiles with the revised fix
        step_number: 14
      - node: _actors/Compiler
        action: validates the revised fix introduces no new errors
        step_number: 15
      - node: compilation/CompilationResult
        action: confirms zero new errors from the revised fix
        step_number: 16
      - node: convergence/ConvergenceState
        action: records the fix-retry outcome
        step_number: 17
    modules_touched:
      - convergence
      - _actors
      - graph
      - compilation
