      - graph
      - compilation
  ProjectConvergence:
    name: ProjectConvergence
    module: convergence
    actor: _actors/ProjectOwner
    steps:
      - node: _actors/ProjectOwner
        action: writes spec.md describing the project
        step_number: 1
      - node: convergence/SpecFile
        action: stores the spec on disk as the sole human input
        step_number: 2
      - node: convergence/ConvergenceCLI
        action: receives the command to start convergence
        step_number: 3
      - node: convergence/ReadSpec
