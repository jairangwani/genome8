      - sync/DiscardStaleEvent
    in_journeys:
      - ForwardOriginChainToSync (step 13)
      - SyncAfterEventDetection (step 5)
      - DiscardOutOfOrderEvent (step 4)
      - DiscardOutOfOrderEvent (step 6)
      - EndToEndRipplePropagation (step 4)
      - HandleConcurrentDependencyRipples (step 5)
