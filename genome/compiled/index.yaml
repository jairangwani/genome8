    type: actor
    description: >-
      encounters genome8 for the first time, runs convergence on their first spec.md, and evaluates whether the protocol
      fits their system
    preceded_by:
      - _goals/GenomeIsTheProduct
    followed_by:
      - _actors/ProjectOwner
      - convergence/ScaffoldProject
      - convergence/ReadSpec
    in_journeys:
      - NewProjectAdoption (step 1)
      - ScaffoldAndConvergeForNewAdopter (step 1)
      - ProveGenomeIsTheProduct (step 2)
    triggered_by_actors:
      - _actors/NewProjectAdopter
    cross_module_connections:
      - convergence/ScaffoldProject
      - _goals/GenomeIsTheProduct
      - convergence/ReadSpec
    referenced_in_modules:
      - _actors
      - convergence
      - _goals
  _actors/MigratingProject:
    module: _actors
    type: actor
    description: >-
      an existing codebase with legacy documentation being onboarded into genome8, requiring initial graph bootstrapping
      from pre-existing artifacts
    preceded_by: []
    followed_by:
      - _actors/ProjectOwner
      - _actors/Compiler
    in_journeys:
      - MigratingProjectBootstrap (step 1)
      - MigratingProjectReconcileCode (step 1)
      - MigratingProjectValidateAfterBootstrap (step 1)
    triggered_by_actors:
      - _actors/MigratingProject
    cross_module_connections: []
    referenced_in_modules:
      - _actors
  _actors/StaleBox:
    module: _actors
    type: actor
    description: >-
      a box whose event watcher has stopped or whose upstream dependencies have been removed, silently drifting out of
      sync with the living graph
    preceded_by: []
    followed_by:
      - events/RegisterEventWatchers
      - compilation/ExternalRefClassification
      - events/DetectWatcherCrash
    in_journeys:
      - StaleBoxRecovery (step 1)
      - DetectStaleBoxDuringCompilation (step 1)
      - RecoverStaleBoxWatcher (step 1)
    triggered_by_actors:
      - _actors/StaleBox
    cross_module_connections:
      - events/RegisterEventWatchers
      - compilation/ExternalRefClassification
      - events/DetectWatcherCrash
    referenced_in_modules:
      - _actors
      - events
      - compilation
  _actors/DeprecatedModule:
    module: _actors
    type: actor
    description: >-
      a module that is no longer relevant to the current spec but still exists on disk with orphaned nodes and dangling
      inbound references
    preceded_by: []
    followed_by:
      - compilation/OrphanDetection
      - graph/JourneyMembershipTracking
    in_journeys:
      - DeprecatedModuleCleanup (step 1)
      - DetectDeprecatedModuleDuringCompilation (step 1)
      - DetectAndIsolateDeprecatedModule (step 1)
    triggered_by_actors:
      - _actors/DeprecatedModule
    cross_module_connections:
      - compilation/OrphanDetection
      - graph/JourneyMembershipTracking
    referenced_in_modules:
      - _actors
      - compilation
      - graph
  _actors/ReturningOwner:
    module: _actors
    type: actor
    description: >-
      a ProjectOwner who re-triggers convergence after a long period of inactivity, facing stale hashes, outdated
      interfaces, and potentially broken child engines
    preceded_by: []
    followed_by:
      - convergence/ReadSpec
      - convergence/SpecFile
      - sync/ReadDependencyList
    in_journeys:
      - ReturningOwnerReconvergence (step 1)
      - SpecChangeOnSelf (step 1)
      - ResumeAfterOwnerReturn (step 1)
    triggered_by_actors:
      - _actors/ReturningOwner
    cross_module_connections:
      - convergence/ReadSpec
      - convergence/SpecFile
      - sync/ReadDependencyList
    referenced_in_modules:
      - _actors
      - convergence
      - sync
  _goals/SolveContextProblem:
    module: _goals
    type: rule
    description: any system at any scale gets scoped, connected, synced context — no single brain required
    preceded_by:
      - audit/GenerateAuditPrompt
    followed_by:
      - _goals/BuildPando
      - _actors/ProjectOwner
    in_journeys:
      - CheckGoalCoverageAgainstGoals (step 4)
      - ProveSolveContextProblem (step 1)
    triggered_by_actors:
      - _actors/Auditor
      - _actors/ProjectOwner
    cross_module_connections:
      - audit/GenerateAuditPrompt
      - _actors/ProjectOwner
    referenced_in_modules:
      - _goals
      - audit
      - _actors
  _goals/BuildPando:
    module: _goals
    type: rule
    description: decentralized AI platform ships as the first real proof that genome works at scale
    preceded_by:
      - _goals/SolveContextProblem
    followed_by:
      - _goals/GenomeIsTheProduct
      - _actors/ProjectOwner
    in_journeys:
      - CheckGoalCoverageAgainstGoals (step 5)
      - ProveBuildPando (step 1)
    triggered_by_actors:
      - _actors/Auditor
      - _actors/ProjectOwner
    cross_module_connections:
      - _actors/ProjectOwner
    referenced_in_modules:
      - _goals
      - _actors
  _goals/GenomeIsTheProduct:
    module: _goals
    type: rule
    description: genome is a protocol others adopt, not just an internal tool
    preceded_by:
      - _goals/BuildPando
    followed_by:
      - _goals/ProductionReady
      - _actors/NewProjectAdopter
    in_journeys:
      - CheckGoalCoverageAgainstGoals (step 6)
      - ProveGenomeIsTheProduct (step 1)
    triggered_by_actors:
      - _actors/Auditor
      - _actors/NewProjectAdopter
    cross_module_connections:
      - _actors/NewProjectAdopter
    referenced_in_modules:
      - _goals
      - _actors
  _goals/ProductionReady:
    module: _goals
    type: rule
    description: no hacks, no shortcuts — every component reliable enough for real workloads
    preceded_by:
      - _goals/GenomeIsTheProduct
    followed_by:
      - _goals/SelfSustaining
      - compilation/CompileFromModules
    in_journeys:
      - CheckGoalCoverageAgainstGoals (step 7)
      - ProveProductionReady (step 1)
    triggered_by_actors:
      - _actors/Auditor
    cross_module_connections:
      - compilation/CompileFromModules
    referenced_in_modules:
      - _goals
      - compilation
  _goals/SelfSustaining:
    module: _goals
    type: rule
    description: the system runs, converges, and heals without human intervention
    preceded_by:
      - _goals/ProductionReady
    followed_by:
      - _actors/Auditor
      - convergence/OnlyHumanInputIsSpec
    in_journeys:
      - CheckGoalCoverageAgainstGoals (step 8)
      - ProveSelfSustaining (step 1)
    triggered_by_actors:
      - _actors/Auditor
    cross_module_connections:
      - _actors/Auditor
      - convergence/OnlyHumanInputIsSpec
    referenced_in_modules:
      - _goals
      - _actors
      - convergence
journeys:
  DiscoverActorsFromSpec:
    name: DiscoverActorsFromSpec
    module: actors
    actor: _actors/LLMWorker
    steps:
      - node: convergence/DiscoverActors
        action: triggers actor discovery after organization step is complete
        step_number: 1
      - node: organization/OrganizationFile
        action: provides the organizational context for actor analysis
        step_number: 2
      - node: convergence/SpecFile
        action: provides the raw spec for actor extraction
        step_number: 3
      - node: actors/ThreeAngleDiscovery
        action: enforces that all 3 discovery angles will be executed
        step_number: 4
      - node: _actors/LLMWorker
        action: reads the spec to discover actors from the activities perspective
        step_number: 5
      - node: actors/DiscoverFromActivities
        action: identifies who uses, creates, operates, governs, and visits the system
        step_number: 6
      - node: actors/ActivitiesActorList
        action: stores the activities-perspective actors
        step_number: 7
      - node: _actors/LLMWorker
        action: reads the spec to discover actors from the threats perspective
        step_number: 8
      - node: actors/DiscoverFromThreats
        action: identifies attackers, abusers, failure scenarios, and exploitation vectors
        step_number: 9
      - node: actors/ThreatsActorList
        action: stores the threats-perspective actors
        step_number: 10
      - node: _actors/LLMWorker
        action: reads the spec to discover actors from the lifecycle perspective
        step_number: 11
      - node: actors/DiscoverFromLifecycle
        action: identifies first visit, onboarding, power use, decline, exit, and return actors
        step_number: 12
      - node: actors/LifecycleActorList
        action: stores the lifecycle-perspective actors
        step_number: 13
    modules_touched:
      - convergence
      - organization
      - actors
      - _actors
  MergeAndWriteActors:
    name: MergeAndWriteActors
    module: actors
    actor: null
    steps:
      - node: actors/ActivitiesActorList
        action: provides the activities-perspective actors for merging
        step_number: 1
      - node: actors/ThreatsActorList
        action: provides the threats-perspective actors for merging
        step_number: 2
      - node: actors/LifecycleActorList
        action: provides the lifecycle-perspective actors for merging
        step_number: 3
      - node: actors/MergeAndDeduplicate
        action: combines all actors, removes duplicates, keeps best descriptions
        step_number: 4
      - node: actors/MergedActorList
        action: stores the final deduplicated actor set
        step_number: 5
      - node: actors/WriteActorsFile
        action: writes the merged actors to _actors.yaml
        step_number: 6
      - node: actors/ActorsFile
        action: the _actors.yaml file is now on disk in the modules directory
        step_number: 7
      - node: convergence/ConvergenceState
        action: records that actor discovery is complete
        step_number: 8
    modules_touched:
      - actors
      - convergence
  InheritActorsToChildren:
    name: InheritActorsToChildren
    module: actors
    actor: _actors/ParentEngine
    steps:
      - node: _actors/ParentEngine
        action: has completed actor discovery and is preparing child engines
        step_number: 1
      - node: actors/ActorsFile
        action: provides the parent's _actors.yaml for distribution
        step_number: 2
      - node: actors/ParentDiscoversChildrenInherit
        action: enforces that children inherit actors rather than re-discovering
        step_number: 3
      - node: actors/InheritActorsFromParent
        action: copies _actors.yaml into the child engine directory
        step_number: 4
      - node: hierarchy/DistributeSharedActors
        action: places the shared actors in each child's modules directory
        step_number: 5
      - node: _actors/ChildEngine
        action: receives the inherited actors and uses them during its own convergence
        step_number: 6
    modules_touched:
      - _actors
      - actors
      - hierarchy
  ValidateActorsBeforeProceeding:
    name: ValidateActorsBeforeProceeding
    module: actors
    actor: null
    steps:
      - node: actors/ActivitiesActorList
        action: provides the activities-angle results for completeness checking
        step_number: 1
      - node: actors/ThreatsActorList
        action: provides the threats-angle results for completeness checking
        step_number: 2
      - node: actors/LifecycleActorList
        action: provides the lifecycle-angle results for completeness checking
        step_number: 3
      - node: actors/ValidateThreeAngleCompleteness
        action: checks that the activities angle produced at least one actor
        step_number: 4
      - node: actors/ValidateThreeAngleCompleteness
        action: checks that the threats angle produced at least one actor
        step_number: 5
      - node: actors/ValidateThreeAngleCompleteness
        action: checks that the lifecycle angle produced at least one actor
        step_number: 6
      - node: actors/ThreeAngleDiscovery
        action: confirms all 3 angles are satisfied
        step_number: 7
      - node: actors/ActorsFile
        action: provides the written _actors.yaml for structural validation
        step_number: 8
      - node: actors/ValidateActorYAMLStructure
        action: checks that every entry has type actor and a non-empty description
        step_number: 9
      - node: actors/ValidateActorYAMLStructure
        action: flags any malformed entries for correction before compilation
        step_number: 10
      - node: convergence/ValidateActorCompleteness
        action: receives the validation result and proceeds if all checks pass
        step_number: 11
    modules_touched:
      - actors
      - convergence
  ProvideActorsToCompilation:
    name: ProvideActorsToCompilation
    module: actors
    actor: _actors/Compiler
    steps:
      - node: actors/ActorsFile
        action: provides the validated _actors.yaml file on disk
        step_number: 1
      - node: _actors/Compiler
        action: includes _actors.yaml in the set of files to parse
        step_number: 2
      - node: compilation/YAMLParsing
        action: parses _actors.yaml into structured actor node definitions
        step_number: 3
      - node: graph/NodeDefinition
        action: creates a node definition for each discovered actor
        step_number: 4
      - node: graph/NodeRegistry
        action: registers each actor node so _actors/ references in journeys can resolve
        step_number: 5
      - node: graph/CompiledIndex
        action: the compiled index now contains all actor nodes alongside module nodes
        step_number: 6
    modules_touched:
      - actors
      - _actors
      - compilation
      - graph
  ProvideActorsForExcerptContext:
    name: ProvideActorsForExcerptContext
    module: actors
    actor: null
    steps:
      - node: convergence/ModuleCreation
        action: begins creating a module and requests an excerpt for context
        step_number: 1
      - node: actors/ActorsFile
        action: provides the full actor list as context source
        step_number: 2
      - node: actors/ProvideActorsForModuleCreation
        action: extracts actor names and descriptions relevant to the target module
        step_number: 3
      - node: excerpt/CollectReferencedActors
        action: gathers actor references needed by the target module's domain
        step_number: 4
      - node: excerpt/AssembleExcerpt
        action: includes the relevant actors in the excerpt so the worker can reference them
        step_number: 5
      - node: llm/TaskPayload
        action: packages the excerpt including actor context into the creation task
        step_number: 6
    modules_touched:
      - convergence
      - actors
      - excerpt
      - llm
  RediscoverActorsAfterSpecChange:
    name: RediscoverActorsAfterSpecChange
    module: actors
    actor: _actors/LLMWorker
    steps:
      - node: convergence/TargetedReconvergence
        action: signals that the spec has changed and actors may need updating
        step_number: 1
      - node: convergence/SpecFile
        action: provides the changed spec content
        step_number: 2
      - node: actors/RediscoverActorsOnSpecChange
        action: reads the current _actors.yaml to know the existing actor set
        step_number: 3
      - node: _actors/LLMWorker
        action: re-analyzes the changed spec from the activities perspective
        step_number: 4
      - node: actors/DiscoverFromActivities
        action: re-identifies activity actors from the updated spec
        step_number: 5
      - node: _actors/LLMWorker
        action: re-analyzes the changed spec from the threats perspective
        step_number: 6
      - node: actors/DiscoverFromThreats
        action: re-identifies threat actors from the updated spec
        step_number: 7
      - node: _actors/LLMWorker
        action: re-analyzes the changed spec from the lifecycle perspective
        step_number: 8
      - node: actors/DiscoverFromLifecycle
        action: re-identifies lifecycle actors from the updated spec
        step_number: 9
      - node: actors/MergeAndDeduplicate
        action: merges the rediscovered actors and removes duplicates
        step_number: 10
      - node: actors/UpdateActorsFileAfterRediscovery
        action: diffs the rediscovered set against the existing actors to find additions and removals
        step_number: 11
      - node: actors/UpdateActorsFileAfterRediscovery
        action: adds new actors to _actors.yaml and flags removed actors for orphan detection
        step_number: 12
      - node: actors/WriteActorsFile
        action: writes the updated _actors.yaml to disk
        step_number: 13
      - node: actors/ActorsFile
        action: the updated actor file is ready for recompilation
        step_number: 14
    modules_touched:
      - convergence
      - actors
      - _actors
  EndToEndActorDiscoveryToModuleCreation:
    name: EndToEndActorDiscoveryToModuleCreation
    module: actors
    actor: _actors/ProjectOwner
    steps:
      - node: _actors/ProjectOwner
        action: has written spec.md describing their system
        step_number: 1
      - node: convergence/ReadSpec
        action: reads the spec from disk
        step_number: 2
      - node: convergence/WriteOrganization
        action: organization step produces the module list
        step_number: 3
      - node: convergence/DiscoverActors
        action: triggers actor discovery after organization is complete
        step_number: 4
      - node: actors/DiscoverFromActivities
        action: discovers activity actors from the spec
        step_number: 5
      - node: actors/DiscoverFromThreats
        action: discovers threat actors from the spec
        step_number: 6
      - node: actors/DiscoverFromLifecycle
        action: discovers lifecycle actors from the spec
        step_number: 7
      - node: actors/MergeAndDeduplicate
        action: merges and deduplicates actors from all 3 angles
        step_number: 8
      - node: actors/WriteActorsFile
        action: writes _actors.yaml to disk
        step_number: 9
      - node: actors/ValidateActorYAMLStructure
        action: validates the written file has correct structure
        step_number: 10
      - node: _actors/Compiler
        action: compiles _actors.yaml into the graph alongside module files
        step_number: 11
      - node: graph/NodeRegistry
        action: registers actor nodes so journey steps can reference _actors/ActorName
        step_number: 12
      - node: convergence/ModuleCreation
        action: begins creating modules with actors available as valid references
        step_number: 13
      - node: actors/ProvideActorsForModuleCreation
        action: supplies the actor list to each module's excerpt context
        step_number: 14
      - node: excerpt/AssembleExcerpt
        action: includes relevant actors in the module creation excerpt
        step_number: 15
    modules_touched:
      - _actors
      - convergence
      - actors
      - graph
      - excerpt
  SpecInjectionDefense:
    name: SpecInjectionDefense
    module: actors
    actor: _actors/MaliciousSpecAuthor
    steps:
      - node: _actors/MaliciousSpecAuthor
        action: submits a spec.md containing prompt injection or adversarial content
        step_number: 1
      - node: convergence/ReadSpec
        action: reads the potentially malicious spec from disk
        step_number: 2
      - node: actors/DiscoverFromActivities
        action: processes the spec through LLM which may encounter injected prompts
        step_number: 3
      - node: _actors/LLMWorker
        action: receives the spec content including any adversarial payloads
        step_number: 4
      - node: actors/WriteActorsFile
        action: writes whatever actors the LLM discovered including any injected entries
        step_number: 5
      - node: _actors/Compiler
        action: validates the resulting _actors.yaml for structural correctness
        step_number: 6
      - node: compilation/DuplicateDetection
        action: catches any duplicate actor names injected by the adversarial content
        step_number: 7
      - node: compilation/DanglingRefDetection
        action: catches any phantom references injected through the adversarial spec
        step_number: 8
    modules_touched:
      - _actors
      - convergence
      - actors
      - compilation
  YAMLTamperingDefense:
    name: YAMLTamperingDefense
    module: actors
    actor: _actors/YAMLTamperer
    steps:
      - node: _actors/YAMLTamperer
        action: directly edits _actors.yaml to inject invalid actor definitions or corrupt entries
        step_number: 1
      - node: actors/ActorsFile
        action: contains the tampered content
        step_number: 2
      - node: _actors/Compiler
        action: runs compilation on the tampered file
        step_number: 3
      - node: compilation/YAMLErrorReporting
        action: catches any YAML syntax errors from the tampering
        step_number: 4
      - node: graph/NodeTypeSchema
        action: validates that tampered entries still conform to the actor type schema
        step_number: 5
      - node: compilation/CompilationResult
        action: reports validation errors from the tampered content
        step_number: 6
    modules_touched:
      - _actors
      - actors
      - compilation
      - graph
  RogueWorkerDefense:
    name: RogueWorkerDefense
    module: actors
    actor: _actors/RogueWorker
    steps:
      - node: _actors/RogueWorker
        action: produces subtly wrong actor content with hallucinated or phantom actors
        step_number: 1
      - node: actors/WriteActorsFile
        action: writes the rogue content to _actors.yaml
        step_number: 2
      - node: actors/ActorsFile
        action: contains the hallucinated actors
        step_number: 3
      - node: actors/ValidateActorCoverage
        action: checks that every actor appears in at least one journey
        step_number: 4
      - node: compilation/OrphanDetection
        action: flags hallucinated actors that no journey references as orphans
        step_number: 5
      - node: convergence/AuditGapFix
        action: targeted fix removes orphan actors that cannot be connected to any journey
        step_number: 6
    modules_touched:
      - _actors
      - actors
      - compilation
      - convergence
  EventSpoofingDefense:
    name: EventSpoofingDefense
    module: actors
    actor: _actors/EventSpoofer
    steps:
      - node: _actors/EventSpoofer
        action: writes a fake event file to trigger unnecessary reconvergence
        step_number: 1
      - node: events/DetectEventFileChange
        action: detects the spoofed event file change
        step_number: 2
      - node: events/ReadEventFile
        action: reads the spoofed event content
        step_number: 3
      - node: sync/FetchDependencyHash
        action: fetches the actual dependency hash to compare
        step_number: 4
      - node: sync/CompareStoredHash
        action: compares and finds the hash has not actually changed
        step_number: 5
      - node: sync/SkipIfAllCurrent
        action: aborts sync because no real change occurred, neutralizing the spoof
        step_number: 6
    modules_touched:
      - _actors
      - events
      - sync
  InfiniteRippleDefense:
    name: InfiniteRippleDefense
    module: actors
    actor: _actors/InfiniteLoopTrigger
    steps:
      - node: _actors/InfiniteLoopTrigger
        action: crafts circular dependencies or oscillating changes to cause unbounded ripple
        step_number: 1
      - node: events/DetectEventFileChange
        action: detects the rapid sequence of events
        step_number: 2
      - node: events/OscillationCooldown
        action: suppresses re-trigger because the same dependency fired within the cooldown window
        step_number: 3
      - node: events/DebounceEvents
        action: batches the rapid events into a single sync trigger
        step_number: 4
      - node: sync/CompareStoredHash
        action: compares hashes and finds they cycle back to a previous state
        step_number: 5
      - node: sync/SkipIfAllCurrent
        action: aborts because the effective state has not changed
        step_number: 6
    modules_touched:
      - _actors
      - events
      - sync
  HashCollisionDefense:
    name: HashCollisionDefense
    module: actors
    actor: _actors/HashCollisionExploiter
    steps:
      - node: _actors/HashCollisionExploiter
        action: manipulates content to produce identical SHA256 hashes
        step_number: 1
      - node: publish/ComputeInterfaceHash
        action: computes hash on the manipulated content
        step_number: 2
      - node: publish/ComparePreviousHash
        action: compares and incorrectly finds no change due to collision
        step_number: 3
      - node: publish/SkipPublishIfUnchanged
        action: incorrectly skips publish, missing the real change
        step_number: 4
      - node: _actors/Auditor
        action: detects the coverage gap during depth audit because spec content diverges from graph
        step_number: 5
      - node: convergence/AuditGapFix
        action: targeted fix forces a re-publish of the affected interface
        step_number: 6
    modules_touched:
      - _actors
      - publish
      - convergence
  PrivilegeEscalationDefense:
    name: PrivilegeEscalationDefense
    module: actors
    actor: _actors/PrivilegeEscalator
    steps:
      - node: _actors/PrivilegeEscalator
        action: attempts to use LLMWorker's native tools to access files outside box scope
        step_number: 1
      - node: llm/NativeToolSet
        action: provides the tool access that could be exploited
        step_number: 2
      - node: llm/WriteFile
        action: worker attempts to write to a path outside the box directory
        step_number: 3
      - node: _actors/Compiler
        action: detects files or references outside the expected module scope
        step_number: 4
      - node: compilation/DanglingRefDetection
        action: flags any references to nodes or files outside the box boundary
        step_number: 5
      - node: compilation/CompilationResult
        action: reports the out-of-scope access as validation errors
        step_number: 6
    modules_touched:
      - _actors
      - llm
      - compilation
  ResourceExhaustionDefense:
    name: ResourceExhaustionDefense
    module: actors
    actor: _actors/ResourceExhauster
    steps:
      - node: _actors/ResourceExhauster
        action: submits a spec designed to spawn unbounded child engines
        step_number: 1
      - node: organization/IdentifyModules
        action: discovers a very large number of modules from the adversarial spec
        step_number: 2
      - node: organization/ModuleList
        action: stores the inflated module list
        step_number: 3
      - node: hierarchy/DecideSplit
        action: evaluates whether the large module count warrants splitting
        step_number: 4
      - node: convergence/BoundedCreationRule
        action: enforces that creation is bounded by modules times lenses, not unbounded
        step_number: 5
      - node: convergence/DataDecidesWhenToStop
        action: allows convergence to complete even with many modules since creation is bounded
        step_number: 6
    modules_touched:
      - _actors
      - organization
      - hierarchy
      - convergence
  StaleBoxRecovery:
    name: StaleBoxRecovery
    module: actors
    actor: _actors/StaleBox
    steps:
      - node: _actors/StaleBox
        action: has stopped watching events and drifted out of sync
        step_number: 1
      - node: events/RegisterEventWatchers
        action: re-registers fs.watch watchers on dependency event files
        step_number: 2
      - node: sync/FetchDependencyHash
        action: fetches current hashes from all dependencies
        step_number: 3
      - node: sync/CompareStoredHash
        action: finds multiple hashes have changed during the stale period
        step_number: 4
      - node: sync/FindAffectedModules
        action: identifies all modules affected by the accumulated changes
        step_number: 5
      - node: sync/MarkModulesStale
        action: marks all affected modules for reconvergence
        step_number: 6
      - node: convergence/TargetedReconvergence
        action: reconverges all stale modules to bring the box back in sync
        step_number: 7
    modules_touched:
      - _actors
      - events
      - sync
      - convergence
  DeprecatedModuleCleanup:
