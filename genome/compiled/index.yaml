      - node: compilation/ParallelValidationDispatch
        action: >-
          dispatches DuplicateDetection, DanglingRefDetection, OrphanDetection, IsolatedModuleDetection, and
          StaleConnectionDetection concurrently
        step_number: 7
      - node: compilation/DuplicateDetection
        action: checks for duplicate node names concurrently with other checks
        step_number: 8
      - node: compilation/DanglingRefDetection
        action: checks for unresolved node references concurrently with other checks
        step_number: 9
      - node: compilation/OrphanDetection
        action: checks for unreferenced nodes concurrently with other checks
        step_number: 10
      - node: compilation/IsolatedModuleDetection
        action: checks for isolated modules concurrently with other checks
        step_number: 11
      - node: compilation/StaleConnectionDetection
        action: checks for stale connections concurrently with other checks
        step_number: 12
      - node: compilation/ParallelValidationDispatch
        action: collects all ErrorReports from completed concurrent checks
        step_number: 13
      - node: compilation/ValidationAggregation
        action: merges the concurrent check results into a single compilation result
        step_number: 14
