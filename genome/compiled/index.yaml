    in_journeys:
      - HierarchySplitPipeline (step 16)
      - ValidateAndConnectChildren (step 7)
      - EndToEndHierarchySplit (step 15)
      - FlattenGrandchildInterfacesIntoChild (step 5)
      - PropagateUnresolvedRefsAcrossLevels (step 10)
      - EndToEndDeepHierarchy (step 17)
    triggered_by_actors:
