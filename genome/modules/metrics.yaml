spec_sections: [3, 5]

nodes:
  ConvergenceMetricsRecord:
    type: artifact
    description: in-memory accumulator that holds LLM call count, total tokens, per-step wall-clock timings, start and completion timestamps, modules processed, nodes created, and journeys created
    files: ["src/metrics.ts"]
  MetricsJsonFile:
    type: artifact
    description: genome/metrics.json written to disk after each convergence with the finalized metrics snapshot
    files: ["src/convergence.ts"]
  TrackLLMCall:
    type: process
    description: increments the LLM call counter and adds the token count from a single call to the running total
    files: ["src/metrics.ts"]
  StartStepTimer:
    type: process
    description: records the wall-clock start time for a named pipeline step in the step timings map
    files: ["src/metrics.ts"]
  EndStepTimer:
    type: process
    description: computes elapsed milliseconds for a named pipeline step by subtracting its start time from the current time
    files: ["src/metrics.ts"]
  TrackModuleCount:
    type: process
    description: records the number of modules processed during convergence into the metrics accumulator
    files: ["src/metrics.ts"]
  TrackGraphCounts:
    type: process
    description: records the total node count and journey count from the compiled graph into the metrics accumulator
    files: ["src/metrics.ts"]
  FinalizeMetrics:
    type: process
    description: stamps the completion timestamp and returns a frozen snapshot of the accumulated metrics
    files: ["src/metrics.ts"]
  WriteMetricsToDisk:
    type: process
    description: serializes the finalized metrics snapshot to JSON and writes it to genome/metrics.json
    files: ["src/convergence.ts"]
  StepTimingInvariant:
    type: rule
    description: endStep silently skips if startStep was never called for that step name, preventing negative or nonsensical elapsed times

journeys:
  TrackPipelineStepPerformance:
    description: times a single pipeline step from start to completion
    steps:
      - node: convergence/ReadSpec
        action: begins a pipeline step that needs timing
      - node: StartStepTimer
        action: records the wall-clock start time for the step
      - node: ConvergenceMetricsRecord
        action: stores the start timestamp keyed by step name
      - node: StepTimingInvariant
        action: ensures startStep was called before endStep resolves timing
      - node: EndStepTimer
        action: computes elapsed ms when the step completes
      - node: ConvergenceMetricsRecord
        action: replaces the start timestamp with the elapsed duration

  RecordLLMUsage:
    description: tracks an LLM call and its token consumption
    steps:
      - node: _actors/LLMWorker
        action: completes an LLM call and reports the token count
      - node: llm/TaskResult
        action: provides the completed task result including token usage count
      - node: TrackLLMCall
        action: increments the call counter and adds tokens to the running total
      - node: ConvergenceMetricsRecord
        action: stores the updated llmCalls and totalTokens fields

  TrackConvergenceScope:
    description: records the scale of a convergence run after compilation
    steps:
      - node: convergence/CompileCheck
        action: finishes compilation and reports module, node, and journey counts
      - node: compilation/CompilationResult
        action: provides the compilation output with error and warning counts
      - node: graph/CompiledIndex
        action: provides the compiled graph with total node and journey counts
      - node: TrackModuleCount
        action: records the number of modules processed
      - node: TrackGraphCounts
        action: records the node and journey totals from the compiled graph
      - node: ConvergenceMetricsRecord
        action: stores modulesProcessed, nodesCreated, and journeysCreated

  FinalizeAndPersistMetrics:
    description: snapshots the accumulated metrics and writes them to disk after convergence completes
    steps:
      - node: convergence/TriggerPublish
        action: signals that convergence has completed and metrics can be finalized
      - node: FinalizeMetrics
        action: stamps completedAt and returns a frozen metrics snapshot
      - node: ConvergenceMetricsRecord
        action: provides the accumulated data for the snapshot
      - node: WriteMetricsToDisk
        action: serializes the snapshot to JSON
      - node: MetricsJsonFile
        action: receives the written metrics at genome/metrics.json
      - node: _actors/HumanDeveloper
        action: reads genome/metrics.json to review pipeline performance

  TrackAuditPerformance:
    steps:
      - node: convergence/TargetedAudit
        action: begins the audit phase of the pipeline
      - node: StartStepTimer
        action: records the wall-clock start time for the audit step
      - node: audit/CheckSpecCoverage
        action: runs all three auditors against the compiled graph
      - node: audit/TrackAuditRound
        action: completes an audit round with findings and fix attempts
      - node: EndStepTimer
        action: computes elapsed ms for the audit phase
      - node: ConvergenceMetricsRecord
        action: stores the audit duration and round count

  TrackCodegenAndTestgenPerformance:
    steps:
      - node: convergence/TriggerCodegen
        action: begins the code generation phase
      - node: StartStepTimer
        action: records the start time for the codegen step
      - node: codegen/ReadConvergedGraph
        action: generates skeletons and fills implementations
      - node: EndStepTimer
        action: computes elapsed ms for codegen
      - node: StartStepTimer
        action: records the start time for the testgen step
      - node: testgen/ReadJourneySteps
        action: generates test skeletons and fills assertions
      - node: EndStepTimer
        action: computes elapsed ms for testgen
      - node: ConvergenceMetricsRecord
        action: stores codegen and testgen durations

  TrackOrganizationAndActorPerformance:
    steps:
      - node: convergence/WriteOrganization
        action: begins the organization phase
      - node: StartStepTimer
        action: records the start time for organization analysis
      - node: organization/WriteOrganizationFile
        action: reads spec and writes ORGANIZATION.md
      - node: EndStepTimer
        action: computes elapsed ms for organization
      - node: StartStepTimer
        action: records the start time for actor discovery
      - node: actors/WriteActorsFile
        action: discovers actors from three angles and writes actors file
      - node: EndStepTimer
        action: computes elapsed ms for actor discovery
      - node: ConvergenceMetricsRecord
        action: stores organization and actor discovery durations

  TrackPublishAndEventPerformance:
    steps:
      - node: convergence/TriggerPublish
        action: begins the publish phase
      - node: StartStepTimer
        action: records the start time for publishing
      - node: publish/GenerateInterfaceYaml
        action: generates interface.yaml and writes event file
      - node: EndStepTimer
        action: computes elapsed ms for publish
      - node: events/PropagateRipple
        action: processes the event through watchers and ripple propagation
      - node: ConvergenceMetricsRecord
        action: stores publish and event processing durations

  TrackHierarchySplitPerformance:
    steps:
      - node: convergence/HierarchyDecision
        action: begins the hierarchy decision phase
      - node: StartStepTimer
        action: records the start time for hierarchy split
      - node: hierarchy/CollectChildInterfaces
        action: splits into children, waits for convergence, merges interfaces
      - node: EndStepTimer
        action: computes elapsed ms for the full hierarchy split
      - node: ConvergenceMetricsRecord
        action: stores hierarchy split duration and child engine count

  TrackSyncPerformance:
    steps:
      - node: convergence/WakeOnEvent
        action: wakes from sleep after an event triggers reconvergence
      - node: StartStepTimer
        action: records the start time for the sync operation
      - node: sync/CompareStoredHash
        action: compares dependency hashes to detect changes
      - node: sync/FindAffectedModules
        action: traces which modules are affected by the dependency change
      - node: sync/MarkModulesStale
        action: marks affected modules for targeted reconvergence
      - node: EndStepTimer
        action: computes elapsed ms for the sync operation
      - node: ConvergenceMetricsRecord
        action: stores sync duration and stale module count

  TrackExcerptGenerationPerformance:
    steps:
      - node: convergence/ModuleCreation
        action: begins module creation which requires excerpt generation for each module
      - node: StartStepTimer
        action: records the start time for excerpt generation
      - node: excerpt/SelectTargetModule
        action: selects the module to generate an excerpt for
      - node: excerpt/AssembleExcerpt
        action: assembles the focused context from nodes, journeys, and cross-module connections
      - node: excerpt/TruncateToLimit
        action: trims the excerpt to the configured line budget
      - node: EndStepTimer
        action: computes elapsed ms for this excerpt generation
      - node: ConvergenceMetricsRecord
        action: stores excerpt generation duration and module name
