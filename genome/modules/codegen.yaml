spec_sections: [3, 5]

nodes:
  ReadConvergedGraph:
    type: process
    description: reads the compiled index after convergence to extract all nodes with their types, descriptions, file paths, connection context (preceded_by, followed_by, triggered_by_actors), journey participation, and properties for skeleton generation
    files: ["src/codegen.ts"]
  GenerateProcessSkeletons:
    type: process
    description: creates a TypeScript class skeleton for each process node with a JSDoc header, optional config interface, and journey-derived method stubs
    files: ["src/codegen.ts"]
  FillImplementation:
    type: process
    description: delegates to LLM to fill the empty function bodies and class methods in a skeleton file with working code
  WriteGeneratedFile:
    type: process
    description: writes a generated TypeScript file to disk — either an unfilled skeleton during skeleton generation or a filled implementation during LLM fill — at the path declared in the node's files field
    files: ["src/codegen.ts"]
  ValidateFilledSyntax:
    type: process
    description: runs a TypeScript syntax and type check on the filled source file to catch LLM-generated errors before staging
    files: ["src/codegen.ts"]
  StageFilledModule:
    type: process
    description: writes the validated filled file to the staging directory rather than directly to the final output, allowing review before commit
  SelectNextModuleToFill:
    type: process
    description: picks the next unfilled module from the dependency-ordered build list and advances the pointer
  ConfirmAllModulesFilled:
    type: process
    description: checks that every module in the dependency-ordered build list has a filled source file on disk before signaling codegen completion
  BuildFillPrompt:
    type: process
    description: builds a structured fill prompt from the skeleton content, node name, description, and connection context (preceded_by, followed_by, triggered_by_actors) with rules instructing the LLM to replace stubs with working code while preserving signatures
    files: ["src/codegen.ts"]
  ProvideCodegenExcerpt:
    type: process
    description: assembles codegen-specific excerpt context including node descriptions, journey flows, and cross-module imports to guide the LLM fill
  RetryFillWithErrorFeedback:
    type: process
    description: sends the syntax or type errors from a failed fill back to the LLM as feedback and re-requests the fill with the original skeleton plus the error context
  DetectWorkerCrashDuringFill:
    type: process
    description: detects that the LLM worker process crashed, timed out, or disconnected during a fill task before the result was fully received
  ResumeFromLastFilledModule:
    type: process
    description: on restart after a partial crash, scans the generated code directory to find which modules already have filled files and resumes from the next unfilled module in build order
  SkipAndDeferFailedModule:
    type: process
    description: when a module fill fails after retries, skips it and continues with independent modules that do not depend on the failed one, deferring it for a later attempt
  RollbackCorruptedFill:
    type: process
    description: reverts a filled file back to its skeleton state when the fill passes syntax check but causes type errors in dependent modules downstream
  SkeletonFile:
    type: artifact
    description: a per-node TypeScript class file for a process node containing JSDoc context, optional config interface, and journey-derived method stubs ready for LLM to fill
    files: [test/codegen.test.ts]
  FilledSourceFile:
    type: artifact
    description: a TypeScript file with LLM-filled implementations for all node stubs in a module
  GeneratedCodeDirectory:
    type: artifact
    description: the output directory containing all generated TypeScript files organized by module
  ProcessNodesOnly:
    type: rule
    description: skeleton generation only targets process-type nodes, excluding artifact, interface, and rule nodes entirely regardless of whether they declare a files field
  FilesFieldRequired:
    type: rule
    description: skeleton generation only targets nodes that declare a files field, skipping all nodes without explicit file path mappings
  NeverOverwriteExisting:
    type: rule
    description: skeleton generation skips any file path where a file already exists on disk, preventing accidental overwrite of filled implementations
  EnsureOutputDirectory:
    type: process
    description: creates the output directory tree for a skeleton file if it does not already exist on disk before writing
    files: ["src/codegen.ts"]
  CodeComesFromNodes:
    type: rule
    description: every generated function, class, or interface maps directly to a node in the graph — no code exists without a node
  SkeletonBeforeFill:
    type: rule
    description: code generation always produces empty skeletons first, then LLM fills — never asks LLM to generate from scratch
  EnforceFillRetryLimit:
    type: process
    description: tracks fill retry count per module and triggers skip-and-defer when the configured maximum is exceeded, preventing infinite retry loops on persistently failing modules
  DetectNodeStubMismatch:
    type: process
    description: compares function and class exports in a filled file against the module's node list to detect added or removed stubs that violate CodeComesFromNodes
    files: ["src/codegen.ts"]
  DetectPlaceholderFill:
    type: process
    description: scans filled function bodies for placeholder patterns like throw-not-implemented, TODO comments, empty bodies, and return-undefined stubs that indicate the LLM did not produce real implementations
    files: ["src/codegen.ts"]
  DispatchByFileExtension:
    type: process
    description: selects the language-specific skeleton generator based on file extension, routing .ts and .js files to the TypeScript generator and all others to a generic comment skeleton
    files: ["src/codegen.ts"]
  EnrichSkeletonWithConnectionContext:
    type: process
    description: embeds node name, description, in_journeys, preceded_by, followed_by, and triggered_by_actors metadata as JSDoc comments in the skeleton header so the LLM understands the node's identity and graph context during fill
    files: ["src/codegen.ts"]
  GenerateConfigInterface:
    type: process
    description: generates a named Config interface from the node's properties map when properties exist, inferring TypeScript types from runtime value types via typeof, providing typed configuration for the implementation class
    files: ["src/codegen.ts"]
  GenerateJourneyMethodStubs:
    type: process
    description: creates one deduplicated async method stub per journey the node participates in, stripping step numbers and non-alphanumeric characters to produce camelCase method names, each annotated with a JSDoc journey reference and throwing NotImplemented
    files: ["src/codegen.ts"]
  CodegenResultSummary:
    type: artifact
    description: the exported CodegenResult interface returned by generateCodeSkeletons containing a generated list of bare file paths and a skipped list of reason-annotated diagnostic strings explaining why each node or file was excluded
    files: ["src/codegen.ts"]
  DetectCodeNeedsUpdate:
    type: process
    description: compares the current graph node metadata against the existing source file to determine if the code has drifted from the graph and needs an edit-based update rather than a fresh skeleton
    files: ["src/codegen.ts"]
  GenerateUpdateContext:
    type: process
    description: assembles the diff between the previous graph state and the current graph state for a node, producing targeted edit instructions that describe what changed in the node's description, connections, or journey participation
  ApplyEditToExistingCode:
    type: process
    description: sends the update context to the LLM worker with instructions to use Edit on the existing source file rather than regenerating it, preserving working code while updating only the parts that changed
  Mode2UpdateExisting:
    type: rule
    description: when a source file already exists for a node, codegen must update it via Edit rather than regenerating from scratch because full rewrites mask bugs

journeys:
  GenerateSkeletonsFromGraph:
    files: [test/journeys/GenerateSkeletonsFromGraph.test.ts]
    steps:
      - node: convergence/TriggerCodegen
        action: invokes codegen.ts after convergence and publish are complete
      - node: graph/CompiledIndex
        action: provides the full converged graph with all nodes and connections
      - node: ReadConvergedGraph
        action: extracts all nodes from the compiled index organized by module
      - node: ProcessNodesOnly
        action: filters to process-type nodes only, excluding artifact, interface, and rule nodes
      - node: CodeComesFromNodes
        action: ensures every skeleton maps to exactly one graph node
      - node: GenerateProcessSkeletons
        action: creates TypeScript class skeletons for all process nodes that have a files field
      - node: DispatchByFileExtension
        action: routes .ts and .js files to the TypeScript generator, others to generic comment skeleton
      - node: EnrichSkeletonWithConnectionContext
        action: writes JSDoc header with description, in_journeys, preceded_by, followed_by, and triggered_by_actors
      - node: GenerateConfigInterface
        action: generates a TypeScript interface from the node's properties map if properties exist
      - node: GenerateJourneyMethodStubs
        action: adds one async method stub per journey with camelCase name and throw NotImplemented body
      - node: NeverOverwriteExisting
        action: skips any file path where a file already exists on disk
      - node: EnsureOutputDirectory
        action: creates the parent directory tree if it does not yet exist
      - node: WriteGeneratedFile
        action: writes each skeleton to disk at the declared file path
      - node: SkeletonFile
        action: stores the generated skeleton file for each process node
      - node: CodegenResultSummary
        action: records generated file paths and skip reasons in the result
      - node: SkeletonBeforeFill
        action: confirms skeletons are complete before any LLM filling begins

  FillSkeletonsWithLLM:
    files: [test/journeys/FillSkeletonsWithLLM.test.ts]
    steps:
      - node: SkeletonFile
        action: provides the empty skeleton for a module
      - node: ProvideCodegenExcerpt
        action: assembles codegen-specific context including node descriptions and journey flows
      - node: excerpt/ExcerptOutput
        action: provides focused context for the module to guide implementation
      - node: BuildFillPrompt
        action: builds the structured fill prompt combining skeleton content, node metadata, connection context, and fill rules
      - node: llm/TaskPayload
        action: packages the prompt into a task for the worker
      - node: llm/SendTask
        action: sends the fill task to the LLM worker
      - node: _actors/LLMWorker
        action: reads the skeleton and excerpt to understand what each stub should do
      - node: FillImplementation
        action: LLM writes working code into each empty function body and class method
      - node: llm/ReceiveResult
        action: receives the filled source code from the worker
      - node: FilledSourceFile
        action: stores the implementation-complete TypeScript file
      - node: ValidateFilledSyntax
        action: runs TypeScript syntax and type checking on the filled output
      - node: WriteGeneratedFile
        action: writes the validated file to the generated code output directory
      - node: GeneratedCodeDirectory
        action: the file is now on disk in the output directory

  FillAllModulesInOrder:
    files: [test/journeys/FillAllModulesInOrder.test.ts]
    steps:
      - node: organization/DependencyGraph
        action: provides the build order so dependencies are filled before dependents
      - node: SelectNextModuleToFill
        action: picks the first module in build order which has no internal dependencies
      - node: SkeletonFile
        action: provides the selected module's skeleton
      - node: BuildFillPrompt
        action: builds the fill prompt from the skeleton and node metadata with connection context and fill rules
      - node: FillImplementation
        action: LLM fills the first module
      - node: FilledSourceFile
        action: the first filled file is available for subsequent modules to import
      - node: ValidateFilledSyntax
        action: checks the filled file for syntax and type errors
      - node: WriteGeneratedFile
        action: writes the first filled file to disk
      - node: SelectNextModuleToFill
        action: advances to the next module in build order
      - node: SkeletonFile
        action: provides the next module's skeleton
      - node: _actors/LLMWorker
        action: fills the next module with access to previously filled dependency files
      - node: FillImplementation
        action: LLM fills the module referencing already-implemented dependencies
      - node: ValidateFilledSyntax
        action: checks each subsequent filled file for errors
      - node: WriteGeneratedFile
        action: writes each filled file to disk as it completes
      - node: GeneratedCodeDirectory
        action: accumulates all filled files in build order
      - node: ConfirmAllModulesFilled
        action: verifies every module in the build list has a filled source file
      - node: convergence/ConvergenceState
        action: records that code generation is complete for all modules

  ProvideCodegenExcerptContext:
    files: [test/journeys/ProvideCodegenExcerptContext.test.ts]
    steps:
      - node: SelectNextModuleToFill
        action: identifies which module needs an excerpt for its fill pass
      - node: excerpt/SelectTargetModule
        action: targets the module for excerpt generation
      - node: graph/CompiledIndex
        action: provides the compiled graph for understanding node purposes and connections
      - node: excerpt/CollectLocalNodes
        action: extracts the module's nodes with types and descriptions for implementation guidance
      - node: excerpt/CollectLocalJourneys
        action: extracts the module's journeys showing how nodes interact in sequences
      - node: excerpt/CollectCrossModuleConnections
        action: identifies imports and dependencies the implementation needs to reference
      - node: excerpt/LensRelevance
        action: filters context to implementation-relevant details emphasizing node descriptions and journey flows
      - node: excerpt/AssembleExcerpt
        action: builds the codegen-focused excerpt prioritizing implementation guidance
      - node: excerpt/TruncateToLimit
        action: ensures the excerpt fits within the line budget
      - node: excerpt/ExcerptOutput
        action: provides the implementation-focused excerpt for the fill task
      - node: ProvideCodegenExcerpt
        action: wraps the excerpt with codegen-specific instructions for the LLM worker

  ValidateAndStageFilledModule:
    files: [test/journeys/ValidateAndStageFilledModule.test.ts]
    steps:
      - node: FillImplementation
        action: has produced a filled source file from the LLM worker
      - node: FilledSourceFile
        action: provides the filled TypeScript content for validation
      - node: ValidateFilledSyntax
        action: parses the filled file to check for syntax errors
      - node: ValidateFilledSyntax
        action: runs type checking against the module's imports and dependencies
      - node: CodeComesFromNodes
        action: verifies the filled file still contains one function or class per graph node
      - node: StageFilledModule
        action: writes the validated file to the staging directory
      - node: convergence/StageGeneratedCode
        action: registers the staged file in the convergence state for review
      - node: WriteGeneratedFile
        action: writes the final approved file to the generated code output directory
      - node: GeneratedCodeDirectory
        action: the validated and staged file is now in the final output location

  EndToEndCodegenPipeline:
    files: [test/journeys/EndToEndCodegenPipeline.test.ts]
    steps:
      - node: convergence/TriggerCodegen
        action: invokes codegen after convergence declares the graph CONVERGED
      - node: graph/CompiledIndex
        action: provides the full converged graph
      - node: ReadConvergedGraph
        action: extracts all nodes organized by module for skeleton generation
      - node: organization/DependencyGraph
        action: provides the module build order
      - node: ProcessNodesOnly
        action: filters to process-type nodes only
      - node: FilesFieldRequired
        action: skips nodes without a files field
      - node: GenerateProcessSkeletons
        action: creates TypeScript class skeletons for each process node
      - node: NeverOverwriteExisting
        action: skips skeleton write for files that already exist on disk
      - node: EnsureOutputDirectory
        action: creates parent directories as needed
      - node: WriteGeneratedFile
        action: writes each skeleton file to disk
      - node: SkeletonFile
        action: stores all skeletons ready for filling
      - node: SelectNextModuleToFill
        action: picks each module in dependency order
      - node: ProvideCodegenExcerpt
        action: assembles codegen-specific context for each module
      - node: BuildFillPrompt
        action: builds the fill prompt from skeleton, node metadata, and connection context for the LLM worker
      - node: FillImplementation
        action: LLM fills each skeleton with working code
      - node: FilledSourceFile
        action: stores each filled implementation
      - node: ValidateFilledSyntax
        action: checks each filled file for syntax and type errors
      - node: StageFilledModule
        action: stages each validated file for review
      - node: WriteGeneratedFile
        action: writes each final file to the output directory
      - node: ConfirmAllModulesFilled
        action: verifies every module has been filled and staged
      - node: GeneratedCodeDirectory
        action: contains the complete generated codebase
      - node: convergence/TriggerTestgen
        action: signals testgen to begin generating test skeletons from the filled code

  HandoffToTestgen:
    files: [test/journeys/HandoffToTestgen.test.ts]
    steps:
      - node: ConfirmAllModulesFilled
        action: confirms every module has a validated filled source file
      - node: GeneratedCodeDirectory
        action: provides the complete output directory with all filled files
      - node: FilledSourceFile
        action: each filled file is available for testgen to analyze
      - node: convergence/ConvergenceState
        action: records that codegen phase is complete
      - node: convergence/TriggerTestgen
        action: invokes testgen.ts to generate test skeletons from the filled code
      - node: testgen/MapTestImports
        action: reads the generated code files to produce test import statements

  RecoverFromFillSyntaxError:
    files: [test/journeys/RecoverFromFillSyntaxError.test.ts]
    steps:
      - node: FillImplementation
        action: has produced a filled file from the LLM worker
      - node: FilledSourceFile
        action: provides the filled TypeScript content
      - node: ValidateFilledSyntax
        action: runs syntax checking and detects errors in the filled output
      - node: ValidateFilledSyntax
        action: collects the specific error messages with line numbers and error types
      - node: RetryFillWithErrorFeedback
        action: reads the original skeleton file as the base for the retry
      - node: SkeletonFile
        action: provides the original empty skeleton that the LLM will re-fill
      - node: RetryFillWithErrorFeedback
        action: packages the syntax errors as feedback context for the retry attempt
      - node: llm/SendTask
        action: sends the retry task with the skeleton plus error feedback to the worker
      - node: _actors/LLMWorker
        action: reads the error feedback and re-fills the skeleton avoiding the previous mistakes
      - node: FillImplementation
        action: LLM produces a corrected fill addressing the specific syntax errors
      - node: llm/ReceiveResult
        action: receives the corrected filled source code
      - node: FilledSourceFile
        action: stores the corrected implementation
      - node: ValidateFilledSyntax
        action: re-checks the corrected fill for syntax and type errors

  RecoverFromWorkerCrashDuringFill:
    files: [test/journeys/RecoverFromWorkerCrashDuringFill.test.ts]
    steps:
      - node: llm/SendTask
        action: has sent a fill task to the LLM worker
      - node: _actors/LLMWorker
        action: begins processing the fill task
      - node: DetectWorkerCrashDuringFill
        action: detects that the worker process exited unexpectedly or stopped responding
      - node: llm/DetectProcessExit
        action: confirms the worker process is no longer running
      - node: DetectWorkerCrashDuringFill
        action: checks whether any partial output was written before the crash
      - node: llm/DrainPartialOutput
        action: reads any partial response the worker streamed before crashing
      - node: RollbackCorruptedFill
        action: discards the partial output since it is incomplete and potentially corrupt
      - node: SkeletonFile
        action: provides the original skeleton as the starting point for a fresh retry
      - node: llm/SpawnWorkerProcess
        action: launches a new worker process to replace the crashed one
      - node: llm/InjectSystemPrompt
        action: initializes the new worker with the codegen system prompt
      - node: llm/SendTask
        action: re-sends the fill task to the fresh worker
      - node: _actors/LLMWorker
        action: processes the fill task from scratch in the new session
      - node: FillImplementation
        action: LLM fills the skeleton in the replacement worker
      - node: llm/ReceiveResult
        action: receives the complete filled source from the replacement worker

  ResumePartialCodegen:
    files: [test/journeys/ResumePartialCodegen.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: indicates codegen was in progress when the process was interrupted
      - node: GeneratedCodeDirectory
        action: provides the output directory containing any previously completed fills
      - node: ResumeFromLastFilledModule
        action: scans the directory listing all filled source files present
      - node: organization/DependencyGraph
        action: provides the full build order for comparison
      - node: ResumeFromLastFilledModule
        action: compares filled files against the build order to identify the first unfilled module
      - node: ResumeFromLastFilledModule
        action: verifies each existing filled file has valid syntax to ensure no corrupt partial fills
      - node: SelectNextModuleToFill
        action: sets the pointer to the first unfilled module in the build order
      - node: SkeletonFile
        action: provides the skeleton for the unfilled module
      - node: FillImplementation
        action: resumes LLM filling from the point of interruption
      - node: ValidateFilledSyntax
        action: validates the resumed fill output
      - node: WriteGeneratedFile
        action: writes the filled file to disk
      - node: ConfirmAllModulesFilled
        action: continues checking until all remaining modules are filled

  HandleCascadeFillFailure:
    files: [test/journeys/HandleCascadeFillFailure.test.ts]
    steps:
      - node: SelectNextModuleToFill
        action: picks a module whose dependency failed to fill
      - node: organization/DependencyGraph
        action: provides the dependency relationships for the failed module
      - node: SkipAndDeferFailedModule
        action: checks whether the selected module depends on the failed module
      - node: SkipAndDeferFailedModule
        action: confirms the dependency is required and the module cannot be filled without it
      - node: SkipAndDeferFailedModule
        action: marks the dependent module as deferred and skips to the next module in build order
      - node: SelectNextModuleToFill
        action: advances to the next module that does not depend on the failed one
      - node: FillImplementation
        action: fills the independent module which has all its dependencies available
      - node: ValidateFilledSyntax
        action: validates the independent module's fill
      - node: WriteGeneratedFile
        action: writes the independent module to disk
      - node: RetryFillWithErrorFeedback
        action: retries the originally failed module with additional error context
      - node: SkipAndDeferFailedModule
        action: after the retry succeeds, unblocks all deferred modules that depended on it
      - node: SelectNextModuleToFill
        action: returns to the deferred modules now that their dependency is available

  HandleWriteFailure:
    files: [test/journeys/HandleWriteFailure.test.ts]
    steps:
      - node: FilledSourceFile
        action: provides the validated filled content ready to write
      - node: WriteGeneratedFile
        action: attempts to write the file to disk and encounters a failure
      - node: WriteGeneratedFile
        action: detects the specific failure reason — disk full, permission denied, or path not found
      - node: GeneratedCodeDirectory
        action: checks the output directory exists and is writable
      - node: WriteGeneratedFile
        action: retries the write after verifying the directory is accessible
      - node: WriteGeneratedFile
        action: confirms the file was successfully written on retry
      - node: convergence/ConvergenceState
        action: records the write failure and recovery for diagnostic logging

  FilterAndProtectDuringSkeletonWrite:
    steps:
      - node: graph/CompiledIndex
        action: provides all nodes in the converged graph
      - node: ReadConvergedGraph
        action: iterates every node in the compiled index
      - node: ProcessNodesOnly
        action: filters to process-type nodes only, skipping artifact, interface, and rule nodes
      - node: FilesFieldRequired
        action: skips any node that does not declare a files field
      - node: GenerateProcessSkeletons
        action: generates a TypeScript skeleton for each process node that passes both filters
      - node: DispatchByFileExtension
        action: routes .ts and .js files to the TypeScript generator, others to generic comment skeleton
      - node: NeverOverwriteExisting
        action: checks the target file path on disk and skips if a file already exists
      - node: EnsureOutputDirectory
        action: creates the parent directory tree if it does not yet exist
      - node: WriteGeneratedFile
        action: writes the skeleton to disk at the declared file path
      - node: SkeletonFile
        action: the generated skeleton is stored and ready for LLM filling
      - node: CodegenResultSummary
        action: records the generated file path or skip reason in the result tracking

  ExhaustFillRetriesAndSkip:
    steps:
      - node: FillImplementation
        action: LLM produces a filled file that fails validation
      - node: ValidateFilledSyntax
        action: detects syntax or type errors in the filled output
      - node: RetryFillWithErrorFeedback
        action: sends errors back to LLM and re-requests the fill
      - node: FillImplementation
        action: LLM produces another fill attempt
      - node: ValidateFilledSyntax
        action: re-checks the retry output and finds it still fails
      - node: EnforceFillRetryLimit
        action: increments the retry counter and checks against the configured maximum
      - node: EnforceFillRetryLimit
        action: determines the maximum retry count has been exceeded for this module
      - node: SkipAndDeferFailedModule
        action: marks the module as permanently failed and skips to the next independent module
      - node: convergence/ConvergenceState
        action: records the module as unfillable after retry exhaustion for diagnostic reporting

  RecoverFromNodeStubMismatch:
    steps:
      - node: FillImplementation
        action: LLM has produced a filled file
      - node: FilledSourceFile
        action: provides the filled TypeScript content for structural validation
      - node: DetectNodeStubMismatch
        action: compares exported functions and classes against the module's node list from the graph
      - node: CodeComesFromNodes
        action: flags that the filled file has extra functions not in the graph or is missing stubs for declared nodes
      - node: DetectNodeStubMismatch
        action: produces a list of added and removed stubs with their names
      - node: RetryFillWithErrorFeedback
        action: packages the structural mismatch as feedback specifying which stubs must exist and which must be removed
      - node: SkeletonFile
        action: provides the original skeleton as the structural reference for the retry
      - node: llm/SendTask
        action: sends the retry task with structural feedback to the worker
      - node: _actors/LLMWorker
        action: re-fills the skeleton maintaining exactly one function or class per graph node
      - node: FillImplementation
        action: LLM produces a corrected fill matching the node list
      - node: llm/ReceiveResult
        action: receives the structurally corrected fill
      - node: DetectNodeStubMismatch
        action: re-checks the corrected fill to confirm all stubs match the node list

  RejectPlaceholderFill:
    steps:
      - node: FillImplementation
        action: LLM has produced a filled file that passes syntax and structural checks
      - node: FilledSourceFile
        action: provides the filled TypeScript content for implementation quality check
      - node: DetectPlaceholderFill
        action: scans each function body for throw-not-implemented, TODO comments, empty bodies, and return-undefined patterns
      - node: DetectPlaceholderFill
        action: flags specific functions that contain only placeholder code without real logic
      - node: RetryFillWithErrorFeedback
        action: packages the placeholder detection results as feedback listing which functions need real implementations
      - node: SkeletonFile
        action: provides the original skeleton as context for what each stub should implement
      - node: ProvideCodegenExcerpt
        action: re-assembles the implementation guidance so the LLM understands what each function should do
      - node: llm/SendTask
        action: sends the retry task with placeholder feedback and implementation context to the worker
      - node: _actors/LLMWorker
        action: re-fills the flagged functions with actual implementation logic guided by node descriptions
      - node: FillImplementation
        action: LLM produces a fill with real implementations replacing the placeholders
      - node: llm/ReceiveResult
        action: receives the implementation-complete fill
      - node: DetectPlaceholderFill
        action: re-checks to confirm all function bodies now contain substantive code

  SkipCodegenWhenFullyConverged:
    steps:
      - node: convergence/TriggerCodegen
        action: invokes codegen on a system that has already completed code generation
      - node: graph/CompiledIndex
        action: provides the converged graph for skeleton generation
      - node: ReadConvergedGraph
        action: extracts all nodes organized by module
      - node: DispatchByFileExtension
        action: checks the file extension to select the TypeScript or generic skeleton generator
      - node: NeverOverwriteExisting
        action: checks each skeleton target path and finds every file already exists on disk
      - node: NeverOverwriteExisting
        action: skips all skeleton writes because no target path is missing a file
      - node: organization/DependencyGraph
        action: provides the full build order for the fill phase
      - node: ConfirmAllModulesFilled
        action: checks every module in the build list and finds all already have filled source files
      - node: ConfirmAllModulesFilled
        action: determines zero modules need filling and signals codegen is already complete
      - node: convergence/ConvergenceState
        action: records that codegen exited with no changes because all outputs already exist

  GenerateTypeScriptSkeleton:
    steps:
      - node: ReadConvergedGraph
        action: provides a process node with its compiled metadata including connections and journey participation
      - node: DispatchByFileExtension
        action: detects .ts or .js extension and routes to the TypeScript skeleton generator
      - node: EnrichSkeletonWithConnectionContext
        action: writes JSDoc header with description, in_journeys, preceded_by, followed_by, and triggered_by_actors
      - node: GenerateConfigInterface
        action: generates a TypeScript interface from the node's properties map if properties exist
      - node: GenerateProcessSkeletons
        action: creates the class declaration for the process node
      - node: GenerateJourneyMethodStubs
        action: adds one async method stub per journey with camelCase name and throw NotImplemented body
      - node: SkeletonFile
        action: returns the assembled TypeScript skeleton content
      - node: CodegenResultSummary
        action: records the generated file in the result tracking

  ValidateGeneratedCodeCompiles:
    steps:
      - node: WriteGeneratedFile
        action: writes the filled source file to disk
      - node: _actors/Compiler
        action: runs compilation on the generated code directory
      - node: compilation/YAMLParsing
        action: parses any generated YAML artifacts for structural validity
      - node: compilation/DanglingRefDetection
        action: checks that generated code references only nodes that exist in the graph
      - node: compilation/ValidationAggregation
        action: collects all validation errors from the generated output
      - node: compilation/CompilationResult
        action: reports whether the generated code introduced any compilation errors
      - node: ValidateFilledSyntax
        action: confirms the filled module has valid syntax and no compilation errors
      - node: RetryFillWithErrorFeedback
        action: if errors found, feeds the compilation errors back to the LLM for correction

  UpdateExistingCodeFromGraph:
    steps:
      - node: convergence/TriggerCodegen
        action: invokes codegen after graph changes during reconvergence
      - node: graph/CompiledIndex
        action: provides the updated converged graph with changed nodes
      - node: ReadConvergedGraph
        action: extracts all nodes organized by module from the updated graph
      - node: NeverOverwriteExisting
        action: detects that source files already exist for the changed nodes
      - node: Mode2UpdateExisting
        action: enforces that existing files must be updated via Edit not regenerated
      - node: DetectCodeNeedsUpdate
        action: compares each existing source file against its updated graph node metadata
      - node: DetectCodeNeedsUpdate
        action: identifies nodes where description, connections, or journey participation changed
      - node: GenerateUpdateContext
        action: assembles the diff between previous and current graph state for each changed node
      - node: ProvideCodegenExcerpt
        action: generates focused context for the update showing what changed and what to preserve
      - node: _actors/LLMWorker
        action: receives the update context and existing file path with instructions to Edit not rewrite
      - node: ApplyEditToExistingCode
        action: LLM applies targeted edits to the existing source file preserving working code
      - node: ValidateFilledSyntax
        action: validates that the edited file still has valid syntax
      - node: _actors/Compiler
        action: runs compilation to verify the edited code introduces no errors
      - node: StageFilledModule
        action: stages the successfully updated module in the codegen result

  RollbackFillThatBreaksDependents:
    steps:
      - node: FillImplementation
        action: LLM has produced a filled file for a module
      - node: ValidateFilledSyntax
        action: confirms the filled file itself has valid syntax and types
      - node: WriteGeneratedFile
        action: writes the filled file to disk so dependent modules can import it
      - node: SelectNextModuleToFill
        action: advances to the next module in build order which depends on the just-filled module
      - node: FillImplementation
        action: LLM fills the dependent module importing the previously filled file
      - node: ValidateFilledSyntax
        action: runs type checking on the dependent and detects type errors caused by the upstream fill
      - node: ValidateFilledSyntax
        action: traces the type errors back to exported signatures in the upstream filled module
      - node: RollbackCorruptedFill
        action: reads the original skeleton for the upstream module that caused the type errors
      - node: RollbackCorruptedFill
        action: reverts the upstream file on disk back to its skeleton state
      - node: RetryFillWithErrorFeedback
        action: packages the downstream type errors as feedback showing how the upstream exports broke dependents
      - node: SkeletonFile
        action: provides the original skeleton as the base for the corrected fill attempt
      - node: llm/SendTask
        action: sends the retry task with downstream type error context to the worker
      - node: _actors/LLMWorker
        action: re-fills the upstream skeleton with exports that satisfy dependent module type requirements
      - node: FillImplementation
        action: LLM produces a corrected fill with compatible exported signatures
      - node: llm/ReceiveResult
        action: receives the corrected upstream fill
      - node: ValidateFilledSyntax
        action: re-checks the corrected fill for syntax errors before re-attempting dependents

  RecoverFromMode2UpdateFailure:
    steps:
      - node: ApplyEditToExistingCode
        action: LLM has applied edits to an existing source file during Mode 2 update
      - node: ValidateFilledSyntax
        action: runs syntax and type checking on the edited file and detects errors introduced by the edit
      - node: ValidateFilledSyntax
        action: collects the specific error messages with line numbers from the failed edit
      - node: Mode2UpdateExisting
        action: confirms the file must be preserved not regenerated so the recovery must revert and retry
      - node: RollbackCorruptedFill
        action: reads the pre-edit backup of the source file taken before the LLM edit was applied
      - node: RollbackCorruptedFill
        action: restores the source file to its pre-edit state on disk
      - node: _actors/Compiler
        action: recompiles to confirm the revert restored the previous working state
      - node: GenerateUpdateContext
        action: re-assembles the graph diff with additional context about what the previous edit broke
      - node: RetryFillWithErrorFeedback
        action: packages the edit errors as feedback specifying which lines and types failed
      - node: _actors/LLMWorker
        action: receives the retry task with error feedback and instructions to apply a more conservative edit
      - node: ApplyEditToExistingCode
        action: LLM re-applies edits avoiding the patterns that caused the previous failure
      - node: ValidateFilledSyntax
        action: re-checks the corrected edit for syntax and type errors
      - node: _actors/Compiler
        action: runs compilation to confirm the corrected edit introduces no errors
      - node: StageFilledModule
        action: stages the successfully updated module after recovery

  ValidateMode2PreservesStructure:
    steps:
      - node: ApplyEditToExistingCode
        action: LLM has applied edits to an existing source file during Mode 2 update
      - node: ValidateFilledSyntax
        action: confirms the edited file has valid syntax and types
      - node: DetectNodeStubMismatch
        action: compares exported functions and classes in the edited file against the module's node list from the graph
      - node: CodeComesFromNodes
        action: verifies every graph node still has a corresponding function or class in the edited file
      - node: DetectNodeStubMismatch
        action: confirms no stubs were removed by the edit and no extra functions were added
      - node: DetectPlaceholderFill
        action: checks that the edit did not hollow out function bodies replacing implementations with placeholders
      - node: StageFilledModule
        action: stages the structurally validated updated module in the codegen result

  IncludeActorContextInCodegen:
    steps:
      - node: _actors/Compiler
        action: triggers codegen after compilation produces zero errors
      - node: ReadConvergedGraph
        action: reads the converged graph including actor-triggered journeys
      - node: actors/ProvideActorsForModuleCreation
        action: provides the actor list so codegen knows which actors trigger each process
      - node: BuildFillPrompt
        action: includes actor type context in the fill prompt so generated code handles actor-specific inputs
      - node: EnrichSkeletonWithConnectionContext
        action: annotates skeletons with inbound actor connections informing parameter types
      - node: _actors/LLMWorker
        action: receives the actor-enriched prompt and generates implementation aware of caller context
      - node: FillImplementation
        action: fills the skeleton with implementation that validates inputs based on triggering actor type
      - node: ValidateFilledSyntax
        action: validates the filled code compiles correctly with actor-aware type signatures
