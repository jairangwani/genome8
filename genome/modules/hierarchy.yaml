spec_sections: [2, 3, 5, 6]

nodes:
  AnalyzeModuleIndependence:
    type: process
    description: reads ORGANIZATION.md independence section to identify which module groups could form separate child engines
  DecideSplit:
    type: process
    description: LLM-based decision on whether to split, using module count, independence, and coupling analysis — no hardcoded threshold
  CreateChildDirectory:
    type: process
    description: creates a new directory for each child engine with its own modules/ folder structure
  GenerateScopedSpec:
    type: process
    description: writes a scoped spec.md for each child containing only the sections relevant to that child's module group
  DistributeSharedActors:
    type: process
    description: copies the parent's _actors.yaml into each child directory so all children inherit the same shared actors
  AssignModulesToChildren:
    type: process
    description: maps each module from ORGANIZATION.md to exactly one child engine based on the grouping decision
  SpawnChildEngine:
    type: process
    description: launches a child convergence.ts process for each child directory as an independent subprocess
    files: [test/multi-engine.test.ts]
  WaitForAllChildren:
    type: process
    description: blocks until every spawned child engine has completed its convergence and published its interface
  CollectChildInterfaces:
    type: process
    description: reads each child's published interface.yaml to gather their exported nodes and journeys
  CreateCrossEngineJourneys:
    type: process
    description: creates journeys at the parent level that connect nodes across different children's published interfaces
    files: [test/director.test.ts]
  ValidateCrossEngineRefs:
    type: process
    description: checks that all external refs in children (warnings) resolve to actual nodes in sibling child interfaces
    files: [test/cross-project.test.ts]
  PromoteExternalRefsToErrors:
    type: process
    description: converts unresolved external refs from warnings to errors at the parent level where all children are visible
  ContinueWithoutSplit:
    type: process
    description: bypasses the entire hierarchy pipeline and proceeds directly to bounded module creation when the LLM decides not to split
  MonitorChildConvergence:
    type: process
    description: polls each child engine's published output directory to track whether it has completed convergence or is still running
  MergeChildGraphsIntoParent:
    type: process
    description: incorporates all child interface nodes and journeys into the parent's compiled index as resolved external references
  GenerateChildOrganization:
    type: process
    description: creates a scoped ORGANIZATION.md for each child listing only the modules assigned to that child's group
  TrackHierarchyDepth:
    type: process
    description: reads the depth parameter passed at spawn time and records the current nesting level for this engine instance
  EnforceMaxDepth:
    type: process
    description: compares the current hierarchy depth against the maximum allowed and forces a no-split decision if the limit is reached
  FlattenGrandchildInterfaces:
    type: process
    description: when a child engine has split into grandchildren, merges all grandchild published interfaces into the child's own interface as a flat node and journey set
  PropagateUnresolvedRefsUpward:
    type: process
    description: collects external ref warnings that a child could not resolve against its own grandchildren and passes them up to the parent level for cross-engine resolution
  NarrowScopedSpec:
    type: process
    description: further narrows an already-scoped spec when a child itself splits, producing sub-scoped specs containing only sections relevant to each grandchild group
  LimitConcurrentChildren:
    type: process
    description: caps the number of simultaneously running child engine subprocesses by maintaining a queue and spawning the next child only when a running one completes
  BatchChildDirectoryCreation:
    type: process
    description: creates all child directories, scoped specs, scoped organizations, and actor copies in a single batch pass to reduce disk I/O overhead when child count is high
  StreamingInterfaceMerge:
    type: process
    description: merges child interfaces into the parent compiled index one at a time in sequence instead of loading all interfaces into memory simultaneously
  DetectChildTimeout:
    type: process
    description: compares each running child engine's wall-clock elapsed time against the configured timeout threshold and flags children that exceed it
  CompactSplitDecisionContext:
    type: process
    description: summarizes the organization and independence analysis into a compact form that fits within LLM context limits when the full module list and coupling data is too large
  IndexChildNodesForRefLookup:
    type: process
    description: builds a hash-indexed lookup table of all child interface node names to accelerate cross-engine ref validation when child count is high
  ChildDirectory:
    type: artifact
    description: a directory containing scoped spec.md, shared _actors.yaml, and modules/ for one child engine
  ScopedSpecFile:
    type: artifact
    description: a child-specific spec.md containing only the sections relevant to that child's module group
  CrossEngineJourneySet:
    type: artifact
    description: the set of parent-level journeys connecting nodes across children's published interfaces
  ChildInterfaceCollection:
    type: artifact
    description: the collected interface.yaml files from all children, used for cross-engine validation
  ChildConvergenceStatus:
    type: artifact
    description: tracks the current state of each child engine — running, converged, or failed — used by the parent to determine when all children are done
  ChildOrganizationFile:
    type: artifact
    description: a child-specific ORGANIZATION.md listing only the modules assigned to that child engine
  HierarchyDepthCounter:
    type: artifact
    description: the current nesting depth passed to each engine at spawn time — 0 for root, 1 for child, 2 for grandchild, and so on
  SameCodeEveryLevel:
    type: rule
    description: convergence.ts is the exact same code at parent, child, and grandchild levels — no level-specific logic
  SharedActorsNoduplicates:
    type: rule
    description: parent discovers actors once, children inherit them — no child re-discovers or duplicates actors
  ExternalRefsWarningsInChildrenErrorsInParent:
    type: rule
    description: children emit warnings for unresolved cross-engine refs, parent promotes them to errors if they remain unresolved
  MaxDepthLimit:
    type: rule
    description: hierarchy depth is bounded to a configurable maximum to prevent infinite recursive splitting — engines at the limit always choose no-split
  ChildConcurrencyLimit:
    type: rule
    description: maximum number of child engine subprocesses that may run simultaneously — additional children are queued until a running child completes
  ChildTimeoutThreshold:
    type: rule
    description: maximum wall-clock time a child engine may run before being flagged as timed out and reported to the parent
  DetectChildProcessFailure:
    type: process
    description: detects when a child engine subprocess exits with non-zero status or crashes before publishing its interface, distinguishing process failure from timeout
  FallbackToNoSplitOnFailure:
    type: process
    description: defaults to no-split when the LLM-based hierarchy decision fails or returns unparseable output, ensuring convergence can always proceed
  DetectChildSpawnFailure:
    type: process
    description: detects when a child engine subprocess fails to launch due to OS-level errors such as resource exhaustion or permission denial
  ValidateChildInterfaceIntegrity:
    type: process
    description: checks that each child's published interface.yaml exists on disk and is valid parseable YAML with the expected node and journey structure before merging
  DetectInheritedActors:
    type: process
    description: checks whether _actors.yaml was placed in the engine's directory by a parent, indicating actors are inherited and actor discovery should be skipped at this level
  DetectInheritedOrganization:
    type: process
    description: checks whether a scoped ORGANIZATION.md was placed in the engine's directory by a parent, indicating the module list was pre-assigned and organization generation should be skipped
  ValidateSplitDecision:
    type: process
    description: validates the LLM-produced split decision for semantic correctness including that every module from ORGANIZATION.md is assigned to exactly one child, no module is duplicated across children, and no child group is empty

journeys:
  DecideHierarchySplit:
    files: [test/journeys/DecideHierarchySplit.test.ts]
    steps:
      - node: convergence/HierarchyDecision
        action: invokes the hierarchy decision step after organization and actor discovery
      - node: TrackHierarchyDepth
        action: reads the current engine's depth parameter to determine nesting level
      - node: HierarchyDepthCounter
        action: provides the current depth for the split decision
      - node: EnforceMaxDepth
        action: checks whether current depth has reached the maximum allowed level
      - node: MaxDepthLimit
        action: if at max depth, forces the decision to no-split regardless of module count
      - node: AnalyzeModuleIndependence
        action: reads the independence analysis from ORGANIZATION.md
      - node: _actors/LLMWorker
        action: analyzes module groups, coupling, and independence to decide whether to split
      - node: DecideSplit
        action: produces a split decision with child groupings or a no-split result
      - node: convergence/ConvergenceState
        action: records the hierarchy decision — split with groupings or no-split

  PrepareChildEngines:
    files: [test/journeys/PrepareChildEngines.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: provides the split decision with module-to-child assignments
      - node: AssignModulesToChildren
        action: maps each module to exactly one child engine group
      - node: CreateChildDirectory
        action: creates the directory structure for the first child engine
      - node: ChildDirectory
        action: the child directory is ready on disk
      - node: GenerateScopedSpec
        action: writes a scoped spec.md with only the relevant sections for this child
      - node: ScopedSpecFile
        action: stores the scoped spec in the child directory
      - node: GenerateChildOrganization
        action: writes a scoped ORGANIZATION.md listing only this child's assigned modules
      - node: ChildOrganizationFile
        action: stores the scoped organization in the child directory
      - node: DistributeSharedActors
        action: copies _actors.yaml from the parent into the child directory
      - node: SharedActorsNoduplicates
        action: ensures actors are inherited, not re-discovered by the child
      - node: CreateChildDirectory
        action: repeats directory creation for each additional child engine
      - node: GenerateScopedSpec
        action: repeats scoped spec generation for each additional child
      - node: GenerateChildOrganization
        action: repeats scoped organization generation for each additional child
      - node: DistributeSharedActors
        action: repeats actor distribution for each additional child

  SpawnAndWaitForChildren:
    files: [test/journeys/SpawnAndWaitForChildren.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: has all child directories prepared and ready to spawn
      - node: SameCodeEveryLevel
        action: confirms that each child runs the same convergence.ts code as the parent
      - node: HierarchyDepthCounter
        action: provides the current depth to increment for child engines
      - node: TrackHierarchyDepth
        action: computes child depth as current depth plus one
      - node: SpawnChildEngine
        action: launches a convergence.ts subprocess for the first child directory with incremented depth parameter
      - node: _actors/ChildEngine
        action: begins independent convergence in its scoped directory at the new depth level
      - node: SpawnChildEngine
        action: launches convergence.ts for each additional child directory with the same incremented depth
      - node: _actors/ChildEngine
        action: each child converges independently with its scoped spec and inherited actors
      - node: MonitorChildConvergence
        action: polls each child's output directory for published interface presence
      - node: ChildConvergenceStatus
        action: records each child's current state as running or converged
      - node: WaitForAllChildren
        action: parent blocks until every child process has completed and exited
      - node: _actors/ChildEngine
        action: publishes its interface.yaml upon convergence completion
      - node: publish/InterfaceYamlFile
        action: each child's published interface is now on disk

  ValidateAndConnectChildren:
    files: [test/journeys/ValidateAndConnectChildren.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: all children have converged and published their interfaces
      - node: CollectChildInterfaces
        action: reads interface.yaml from each child directory
      - node: ChildInterfaceCollection
        action: stores all collected child interfaces for validation
      - node: ValidateCrossEngineRefs
        action: checks every external ref warning from children against sibling interfaces
      - node: ExternalRefsWarningsInChildrenErrorsInParent
        action: enforces that unresolved refs become errors at the parent level
      - node: PropagateUnresolvedRefsUpward
        action: collects any refs children could not resolve against their own grandchildren
      - node: PromoteExternalRefsToErrors
        action: converts any remaining unresolved external refs to compilation errors
      - node: _actors/Compiler
        action: validates the parent graph including cross-engine references
      - node: compilation/CompilationResult
        action: reports the validation result with any cross-engine errors
      - node: CreateCrossEngineJourneys
        action: creates parent-level journeys linking nodes across children's interfaces
      - node: CrossEngineJourneySet
        action: stores the cross-engine journeys in the parent's graph
      - node: MergeChildGraphsIntoParent
        action: incorporates child interface nodes and journeys into the parent compiled index
      - node: graph/CompiledIndex
        action: the parent compiled index now contains both parent-level and child-level nodes

  PublishParentAfterHierarchy:
    files: [test/journeys/PublishParentAfterHierarchy.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: cross-engine validation passed with 0 errors
      - node: CrossEngineJourneySet
        action: provides the parent-level journeys for inclusion in the interface
      - node: ChildInterfaceCollection
        action: provides child interfaces to include in the parent's published interface
      - node: publish/CollectExportedNodes
        action: selects parent and cross-engine nodes for the parent interface
      - node: publish/CollectExportedJourneys
        action: selects parent and cross-engine journeys for the parent interface
      - node: publish/ComputeInterfaceHash
        action: computes SHA256 hash for the parent's combined interface
      - node: publish/GenerateInterfaceYaml
        action: writes the parent's interface.yaml combining all child interfaces
      - node: publish/InterfaceYamlFile
        action: stores the parent interface on disk
      - node: publish/WriteEventFile
        action: writes event file signaling the parent has published
      - node: publish/EventFile
        action: the parent event file is visible to upstream dependents

  ContinueWithoutSplit:
    files: [test/journeys/ContinueWithoutSplit.test.ts]
    steps:
      - node: convergence/HierarchyDecision
        action: invokes the hierarchy decision step in the convergence pipeline
      - node: TrackHierarchyDepth
        action: reads the current engine's depth parameter
      - node: AnalyzeModuleIndependence
        action: reads ORGANIZATION.md independence analysis for the LLM
      - node: _actors/LLMWorker
        action: evaluates module groups and determines splitting is not beneficial
      - node: DecideSplit
        action: produces a no-split result indicating all modules stay in the current engine
      - node: ContinueWithoutSplit
        action: bypasses child engine preparation and proceeds to the next convergence phase
      - node: convergence/ConvergenceState
        action: records the no-split decision and advances to bounded module creation
      - node: convergence/BoundedCreationLoop
        action: begins creating modules directly in the current engine without hierarchy

  MonitorChildConvergenceProgress:
    files: [test/journeys/MonitorChildConvergenceProgress.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: has spawned all child engines and needs to track their progress
      - node: MonitorChildConvergence
        action: checks the first child's output directory for a published interface file
      - node: ChildConvergenceStatus
        action: records the first child's state as running or converged
      - node: MonitorChildConvergence
        action: checks each subsequent child's output directory
      - node: ChildConvergenceStatus
        action: updates each child's state in the status tracker
      - node: WaitForAllChildren
        action: continues blocking while any child status remains running
      - node: MonitorChildConvergence
        action: re-polls children that have not yet converged
      - node: ChildConvergenceStatus
        action: detects all children have transitioned to converged state
      - node: _actors/ParentEngine
        action: proceeds to collect child interfaces now that all children are done

  MergeChildGraphs:
    files: [test/journeys/MergeChildGraphs.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: cross-engine validation has passed and cross-engine journeys are created
      - node: ChildInterfaceCollection
        action: provides all child interface files with their exported nodes and journeys
      - node: CollectChildInterfaces
        action: parses each child interface into structured node and journey data
      - node: MergeChildGraphsIntoParent
        action: adds each child's exported nodes to the parent's node registry
      - node: MergeChildGraphsIntoParent
        action: adds each child's exported journeys to the parent's journey registry
      - node: CrossEngineJourneySet
        action: provides the parent-level cross-engine journeys for inclusion
      - node: graph/CompiledIndex
        action: stores the merged parent graph containing parent nodes, child nodes, and cross-engine journeys
      - node: _actors/Compiler
        action: runs final validation on the merged parent graph
      - node: compilation/CompilationResult
        action: confirms the merged graph has zero errors and zero orphans

  EndToEndHierarchySplit:
    files: [test/journeys/EndToEndHierarchySplit.test.ts]
    steps:
      - node: convergence/HierarchyDecision
        action: triggers the hierarchy decision step in the convergence pipeline
      - node: TrackHierarchyDepth
        action: reads the current depth to pass to children
      - node: AnalyzeModuleIndependence
        action: reads independence analysis from ORGANIZATION.md
      - node: DecideSplit
        action: produces a split decision with child groupings
      - node: AssignModulesToChildren
        action: maps modules to child engine groups
      - node: CreateChildDirectory
        action: creates directory structures for all child engines
      - node: GenerateScopedSpec
        action: writes scoped spec.md for each child
      - node: GenerateChildOrganization
        action: writes scoped ORGANIZATION.md for each child
      - node: DistributeSharedActors
        action: copies _actors.yaml into each child directory
      - node: SpawnChildEngine
        action: launches convergence.ts for each child with incremented depth
      - node: MonitorChildConvergence
        action: tracks child convergence progress until all complete
      - node: WaitForAllChildren
        action: blocks until all children have published interfaces
      - node: CollectChildInterfaces
        action: reads all child interface.yaml files
      - node: ValidateCrossEngineRefs
        action: validates cross-engine references across sibling interfaces
      - node: PromoteExternalRefsToErrors
        action: converts unresolved external refs to errors
      - node: CreateCrossEngineJourneys
        action: creates parent-level journeys connecting child nodes
      - node: MergeChildGraphsIntoParent
        action: incorporates all child graphs into the parent compiled index
      - node: publish/ComputeInterfaceHash
        action: computes SHA256 hash for the parent's combined interface
      - node: publish/GenerateInterfaceYaml
        action: writes the parent's interface.yaml
      - node: publish/WriteEventFile
        action: writes event file signaling the parent has published

  PrepareChildOrganization:
    files: [test/journeys/PrepareChildOrganization.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: provides the split decision with module-to-child assignments
      - node: AssignModulesToChildren
        action: determines which modules belong to each child group
      - node: organization/ModuleList
        action: provides the full list of modules from the parent ORGANIZATION.md
      - node: GenerateChildOrganization
        action: filters the parent module list to only modules assigned to the first child
      - node: ChildOrganizationFile
        action: stores the first child's scoped ORGANIZATION.md in its directory
      - node: GenerateChildOrganization
        action: repeats organization generation for each additional child
      - node: ChildOrganizationFile
        action: stores each additional child's scoped ORGANIZATION.md
      - node: SameCodeEveryLevel
        action: confirms children will use their scoped organization the same way the parent uses its full one

  RecursiveChildSplit:
    files: [test/journeys/RecursiveChildSplit.test.ts]
    steps:
      - node: _actors/ChildEngine
        action: reaches its own hierarchy decision step during convergence
      - node: TrackHierarchyDepth
        action: reads this child's depth parameter which was set to parent depth plus one
      - node: HierarchyDepthCounter
        action: confirms the current depth is below the maximum allowed
      - node: EnforceMaxDepth
        action: verifies the depth limit has not been reached so splitting is permitted
      - node: AnalyzeModuleIndependence
        action: reads the child's scoped ORGANIZATION.md for independence analysis
      - node: _actors/LLMWorker
        action: analyzes the child's module groups and decides to split further
      - node: DecideSplit
        action: produces a split decision with grandchild groupings
      - node: AssignModulesToChildren
        action: maps the child's modules to grandchild engine groups
      - node: NarrowScopedSpec
        action: further narrows the child's already-scoped spec to produce sub-scoped specs for each grandchild
      - node: ScopedSpecFile
        action: stores each grandchild's sub-scoped spec in its directory
      - node: CreateChildDirectory
        action: creates directory structures for grandchild engines
      - node: DistributeSharedActors
        action: copies inherited _actors.yaml into each grandchild directory
      - node: SpawnChildEngine
        action: launches convergence.ts for each grandchild with depth incremented again
      - node: WaitForAllChildren
        action: child blocks until all grandchildren have converged and published

  EnforceDepthLimitAtMaxLevel:
    files: [test/journeys/EnforceDepthLimitAtMaxLevel.test.ts]
    steps:
      - node: _actors/ChildEngine
        action: reaches its hierarchy decision step during convergence
      - node: TrackHierarchyDepth
        action: reads this engine's depth parameter from spawn arguments
      - node: HierarchyDepthCounter
        action: reports the current depth value
      - node: EnforceMaxDepth
        action: compares current depth against the configured maximum
      - node: MaxDepthLimit
        action: current depth equals or exceeds the limit, forcing no-split
      - node: DecideSplit
        action: is bypassed entirely since the depth limit overrides the LLM decision
      - node: ContinueWithoutSplit
        action: proceeds directly to bounded module creation at this level
      - node: convergence/ConvergenceState
        action: records the depth-limited no-split decision
      - node: convergence/BoundedCreationLoop
        action: begins creating modules in the current engine without further splitting

  FlattenGrandchildInterfacesIntoChild:
    files: [test/journeys/FlattenGrandchildInterfacesIntoChild.test.ts]
    steps:
      - node: _actors/ChildEngine
        action: has split into grandchildren and all grandchildren have converged
      - node: CollectChildInterfaces
        action: reads interface.yaml from each grandchild directory
      - node: ChildInterfaceCollection
        action: stores all grandchild interfaces for the child to process
      - node: ValidateCrossEngineRefs
        action: checks external refs across grandchild sibling interfaces
      - node: PromoteExternalRefsToErrors
        action: converts unresolved grandchild refs to errors at the child level
      - node: FlattenGrandchildInterfaces
        action: merges all grandchild exported nodes into a single flat set
      - node: FlattenGrandchildInterfaces
        action: merges all grandchild exported journeys into the flat set
      - node: MergeChildGraphsIntoParent
        action: incorporates the flattened grandchild graph into the child's compiled index
      - node: graph/CompiledIndex
        action: the child's index now contains its own nodes plus flattened grandchild nodes
      - node: publish/ComputeInterfaceHash
        action: computes SHA256 hash over the child's combined interface including grandchild nodes
      - node: publish/GenerateInterfaceYaml
        action: writes the child's interface.yaml with flattened grandchild content
      - node: publish/InterfaceYamlFile
        action: the child's published interface is visible to its parent

  PropagateUnresolvedRefsAcrossLevels:
    files: [test/journeys/PropagateUnresolvedRefsAcrossLevels.test.ts]
    steps:
      - node: _actors/ChildEngine
        action: has grandchildren with external refs that could not be resolved against grandchild siblings
      - node: CollectChildInterfaces
        action: reads grandchild interfaces including their unresolved external ref warnings
      - node: ValidateCrossEngineRefs
        action: attempts to resolve grandchild external refs against other grandchild siblings
      - node: PropagateUnresolvedRefsUpward
        action: identifies refs that remain unresolved even after grandchild-sibling checking
      - node: PropagateUnresolvedRefsUpward
        action: re-emits those refs as warnings in the child's own published interface
      - node: compilation/WarningReport
        action: records the propagated warnings in the child's compilation output
      - node: publish/GenerateInterfaceYaml
        action: includes the propagated warnings in the child's interface metadata
      - node: _actors/ParentEngine
        action: receives the child's interface containing propagated grandchild warnings
      - node: ValidateCrossEngineRefs
        action: attempts to resolve the propagated refs against sibling child interfaces
      - node: PromoteExternalRefsToErrors
        action: converts any still-unresolved propagated refs to errors at the parent level

  EndToEndDeepHierarchy:
    files: [test/journeys/EndToEndDeepHierarchy.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: begins convergence at depth 0 with a large module set
      - node: TrackHierarchyDepth
        action: records depth 0 for the root engine
      - node: DecideSplit
        action: root decides to split into children
      - node: SpawnChildEngine
        action: launches child engines at depth 1
      - node: _actors/ChildEngine
        action: begins convergence and reaches its own hierarchy decision
      - node: TrackHierarchyDepth
        action: records depth 1 for the child engine
      - node: DecideSplit
        action: child decides to split further into grandchildren
      - node: NarrowScopedSpec
        action: narrows the child's scoped spec into sub-scoped specs for grandchildren
      - node: SpawnChildEngine
        action: launches grandchild engines at depth 2
      - node: _actors/ChildEngine
        action: grandchild converges its scoped modules without further splitting
      - node: FlattenGrandchildInterfaces
        action: child merges grandchild interfaces into its own flat interface
      - node: PropagateUnresolvedRefsUpward
        action: child passes any unresolvable grandchild refs up as warnings
      - node: publish/InterfaceYamlFile
        action: child publishes its flattened interface including grandchild content
      - node: WaitForAllChildren
        action: root parent detects all children have published
      - node: CollectChildInterfaces
        action: root reads all child interfaces which include flattened grandchild nodes
      - node: ValidateCrossEngineRefs
        action: root resolves all cross-engine refs including propagated grandchild warnings
      - node: PromoteExternalRefsToErrors
        action: root converts any remaining unresolved refs to errors
      - node: MergeChildGraphsIntoParent
        action: root incorporates all child and grandchild nodes into its compiled index
      - node: publish/GenerateInterfaceYaml
        action: root publishes its interface containing the full flattened hierarchy

  SpawnChildrenWithConcurrencyLimit:
    files: [test/journeys/SpawnChildrenWithConcurrencyLimit.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: has many child directories prepared and needs to spawn them within resource constraints
      - node: ChildConcurrencyLimit
        action: provides the maximum number of simultaneous child subprocesses allowed
      - node: LimitConcurrentChildren
        action: initializes a spawn queue with all child directories ordered by assignment
      - node: SpawnChildEngine
        action: launches the first batch of child engines up to the concurrency limit
      - node: _actors/ChildEngine
        action: first batch of children begin independent convergence
      - node: MonitorChildConvergence
        action: polls all running children for completion status
      - node: ChildConvergenceStatus
        action: detects that one child in the batch has completed
      - node: LimitConcurrentChildren
        action: dequeues the next waiting child now that a slot has opened
      - node: SpawnChildEngine
        action: launches the next child engine into the freed slot
      - node: _actors/ChildEngine
        action: the newly spawned child begins convergence
      - node: LimitConcurrentChildren
        action: repeats spawn-on-completion until the queue is empty
      - node: WaitForAllChildren
        action: blocks until the final batch of children has completed

  HandleChildTimeout:
    files: [test/journeys/HandleChildTimeout.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: is waiting for children to converge and one is taking too long
      - node: ChildTimeoutThreshold
        action: provides the maximum allowed wall-clock time per child engine
      - node: MonitorChildConvergence
        action: checks elapsed time for each running child engine
      - node: DetectChildTimeout
        action: identifies a child whose elapsed time exceeds the threshold
      - node: ChildConvergenceStatus
        action: marks the timed-out child as failed with a timeout reason
      - node: DetectChildTimeout
        action: logs the timeout with child directory path and elapsed time
      - node: compilation/ErrorReport
        action: records the child timeout as a compilation error at the parent level
      - node: WaitForAllChildren
        action: stops waiting for the timed-out child and reports partial completion
      - node: compilation/CompilationResult
        action: outputs a non-zero error result due to the child timeout

  MergeChildInterfacesIncrementally:
    files: [test/journeys/MergeChildInterfacesIncrementally.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: has many child interfaces to merge and wants to avoid loading all simultaneously
      - node: CollectChildInterfaces
        action: reads the first child's interface.yaml from disk
      - node: StreamingInterfaceMerge
        action: merges the first child's nodes into the parent's initially empty index
      - node: StreamingInterfaceMerge
        action: merges the first child's journeys into the parent index
      - node: CollectChildInterfaces
        action: reads the next child's interface.yaml from disk
      - node: StreamingInterfaceMerge
        action: merges the next child's nodes into the growing parent index
      - node: StreamingInterfaceMerge
        action: merges the next child's journeys into the growing parent index
      - node: StreamingInterfaceMerge
        action: repeats one-at-a-time merge for each remaining child interface
      - node: graph/CompiledIndex
        action: the parent index now contains all child nodes merged incrementally
      - node: _actors/Compiler
        action: validates the fully merged parent graph
      - node: compilation/CompilationResult
        action: confirms the incrementally merged graph is valid

  CompactContextForLargeSplitDecision:
    files: [test/journeys/CompactContextForLargeSplitDecision.test.ts]
    steps:
      - node: convergence/HierarchyDecision
        action: triggers the hierarchy decision for an engine with a very large module set
      - node: AnalyzeModuleIndependence
        action: reads the full independence analysis which is too large for LLM context
      - node: CompactSplitDecisionContext
        action: counts total modules and identifies the largest independent groups
      - node: CompactSplitDecisionContext
        action: summarizes coupling between groups as a compact adjacency list instead of full matrix
      - node: CompactSplitDecisionContext
        action: produces a condensed summary with group names, module counts, and key coupling edges
      - node: llm/PayloadSizeBudget
        action: confirms the compacted summary fits within the LLM's available context window
      - node: _actors/LLMWorker
        action: receives the compacted summary and makes the split decision
      - node: DecideSplit
        action: produces a split decision based on the summarized analysis

  HandleHighChildCountHierarchy:
    files: [test/journeys/HandleHighChildCountHierarchy.test.ts]
    steps:
      - node: _actors/ParentEngine
        action: decides to split into a large number of children
      - node: AssignModulesToChildren
        action: maps modules across many child groups
      - node: BatchChildDirectoryCreation
        action: creates all child directories in a single batch pass
      - node: BatchChildDirectoryCreation
        action: writes all scoped specs in the same batch pass
      - node: BatchChildDirectoryCreation
        action: writes all scoped organizations in the same batch pass
      - node: BatchChildDirectoryCreation
        action: copies _actors.yaml into all child directories in the same batch pass
      - node: ChildConcurrencyLimit
        action: caps simultaneous child processes to prevent resource exhaustion
      - node: LimitConcurrentChildren
        action: queues all children and spawns the first batch up to the limit
      - node: SpawnChildEngine
        action: launches the initial batch of children
      - node: DetectChildTimeout
        action: monitors for slow children in the batch
      - node: LimitConcurrentChildren
        action: spawns queued children as slots open from completed ones
      - node: WaitForAllChildren
        action: blocks until all batches have completed
      - node: IndexChildNodesForRefLookup
        action: builds a hash index of all child interface node names
      - node: ValidateCrossEngineRefs
        action: validates cross-engine refs using the indexed lookup instead of linear scan
      - node: StreamingInterfaceMerge
        action: merges child interfaces one at a time into the parent index
      - node: MergeChildGraphsIntoParent
        action: completes the parent compiled index with all child content

  HandleChildConvergenceFailure:
    steps:
      - node: _actors/ParentEngine
        action: is waiting for children and one exits with a non-zero status
      - node: MonitorChildConvergence
        action: detects that a child process has exited before publishing its interface
      - node: DetectChildProcessFailure
        action: reads the child's exit code and determines it failed convergence
      - node: ChildConvergenceStatus
        action: marks the failed child's state as failed with the exit code and error output
      - node: compilation/ErrorReport
        action: records the child convergence failure as a parent-level compilation error
      - node: WaitForAllChildren
        action: stops waiting for the failed child and continues monitoring remaining children
      - node: compilation/CompilationResult
        action: outputs a non-zero error result identifying which child failed and why

  HandleSplitDecisionFailure:
    steps:
      - node: convergence/HierarchyDecision
        action: invokes the hierarchy decision step requiring an LLM call
      - node: _actors/LLMWorker
        action: attempts to analyze module groups but the call fails or returns unparseable output
      - node: FallbackToNoSplitOnFailure
        action: catches the LLM failure and defaults to a no-split decision as a safe fallback
      - node: ContinueWithoutSplit
        action: bypasses child engine preparation since no valid split decision was produced
      - node: convergence/ConvergenceState
        action: records the fallback no-split decision with the failure reason
      - node: convergence/BoundedCreationLoop
        action: begins creating modules directly in the current engine

  HandleChildSpawnFailure:
    steps:
      - node: _actors/ParentEngine
        action: attempts to spawn a child engine subprocess
      - node: SpawnChildEngine
        action: invokes the OS to create a new convergence.ts process for the child directory
      - node: DetectChildSpawnFailure
        action: detects the OS returned an error instead of a valid child process handle
      - node: ChildConvergenceStatus
        action: marks the child as failed before it ever started running
      - node: compilation/ErrorReport
        action: records the spawn failure with the OS error details and child directory path
      - node: LimitConcurrentChildren
        action: does not count the failed spawn against the concurrency limit
      - node: compilation/CompilationResult
        action: outputs a non-zero error result due to the spawn failure

  HandleMalformedChildInterface:
    steps:
      - node: _actors/ParentEngine
        action: all children have exited and the parent begins collecting interfaces
      - node: CollectChildInterfaces
        action: attempts to read interface.yaml from a child directory
      - node: ValidateChildInterfaceIntegrity
        action: checks that the file exists on disk and is parseable YAML
      - node: ValidateChildInterfaceIntegrity
        action: checks that the parsed YAML contains the expected nodes and journeys structure
      - node: compilation/ErrorReport
        action: records the malformed interface with the child directory path and parse error
      - node: compilation/CompilationResult
        action: outputs a non-zero error result identifying the child with the invalid interface

  CreateCrossGrandchildJourneys:
    steps:
      - node: _actors/ChildEngine
        action: has split into grandchildren and all grandchildren have published their interfaces
      - node: CollectChildInterfaces
        action: reads interface.yaml from each grandchild directory
      - node: ChildInterfaceCollection
        action: stores all grandchild interfaces for cross-engine analysis
      - node: ValidateCrossEngineRefs
        action: verifies that external refs between grandchildren resolve to sibling grandchild interfaces
      - node: CreateCrossEngineJourneys
        action: creates journeys at the child level connecting nodes across grandchild interfaces
      - node: CrossEngineJourneySet
        action: stores the child's cross-grandchild journeys
      - node: FlattenGrandchildInterfaces
        action: includes the cross-grandchild journeys alongside flattened grandchild content
      - node: MergeChildGraphsIntoParent
        action: incorporates grandchild nodes and cross-grandchild journeys into the child's compiled index
      - node: graph/CompiledIndex
        action: the child's index now contains grandchild nodes connected by cross-grandchild journeys

  ChildSkipsActorRediscovery:
    steps:
      - node: _actors/ChildEngine
        action: begins convergence in its scoped directory after being spawned by the parent
      - node: DetectInheritedActors
        action: checks the engine's directory and finds _actors.yaml placed there by the parent
      - node: SharedActorsNoduplicates
        action: confirms that inherited actors must be used as-is without re-discovery
      - node: convergence/ConvergenceState
        action: records that actor discovery is skipped and inherited actors are loaded
      - node: convergence/HierarchyDecision
        action: proceeds directly to the hierarchy decision step bypassing actor discovery

  ChildSkipsOrganizationGeneration:
    steps:
      - node: _actors/ChildEngine
        action: begins convergence in its scoped directory after being spawned by the parent
      - node: DetectInheritedOrganization
        action: checks the engine's directory and finds ORGANIZATION.md placed there by the parent
      - node: ChildOrganizationFile
        action: provides the parent-assigned module list ensuring the child works on exactly the intended modules
      - node: convergence/ConvergenceState
        action: records that organization generation is skipped and the inherited module list is loaded
      - node: DetectInheritedActors
        action: also detects inherited _actors.yaml in the same directory
      - node: SharedActorsNoduplicates
        action: confirms inherited actors are used without re-discovery
      - node: convergence/HierarchyDecision
        action: proceeds to the hierarchy decision step bypassing both organization generation and actor discovery

  RejectInvalidModuleAssignment:
    steps:
      - node: _actors/LLMWorker
        action: produces a split decision with child groupings that parse correctly
      - node: DecideSplit
        action: parses the LLM output into a structured split decision with module-to-child mappings
      - node: organization/ModuleList
        action: provides the complete list of modules from ORGANIZATION.md as the expected set
      - node: ValidateSplitDecision
        action: collects all module names assigned across every child group into a combined set
      - node: ValidateSplitDecision
        action: compares the combined set against the complete module list and detects orphaned modules missing from all assignments
      - node: ValidateSplitDecision
        action: checks for duplicate modules appearing in more than one child group
      - node: ValidateSplitDecision
        action: checks for empty child groups that contain zero assigned modules
      - node: compilation/ErrorReport
        action: records the specific assignment errors listing orphaned module names, duplicate assignments, or empty child groups
      - node: FallbackToNoSplitOnFailure
        action: defaults to no-split since the split decision is semantically invalid and cannot be safely executed
      - node: ContinueWithoutSplit
        action: bypasses child engine preparation and proceeds to bounded module creation
      - node: convergence/ConvergenceState
        action: records the fallback no-split decision with the assignment validation failure reason

  DistributeActorsToChildren:
    steps:
      - node: actors/ActorsFile
        action: provides the parent's discovered _actors.yaml as the source for child inheritance
      - node: actors/MergedActorList
        action: supplies the deduplicated actor set that was written to _actors.yaml
      - node: DistributeSharedActors
        action: copies the actors file from the parent directory into each child directory
      - node: ChildDirectory
        action: receives the inherited _actors.yaml alongside its scoped spec and organization
      - node: SharedActorsNoduplicates
        action: ensures children use the inherited actors without re-discovering them
      - node: DetectInheritedActors
        action: child detects the parent-placed _actors.yaml and skips actor discovery

  SetupChildEventWatching:
    steps:
      - node: SpawnChildEngine
        action: launches child engine processes in their scoped directories
      - node: ChildDirectory
        action: provides the output path where each child will write event files
      - node: events/RegisterEventWatchers
        action: creates fs.watch instances on each child's event directory
      - node: events/EventWatcherSet
        action: stores the child watchers in the active set for the parent engine
      - node: WaitForAllChildren
        action: parent enters wait mode, relying on event watchers to detect child completion
      - node: events/DetectEventFileChange
        action: receives notification when a child writes its published interface event
      - node: CollectChildInterfaces
        action: reads the child's published interface triggered by the event notification

  ValidateCrossEngineRefsAfterMerge:
    steps:
      - node: CollectChildInterfaces
        action: gathers all published interfaces from converged child engines
      - node: CreateCrossEngineJourneys
        action: creates journeys connecting nodes across child engine boundaries
      - node: ValidateCrossEngineRefs
        action: checks that every cross-engine ref resolves to a published interface node
      - node: PromoteExternalRefsToErrors
        action: any external ref that was a warning in a child becomes an error at the parent level
      - node: audit/CheckCrossModuleCoverage
        action: audits that cross-engine journeys cover all interface touchpoints between children
      - node: audit/CollectAuditFindings
        action: collects any gaps in cross-engine coverage for targeted fixing
      - node: convergence/ConvergenceState
        action: records the cross-engine validation result before proceeding to parent publish

  SyncParentAfterChildPublish:
    steps:
      - node: _actors/ChildEngine
        action: completes convergence and publishes a new interface with an updated hash
      - node: CollectChildInterfaces
        action: reads the child's newly published interface into the parent
      - node: sync/CompareStoredHash
        action: compares the child's new interface hash against the parent's stored dependency hash
      - node: sync/IdentifyStaleDependencies
        action: detects a hash mismatch indicating the child's interface changed
      - node: sync/FindAffectedModules
        action: traces which parent modules reference nodes from the changed child
      - node: sync/MarkModulesStale
        action: marks the affected parent modules for targeted reconvergence
      - node: convergence/TargetedReconvergence
        action: reconverges only the parent modules affected by the child's interface change

  ProvideExcerptForChildModuleCreation:
    steps:
      - node: GenerateScopedSpec
        action: creates the scoped spec for a child engine from the parent's organization
      - node: AssignModulesToChildren
        action: determines which modules belong to this child
      - node: excerpt/SelectTargetModule
        action: selects the first child module that needs context for creation
      - node: excerpt/CollectCrossModuleConnections
        action: gathers cross-module connections relevant to the child's scoped modules
      - node: excerpt/AssembleExcerpt
        action: assembles focused context for the child module using scoped spec and parent graph
      - node: ChildDirectory
        action: receives the assembled excerpt for use during child convergence

  GenerateCrossEngineTests:
    steps:
      - node: CreateCrossEngineJourneys
        action: defines journeys that span multiple child engine boundaries
      - node: CrossEngineJourneySet
        action: provides the set of cross-engine journeys for test generation
      - node: testgen/ReadJourneySteps
        action: reads the steps of each cross-engine journey
      - node: testgen/GenerateTestFilePerJourney
        action: creates a test file for each cross-engine journey
      - node: testgen/GenerateStepTestCase
        action: generates a test case for each step verifying interface contract at the boundary
      - node: _actors/LLMWorker
        action: fills test assertions with checks that child interfaces satisfy parent expectations

  GenerateCrossEngineCode:
    steps:
      - node: CollectChildInterfaces
        action: provides the published interfaces from all child engines
      - node: CreateCrossEngineJourneys
        action: defines the journeys that bridge child engine boundaries
      - node: codegen/ReadConvergedGraph
        action: reads the parent graph containing cross-engine nodes and connections
      - node: codegen/GenerateProcessSkeletons
        action: generates TypeScript skeletons for cross-engine bridge nodes
      - node: codegen/WriteGeneratedFile
        action: writes the cross-engine skeleton files to disk
