spec_sections: [1]

nodes:
  ProjectOwner:
    type: actor
    description: describes a project via spec.md and triggers convergence
  HumanDeveloper:
    type: actor
    description: reads, edits, and maintains modules and spec files directly
  LLMWorker:
    type: actor
    description: persistent Claude Code process that creates module content, fills code, and fills test assertions when asked
  Compiler:
    type: actor
    description: validates the graph by checking for duplicates, dangling refs, YAML errors, orphans, and isolated modules
  Auditor:
    type: actor
    description: LLM that checks coverage from a specific angle (spec, actor, or cross-module) and identifies gaps
  ParentEngine:
    type: actor
    description: convergence.ts instance that splits organization into children, validates cross-engine refs, and publishes parent interface
  ChildEngine:
    type: actor
    description: convergence.ts instance running at a scoped level with inherited actors, converging independently
  DependentBox:
    type: actor
    description: a box that watches another box's event files via fs.watch and triggers targeted reconvergence on change
  FileSystem:
    type: actor
    description: the OS file system that delivers watch events, stores modules, and hosts event files for ripple propagation
  MaliciousSpecAuthor:
    type: actor
    description: injects prompt-injection or adversarial content into spec.md to manipulate LLM behavior during convergence
  YAMLTamperer:
    type: actor
    description: directly edits module YAML files to introduce invalid refs, corrupt hashes, or inject malicious node definitions
  RogueWorker:
    type: actor
    description: an LLMWorker that produces subtly wrong content — hallucinated nodes, phantom connections, or code with hidden vulnerabilities
  EventSpoofer:
    type: actor
    description: writes fake event files to trigger unnecessary reconvergence cascades or inject stale data into dependent boxes
  InfiniteLoopTrigger:
    type: actor
    description: crafts circular dependencies or oscillating changes between boxes that cause unbounded ripple chains despite convergence rules
  HashCollisionExploiter:
    type: actor
    description: manipulates artifact content to produce identical SHA256 hashes, causing sync.ts to miss real changes
  PrivilegeEscalator:
    type: actor
    description: exploits LLMWorker's native tool access (Read, Write, Edit, Bash) to touch files outside the box scope or execute arbitrary commands
  ResourceExhauster:
    type: actor
    description: submits specs or triggers hierarchies designed to spawn unbounded child engines, exhausting memory, disk, or API quota
  NewProjectAdopter:
    type: actor
    description: encounters genome8 for the first time, runs convergence on their first spec.md, and evaluates whether the protocol fits their system
  MigratingProject:
    type: actor
    description: an existing codebase with legacy documentation being onboarded into genome8, requiring initial graph bootstrapping from pre-existing artifacts
  StaleBox:
    type: actor
    description: a box whose event watcher has stopped or whose upstream dependencies have been removed, silently drifting out of sync with the living graph
  DeprecatedModule:
    type: actor
    description: a module that is no longer relevant to the current spec but still exists on disk with orphaned nodes and dangling inbound references
  ReturningOwner:
    type: actor
    description: a ProjectOwner who re-triggers convergence after a long period of inactivity, facing stale hashes, outdated interfaces, and potentially broken child engines

journeys:
  BreakSystemIntoScopedPieces:
    steps:
      - node: _actors/ProjectOwner
        action: writes spec.md describing a complex system that no single brain can hold
      - node: convergence/ReadSpec
        action: reads the spec as the sole human input to the pipeline
      - node: organization/IdentifyModules
        action: discovers independent concerns in the spec, each becoming a scoped module
      - node: organization/AnalyzeDependencies
        action: determines how the scoped modules relate to each other
      - node: convergence/ModuleCreation
        action: creates a YAML module file for each scoped piece
      - node: compilation/YAMLParsing
        action: parses each module into structured node and journey data
      - node: graph/CompiledIndex
        action: merges all scoped pieces into a single connected graph

  MapPiecesWithJourneys:
    steps:
      - node: _actors/LLMWorker
        action: writes journey steps that trace use cases across nodes in a module
      - node: graph/JourneyDefinition
        action: defines each journey as an ordered sequence of steps
      - node: graph/StepDefinition
        action: binds each step to a node reference and an action description
      - node: graph/ConnectionComputation
        action: derives directed edges from consecutive journey steps
      - node: graph/CrossModuleRefResolution
        action: resolves module/NodeName references linking nodes across module boundaries
      - node: graph/ConnectionSet
        action: stores the full set of directed edges connecting all pieces
      - node: graph/CompiledIndex
        action: assembles nodes and connections into the living graph

  SyncWhenThingsChange:
    steps:
      - node: _actors/HumanDeveloper
        action: modifies a module or spec in a box
      - node: convergence/TargetedReconvergence
        action: reconverges only the affected modules in the changed box
      - node: publish/ComputeInterfaceHash
        action: computes a new hash over the changed box's exported interface
      - node: publish/WriteEventFile
        action: writes an event file signaling the change to dependent boxes
      - node: _actors/DependentBox
        action: watches for event files from upstream boxes via fs.watch
      - node: events/DetectEventFileChange
        action: receives the filesystem notification that an upstream box changed
      - node: events/ReadEventFile
        action: reads the change event to identify what changed
      - node: sync/CompareStoredHash
        action: compares the new dependency hash against the locally stored one
      - node: sync/FindAffectedModules
        action: traces which local modules reference the changed dependency
      - node: convergence/TargetedReconvergence
        action: reconverges only the affected modules in the dependent box
