spec_sections: [3]

nodes:
  SelectTargetModule:
    type: process
    description: identifies which module to generate an excerpt for based on the current convergence step
  CollectLocalNodes:
    type: process
    description: gathers all nodes defined within the target module from the compiled index
  CollectLocalJourneys:
    type: process
    description: gathers all journeys defined within the target module from the compiled index
  CollectCrossModuleConnections:
    type: process
    description: finds all connections where one endpoint is in the target module and the other is in a different module
  CollectReferencedActors:
    type: process
    description: finds all _actors/ references used in the target module's journeys
  CollectWarnings:
    type: process
    description: gathers all compilation warnings relevant to the target module including external refs and orphans
  AssembleExcerpt:
    type: process
    description: combines module status with node-type breakdown, local nodes, local journeys, cross-module connections, triggered-by actors, issues, all-modules overview, global stats, optional spec sections, and raw module YAML source into a single focused output
    files: ["src/excerpt.ts"]
  TruncateToLimit:
    type: process
    description: trims the assembled excerpt to approximately 200 lines while preserving completeness of each section
  CollectModuleSource:
    type: process
    description: reads the target module's raw YAML file content for inclusion in the YOUR FILE section of the excerpt
  CollectGlobalStats:
    type: process
    description: gathers global compilation statistics including total nodes, journeys, connections, orphan count, and duplicate count
  CollectAllModuleSummaries:
    type: process
    description: gathers one-line summaries for every module showing node count, journey count, and cross-module connection count
  CollectTriggeredByActors:
    type: process
    description: identifies which actors trigger journeys in the target module by scanning journey first-steps for actor references
  RankCrossModuleByRelevance:
    type: process
    description: ranks cross-module connections by relevance when the full set exceeds the budget, keeping direct dependencies and demoting distant transitive connections
  SummarizeLargeModuleSource:
    type: process
    description: when the module YAML exceeds a line threshold, produces a compact summary listing node names with types and journey names instead of the raw source
  CompressModuleSummaries:
    type: process
    description: when there are many modules, abbreviates the ALL MODULES section to show directly-connected modules in full detail and group the rest into a count line
  CacheExcerptByState:
    type: process
    description: caches generated excerpts keyed by module name and compiled index hash, serving cached results when the graph has not changed since last generation
  InvalidateExcerptCache:
    type: process
    description: clears all cached excerpts when compilation produces a new compiled index, ensuring stale context is never served to workers
  ValidateCrossModuleRefIntegrity:
    type: process
    description: checks that every cross-module node reference included in the excerpt resolves to an actual node in the compiled index, flagging dangling references to deleted or renamed nodes
  ValidateExcerptCompleteness:
    type: process
    description: checks that the assembled excerpt contains all mandatory sections for the target module, flagging missing local nodes, journeys, or cross-module connections that exist in the compiled index but were not collected
  DetectMissingModuleSource:
    type: process
    description: detects when the target module's YAML file does not exist on disk or is empty, switching to a compiled-index-only excerpt that omits the YOUR FILE section
  DetectStaleExcerptAtConsumption:
    type: process
    description: compares the compiled index hash embedded in a cached excerpt against the current compiled index hash at the moment a worker consumes it, detecting staleness from intervening graph changes
  ValidateExcerptSectionOrder:
    type: process
    description: checks that the assembled excerpt presents sections in the expected order so the LLM worker can parse it reliably, flagging misordered or duplicated sections
  CollectSpecSectionText:
    type: process
    description: reads the spec document and extracts the full text of the sections listed in the target module's spec_sections field, providing the authoritative spec content the module must cover
  MapNodesToSpecConcepts:
    type: process
    description: maps each node in the target module to the spec concepts it addresses by matching node descriptions against key terms and requirements from the assigned spec sections
  DetectUncoveredSpecConcepts:
    type: process
    description: compares the set of spec concepts from the assigned sections against the mapped node coverage and identifies concepts that have no corresponding node or journey in the module
  ValidateSpecSectionBoundary:
    type: process
    description: checks that the target module's nodes and journeys address only concepts from its assigned spec_sections, flagging content that belongs to a different module's spec scope
  CollectSpecCoverageMapping:
    type: process
    description: assembles a compact traceability section showing which spec concepts are covered by which nodes and journeys, and which concepts remain uncovered
  SortCollectedItemsDeterministically:
    type: process
    description: sorts all collected nodes, journeys, connections, actors, and warnings into a stable alphabetical order before assembly, ensuring identical ordering across runs regardless of map iteration or filesystem enumeration order
  VerifyExcerptReproducibility:
    type: process
    description: generates the excerpt a second time from the same inputs and compares the two outputs byte-for-byte, detecting non-determinism in the generation pipeline
  DeduplicateCacheWrite:
    type: process
    description: before writing a new excerpt to the cache, checks if an identical entry already exists at the same module-plus-hash key and skips the write if the content matches, preventing redundant cache churn
  DeterministicTruncationBoundary:
    type: process
    description: when truncation must cut within a section, always cuts at the last complete entry boundary rather than at an arbitrary line count, ensuring the same input always produces the same truncation point
  NormalizeSpecSectionBoundaries:
    type: process
    description: normalizes spec section boundary detection by trimming whitespace, standardizing heading formats, and using exact section number matching, ensuring the same spec text is extracted regardless of minor formatting variations
  BatchGenerateExcerpts:
    type: process
    description: generates excerpts for multiple target modules in a single pass, sharing the compiled index lookup and global stats collection across all targets instead of repeating them per module
  CollapseDeepHierarchyConnections:
    type: process
    description: when cross-module connections span multiple hierarchy levels, collapses transitive edges into summarized paths showing the chain of boxes rather than listing every intermediate connection
  SummarizeOversizedSpecSection:
    type: process
    description: when a single spec section exceeds a line threshold, produces a condensed summary of key concepts and requirements instead of including the full verbatim text in the excerpt
  PrioritizeAndCompressWarnings:
    type: process
    description: when a module has accumulated many warnings, groups them by type, keeps the highest-severity warnings in full detail, and compresses the rest into count-per-type summaries to fit within budget
  TrackExcerptGenerationCost:
    type: process
    description: measures the wall-clock time and compiled index traversal count for each excerpt generation, logging metrics to identify modules where generation is disproportionately expensive
  ExcerptOutput:
    type: artifact
    description: the final ~200 line focused context document for a single module
  ExcerptLineLimit:
    type: rule
    description: each excerpt must be approximately 200 lines to provide focused context without overwhelming the LLM
  LensRelevance:
    type: rule
    description: excerpt content is scoped to what is relevant for the target module, filtering out unrelated graph data
  AdaptiveBudgetAllocation:
    type: rule
    description: the ~200 line budget is allocated dynamically across sections based on module complexity, giving more space to cross-module connections for highly-connected modules and more to source for complex modules
  StabilizeRelevanceRankTiebreaking:
    type: process
    description: when two cross-module connections share the same relevance score during ranking, breaks ties using deterministic alphabetical ordering of module name then node name to prevent non-deterministic output ordering across runs
  CompressLocalNodeList:
    type: process
    description: when a module's node count exceeds the per-section budget threshold, groups nodes by type with counts and lists only the most-connected node names per type instead of enumerating every node
  CompressLocalJourneyList:
    type: process
    description: when a module's journey count exceeds the per-section budget threshold, groups journeys by category and lists only the most cross-connected journey names instead of enumerating every journey
  TargetedCacheInvalidation:
    type: process
    description: when compilation changes specific modules, invalidates only cache entries for those modules and their direct cross-module neighbors instead of clearing the entire cache
  ExcerptCLI:
    type: interface
    description: command-line interface to run excerpt generation for a target module with an optional round number
    files: ["src/cli.ts"]

journeys:
  GenerateModuleExcerpt:
    files: [test/journeys/GenerateModuleExcerpt.test.ts]
    steps:
      - node: _actors/Compiler
        action: provides the compiled index with all nodes, journeys, and connections
      - node: graph/CompiledIndex
        action: supplies the full graph data for extraction
      - node: SelectTargetModule
        action: identifies the module to generate an excerpt for
      - node: CollectLocalNodes
        action: extracts all nodes defined in the target module
      - node: CollectLocalJourneys
        action: extracts all journeys defined in the target module
      - node: CollectCrossModuleConnections
        action: finds all edges crossing into or out of the target module
      - node: CollectReferencedActors
        action: finds all actors referenced in the target module's journey steps
      - node: CollectTriggeredByActors
        action: identifies which actors appear as first-step triggers in the module's journeys
      - node: CollectWarnings
        action: gathers compilation warnings relevant to this module
      - node: CollectGlobalStats
        action: gathers total nodes, journeys, connections, orphans, and duplicates across all modules
      - node: CollectAllModuleSummaries
        action: gathers one-line stats for every module in the graph
      - node: CollectModuleSource
        action: reads the raw YAML file content of the target module
      - node: AssembleExcerpt
        action: combines all collected sections into a structured excerpt document
      - node: ExcerptLineLimit
        action: enforces the ~200 line target for the output
      - node: TruncateToLimit
        action: trims the assembled excerpt if it exceeds the line limit
      - node: ExcerptOutput
        action: stores the final focused context document for the module

  ProvideExcerptForModuleCreation:
    files: [test/journeys/ProvideExcerptForModuleCreation.test.ts]
    steps:
      - node: convergence/ModuleCreation
        action: requests focused context for the next module to be created
      - node: SelectTargetModule
        action: identifies the module that needs context for LLM creation
      - node: graph/CompiledIndex
        action: provides current graph state including all previously created modules
      - node: CollectCrossModuleConnections
        action: finds existing connections that the new module should reference
      - node: CollectReferencedActors
        action: identifies actors relevant to the new module's domain
      - node: CollectAllModuleSummaries
        action: provides the full module list so the worker knows what modules exist
      - node: CollectGlobalStats
        action: provides current graph health metrics for the worker
      - node: LensRelevance
        action: filters context to only what is relevant for this specific module
      - node: AssembleExcerpt
        action: builds the focused context from relevant graph data
      - node: TruncateToLimit
        action: ensures the excerpt fits within the ~200 line budget
      - node: ExcerptOutput
        action: provides the excerpt as context input for the LLM worker
      - node: llm/TaskPayload
        action: packages the excerpt into the task payload sent to the worker

  ProvideExcerptForPerspectiveEnrichment:
    files: [test/journeys/ProvideExcerptForPerspectiveEnrichment.test.ts]
    steps:
      - node: convergence/ExamineFromPerspective
        action: requests focused context for a perspective enrichment pass on a module
      - node: SelectTargetModule
        action: identifies the module being enriched from a specific perspective
      - node: graph/CompiledIndex
        action: provides the full compiled graph with all current nodes and connections
      - node: CollectLocalNodes
        action: extracts the module's current nodes so the worker knows what already exists
      - node: CollectLocalJourneys
        action: extracts the module's current journeys so the worker knows what's already covered
      - node: CollectCrossModuleConnections
        action: shows how the module currently connects to other modules
      - node: CollectReferencedActors
        action: lists actors currently involved in this module's journeys
      - node: CollectTriggeredByActors
        action: identifies which actors trigger this module's journeys
      - node: CollectGlobalStats
        action: provides overall graph health for the worker to assess impact
      - node: CollectAllModuleSummaries
        action: shows all modules so the worker can identify valid cross-module reference targets
      - node: CollectModuleSource
        action: reads the full YAML source so the worker can write the complete updated file
      - node: AssembleExcerpt
        action: combines all sections into a perspective-enrichment excerpt
      - node: TruncateToLimit
        action: trims to the ~200 line budget while preserving the full module source
      - node: ExcerptOutput
        action: provides the enrichment-focused excerpt to the convergence pipeline

  ProvideExcerptForCodegenFill:
    files: [test/journeys/ProvideExcerptForCodegenFill.test.ts]
    steps:
      - node: codegen/FillImplementation
        action: requests focused context for filling a code skeleton with implementation
      - node: SelectTargetModule
        action: identifies the module whose code skeleton needs filling
      - node: graph/CompiledIndex
        action: provides the compiled graph for understanding node purposes and connections
      - node: CollectLocalNodes
        action: extracts the module's nodes with types and descriptions for implementation guidance
      - node: CollectLocalJourneys
        action: extracts the module's journeys showing how nodes interact in sequences
      - node: CollectCrossModuleConnections
        action: identifies imports and dependencies the implementation needs to reference
      - node: LensRelevance
        action: filters context to implementation-relevant details, emphasizing node descriptions and journey flows
      - node: AssembleExcerpt
        action: builds the codegen-focused excerpt prioritizing implementation guidance
      - node: TruncateToLimit
        action: ensures the excerpt fits within the line budget
      - node: ExcerptOutput
        action: provides the implementation-focused excerpt for the codegen pipeline

  ProvideExcerptForTestgenFill:
    files: [test/journeys/ProvideExcerptForTestgenFill.test.ts]
    steps:
      - node: testgen/FillTestAssertions
        action: requests focused context for filling test assertion bodies
      - node: SelectTargetModule
        action: identifies the module whose test skeleton needs assertion filling
      - node: graph/CompiledIndex
        action: provides the compiled graph for understanding expected behaviors
      - node: CollectLocalNodes
        action: extracts node definitions to understand what each test should verify
      - node: CollectLocalJourneys
        action: extracts journey steps to understand the expected sequence of actions
      - node: CollectCrossModuleConnections
        action: identifies cross-module interactions the tests should validate
      - node: codegen/FilledSourceFile
        action: provides the implementation code the tests will exercise
      - node: LensRelevance
        action: filters context to test-relevant details, emphasizing expected behaviors and assertions
      - node: AssembleExcerpt
        action: builds the testgen-focused excerpt with implementation and graph context
      - node: TruncateToLimit
        action: ensures the excerpt fits within the line budget
      - node: ExcerptOutput
        action: provides the test-focused excerpt for the testgen pipeline

  ProvideExcerptForAuditFix:
    files: [test/journeys/ProvideExcerptForAuditFix.test.ts]
    steps:
      - node: convergence/AuditGapFix
        action: requests focused context for fixing a specific audit gap in a module
      - node: SelectTargetModule
        action: identifies the module that contains the audit gap
      - node: graph/CompiledIndex
        action: provides the compiled graph showing current state including the gap
      - node: CollectLocalNodes
        action: extracts the module's nodes to show what exists
      - node: CollectLocalJourneys
        action: extracts the module's journeys to show current coverage
      - node: CollectCrossModuleConnections
        action: shows cross-module connections relevant to the gap
      - node: CollectWarnings
        action: includes compilation warnings that may relate to the audit finding
      - node: CollectModuleSource
        action: reads the raw YAML so the worker can edit the specific file
      - node: AssembleExcerpt
        action: builds the fix-focused excerpt combining gap details with module context
      - node: TruncateToLimit
        action: ensures the excerpt fits within the line budget
      - node: ExcerptOutput
        action: provides the fix-focused excerpt to the LLM worker for targeted repair

  ProvideExcerptForAudit:
    files: [test/journeys/ProvideExcerptForAudit.test.ts]
    steps:
      - node: convergence/TargetedAudit
        action: requests focused context for an auditor to check a specific module
      - node: SelectTargetModule
        action: identifies the module being audited
      - node: graph/CompiledIndex
        action: provides the full compiled graph for extraction
      - node: CollectLocalNodes
        action: extracts the module's nodes for the auditor to review
      - node: CollectLocalJourneys
        action: extracts the module's journeys for the auditor to review
      - node: CollectCrossModuleConnections
        action: shows the auditor how this module connects to others
      - node: CollectWarnings
        action: includes any existing warnings the auditor should consider
      - node: AssembleExcerpt
        action: builds the audit-focused excerpt
      - node: ExcerptOutput
        action: provides the excerpt to the auditor
      - node: _actors/Auditor
        action: receives the focused context and begins coverage checking

  ProvideExcerptForHumanDeveloper:
    files: [test/journeys/ProvideExcerptForHumanDeveloper.test.ts]
    steps:
      - node: _actors/HumanDeveloper
        action: requests context for a specific module to understand or edit it
      - node: SelectTargetModule
        action: identifies the module the developer wants to explore
      - node: graph/CompiledIndex
        action: provides the compiled graph data
      - node: CollectLocalNodes
        action: extracts the module's node definitions
      - node: CollectLocalJourneys
        action: extracts the module's journey definitions
      - node: CollectCrossModuleConnections
        action: shows how the module connects to the rest of the graph
      - node: CollectReferencedActors
        action: lists the actors involved in this module
      - node: CollectWarnings
        action: shows any validation warnings for this module
      - node: AssembleExcerpt
        action: combines all sections into a readable excerpt
      - node: TruncateToLimit
        action: trims to ~200 lines for focused reading
      - node: ExcerptOutput
        action: displays the excerpt to the developer

  HandleHighConnectionModule:
    files: [test/journeys/HandleHighConnectionModule.test.ts]
    steps:
      - node: SelectTargetModule
        action: identifies a module with a high number of cross-module connections
      - node: graph/CompiledIndex
        action: provides all connections for the target module
      - node: CollectCrossModuleConnections
        action: gathers the full set of cross-module connections which exceeds the normal budget
      - node: RankCrossModuleByRelevance
        action: scores each connection by directness, ranking direct dependencies above transitive ones
      - node: RankCrossModuleByRelevance
        action: selects the top-ranked connections that fit within the cross-module budget allocation
      - node: AdaptiveBudgetAllocation
        action: allocates more of the ~200 line budget to the cross-module section for this highly-connected module
      - node: AssembleExcerpt
        action: assembles the excerpt using only the highest-relevance connections
      - node: TruncateToLimit
        action: trims the excerpt to the adapted budget limit
      - node: ExcerptOutput
        action: stores the connection-focused excerpt that fits within the line budget

  HandleOversizedModuleSource:
    files: [test/journeys/HandleOversizedModuleSource.test.ts]
    steps:
      - node: SelectTargetModule
        action: identifies a module whose YAML source exceeds the line budget threshold
      - node: CollectModuleSource
        action: reads the raw YAML and detects that it exceeds the source line threshold
      - node: SummarizeLargeModuleSource
        action: extracts node names with their types as a compact list
      - node: SummarizeLargeModuleSource
        action: extracts journey names with step counts as a compact list
      - node: SummarizeLargeModuleSource
        action: produces the compact summary replacing the raw source in the excerpt
      - node: AdaptiveBudgetAllocation
        action: reallocates the saved lines from source compression to other sections
      - node: AssembleExcerpt
        action: includes the summarized source instead of the raw YAML file content
      - node: ExcerptOutput
        action: stores the excerpt with source summary fitting within the line budget

  ServeExcerptFromCache:
    files: [test/journeys/ServeExcerptFromCache.test.ts]
    steps:
      - node: SelectTargetModule
        action: identifies the module that needs an excerpt
      - node: graph/CompiledIndex
        action: provides the current compiled index hash for cache lookup
      - node: CacheExcerptByState
        action: checks if a cached excerpt exists for this module at the current compiled index hash
      - node: CacheExcerptByState
        action: finds a valid cache hit and retrieves the stored excerpt
      - node: ExcerptOutput
        action: serves the cached excerpt immediately without running any collection steps

  RegenerateAfterGraphChange:
    files: [test/journeys/RegenerateAfterGraphChange.test.ts]
    steps:
      - node: _actors/Compiler
        action: completes a compilation that changes the compiled index
      - node: graph/CompiledIndex
        action: provides the new compiled index with a different hash than before
      - node: InvalidateExcerptCache
        action: detects that the compiled index hash has changed since the last cache entries were stored
      - node: InvalidateExcerptCache
        action: clears all cached excerpts to prevent serving stale context
      - node: CacheExcerptByState
        action: resets the cache to empty, ready to store fresh excerpts on next generation
      - node: compilation/CompilationResult
        action: confirms the compilation is complete and excerpts are ready to be regenerated on demand

  ValidateAssembledExcerpt:
    files: [test/journeys/ValidateAssembledExcerpt.test.ts]
    steps:
      - node: AssembleExcerpt
        action: produces a structured excerpt from the collected sections
      - node: ValidateExcerptCompleteness
        action: checks that the YOUR NODES section is present and non-empty for modules that define nodes
      - node: ValidateExcerptCompleteness
        action: checks that the YOUR JOURNEYS section is present and non-empty for modules that define journeys
      - node: ValidateExcerptCompleteness
        action: checks that the CROSS-MODULE section is present for modules with cross-module connections in the compiled index
      - node: ValidateExcerptSectionOrder
        action: checks that sections appear in the expected order from MODULE STATUS through YOUR FILE
      - node: ValidateExcerptSectionOrder
        action: flags any duplicated or misordered sections that would confuse the LLM parser
      - node: ExcerptOutput
        action: stores the validated excerpt only after completeness and ordering checks pass

  DetectDanglingRefsInExcerpt:
    files: [test/journeys/DetectDanglingRefsInExcerpt.test.ts]
    steps:
      - node: CollectCrossModuleConnections
        action: gathers all cross-module connections for the target module
      - node: graph/CompiledIndex
        action: provides the current compiled index as the authority on which nodes exist
      - node: ValidateCrossModuleRefIntegrity
        action: checks each BEFORE YOU reference to confirm the source node exists in its declared module
      - node: ValidateCrossModuleRefIntegrity
        action: checks each AFTER YOU reference to confirm the target node exists in its declared module
      - node: ValidateCrossModuleRefIntegrity
        action: flags any dangling references where the target node was deleted or renamed since the connection was established
      - node: CollectWarnings
        action: adds dangling cross-module reference warnings to the module's warning list
      - node: AssembleExcerpt
        action: includes the dangling reference warnings in the ISSUES section of the excerpt

  HandleMissingModuleSourceFile:
    files: [test/journeys/HandleMissingModuleSourceFile.test.ts]
    steps:
      - node: SelectTargetModule
        action: identifies the target module for excerpt generation
      - node: CollectModuleSource
        action: attempts to read the target module's YAML file from disk
      - node: DetectMissingModuleSource
        action: detects that the file does not exist on disk because the module has not been created yet
      - node: DetectMissingModuleSource
        action: switches to compiled-index-only mode, omitting the YOUR FILE section from the excerpt
      - node: graph/CompiledIndex
        action: provides node and journey data from the compiled index as a fallback for the missing file
      - node: CollectLocalNodes
        action: extracts nodes from the compiled index instead of the raw file
      - node: CollectLocalJourneys
        action: extracts journeys from the compiled index instead of the raw file
      - node: AssembleExcerpt
        action: builds the excerpt without the YOUR FILE section, using compiled index data for all content
      - node: ExcerptOutput
        action: stores the source-less excerpt suitable for module creation context

  CompressModuleSummariesForLargeGraph:
    files: [test/journeys/CompressModuleSummariesForLargeGraph.test.ts]
    steps:
      - node: SelectTargetModule
        action: identifies the target module in a graph with many modules
      - node: graph/CompiledIndex
        action: provides the full compiled index containing all modules
      - node: CollectAllModuleSummaries
        action: gathers one-line summaries for every module and detects the count exceeds the budget threshold
      - node: CollectCrossModuleConnections
        action: identifies which modules are directly connected to the target for prioritization
      - node: CompressModuleSummaries
        action: retains full detail for modules directly connected to the target module
      - node: CompressModuleSummaries
        action: groups all remaining unconnected modules into a single count line showing their total node and journey counts
      - node: AdaptiveBudgetAllocation
        action: reallocates the saved lines from compressed summaries to other sections
      - node: AssembleExcerpt
        action: includes the compressed ALL MODULES section in the excerpt
      - node: TruncateToLimit
        action: trims the excerpt to the line budget with the compressed summaries
      - node: ExcerptOutput
        action: stores the excerpt with compressed module summaries fitting within the line budget

  DetectAndRejectStaleExcerpt:
    files: [test/journeys/DetectAndRejectStaleExcerpt.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: prepares to send a task to a worker using a previously generated excerpt
      - node: ExcerptOutput
        action: provides the cached excerpt that was generated at a prior compiled index hash
      - node: graph/CompiledIndex
        action: provides the current compiled index which may have changed since the excerpt was generated
      - node: DetectStaleExcerptAtConsumption
        action: extracts the compiled index hash embedded in the excerpt at generation time
      - node: DetectStaleExcerptAtConsumption
        action: compares the embedded hash against the current compiled index hash
      - node: DetectStaleExcerptAtConsumption
        action: detects a mismatch indicating the graph changed after the excerpt was generated
      - node: InvalidateExcerptCache
        action: evicts the stale excerpt from the cache for this module
      - node: SelectTargetModule
        action: re-identifies the target module for fresh excerpt generation
      - node: AssembleExcerpt
        action: regenerates the excerpt from the current compiled index state
      - node: ExcerptOutput
        action: provides the freshly generated excerpt to the worker instead of the stale one

  IncludeSpecTextInCreationExcerpt:
    files: [test/journeys/IncludeSpecTextInCreationExcerpt.test.ts]
    steps:
      - node: convergence/ModuleCreation
        action: requests context for creating a new module that must cover specific spec sections
      - node: SelectTargetModule
        action: identifies the module to be created and reads its spec_sections assignment
      - node: organization/ProvideSpecSectionsToExcerpt
        action: supplies the spec_sections list for the target module from the organization plan
      - node: CollectSpecSectionText
        action: reads the spec document and locates the sections matching the module's spec_sections numbers
      - node: CollectSpecSectionText
        action: extracts the full text of each assigned spec section as authoritative content the module must cover
      - node: LensRelevance
        action: prioritizes spec section text as high-relevance content that must not be truncated
      - node: AssembleExcerpt
        action: includes the spec section text in a dedicated SPEC SECTIONS section of the excerpt
      - node: TruncateToLimit
        action: trims other sections before spec text to ensure spec content is preserved
      - node: ExcerptOutput
        action: provides the creation excerpt with spec text so the worker knows exactly what concepts to cover

  ProvideExcerptForSpecCoverageAudit:
    files: [test/journeys/ProvideExcerptForSpecCoverageAudit.test.ts]
    steps:
      - node: convergence/TargetedAudit
        action: requests focused context for a spec coverage auditor to check a specific module
      - node: SelectTargetModule
        action: identifies the module being audited for spec coverage
      - node: graph/CompiledIndex
        action: provides the compiled graph for extraction
      - node: CollectSpecSectionText
        action: extracts the authoritative spec text for the module's assigned sections
      - node: CollectLocalNodes
        action: extracts the module's nodes for the auditor to compare against spec concepts
      - node: CollectLocalJourneys
        action: extracts the module's journeys for the auditor to compare against spec flows
      - node: MapNodesToSpecConcepts
        action: maps each node and journey to the spec concepts they address based on description matching
      - node: DetectUncoveredSpecConcepts
        action: identifies spec concepts that have no corresponding node or journey in the module
      - node: CollectSpecCoverageMapping
        action: assembles the traceability section showing covered and uncovered concepts
      - node: AssembleExcerpt
        action: builds the spec-coverage-focused excerpt with spec text, mapping, and gaps highlighted
      - node: ExcerptOutput
        action: provides the spec-coverage excerpt to the auditor
      - node: _actors/Auditor
        action: receives the excerpt with spec traceability and begins coverage checking

  DetectSpecScopeCreep:
    files: [test/journeys/DetectSpecScopeCreep.test.ts]
    steps:
      - node: SelectTargetModule
        action: identifies the target module and reads its spec_sections assignment
      - node: organization/ProvideSpecSectionsToExcerpt
        action: supplies the spec_sections list that defines this module's scope boundary
      - node: CollectSpecSectionText
        action: extracts the spec text for the assigned sections to define the authorized scope
      - node: CollectLocalNodes
        action: extracts all nodes defined in the target module
      - node: CollectLocalJourneys
        action: extracts all journeys defined in the target module
      - node: ValidateSpecSectionBoundary
