        action: compares re-fetched hashes against stored and finds at least one mismatch indicating a dependency changed during the sync cycle
      - node: IdentifyStaleDependencies
        action: collects the dependencies that drifted during the sync cycle into a new changed list
      - node: SyncResult
        action: records that post-sync drift was detected and a follow-up sync is required
      - node: graph/CompiledIndex
        action: provides the graph for tracing modules affected by the drifted dependencies
      - node: graph/ConnectionSet
        action: provides edges for reference tracing
      - node: FindAffectedModules
        action: traces connections from the drifted dependencies to local modules
      - node: MarkModulesStale
        action: marks the newly affected modules stale for another round of targeted reconvergence
      - node: StaleModuleList
        action: stores the new stale list from drift detection
      - node: convergence/TargetedReconvergence
        action: begins a follow-up reconvergence on the modules affected by changes that occurred during the previous sync cycle

  DetectAndRetryFailedOutgoingEvent:
    steps:
      - node: UpdateStoredHashes
        action: writes new dependency hashes to DependencyHashStore after successful reconvergence
      - node: DependencyHashStore
        action: updated with the latest hashes before the outgoing event is written
      - node: AppendBoxToOriginChain
        action: prepares the origin chain with this box's ID for the outgoing event
      - node: NarrowOutgoingChangelog
        action: produces the narrowed changelog for the outgoing event
      - node: publish/WriteEventFile
        action: attempts to write the outgoing event file but the write fails due to disk error or crash mid-write
      - node: VerifyOutgoingEventWritten
        action: reads the event file location and finds it missing or truncated
      - node: VerifyOutgoingEventWritten
        action: detects the outgoing event was not successfully written despite stored hashes already being updated
      - node: publish/WriteEventFile
        action: retries writing the outgoing event file with the same changelog and origin chain
      - node: VerifyOutgoingEventWritten
        action: reads the event file back and confirms its content matches the expected changelog, origin chain, and sequence number
      - node: publish/EventFile
        action: the verified event file propagates the ripple to downstream dependents
      - node: SyncResult
        action: records that the outgoing event required a retry but was successfully written

  DetectHashCollisionDuringSyncCheck:
    steps:
      - node: _actors/HashCollisionExploiter
        action: manipulates artifact content to produce an identical SHA256 hash as the previous version
      - node: FetchDependencyHash
        action: fetches the dependency hash which matches the stored hash despite real changes
      - node: CompareStoredHash
        action: compares hashes and incorrectly finds no mismatch
      - node: CrossValidateEventHashWithFetchedHash
        action: cross-validates by comparing the event payload hash against the fetched interface hash
      - node: ReadDependencyChangelog
        action: reads the changelog to detect that content changed even though the hash did not
      - node: MarkModulesStale
        action: marks modules stale based on changelog evidence overriding the hash match
