spec_sections: [3, 5]

nodes:
  CheckSpecCoverage:
    type: process
    description: auditor 1 compares spec sections against the graph to find sections not represented by any node or journey
  CheckActorCoverage:
    type: process
    description: auditor 2 checks that every actor in _actors.yaml participates in at least one journey across all modules
  CheckCrossModuleCoverage:
    type: process
    description: auditor 3 verifies that every module has at least one cross-module connection and no module is an island
  GenerateAuditPrompt:
    type: process
    description: builds a focused prompt for each auditor containing the compiled graph excerpt and the specific coverage angle to check
  CollectAuditFindings:
    type: process
    description: gathers findings from all 4 auditors into a single list of coverage gaps with locations and descriptions
  PrioritizeGaps:
    type: process
    description: ranks the collected gaps by severity so the most critical coverage issues are fixed first
  BuildGapFixPrompt:
    type: process
    description: builds a targeted fix prompt for each gap specifying exactly which module to edit and what coverage to add
  ApplyFix:
    type: process
    description: delegates to LLM to edit the specific module YAML file to close the identified coverage gap
  VerifyFixCompiles:
    type: process
    description: runs compile.ts after each fix to ensure the edit did not introduce new errors
  VerifyGapClosed:
    type: process
    description: re-runs the specific auditor that found the gap to confirm the fix actually closed it
  DeclareConverged:
    type: process
    description: marks the graph as CONVERGED after all 4 auditors report zero gaps and compilation shows zero errors
  SelectNextGapToFix:
    type: process
    description: picks the highest-priority unfixed gap from the prioritized list and advances the pointer to the next gap
  ProvideFixContext:
    type: process
    description: assembles the target module excerpt, the specific gap description, and surrounding graph context into a complete fix payload for the LLM worker
  MergeAuditReports:
    type: process
    description: combines the 4 individual coverage reports into a unified view with normalized gap format before feeding into findings collection
  ConfirmAllGapsResolved:
    type: process
    description: checks that the re-audit findings list is empty and compilation is clean before allowing convergence declaration to proceed
  DetectFixInducedErrors:
    type: process
    description: compares pre-fix and post-fix compilation results to detect new orphans, duplicates, or dangling refs that did not exist before the fix was applied
  DetectFixInducedGaps:
    type: process
    description: compares pre-fix and post-fix audit findings to detect new coverage gaps opened by a fix that closed a different gap
  RejectAndRevertFix:
    type: process
    description: restores the target module to its pre-fix state when a fix introduced new errors or failed to close the target gap
  ValidateGraphInvariantsPostFix:
    type: process
    description: checks all convergence invariants after a fix round including zero errors, zero orphans, zero duplicates, and zero isolated modules
  DetectSelfAuditTarget:
    type: process
    description: detects when a coverage gap targets audit.yaml itself, flagging the meta-circular dependency so the fix process applies extra safeguards
  ValidateAuditModulePresence:
    type: process
    description: checks that audit.yaml exists as a compiled module in the index since it is infrastructure required for the convergence pipeline to function
  DetectSpecChangeToAuditSections:
    type: process
    description: detects when spec sections referenced by audit.yaml have changed, triggering re-evaluation of audit coverage requirements against the updated spec
  ScopeFixToAvoidAuditBreak:
    type: process
    description: when a fix targets audit.yaml, validates that the proposed edit does not remove or break existing audit processes like CheckSpecCoverage, VerifyFixCompiles, or DeclareConverged
  ReauditAfterSelfFix:
    type: process
    description: after a fix modifies audit.yaml, re-runs the full audit pipeline from scratch to verify the self-fix did not invalidate audit's own integrity
  AuditFindingsList:
    type: artifact
    description: the collected list of coverage gaps from all 4 auditors with gap type, location, and description
  SpecCoverageReport:
    type: artifact
    description: auditor 1's report listing which spec sections are covered and which have no representation in the graph
  ActorCoverageReport:
    type: artifact
    description: auditor 2's report listing which actors participate in journeys and which are orphaned
  CrossModuleCoverageReport:
    type: artifact
    description: auditor 3's report listing which modules have cross-module connections and which are isolated
  TrackAuditRound:
    type: artifact
    description: records the current audit-fix-reaudit cycle number and cumulative gaps fixed for progress tracking and termination decisions
  ExactlyFourAuditors:
    type: rule
    description: depth audit always uses exactly 4 auditors checking spec coverage, actor coverage, cross-module coverage, and goal coverage
  TargetedFixesOnly:
    type: rule
    description: audit gaps are fixed with targeted edits to specific modules, never by re-running the full creation pipeline
  AuditAfterZeroErrors:
    type: rule
    description: audit only runs after compile.ts reports 0 errors and 0 orphans — never on a broken graph
  AuditRoundLimit:
    type: rule
    description: audit-fix-reaudit cycles are capped at a maximum number of rounds to prevent infinite loops when gaps cannot be resolved
  DetectFixContentLoss:
    type: process
    description: compares pre-fix and post-fix node and journey counts in the target module to detect a fix that removed existing content, implementing spec section 9's destructive edit protection for the audit fix pipeline
  CheckGoalCoverage:
    type: process
    description: auditor 4 checks that each goal rule node derived from spec §8 is connected to at least one journey that exercises the goal's achievement path, flagging goals with no proving journeys
  GoalCoverageReport:
    type: artifact
    description: auditor 4's report listing which goal rule nodes are connected to journeys proving achievement and which goals are orphaned or only referenced without an achievement path
  DeterministicGapOrdering:
    type: rule
    description: gaps with equal severity must be ordered by a deterministic tiebreaker such as module name then gap type so that fix order is reproducible across runs and the audit-fix cycle produces the same final graph regardless of timing
  VerifyAuditFindingStability:
    type: process
    description: compares two audit finding sets produced from identical compiled graph inputs to detect LLM-induced non-determinism, flagging findings that appear in one run but not the other as unstable
  PerGapFixAttemptLimit:
    type: rule
    description: caps the number of fix attempts for any single gap to prevent an unfixable gap from consuming all LLM calls within a round, marking the gap as unresolvable after the limit is reached
  SkipUnresolvableGap:
    type: process
    description: marks a gap as unresolvable after it has exhausted its per-gap fix attempt limit and advances to the next gap in the prioritized list so the fix round can continue making progress on other gaps
  DetectFixIntroducedDependency:
    type: process
    description: after a fix adds cross-module journey steps to a target module, extracts the new module references and compares them against the declared dependency graph in ORGANIZATION.md to detect undeclared dependencies that the fix introduced
  SafeguardNodesAreImmutableDuringFix:
    type: rule
    description: the self-reference safety nodes (ScopeFixToAvoidAuditBreak, DetectSelfAuditTarget, ReauditAfterSelfFix, DetectFixContentLoss) must not be modified or removed by any audit fix — they can only be changed through spec-driven reconvergence, preventing a fix from disabling its own safety checks
  ValidateAuditorOutput:
    type: process
    description: checks that each auditor's raw LLM output is parseable into structured coverage findings with valid module names that exist in the compiled index, non-empty gap descriptions, and a recognized gap type before the output enters the findings collection pipeline

journeys:
  DepthAudit:
    files: [test/journeys/DepthAudit.test.ts]
    steps:
      - node: convergence/CompileCheck
        action: confirms compilation passed with 0 errors and 0 orphans
      - node: compilation/CompilationResult
        action: provides the clean compilation result
      - node: AuditAfterZeroErrors
        action: verifies the graph is error-free before starting audit
      - node: convergence/TargetedAudit
        action: triggers the depth audit with 4 auditors
      - node: ExactlyFourAuditors
        action: enforces that all 4 coverage angles will be checked
      - node: TrackAuditRound
        action: initializes the round counter to 1 for the first audit pass
      - node: GenerateAuditPrompt
        action: builds the spec coverage prompt for auditor 1
      - node: excerpt/ExcerptOutput
        action: provides focused context for the auditor to review
      - node: _actors/Auditor
        action: checks spec coverage — which spec sections are represented in the graph
      - node: CheckSpecCoverage
        action: compares spec sections against nodes and journeys in the compiled graph
      - node: SpecCoverageReport
        action: records which sections are covered and which have gaps
      - node: GenerateAuditPrompt
        action: builds the actor coverage prompt for auditor 2
      - node: _actors/Auditor
        action: checks actor coverage — which actors participate in journeys
      - node: CheckActorCoverage
        action: compares _actors.yaml entries against journey step references
      - node: ActorCoverageReport
        action: records which actors are connected and which are orphaned
      - node: GenerateAuditPrompt
        action: builds the cross-module coverage prompt for auditor 3
      - node: _actors/Auditor
        action: checks cross-module coverage — which modules connect to others
      - node: CheckCrossModuleCoverage
        action: checks each module for at least one cross-module connection
      - node: CrossModuleCoverageReport
        action: records which modules are connected and which are isolated
      - node: GenerateAuditPrompt
        action: builds the goal coverage prompt for auditor 4
      - node: _actors/Auditor
        action: checks goal coverage — which goals have journeys proving achievement
      - node: CheckGoalCoverage
        action: compares goal rule nodes against journeys exercising each goal's achievement path
      - node: GoalCoverageReport
        action: records which goals are covered by proving journeys and which are orphaned
      - node: MergeAuditReports
        action: combines the 4 individual reports into a unified gap format
      - node: CollectAuditFindings
        action: gathers all findings from the merged reports into a single gap list
      - node: AuditFindingsList
        action: stores the complete list of coverage gaps

  FixAuditGaps:
    files: [test/journeys/FixAuditGaps.test.ts]
    steps:
      - node: AuditFindingsList
        action: provides the list of coverage gaps to fix
      - node: PrioritizeGaps
        action: ranks gaps by severity to fix the most critical first
      - node: TargetedFixesOnly
        action: enforces that fixes are targeted edits, not full re-creation
      - node: SelectNextGapToFix
        action: picks the highest-priority unfixed gap from the list
      - node: DetectSelfAuditTarget
        action: checks whether the selected gap targets audit.yaml itself
      - node: BuildGapFixPrompt
        action: builds a specific fix prompt for the selected gap
      - node: ProvideFixContext
        action: assembles the target module excerpt and gap details into a fix payload
      - node: _actors/LLMWorker
        action: receives the fix payload with the exact module and gap to address
      - node: ApplyFix
        action: edits the target module YAML to close the coverage gap
      - node: VerifyFixCompiles
        action: runs compile.ts on the edited module
      - node: _actors/Compiler
        action: validates the edited module has 0 errors
      - node: compilation/CompilationResult
        action: confirms the fix did not break compilation
      - node: DetectFixInducedErrors
        action: compares pre-fix and post-fix compilation to check for new orphans or duplicates
      - node: VerifyGapClosed
        action: re-runs the specific auditor on the fixed area
      - node: _actors/Auditor
        action: confirms the specific gap is now closed
      - node: TrackAuditRound
        action: increments the cumulative gaps-fixed counter
      - node: convergence/ConvergenceState
        action: updates with the fix result — either more gaps remain or all are closed

  AuditFixReauditCycle:
    files: [test/journeys/AuditFixReauditCycle.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: indicates gaps remain after a fix round
      - node: TrackAuditRound
        action: increments the round counter for the next audit-fix cycle
      - node: AuditRoundLimit
        action: checks whether the round counter has exceeded the maximum allowed cycles
      - node: convergence/RecompileAfterFix
        action: runs full compilation after all fixes in this round
      - node: _actors/Compiler
        action: validates the full graph after fixes
      - node: compilation/CompilationResult
        action: confirms 0 errors after the fix round
      - node: ValidateGraphInvariantsPostFix
        action: checks zero orphans, zero duplicates, and zero isolated modules in the post-fix graph
      - node: convergence/ReauditAfterFix
        action: triggers a re-audit to check for remaining gaps
      - node: GenerateAuditPrompt
        action: rebuilds audit prompts for all 4 angles
      - node: _actors/Auditor
        action: re-checks spec coverage after fixes
      - node: CheckSpecCoverage
        action: re-examines spec sections against the updated graph
      - node: _actors/Auditor
        action: re-checks actor coverage after fixes
      - node: CheckActorCoverage
        action: re-examines actor references in the updated graph
      - node: _actors/Auditor
        action: re-checks cross-module coverage after fixes
      - node: CheckCrossModuleCoverage
        action: re-examines module connections in the updated graph
      - node: _actors/Auditor
        action: re-checks goal coverage after fixes
      - node: CheckGoalCoverage
        action: re-examines goal rule nodes against journeys in the updated graph
      - node: MergeAuditReports
        action: combines the 4 re-audit reports into unified format
      - node: CollectAuditFindings
        action: gathers findings from the re-audit
      - node: AuditFindingsList
        action: stores the updated gap list — may be empty

  DeclareConvergence:
    files: [test/journeys/DeclareConvergence.test.ts]
    steps:
      - node: AuditFindingsList
        action: provides the gap list from the latest audit round
      - node: ConfirmAllGapsResolved
        action: verifies the findings list is empty across all 4 coverage angles
      - node: compilation/CompilationResult
        action: confirms 0 errors and 0 orphans in the final compilation
      - node: compilation/ZeroErrorConvergence
        action: confirms the zero-error threshold is met
      - node: ValidateGraphInvariantsPostFix
        action: performs the final invariant check — zero errors, orphans, duplicates, and isolated modules
      - node: DeclareConverged
        action: marks the graph as CONVERGED — all creation, compilation, and audit complete
      - node: convergence/ConvergenceState
        action: records CONVERGED status, ready for publish and codegen
      - node: convergence/TriggerPublish
        action: proceeds to publish the converged interface

  ProvideAuditExcerptContext:
    files: [test/journeys/ProvideAuditExcerptContext.test.ts]
    steps:
      - node: convergence/TargetedAudit
        action: requests focused context for each auditor to check a specific module
      - node: excerpt/SelectTargetModule
        action: identifies the module the auditor will examine
      - node: graph/CompiledIndex
        action: provides the full compiled graph for extraction
      - node: excerpt/CollectLocalNodes
        action: extracts the target module's nodes for the auditor to review
      - node: excerpt/CollectLocalJourneys
        action: extracts the target module's journeys for the auditor to review
      - node: excerpt/CollectCrossModuleConnections
        action: shows how the target module connects to others
      - node: excerpt/CollectWarnings
        action: includes any compilation warnings relevant to this module
      - node: excerpt/AssembleExcerpt
        action: combines all sections into an audit-focused excerpt
      - node: excerpt/TruncateToLimit
        action: trims to the ~200 line budget
      - node: excerpt/ExcerptOutput
        action: provides the focused excerpt to the auditor
      - node: GenerateAuditPrompt
        action: wraps the excerpt with the specific coverage angle instructions

  ProvideFixExcerptToWorker:
    files: [test/journeys/ProvideFixExcerptToWorker.test.ts]
    steps:
      - node: SelectNextGapToFix
        action: identifies which module contains the gap to be fixed
      - node: excerpt/SelectTargetModule
        action: targets the module that needs the fix
      - node: graph/CompiledIndex
        action: provides the compiled graph showing current state including the gap
      - node: excerpt/CollectLocalNodes
        action: extracts the module's nodes so the worker knows what exists
      - node: excerpt/CollectLocalJourneys
        action: extracts the module's journeys so the worker knows current coverage
      - node: excerpt/CollectCrossModuleConnections
        action: shows cross-module connections relevant to the gap
      - node: excerpt/CollectModuleSource
        action: reads the raw YAML so the worker can edit the specific file
      - node: excerpt/AssembleExcerpt
        action: builds the fix-focused excerpt combining gap details with module context
      - node: excerpt/TruncateToLimit
        action: ensures the excerpt fits within the line budget
      - node: excerpt/ExcerptOutput
        action: provides the excerpt to the fix prompt builder
      - node: ProvideFixContext
        action: combines the excerpt with the specific gap description into the fix payload
      - node: BuildGapFixPrompt
        action: packages the fix context into the prompt sent to the LLM worker

  FixSingleGap:
    files: [test/journeys/FixSingleGap.test.ts]
    steps:
      - node: AuditFindingsList
        action: provides the prioritized list of gaps
      - node: SelectNextGapToFix
        action: picks the next unfixed gap from the prioritized list
      - node: ProvideFixContext
        action: assembles the module excerpt and gap description for the worker
      - node: BuildGapFixPrompt
        action: builds the targeted fix prompt with module context and specific gap
      - node: llm/SendTask
        action: sends the fix task to the LLM worker process
      - node: _actors/LLMWorker
        action: reads the fix prompt and understands which module and gap to address
      - node: llm/ReceiveResult
        action: receives the worker's edited YAML output
      - node: ApplyFix
        action: writes the edited YAML content to the target module file
      - node: graph/ModuleFile
        action: stores the updated module on disk
      - node: VerifyFixCompiles
        action: triggers compilation on the updated module
      - node: _actors/Compiler
        action: validates the edit produced 0 new errors
      - node: compilation/CompilationResult
        action: provides the post-fix compilation result
      - node: DetectFixInducedErrors
        action: checks whether the fix introduced new orphans, duplicates, or dangling refs
      - node: VerifyGapClosed
        action: re-runs the auditor that originally found this gap
      - node: _actors/Auditor
        action: confirms the specific gap no longer appears in the coverage check
      - node: DetectFixInducedGaps
        action: checks whether the fix opened new coverage gaps in other angles
      - node: TrackAuditRound
        action: records that one more gap has been fixed in this round

  EndToEndAuditToConvergence:
    files: [test/journeys/EndToEndAuditToConvergence.test.ts]
    steps:
      - node: convergence/BoundedCreationLoop
        action: completes all module creation with all perspectives applied
      - node: convergence/CompileCheck
        action: triggers final compilation after all modules are created
      - node: _actors/Compiler
        action: runs full compilation across all modules
      - node: compilation/CompilationResult
        action: reports 0 errors and 0 orphans
      - node: AuditAfterZeroErrors
        action: confirms the graph is clean enough to audit
      - node: convergence/TargetedAudit
        action: dispatches 4 auditors to check coverage
      - node: GenerateAuditPrompt
        action: builds prompts for all 4 auditors with excerpt context
      - node: CheckSpecCoverage
        action: auditor 1 checks spec section coverage
      - node: CheckActorCoverage
        action: auditor 2 checks actor participation coverage
      - node: CheckCrossModuleCoverage
        action: auditor 3 checks cross-module connection coverage
      - node: CheckGoalCoverage
        action: auditor 4 checks goal rule node coverage
      - node: MergeAuditReports
        action: combines the 4 audit reports into unified format
      - node: CollectAuditFindings
        action: collects all gaps into the findings list
      - node: AuditFindingsList
        action: stores the initial gap list
      - node: PrioritizeGaps
        action: ranks gaps for fixing
      - node: SelectNextGapToFix
        action: picks each gap in priority order
      - node: ApplyFix
        action: fixes each gap with targeted module edits
      - node: VerifyFixCompiles
        action: confirms each fix compiles cleanly
      - node: DetectFixInducedErrors
        action: checks each fix did not introduce new validation problems
      - node: VerifyGapClosed
        action: confirms each gap is closed after fixing
      - node: ValidateGraphInvariantsPostFix
        action: confirms all invariants hold after the full fix round
      - node: ConfirmAllGapsResolved
        action: verifies no gaps remain after all fixes
      - node: DeclareConverged
        action: marks the graph as CONVERGED
      - node: convergence/TriggerPublish
        action: proceeds to publish the converged interface

  TrackAuditFixProgress:
    files: [test/journeys/TrackAuditFixProgress.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: provides the current pipeline step showing audit is in progress
      - node: TrackAuditRound
        action: provides the current round number and cumulative gaps fixed
      - node: AuditFindingsList
        action: provides the current gap count remaining
      - node: convergence/DataDecidesWhenToStop
        action: evaluates whether progress is being made based on gap count trending toward zero
      - node: TrackAuditRound
        action: records the gap count delta between this round and the previous round
      - node: convergence/ConvergenceState
        action: updates with the audit progress metrics for the current round

  HandleFixInducedErrors:
    files: [test/journeys/HandleFixInducedErrors.test.ts]
    steps:
      - node: ApplyFix
        action: has just edited a module to close a coverage gap
      - node: VerifyFixCompiles
        action: runs compilation on the edited module
      - node: _actors/Compiler
        action: returns a compilation result with new errors not present before the fix
      - node: compilation/CompilationResult
        action: provides the post-fix result showing new orphans, duplicates, or dangling refs
      - node: DetectFixInducedErrors
        action: compares pre-fix error counts against post-fix and identifies the new problems
      - node: DetectFixInducedErrors
        action: determines the fix is net-negative because it introduced more problems than it solved
      - node: RejectAndRevertFix
        action: reads the pre-fix backup of the target module file
      - node: RejectAndRevertFix
        action: restores the module to its pre-fix state on disk
      - node: graph/ModuleFile
        action: stores the reverted module content
      - node: _actors/Compiler
        action: recompiles to confirm the revert restored zero-error state
      - node: compilation/CompilationResult
        action: confirms the graph is back to its pre-fix clean state
      - node: AuditFindingsList
        action: retains the original gap since the fix was rejected
      - node: TrackAuditRound
        action: records the failed fix attempt for progress analysis

  HandleFixInducedGaps:
    files: [test/journeys/HandleFixInducedGaps.test.ts]
    steps:
      - node: ApplyFix
        action: has edited a module to close a specific coverage gap
      - node: VerifyGapClosed
        action: confirms the targeted gap is now closed
      - node: DetectFixInducedGaps
        action: re-runs all 4 coverage checks against the post-fix graph
      - node: CheckSpecCoverage
        action: checks whether the fix changed spec coverage in other modules
      - node: CheckActorCoverage
        action: checks whether the fix created new orphan actors
      - node: CheckCrossModuleCoverage
        action: checks whether the fix disrupted cross-module connections
      - node: CheckGoalCoverage
        action: checks whether the fix affected goal coverage in other modules
      - node: DetectFixInducedGaps
        action: compares pre-fix and post-fix findings to identify any newly opened gaps
      - node: CollectAuditFindings
        action: adds the newly opened gaps to the existing findings list
      - node: AuditFindingsList
        action: stores the updated list with the new fix-induced gaps appended
      - node: PrioritizeGaps
        action: re-ranks the updated gap list including the new entries
      - node: TrackAuditRound
        action: records that the fix closed one gap but opened others for progress tracking

  EnforceAuditTermination:
    files: [test/journeys/EnforceAuditTermination.test.ts]
    steps:
      - node: TrackAuditRound
        action: provides the current round number and gap count history across rounds
      - node: AuditRoundLimit
        action: checks whether the current round exceeds the maximum allowed cycles
      - node: TrackAuditRound
        action: compares the gap count from this round against the previous round
      - node: convergence/DataDecidesWhenToStop
        action: detects that gap count has not decreased for consecutive rounds indicating a stall
      - node: AuditFindingsList
        action: provides the remaining unresolvable gaps
      - node: convergence/ConvergenceState
        action: records that audit has stalled or hit the round limit with gaps still remaining
      - node: compilation/CompilationResult
        action: provides the final compilation state at the point of termination

  ValidateGraphInvariantsAfterFixRound:
    files: [test/journeys/ValidateGraphInvariantsAfterFixRound.test.ts]
    steps:
      - node: convergence/RecompileAfterFix
        action: triggers full compilation after all fixes in this round are applied
      - node: _actors/Compiler
        action: runs the full compilation pipeline
      - node: compilation/CompilationResult
        action: provides the complete post-round compilation result
      - node: ValidateGraphInvariantsPostFix
        action: reads the error count and confirms it is zero
      - node: ValidateGraphInvariantsPostFix
        action: reads the orphan count and confirms it is zero
      - node: ValidateGraphInvariantsPostFix
        action: reads the duplicate count and confirms it is zero
      - node: compilation/IsolatedModuleDetection
        action: checks that no module became isolated as a side effect of fixes
      - node: ValidateGraphInvariantsPostFix
        action: reads the isolated module count and confirms it is zero
      - node: compilation/ZeroErrorConvergence
        action: confirms the zero-error threshold still holds after the fix round
      - node: convergence/ConvergenceState
        action: records that all graph invariants are satisfied after this fix round

  HandleFailedFixVerification:
    files: [test/journeys/HandleFailedFixVerification.test.ts]
    steps:
      - node: ApplyFix
        action: has edited a module to close a gap
      - node: VerifyGapClosed
        action: re-runs the auditor and finds the gap is still present
      - node: _actors/Auditor
        action: reports that the specific gap was not resolved by the fix
      - node: RejectAndRevertFix
        action: restores the module to its pre-fix state since the fix did not achieve its goal
      - node: graph/ModuleFile
        action: stores the reverted module content
      - node: _actors/Compiler
        action: recompiles to confirm the revert is clean
      - node: compilation/CompilationResult
        action: confirms zero errors after revert
      - node: AuditFindingsList
        action: retains the gap and marks it with a failed-fix-attempt annotation
      - node: BuildGapFixPrompt
        action: rebuilds the fix prompt with additional context about why the previous attempt failed
      - node: ProvideFixContext
        action: includes the failed attempt details so the next worker can try a different approach
      - node: TrackAuditRound
        action: records the failed verification for progress tracking

  AuditAuditsItself:
    files: [test/journeys/AuditAuditsItself.test.ts]
    steps:
      - node: convergence/TargetedAudit
        action: dispatches auditors to check all modules including audit.yaml
      - node: GenerateAuditPrompt
        action: builds the spec coverage prompt targeting audit.yaml's own spec sections 3 and 5
      - node: excerpt/SelectTargetModule
        action: selects audit as the target module for excerpt generation
      - node: excerpt/CollectLocalNodes
        action: extracts audit.yaml's own nodes for the auditor to review
      - node: excerpt/CollectLocalJourneys
        action: extracts audit.yaml's own journeys for the auditor to review
      - node: excerpt/AssembleExcerpt
        action: assembles the self-referential excerpt showing the audit module to the auditor
      - node: excerpt/ExcerptOutput
        action: provides the audit module's excerpt to the auditor
      - node: _actors/Auditor
        action: checks whether audit.yaml covers the audit concepts described in spec sections 3 and 5
      - node: CheckSpecCoverage
        action: compares the spec's audit requirements against audit.yaml's own nodes and journeys
      - node: SpecCoverageReport
        action: records any gaps where audit concepts in the spec are not represented in audit.yaml
      - node: CollectAuditFindings
        action: adds any self-audit gaps to the findings list
      - node: AuditFindingsList
        action: stores the self-referential gaps alongside gaps from other modules

  FixGapInAuditModule:
    files: [test/journeys/FixGapInAuditModule.test.ts]
    steps:
      - node: AuditFindingsList
        action: provides a gap that targets audit.yaml itself
      - node: SelectNextGapToFix
        action: picks the self-referential gap from the prioritized list
      - node: DetectSelfAuditTarget
        action: confirms the gap targets audit.yaml and flags it for extra safeguards
      - node: ScopeFixToAvoidAuditBreak
        action: analyzes the proposed fix scope to ensure it will not remove existing audit processes
      - node: ScopeFixToAvoidAuditBreak
        action: verifies the fix will not break CheckSpecCoverage, VerifyFixCompiles, DeclareConverged, or other critical audit nodes
      - node: BuildGapFixPrompt
        action: builds the fix prompt with explicit instructions to preserve existing audit infrastructure
      - node: ProvideFixContext
        action: includes the full audit.yaml source and the safeguard constraints in the fix payload
      - node: _actors/LLMWorker
        action: receives the self-fix prompt with clear boundaries on what must not be changed
      - node: ApplyFix
        action: edits audit.yaml to close the gap while preserving all existing audit processes
      - node: VerifyFixCompiles
        action: compiles the modified audit.yaml to check for errors
      - node: _actors/Compiler
        action: validates the self-modified audit module has 0 errors
      - node: compilation/CompilationResult
        action: confirms the self-fix did not break compilation
      - node: ReauditAfterSelfFix
        action: triggers a full re-audit to verify the self-fix did not invalidate audit's own integrity
      - node: TrackAuditRound
        action: records the self-fix attempt for progress tracking

  DetectSpecChangeToAuditDomain:
    files: [test/journeys/DetectSpecChangeToAuditDomain.test.ts]
    steps:
      - node: convergence/TargetedReconvergence
        action: signals that the spec has changed and modules may need updating
      - node: convergence/SpecFile
        action: provides the changed spec content
      - node: DetectSpecChangeToAuditSections
        action: reads the updated spec sections 3 and 5 that audit.yaml references
      - node: DetectSpecChangeToAuditSections
        action: compares the updated spec sections against audit.yaml's current node and journey coverage
      - node: DetectSpecChangeToAuditSections
        action: identifies new audit requirements in the spec that have no corresponding nodes or journeys
      - node: AuditFindingsList
        action: adds the spec-change-induced gaps to the findings list as new coverage requirements
      - node: PrioritizeGaps
        action: ranks the new spec-driven gaps alongside any existing gaps
      - node: DetectSelfAuditTarget
        action: flags all new gaps as self-referential since they target audit.yaml
      - node: convergence/ConvergenceState
        action: records that audit.yaml needs updating due to spec changes in its own domain

  ValidateAuditInfrastructurePresent:
    files: [test/journeys/ValidateAuditInfrastructurePresent.test.ts]
    steps:
      - node: convergence/CompileCheck
        action: triggers compilation as a prerequisite for the audit pipeline
      - node: _actors/Compiler
        action: compiles all modules including audit.yaml
      - node: graph/CompiledIndex
        action: provides the compiled index with all registered modules
      - node: ValidateAuditModulePresence
        action: checks that audit.yaml exists as a compiled module in the index
      - node: ValidateAuditModulePresence
        action: verifies that key audit nodes are present in the registry including CheckSpecCoverage, CheckActorCoverage, and CheckCrossModuleCoverage
      - node: ValidateAuditModulePresence
        action: verifies that DeclareConverged is present since convergence cannot complete without it
      - node: compilation/ValidateModuleCompleteness
        action: confirms audit is included in the expected module list from ORGANIZATION.md
      - node: compilation/CompilationResult
        action: confirms the audit module compiled without errors
      - node: AuditAfterZeroErrors
        action: proceeds to the audit phase now that audit infrastructure is confirmed present

  ReauditAfterAuditSelfFix:
    files: [test/journeys/ReauditAfterAuditSelfFix.test.ts]
    steps:
      - node: ApplyFix
        action: has just modified audit.yaml to close a self-referential gap
      - node: ReauditAfterSelfFix
        action: detects that the fix targeted audit.yaml and triggers a full re-audit
      - node: _actors/Compiler
        action: recompiles all modules with the modified audit.yaml
      - node: compilation/CompilationResult
        action: confirms 0 errors after the self-fix
      - node: ValidateGraphInvariantsPostFix
        action: confirms all convergence invariants still hold after the self-fix
      - node: GenerateAuditPrompt
        action: rebuilds all 4 audit prompts using the modified audit module's definitions
      - node: _actors/Auditor
        action: re-checks spec coverage with the self-fixed audit module in the graph
      - node: CheckSpecCoverage
        action: re-examines all spec sections including audit's own sections 3 and 5
      - node: _actors/Auditor
        action: re-checks actor coverage with the updated audit module
      - node: CheckActorCoverage
        action: re-examines actor references including any new actors added by the self-fix
      - node: _actors/Auditor
        action: re-checks cross-module coverage with the updated audit module
      - node: CheckCrossModuleCoverage
        action: re-examines module connections including audit's updated cross-module refs
      - node: _actors/Auditor
        action: re-checks goal coverage with the updated audit module
      - node: CheckGoalCoverage
        action: re-examines goal rule nodes against journeys in the self-fixed graph
      - node: MergeAuditReports
        action: combines the 4 post-self-fix re-audit reports
      - node: CollectAuditFindings
        action: gathers findings to verify the self-fix resolved the gap without opening new ones
      - node: AuditFindingsList
        action: stores the post-self-fix findings for comparison against the pre-fix state

  CheckActorCoverageAgainstActorList:
    steps:
      - node: actors/ActorsFile
        action: provides the authoritative list of discovered actors from 3-angle discovery
      - node: actors/MergedActorList
        action: supplies all actors after merge and deduplication
      - node: GenerateAuditPrompt
        action: builds the actor coverage prompt including the full actor list as ground truth
      - node: _actors/Auditor
        action: compares each actor from the list against journey step references across all modules
      - node: CheckActorCoverage
        action: flags actors that appear in no journey and actors confined to a single module
      - node: ActorCoverageReport
        action: records which actors are covered, which are orphaned, and which are single-module
      - node: CollectAuditFindings
        action: adds actor coverage gaps to the findings list with the source actor module as context

  CheckSpecCoverageAgainstOrganization:
    steps:
      - node: organization/SpecSectionIndex
        action: provides the indexed list of spec sections parsed from spec.md
      - node: organization/ModuleSpecSectionMap
        action: provides the mapping of which modules claim which spec sections
      - node: GenerateAuditPrompt
        action: builds the spec coverage prompt including the section-to-module mapping as ground truth
      - node: _actors/Auditor
        action: compares each spec section against nodes and journeys in modules that claim it
      - node: CheckSpecCoverage
        action: flags spec sections with no claiming module and sections with claims but no journeys
      - node: SpecCoverageReport
        action: records which sections are covered, which are unclaimed, and which are thinly covered
      - node: CollectAuditFindings
        action: adds spec coverage gaps to the findings list with the organization mapping as context

  RevertDestructiveFix:
    steps:
      - node: ApplyFix
        action: has edited the target module to close a coverage gap
      - node: VerifyFixCompiles
        action: compilation passes with zero new errors
      - node: VerifyGapClosed
        action: confirms the targeted gap is now closed
      - node: DetectFixContentLoss
        action: compares pre-fix node count against post-fix node count in the target module
      - node: DetectFixContentLoss
        action: compares pre-fix journey count against post-fix journey count in the target module
      - node: DetectFixContentLoss
        action: detects that the fix decreased node or journey count indicating existing content was removed
      - node: RejectAndRevertFix
        action: restores the module to its pre-fix state to preserve the destroyed content
      - node: graph/ModuleFile
        action: stores the reverted module on disk
      - node: _actors/Compiler
        action: recompiles to confirm the revert restored the previous state
      - node: BuildGapFixPrompt
        action: rebuilds the fix prompt with explicit instruction to ADD content without removing existing nodes or journeys
      - node: TrackAuditRound
        action: records the destructive fix attempt for progress tracking

  AuditCompletionTriggersPublish:
    files: [tests/journeys/AuditCompletionTriggersPublish.test.ts]
    steps:
      - node: _actors/Auditor
        action: completes the final audit round with zero remaining gaps
      - node: ConfirmAllGapsResolved
        action: verifies every auditor reports no outstanding coverage gaps
      - node: DeclareConverged
        action: declares the graph converged after all audit checks pass
      - node: convergence/TriggerPublish
        action: signals that convergence is complete and publish should proceed
      - node: publish/GenerateInterfaceYaml
        action: generates interface.yaml from the audit-verified converged graph
      - node: publish/ComputeInterfaceHash
        action: computes SHA256 hash over the newly published interface
      - node: publish/WriteEventFile
        action: writes the event file notifying dependents of the converged interface

  AuditPassTriggersCodegen:
    files: [tests/journeys/AuditPassTriggersCodegen.test.ts]
    steps:
      - node: _actors/Auditor
        action: completes the final audit round with all coverage gaps resolved
      - node: DeclareConverged
        action: declares the graph converged and ready for code generation
      - node: convergence/TriggerCodegen
        action: signals that audit has passed and codegen should begin
      - node: codegen/ReadConvergedGraph
        action: reads the audit-verified converged graph as input for skeleton generation
      - node: codegen/GenerateProcessSkeletons
        action: generates TypeScript skeletons from the converged process nodes
      - node: codegen/FillImplementation
        action: dispatches LLM workers to fill the skeleton implementations

  CheckGoalCoverageAgainstGoals:
    steps:
      - node: convergence/ExtractGoals
        action: provides the authoritative set of goal rule nodes derived from spec §8
      - node: graph/CompiledIndex
        action: provides the compiled graph with all journeys across all modules
      - node: GenerateAuditPrompt
        action: builds the goal coverage prompt including the full goal list as ground truth
      - node: _goals/SolveContextProblem
        action: loaded as ground truth goal to verify journey coverage proves context scoping at any scale
      - node: _goals/BuildPando
        action: loaded as ground truth goal to verify journey coverage proves Pando ships at scale
      - node: _goals/GenomeIsTheProduct
        action: loaded as ground truth goal to verify journey coverage proves genome is an adoptable protocol
      - node: _goals/ProductionReady
        action: loaded as ground truth goal to verify journey coverage proves production reliability
      - node: _goals/SelfSustaining
        action: loaded as ground truth goal to verify journey coverage proves autonomous operation
      - node: _actors/Auditor
        action: compares each goal rule node against journeys that exercise its achievement path
      - node: CheckGoalCoverage
        action: flags goals that have no journey proving achievement and goals referenced only in descriptions without concrete steps
      - node: CheckGoalCoverage
        action: distinguishes between goals with journey coverage (plan exists) and goals with actual proof (journey tests pass)
      - node: GoalCoverageReport
        action: records which goals are covered by journeys, which are orphaned, and which lack achievement proof
      - node: CollectAuditFindings
        action: adds goal coverage gaps to the findings list with the goal name and missing coverage type as context
      - node: MergeAuditReports
        action: integrates the goal coverage report alongside spec, actor, and cross-module reports into the unified findings format

  VerifyAuditFindingsAreRepeatable:
    steps:
      - node: convergence/CompileCheck
        action: confirms compilation passed with zero errors providing a stable input graph
      - node: graph/CompiledIndex
        action: provides the identical compiled graph for both audit runs
      - node: GenerateAuditPrompt
        action: builds audit prompts for all 4 auditors for the first run
      - node: _actors/Auditor
        action: auditor 1 checks spec coverage on the first run
      - node: _actors/Auditor
        action: auditor 2 checks actor coverage on the first run
      - node: _actors/Auditor
        action: auditor 3 checks cross-module coverage on the first run
      - node: _actors/Auditor
        action: auditor 4 checks goal coverage on the first run
      - node: MergeAuditReports
        action: combines the 4 first-run reports into a unified finding set
      - node: CollectAuditFindings
        action: stores the first-run findings as the baseline for comparison
      - node: GenerateAuditPrompt
        action: rebuilds identical audit prompts for all 4 auditors for the second run
      - node: _actors/Auditor
        action: auditor 1 re-checks spec coverage on the same graph
      - node: _actors/Auditor
        action: auditor 2 re-checks actor coverage on the same graph
      - node: _actors/Auditor
        action: auditor 3 re-checks cross-module coverage on the same graph
      - node: _actors/Auditor
        action: auditor 4 re-checks goal coverage on the same graph
      - node: MergeAuditReports
        action: combines the 4 second-run reports into a unified finding set
      - node: CollectAuditFindings
        action: stores the second-run findings for comparison
      - node: VerifyAuditFindingStability
        action: compares the first-run and second-run finding sets gap by gap
      - node: VerifyAuditFindingStability
        action: identifies findings that appear in one run but not the other as unstable
      - node: VerifyAuditFindingStability
        action: flags unstable findings so the fix pipeline can deprioritize or skip them to avoid chasing non-deterministic LLM output

  VerifyGapPrioritizationIsStable:
    steps:
      - node: AuditFindingsList
        action: provides the same collected gap list as input for both prioritization runs
      - node: PrioritizeGaps
        action: ranks the gaps by severity for the first run producing an ordered list
      - node: DeterministicGapOrdering
        action: applies the deterministic tiebreaker for equal-severity gaps in the first run
      - node: PrioritizeGaps
        action: ranks the same gaps by severity for the second run producing a second ordered list
      - node: DeterministicGapOrdering
        action: applies the same deterministic tiebreaker for equal-severity gaps in the second run
      - node: VerifyAuditFindingStability
        action: compares the two ordered lists position by position
      - node: VerifyAuditFindingStability
        action: confirms every gap appears at the same position in both lists proving the prioritization is deterministic
      - node: VerifyAuditFindingStability
        action: flags any ordering differences as a determinism violation in the prioritization algorithm

  HandleUnfixableGap:
    steps:
      - node: AuditFindingsList
        action: provides a gap that has been attempted multiple times without success
      - node: SelectNextGapToFix
        action: picks the gap from the prioritized list
      - node: TrackAuditRound
        action: provides the number of prior fix attempts recorded for this specific gap
      - node: PerGapFixAttemptLimit
        action: checks whether the gap's attempt count has reached the per-gap maximum
      - node: PerGapFixAttemptLimit
        action: confirms the limit is reached and the gap should not be retried
      - node: SkipUnresolvableGap
        action: marks the gap as unresolvable with the number of failed attempts and last failure reason
      - node: SkipUnresolvableGap
        action: removes the gap from the active fix queue so it will not be selected again this round
      - node: AuditFindingsList
        action: retains the gap with an unresolvable annotation distinguishing it from fixable gaps
      - node: SelectNextGapToFix
        action: advances to the next fixable gap in the prioritized list
      - node: TrackAuditRound
        action: records the skipped gap for progress analysis and final termination reporting

  VerifyFixDoesNotIntroduceUndeclaredDependency:
    steps:
      - node: ApplyFix
        action: has edited a target module to close a coverage gap by adding cross-module journey steps
      - node: VerifyFixCompiles
        action: confirms the fix compiles cleanly with all cross-module references resolving
      - node: _actors/Compiler
        action: validates the fix with zero errors
      - node: DetectFixIntroducedDependency
        action: extracts all cross-module references from the fixed module's journey steps
      - node: DetectFixIntroducedDependency
        action: compares the post-fix cross-module references against the pre-fix set to identify newly added references
      - node: organization/DependencyGraph
        action: provides the declared dependency edges from ORGANIZATION.md
      - node: DetectFixIntroducedDependency
        action: checks each newly added cross-module reference against the declared dependency graph
      - node: DetectFixIntroducedDependency
        action: flags any new reference whose target module is not listed as a declared dependency of the fixed module
      - node: compilation/WarningReport
        action: records undeclared dependencies introduced by the fix as warnings that could break future build order
      - node: TrackAuditRound
        action: records the undeclared dependency warning for the fix round report

  PreventFixFromWeakeningSafeguards:
    steps:
      - node: AuditFindingsList
        action: provides a gap that targets audit.yaml
      - node: SelectNextGapToFix
        action: picks the self-referential gap from the prioritized list
      - node: DetectSelfAuditTarget
        action: confirms the gap targets audit.yaml and flags it for extra safeguards
      - node: ScopeFixToAvoidAuditBreak
        action: checks the proposed fix scope against protected operational nodes
      - node: SafeguardNodesAreImmutableDuringFix
        action: checks whether the proposed fix would modify or remove any of the self-reference safety nodes
      - node: SafeguardNodesAreImmutableDuringFix
        action: detects that the fix targets ScopeFixToAvoidAuditBreak, DetectSelfAuditTarget, ReauditAfterSelfFix, or DetectFixContentLoss
      - node: SafeguardNodesAreImmutableDuringFix
        action: rejects the fix because modifying safeguard nodes during the fix cycle would disable safety checks for subsequent fixes
      - node: RejectAndRevertFix
        action: discards the proposed fix without applying it
      - node: AuditFindingsList
        action: retains the gap with an annotation that it requires spec-driven reconvergence to resolve
      - node: TrackAuditRound
        action: records that the fix was rejected due to safeguard immutability protection

  HandleMalformedAuditReport:
    steps:
      - node: GenerateAuditPrompt
        action: has built and sent a coverage check prompt to one of the 4 auditors
      - node: _actors/Auditor
        action: returns raw output from the coverage check
      - node: ValidateAuditorOutput
        action: attempts to parse the raw output into structured coverage findings
      - node: ValidateAuditorOutput
        action: detects that the output is unparseable, references non-existent module names, contains empty gap descriptions, or uses unrecognized gap types
      - node: ValidateAuditorOutput
        action: classifies the failure as either fully malformed (no usable findings) or partially malformed (some findings valid, others not)
      - node: GenerateAuditPrompt
        action: rebuilds the coverage prompt with explicit output format instructions and an example of a valid finding entry
      - node: llm/SendTask
        action: sends the clarified prompt as a retry task to the auditor
      - node: _actors/Auditor
        action: re-runs the coverage check with the clarified format instructions
      - node: ValidateAuditorOutput
        action: re-validates the retried output and confirms it parses into valid structured findings
      - node: CollectAuditFindings
        action: accepts the validated findings into the collection pipeline
      - node: TrackAuditRound
        action: records the auditor retry for progress tracking

  CheckCrossModuleCoverageAgainstGraph:
    steps:
      - node: graph/CompiledIndex
        action: provides the compiled graph with all modules and their computed connections
      - node: graph/ConnectionSet
        action: provides the cross-module connection edges derived from journey step references
      - node: GenerateAuditPrompt
        action: builds the cross-module coverage prompt including the connection graph as ground truth
      - node: _actors/Auditor
        action: examines each module's connections to determine if it participates in cross-module journeys
      - node: CheckCrossModuleCoverage
        action: flags modules that have zero outgoing or incoming cross-module references as isolated
      - node: CheckCrossModuleCoverage
        action: flags modules where all cross-module references point to a single other module as weakly connected
      - node: CrossModuleCoverageReport
        action: records which modules are well-connected, which are isolated, and which are weakly connected
      - node: CollectAuditFindings
        action: adds cross-module coverage gaps to the findings list with the isolated module name and missing connection direction as context
