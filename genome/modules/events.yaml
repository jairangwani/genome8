  EnforceDeterministicEventBatchOrder:
    steps:
      - node: DebounceEvents
        action: produces a batch of events from multiple dependencies after the debounce window closes
      - node: ReadEventFilesInParallel
        action: reads all event files in the batch concurrently, returning results in non-deterministic completion order
      - node: ValidateEventFileFormat
        action: validates each event file in the batch
      - node: EventPayload
        action: stores the validated payloads for all events in the batch
      - node: graph/ConnectionSet
        action: provides the edge set showing how many local modules each dependency affects
      - node: PrioritizeEventsByImpact
        action: sorts the batch by impact count, producing groups of events with equal impact scores
      - node: EnforceDeterministicBatchOrder
        action: detects events with equal impact counts within the sorted batch
      - node: EnforceDeterministicBatchOrder
        action: breaks ties by sorting equal-impact events alphabetically by dependency name, producing a fully deterministic order
      - node: ShedLowPriorityEventsUnderLoad
        action: applies backpressure shedding using the deterministic order so the same events are always dropped across runs
      - node: SpillBatchPayloadsToDisk
        action: selects payloads for disk spill using the deterministic order so the same payloads are always spilled across runs
      - node: DelegateToSync
        action: passes the deterministically ordered events to sync.ts ensuring consistent processing sequence

  RecoverStaleBoxWatcher:
    steps:
      - node: _actors/StaleBox
        action: has been offline with a crashed event watcher, silently missing upstream dependency changes
      - node: DetectWatcherCrash
        action: detects that the stale box's watcher process is no longer running
      - node: ReregisterCrashedWatcher
        action: re-registers the event watcher for the stale box's dependency paths
      - node: ConfirmWatcherHealth
        action: confirms the newly registered watcher is alive and receiving filesystem events
      - node: sync/ScanForMissedEventsDuringSleep
        action: scans for event files written while the watcher was down to identify missed changes
      - node: DelegateToSync
        action: delegates the missed events to sync for hash comparison and stale module marking
      - node: convergence/TargetedReconvergence
        action: reconverges only the modules affected by changes missed during the stale period
