spec_sections: [3, 5, 6]

nodes:
  RegisterEventWatchers:
    type: process
    description: sets up fs.watch on each dependency's event file directory to monitor for new publish events
  DetectEventFileChange:
    type: process
    description: receives a filesystem notification from fs.watch when an event file is created or modified
  ReadEventFile:
    type: process
    description: reads the contents of the changed event file to determine which dependency published and what changed
  DelegateToSync:
    type: process
    description: passes the event data to sync.ts to check dependency hashes and find affected modules
  EnterSleep:
    type: process
    description: suspends the engine process after all watchers are registered, consuming zero CPU until an event arrives
  WakeFromSleep:
    type: process
    description: resumes the engine process when fs.watch fires a callback, transitioning from sleep to active processing
  DeregisterEventWatchers:
    type: process
    description: tears down all fs.watch watchers when the engine shuts down or the box is removed
  DebounceEvents:
    type: process
    description: batches rapid successive events into a single sync trigger to avoid redundant reconvergence
  PropagateRipple:
    type: process
    description: after this box reconverges and republishes, its own event file triggers watchers in downstream dependents
  ValidateEventFileFormat:
    type: process
    description: checks that the event file contains valid JSON with required fields including interface hash, sequence number, origin chain, and changelog before passing to sync
  LogEventReceived:
    type: process
    description: records the received event with timestamp, source dependency, sequence number, and disposition into the event log for observability
  UpdateWatcherAfterDependencyChange:
    type: process
    description: adds fs.watch instances for newly added dependencies and removes instances for dropped dependencies without tearing down existing watchers
  ConfirmWatcherHealth:
    type: process
    description: checks that all registered fs.watch instances are still active and responsive, detecting any that were silently dropped by the OS
  DetectWatcherCrash:
    type: process
    description: detects when an fs.watch instance emits an error event or throws an exception instead of delivering a normal change notification
  HandleEventReadFailure:
    type: process
    description: catches IO errors when reading an event file from disk including file deleted between notification and read, permission denied, or disk IO error
  HandleInvalidEventPayload:
    type: process
    description: catches validation failures when the event file exists but contains malformed JSON, missing required fields, or unparseable values and produces a structured error
  ReregisterCrashedWatcher:
    type: process
    description: tears down the failed fs.watch instance, releases its kernel handle, and creates a replacement watcher for the same dependency event file path
  DetectSyncDelegationFailure:
    type: process
    description: catches errors thrown by sync.ts when it fails to process the delegated event such as unreachable dependency interface or hash store corruption
  LogEventFailure:
    type: process
    description: records event processing failures with error type, source dependency, failing step, and stack trace into the event log for diagnosis
  RetryEventProcessing:
    type: process
    description: re-reads and re-processes a failed event file after a brief delay, attempting recovery before escalating to convergence
  ExtractOriginChain:
    type: process
    description: reads the ripple origin chain from the validated event payload and makes it available for oscillation detection by sync before delegation
  ExtractEventSequenceNumber:
    type: process
    description: reads the event sequence number from the validated event payload and makes it available for ordering and dedup checks by sync before delegation
  SuppressUnchangedRipple:
    type: process
    description: blocks event file write and outgoing propagation when publish reports that the interface hash did not change after reconvergence, absorbing the ripple at this box
  AdjustCooldownWindow:
    type: process
    description: widens the oscillation cooldown window when multiple events arrive in rapid succession and narrows it back during stable periods with no events
  TrackRippleDepth:
    type: process
    description: reads the origin chain length from the incoming event and records the current ripple depth for logging and enforcement by downstream propagation checks
  BatchWatcherRegistration:
    type: process
    description: registers fs.watch instances in batches with a configurable concurrency limit to avoid overwhelming the OS kernel when a box has many dependencies
  TruncateEventLog:
    type: process
    description: removes the oldest entries from the event log when it exceeds a configured maximum entry count, preserving only the most recent entries
  PrioritizeEventsByImpact:
    type: process
    description: when a debounce batch contains many events, sorts them by the number of local modules each dependency affects so the highest-impact changes are processed first
  StreamLargeEventPayload:
    type: process
    description: reads oversized event files in a streaming fashion rather than loading the full content into memory, extracting only the required hash, sequence, origin chain, and changelog fields
  CrossCheckEventHashAgainstInterface:
    type: process
    description: fetches the dependency's actual interface.yaml from disk and compares its hash against the hash claimed in the event payload to detect stale or spoofed events
  DetectDuplicateEventSequence:
    type: process
    description: compares the incoming event's sequence number against the last-processed sequence for that dependency and suppresses the event if the sequence was already processed
  DetectMissedEventSequenceGap:
    type: process
    description: compares the incoming event's sequence number against the last-processed sequence for that dependency and flags a gap when numbers are not consecutive
  DetectPartiallyWrittenEventFile:
    type: process
    description: checks that the event file is complete by verifying it ends with valid JSON closure and its byte length matches the content-length header if present before parsing
  ValidateEventHashFormat:
    type: process
    description: enforces that the interface hash field in the event payload is a non-empty string matching the expected SHA256 hex format before passing to sync
  ReadEventFilesInParallel:
    type: process
    description: reads multiple event files concurrently with a configurable concurrency limit during batch processing to reduce total IO wait time when many dependencies change at once
  EnforceEventProcessingTimeout:
    type: process
    description: applies a configurable deadline to the sync delegation and reconvergence cycle for a single event and cancels the operation if the timeout is exceeded to prevent pipeline stalls
  ShedLowPriorityEventsUnderLoad:
    type: process
    description: drops lowest-impact events from the processing queue when the pending event count exceeds a backpressure threshold to maintain system responsiveness during sustained cascading ripples
  PartitionEventsByDependencySubgraph:
    type: process
    description: groups batched events into independent partitions based on which local modules they affect so that unrelated partitions can be processed concurrently without conflicting stale marks
  SpillBatchPayloadsToDisk:
    type: process
    description: writes excess parsed event payloads to temporary disk storage when the in-memory batch exceeds a configurable payload count threshold and reads them back during sync delegation
  EventWatcherSet:
    type: artifact
    description: the set of active fs.watch instances monitoring dependency event file paths
  EventPayload:
    type: artifact
    description: the parsed content of an event file containing the source box, timestamp, and changed interface hash
  EventLog:
    type: artifact
    description: append-only log of all received events with timestamps, source boxes, sequence numbers, and disposition for observability and debugging
  EventDrivenNotPolling:
    type: rule
    description: event detection uses fs.watch callbacks only, never periodic polling or timer-based checks
  ZeroCostAtRest:
    type: rule
    description: when no events are pending the engine consumes zero CPU and zero network, only fs.watch kernel handles remain active
  OscillationCooldown:
    type: rule
    description: prevents infinite ripple by suppressing re-trigger if the same dependency fires again within a cooldown window
  MaxRetryExceeded:
    type: rule
    description: after a configured number of retry attempts for the same event file, stop retrying and escalate the failure to convergence for operator review
  RippleAbsorbedAtLeaf:
    type: rule
    description: when a box has no downstream dependents the ripple terminates naturally and no event file is written regardless of whether the interface changed
  EventLogSizeLimit:
    type: rule
    description: the event log must not grow beyond a configured maximum number of entries to prevent unbounded disk usage during sustained ripple activity
  WatcherCountLimit:
    type: rule
    description: enforces a maximum number of concurrent fs.watch instances per box to prevent file descriptor exhaustion on boxes with many dependencies
  EventBackpressureThreshold:
    type: rule
    description: enforces a maximum number of pending events in the processing queue and triggers load shedding when exceeded to prevent memory exhaustion and pipeline stalls during cascading ripples
  DeferWatcherForMissingPath:
    type: process
    description: records a dependency whose event file path does not exist when watcher registration is attempted, and retries registration during the next watcher update cycle when the dependency may have published
  WatcherCrashRetryLimit:
    type: rule
    description: enforces a maximum number of consecutive re-registration attempts for the same dependency's watcher before removing it from the active set, preventing infinite crash-reregister oscillation loops
  DetectTotalWatcherLoss:
    type: process
    description: after a watcher crash or termination, checks EventWatcherSet and detects when zero active watchers remain, indicating complete event blindness requiring immediate bulk re-registration or critical escalation
  EnforceDeterministicBatchOrder:
    type: process
    description: after PrioritizeEventsByImpact sorts events by impact count, breaks ties among equal-impact events by sorting on dependency name alphabetically, ensuring the same batch always produces the same processing, shedding, and spill order regardless of fs.watch arrival order

journeys:
  SetupEventWatching:
    files: [test/journeys/SetupEventWatching.test.ts]
    steps:
      - node: convergence/EnterSleepMode
        action: signals that the convergence pipeline is complete and the engine should begin watching
      - node: sync/ReadDependencyList
        action: provides the list of upstream dependencies to watch
      - node: RegisterEventWatchers
        action: creates an fs.watch instance for each dependency's event file path
      - node: _actors/FileSystem
        action: registers the watch callbacks at the kernel level
      - node: EventWatcherSet
        action: stores the set of active watcher instances for later teardown
      - node: EventDrivenNotPolling
        action: confirms that only fs.watch is used, no polling timers created
      - node: ZeroCostAtRest
        action: confirms zero CPU consumption with only kernel-level handles active
      - node: EnterSleep
        action: suspends the engine process until an event callback fires

  HandleIncomingEvent:
    files: [test/journeys/HandleIncomingEvent.test.ts]
    steps:
      - node: _actors/FileSystem
        action: fires the fs.watch callback when a dependency's event file changes
      - node: DetectEventFileChange
        action: receives the filesystem notification with the changed file path
      - node: WakeFromSleep
        action: resumes the engine process from sleep state
      - node: LogEventReceived
        action: records the raw event notification with timestamp and source path
      - node: DebounceEvents
        action: checks for rapid successive events and batches them if needed
      - node: OscillationCooldown
        action: checks whether this dependency already triggered within the cooldown window
      - node: ReadEventFile
        action: reads the event file to extract source box, timestamp, and hash
      - node: ValidateEventFileFormat
        action: checks the event file has valid structure with hash, sequence, origin chain, and changelog
      - node: ExtractOriginChain
        action: reads the ripple origin chain from the validated payload for oscillation detection
      - node: ExtractEventSequenceNumber
        action: reads the sequence number from the validated payload for ordering checks
      - node: TrackRippleDepth
        action: records the origin chain length as the current ripple depth
      - node: EventPayload
        action: stores the parsed and validated event data enriched with extracted origin chain and sequence
      - node: LogEventReceived
        action: updates the event log entry with parsed payload details, origin chain depth, and accepted disposition
      - node: EventLog
        action: persists the completed event log entry
      - node: publish/EventFile
        action: provides the raw event file written by the upstream dependency
      - node: DelegateToSync
        action: passes the event payload with origin chain and sequence to sync.ts for hash comparison and stale detection

  EventTriggeredReconvergence:
    files: [test/journeys/EventTriggeredReconvergence.test.ts]
    steps:
      - node: DelegateToSync
        action: invokes sync.ts with the event payload
      - node: sync/FetchDependencyHash
        action: reads the current hash from the changed dependency's interface
      - node: sync/CompareStoredHash
        action: compares the new hash against the locally stored hash
      - node: sync/FindAffectedModules
        action: traces which local modules are affected by the change
      - node: sync/MarkModulesStale
        action: marks affected modules for targeted reconvergence
      - node: sync/StaleModuleList
        action: provides the list of stale modules
      - node: convergence/TargetedReconvergence
        action: reprocesses only the stale modules with compile and audit
      - node: _actors/Compiler
        action: recompiles the stale modules
      - node: _actors/Auditor
        action: re-audits the affected coverage areas
      - node: convergence/ConvergenceState
        action: records targeted reconvergence complete

  RipplePropagation:
    files: [test/journeys/RipplePropagation.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: confirms targeted reconvergence succeeded
      - node: publish/ComputeInterfaceHash
        action: computes new SHA256 hash after reconvergence
      - node: publish/ComparePreviousHash
        action: checks if the interface actually changed
      - node: publish/GenerateInterfaceYaml
        action: writes the updated interface.yaml
      - node: publish/WriteEventFile
        action: writes a new event file for this box
      - node: PropagateRipple
        action: the new event file is now visible to downstream dependent boxes
      - node: _actors/DependentBox
        action: downstream boxes detect this event via their own fs.watch and begin their sync cycle
      - node: sync/UpdateStoredHashes
        action: updates the local hash store so future syncs only detect new changes
      - node: EnterSleep
        action: returns to zero-cost sleep waiting for the next event

  TeardownEventWatching:
    files: [test/journeys/TeardownEventWatching.test.ts]
    steps:
      - node: _actors/HumanDeveloper
        action: shuts down the engine or removes the box
      - node: EventWatcherSet
        action: provides the set of active fs.watch instances
      - node: DeregisterEventWatchers
        action: closes each fs.watch instance and releases kernel handles
      - node: _actors/FileSystem
        action: deregisters the watch callbacks at the kernel level

  FullEventLifecycle:
    files: [test/journeys/FullEventLifecycle.test.ts]
    steps:
      - node: convergence/EnterSleepMode
        action: signals convergence is complete and the engine should watch for events
      - node: sync/ReadDependencyList
        action: provides the dependency list for watcher setup
      - node: RegisterEventWatchers
        action: creates fs.watch instances for all dependency event file paths
      - node: _actors/FileSystem
        action: registers the watch callbacks at the kernel level
      - node: EventWatcherSet
        action: stores the active watcher instances
      - node: EnterSleep
        action: suspends the engine to zero-cost rest
      - node: _actors/FileSystem
        action: fires a watch callback when a dependency publishes a new event file
      - node: DetectEventFileChange
        action: receives the filesystem notification
      - node: WakeFromSleep
        action: resumes the engine from sleep
      - node: LogEventReceived
        action: records the event notification for observability
      - node: DebounceEvents
        action: checks for rapid events and batches if needed
      - node: OscillationCooldown
        action: checks the cooldown window for this dependency
      - node: ReadEventFile
        action: reads the event file contents
      - node: ValidateEventFileFormat
        action: validates the event file structure
      - node: ExtractOriginChain
        action: reads the origin chain for oscillation detection
      - node: ExtractEventSequenceNumber
        action: reads the sequence number for ordering checks
      - node: EventPayload
        action: stores the validated event data
      - node: DelegateToSync
        action: passes the event to sync.ts
      - node: sync/FetchDependencyHash
        action: reads the current dependency hash
      - node: sync/CompareStoredHash
        action: confirms a hash mismatch
      - node: sync/FindAffectedModules
        action: traces affected local modules
      - node: sync/MarkModulesStale
        action: marks affected modules stale
      - node: sync/StaleModuleList
        action: provides the stale list
      - node: convergence/TargetedReconvergence
        action: reconverges only the stale modules
      - node: _actors/Compiler
        action: recompiles the stale modules
      - node: _actors/Auditor
        action: audits the affected areas
      - node: convergence/ConvergenceState
        action: records reconvergence complete
      - node: publish/ComputeInterfaceHash
        action: computes the new interface hash
      - node: publish/ComparePreviousHash
        action: confirms the interface changed
      - node: publish/WriteEventFile
        action: writes this box's new event file
      - node: PropagateRipple
        action: the event file is visible to downstream dependents
      - node: sync/UpdateStoredHashes
        action: persists the new dependency hash
      - node: LogEventReceived
        action: records the full cycle completion in the event log
      - node: EventLog
        action: persists the lifecycle entry
      - node: EnterSleep
        action: returns to zero-cost sleep awaiting the next event

  HandleMultipleEventsInBatch:
    files: [test/journeys/HandleMultipleEventsInBatch.test.ts]
    steps:
      - node: _actors/FileSystem
        action: fires multiple fs.watch callbacks in rapid succession from different dependencies
      - node: DetectEventFileChange
        action: receives each filesystem notification
      - node: WakeFromSleep
        action: resumes the engine on the first event
      - node: LogEventReceived
        action: records each incoming event notification
      - node: DebounceEvents
        action: collects all events within the debounce window into a single batch
      - node: DebounceEvents
        action: closes the debounce window and produces the combined event set
      - node: OscillationCooldown
        action: checks each event in the batch against the cooldown window and filters out suppressed dependencies
      - node: ReadEventFile
        action: reads the event file for each non-suppressed dependency in the batch
      - node: ValidateEventFileFormat
        action: validates each event file's structure
      - node: ExtractOriginChain
        action: reads the origin chain from each event in the batch
      - node: ExtractEventSequenceNumber
        action: reads the sequence number from each event in the batch
      - node: EventPayload
        action: stores the validated payloads for all events in the batch
      - node: LogEventReceived
        action: records the batch disposition with count and source dependencies
      - node: EventLog
        action: persists the batch log entry
      - node: DelegateToSync
        action: passes the combined batch payload to sync.ts for a single hash comparison pass across all changed dependencies

  UpdateWatchersAfterReconvergence:
    files: [test/journeys/UpdateWatchersAfterReconvergence.test.ts]
    steps:
      - node: convergence/TargetedReconvergence
        action: completes reconvergence which may have changed the dependency list
      - node: sync/ReadDependencyList
        action: reads the current dependency list after reconvergence
      - node: EventWatcherSet
        action: provides the currently active watcher instances for comparison
      - node: UpdateWatcherAfterDependencyChange
        action: compares the current dependency list against the active watcher set
      - node: UpdateWatcherAfterDependencyChange
        action: identifies new dependencies that need watchers added
      - node: RegisterEventWatchers
        action: creates fs.watch instances for the newly added dependencies
      - node: UpdateWatcherAfterDependencyChange
        action: identifies dropped dependencies whose watchers should be removed
      - node: DeregisterEventWatchers
        action: closes fs.watch instances for the dropped dependencies
      - node: _actors/FileSystem
        action: registers new watch callbacks and deregisters old ones at the kernel level
      - node: EventWatcherSet
        action: updated with the new set of active watchers matching the current dependency list

  VerifyWatcherHealth:
    files: [test/journeys/VerifyWatcherHealth.test.ts]
    steps:
      - node: WakeFromSleep
        action: resumes the engine, triggering a health check before processing
      - node: EventWatcherSet
        action: provides the set of registered fs.watch instances
      - node: ConfirmWatcherHealth
        action: iterates each watcher and checks it is still active and responsive
      - node: ConfirmWatcherHealth
        action: identifies any watchers that were silently dropped by the OS
      - node: ConfirmWatcherHealth
        action: reports the list of dead watchers that need re-registration
      - node: sync/ReadDependencyList
        action: provides the dependency list to know which watchers to recreate
      - node: RegisterEventWatchers
        action: re-creates fs.watch instances for the dependencies whose watchers were dropped
      - node: _actors/FileSystem
        action: registers the replacement watch callbacks at the kernel level
      - node: EventWatcherSet
        action: updated with the restored watcher set

  ResumeAfterOwnerReturn:
    files: [test/journeys/ResumeAfterOwnerReturn.test.ts]
    steps:
      - node: _actors/ReturningOwner
        action: restarts the engine after a period of downtime
      - node: sync/ReadDependencyList
        action: provides the list of dependencies to check for missed events
      - node: sync/FetchDependencyHash
        action: fetches current hashes from all dependency interfaces
      - node: sync/DependencyHashStore
        action: provides the stored hashes from before the downtime
      - node: sync/CompareStoredHash
        action: compares fetched hashes against stored hashes to detect changes that occurred during downtime
      - node: sync/IdentifyStaleDependencies
        action: collects all dependencies whose hashes changed while the engine was down
      - node: LogEventReceived
        action: records the catch-up sync with the number of missed dependency changes
      - node: EventLog
        action: persists the catch-up log entry
      - node: RegisterEventWatchers
        action: re-creates fs.watch instances for all dependencies
      - node: _actors/FileSystem
        action: registers the watch callbacks at the kernel level
      - node: EventWatcherSet
        action: stores the restored watcher set
      - node: DelegateToSync
        action: passes the detected changes to sync.ts for stale module identification and reconvergence

  RecoverFromWatcherCrash:
    files: [test/journeys/RecoverFromWatcherCrash.test.ts]
    steps:
      - node: _actors/FileSystem
        action: emits an error event on an fs.watch instance instead of a normal change notification
      - node: DetectWatcherCrash
        action: receives the error event from the failed watcher and captures the error code and dependency path
      - node: DetectWatcherCrash
        action: identifies which dependency's watcher failed by matching the error to the EventWatcherSet entry
      - node: LogEventFailure
        action: records the watcher crash with error code, dependency path, and timestamp
      - node: EventLog
        action: persists the watcher crash log entry
      - node: EventWatcherSet
        action: provides the crashed watcher instance for teardown
      - node: ReregisterCrashedWatcher
        action: tears down the crashed fs.watch instance and releases its kernel handle
      - node: ReregisterCrashedWatcher
        action: creates a replacement fs.watch instance for the same dependency event file path
      - node: _actors/FileSystem
        action: registers the replacement watch callback at the kernel level
      - node: EventWatcherSet
        action: updated with the replacement watcher in place of the crashed one
      - node: ConfirmWatcherHealth
        action: verifies the replacement watcher is active and responsive

  HandleUnreadableEventFile:
    files: [test/journeys/HandleUnreadableEventFile.test.ts]
    steps:
      - node: DetectEventFileChange
        action: receives a filesystem notification for an event file change
      - node: ReadEventFile
        action: attempts to read the event file but encounters an IO error
      - node: HandleEventReadFailure
        action: catches the IO error and captures the error code, file path, and error message
      - node: HandleEventReadFailure
        action: determines the error type as file-deleted, permission-denied, or disk-IO-error
      - node: LogEventFailure
        action: records the read failure with error type, dependency path, and error details
      - node: EventLog
        action: persists the read failure log entry
      - node: RetryEventProcessing
        action: waits a brief delay then re-reads the event file
      - node: ReadEventFile
        action: re-attempts to read the event file from disk
      - node: HandleEventReadFailure
        action: checks whether the retry succeeded or produced the same error
      - node: MaxRetryExceeded
        action: checks whether the retry count has reached the configured maximum
      - node: LogEventFailure
        action: records the final failure disposition after retry exhaustion
      - node: convergence/ConvergenceState
        action: receives the escalated failure for operator review since the event could not be read

  HandleMalformedEventFile:
    files: [test/journeys/HandleMalformedEventFile.test.ts]
    steps:
      - node: DetectEventFileChange
        action: receives a filesystem notification for an event file change
      - node: ReadEventFile
        action: successfully reads the event file bytes from disk
      - node: ValidateEventFileFormat
        action: attempts to parse the event file as JSON and finds malformed content
      - node: HandleInvalidEventPayload
        action: identifies the specific validation failure such as missing hash field, invalid JSON, or unparseable sequence number
      - node: HandleInvalidEventPayload
        action: produces a structured error with the field name, expected format, and actual value
      - node: LogEventFailure
        action: records the malformed event with source dependency, error details, and raw file content excerpt
      - node: EventLog
        action: persists the malformed event log entry
      - node: LogEventReceived
        action: records the event disposition as discarded due to invalid format
      - node: EnterSleep
        action: returns to sleep since the malformed event cannot be processed and no sync is triggered

  HandleSyncDelegationError:
    files: [test/journeys/HandleSyncDelegationError.test.ts]
    steps:
      - node: ReadEventFile
        action: successfully reads and validates the event file
      - node: ValidateEventFileFormat
        action: confirms the event file has valid structure
      - node: EventPayload
        action: stores the validated event data
      - node: DelegateToSync
        action: passes the event payload to sync.ts which throws an error during processing
      - node: DetectSyncDelegationFailure
        action: catches the error from sync.ts and captures the error type and message
      - node: DetectSyncDelegationFailure
        action: determines whether the failure is a transient error like unreachable interface or a persistent error like hash store corruption
      - node: LogEventFailure
        action: records the sync delegation failure with error type, dependency, and stack trace
      - node: EventLog
        action: persists the sync failure log entry
      - node: RetryEventProcessing
        action: re-reads the event file and re-delegates to sync.ts after a brief delay
      - node: DelegateToSync
        action: re-attempts the sync delegation with the same event payload
      - node: DetectSyncDelegationFailure
        action: checks whether the retry succeeded or the same error persists
      - node: MaxRetryExceeded
        action: checks whether the retry count has reached the configured maximum
      - node: LogEventFailure
        action: records the final failure after retry exhaustion
      - node: convergence/ConvergenceState
        action: receives the escalated sync failure for operator review or automated recovery

  RecoverFromPartialBatchFailure:
    files: [test/journeys/RecoverFromPartialBatchFailure.test.ts]
    steps:
      - node: DebounceEvents
        action: produces a batch of multiple events from different dependencies
      - node: ReadEventFile
        action: reads event files for all dependencies in the batch
      - node: ValidateEventFileFormat
        action: validates each event file in the batch
      - node: HandleInvalidEventPayload
        action: catches validation failure on one or more events in the batch
      - node: HandleInvalidEventPayload
        action: separates the batch into valid events and invalid events
      - node: LogEventFailure
        action: records each invalid event with its specific validation error
      - node: EventLog
        action: persists the partial batch failure log entries
      - node: EventPayload
        action: stores only the valid event payloads for sync processing
      - node: LogEventReceived
        action: records the partial batch disposition showing count of valid and invalid events
      - node: DelegateToSync
        action: passes only the valid event payloads to sync.ts, skipping the failed ones

  ForwardOriginChainToSync:
    files: [test/journeys/ForwardOriginChainToSync.test.ts]
    steps:
      - node: _actors/FileSystem
        action: fires the fs.watch callback for a dependency event file change
      - node: DetectEventFileChange
        action: receives the filesystem notification
      - node: ReadEventFile
        action: reads the event file from disk
      - node: ValidateEventFileFormat
        action: validates the event file structure
      - node: ExtractOriginChain
        action: reads the ripple origin chain listing all box IDs that have processed this ripple
      - node: ExtractEventSequenceNumber
        action: reads the monotonic sequence number from the event
      - node: TrackRippleDepth
        action: records the origin chain length as the current ripple depth in the event log
      - node: EventPayload
        action: stores the event data enriched with the extracted origin chain and sequence number
      - node: LogEventReceived
        action: records the event with origin chain depth and sequence number for observability
      - node: EventLog
        action: persists the enriched event log entry
      - node: DelegateToSync
        action: passes the event payload including origin chain and sequence to sync for oscillation and ordering checks
      - node: sync/DetectOscillationInOriginChain
        action: checks whether this box's ID appears in the origin chain
      - node: sync/CheckEventSequenceNumber
        action: compares the sequence number against the last processed sequence for this dependency

  SuppressRippleOnUnchangedInterface:
    files: [test/journeys/SuppressRippleOnUnchangedInterface.test.ts]
    steps:
      - node: convergence/TargetedReconvergence
        action: completes reconvergence on stale modules after a dependency event
      - node: _actors/Compiler
        action: confirms zero errors in the reconverged modules
      - node: publish/ComputeInterfaceHash
        action: computes the new interface hash after reconvergence
      - node: publish/ComparePreviousHash
        action: compares the new hash against the previous and finds they are identical
