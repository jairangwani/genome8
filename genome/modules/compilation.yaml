spec_sections: [3, 9]

nodes:
  YAMLParsing:
    type: process
    description: reads .yaml and .yml files from the modules directory, derives the module name from each filename, parses raw YAML into structured data, normalizes missing top-level fields (spec_sections, nodes, journeys) with empty defaults so downstream consumers never see undefined, and catches parse errors to surface them as tagged _parseError entries with empty defaults rather than crashing the compilation
    files: ["src/compile.ts"]
  DuplicateDetection:
    type: process
    description: scans the node registry for duplicate node names across all modules
  DanglingRefDetection:
    type: process
    description: checks every journey step node reference and flags those that resolve to no known node
  OrphanDetection:
    type: process
    description: identifies nodes that are defined but never referenced in any journey step
  IsolatedModuleDetection:
    type: process
    description: finds modules with more than 3 nodes whose nodes have zero cross-module connections, exempting small modules with 3 or fewer nodes from isolation checks
  ExternalRefClassification:
    type: process
    description: classifies unresolved refs as external sibling-engine references and emits warnings instead of errors
  YAMLErrorReporting:
    type: process
    description: collects _parseError tags from malformed modules and promotes them to severity-error ValidationIssues with module name and error message so parse failures appear in the final compilation report
    files: ["src/compile.ts"]
  ValidationAggregation:
    type: process
    description: collects all errors and warnings from all validation checks into a single compilation result
  IncrementalValidation:
    type: process
    description: validates only the newly added module against the existing graph, checking for new duplicates, dangling refs, and type errors without full rebuild
  SkipMalformedModule:
    type: process
    description: excludes a module with fatal YAML parse errors from the compiled index, allowing compilation of remaining modules to continue
  ValidateModuleCompleteness:
    type: process
    description: checks that every module listed in ORGANIZATION.md exists as a compiled module in the index, ensuring no module was missed during bounded creation
  StaleConnectionDetection:
    type: process
    description: validates that every edge in the ConnectionSet has both source and target nodes present in the NodeRegistry, catching connections left stale after node removal or module rewrite
    files: ["src/compile.ts"]
  CompilationResultComparison:
    type: process
    description: compares two CompilationResults or CompiledIndexes field by field for structural equality, flagging any differences as non-determinism or merge-order drift
  ParallelValidationDispatch:
    type: process
    description: dispatches independent validation checks (duplicates, dangling refs, orphans, isolation, stale connections) concurrently on the same CompiledIndex and collects their ErrorReports when all complete
  DirtyModuleTracking:
    type: process
    description: tracks which modules changed since the last successful compilation and identifies their cross-module dependents, enabling targeted revalidation instead of full recompilation
  SchemaViolationDetection:
    type: process
    description: validates each parsed module file has the required top-level structure (spec_sections as number array, nodes as map, journeys as map) before content parsing proceeds
    files: ["src/compile.ts"]
  FieldLossDetection:
    type: process
    description: compares a module file before and after an LLM rewrite to detect any fields (including extension fields like files) that were silently dropped during the edit
    files: ["src/compile.ts"]
  ValidateDescriptionQuality:
    type: process
    description: checks that every node has a meaningful description string, flagging nodes with missing or empty descriptions as warnings and descriptions exceeding 500 characters as warnings to prevent context window exhaustion
    files: ["src/compile.ts"]
  NodeNameValidation:
    type: process
    description: validates that each node name follows PascalCase format (uppercase letter followed by letters and digits only) and emits a warning for names containing special characters or path separators
    files: ["src/compile.ts"]
  JourneyNameValidation:
    type: process
    description: validates that each journey name follows PascalCase format (uppercase letter followed by letters and digits only) and emits a warning for names containing special characters or path separators
    files: ["src/compile.ts"]
  CompilationResult:
    type: artifact
    description: the full output of compile.ts containing the CompiledIndex (all nodes with connections, all journeys with metadata, aggregate stats), a flat issues array of errors and warnings, and a per-module CoverageReport
    files: [test/compile.test.ts, test/pando8.test.ts, test/pando9.test.ts]
  ErrorReport:
    type: artifact
    description: structured list of all validation errors with type, location, and message for each
  WarningReport:
    type: artifact
    description: structured list of all warnings including external refs that parent will validate later
  CompileCLI:
    type: interface
    description: command-line entry point for the compile command that invokes compile() on the given modules directory and prints aggregate stats as JSON followed by categorized error and warning counts to stdout
    files: ["src/cli.ts"]
  ZeroErrorConvergence:
    type: rule
    description: convergence requires compile.ts to report exactly 0 errors and 0 orphans before proceeding
  DeterministicOrdering:
    type: rule
    description: all output lists in CompilationResult, ErrorReport, and WarningReport are sorted by a canonical key (module name, then node name, then journey name) so file system read order and check execution order never affect the output
  EarlyTerminationRule:
    type: rule
    description: halts remaining validation checks when accumulated error count exceeds a configurable threshold, returning the partial result immediately to avoid wasted work on a clearly failing compilation
  ValidateActionQuality:
    type: process
    description: post-compilation check that iterates every journey step and emits a warning for actions that are empty or shorter than 5 characters, reporting the journey name, step number, and module for each violation
    files: ["src/compile.ts"]
  DetectDuplicateSequences:
    type: process
    description: post-compilation analysis that slides a 3-step window across every journey's node sequence, deduplicates journey names per window, and returns structured records of sequences shared by two or more distinct journeys indicating potential copy-paste or redundancy
    files: ["src/compile.ts"]
  ExternalRefsAreWarnings:
    type: rule
    description: unresolved refs to sibling engines are warnings in children, errors only at parent level
  EmptyModuleDirectoryDetection:
    type: process
    description: detects when the modules directory contains zero YAML files and reports a tagged _parseError on an _empty module entry instead of producing a silent empty compiled index, while a missing directory returns an empty module map without error
    files: ["src/compile.ts"]
  FileReadFailureHandling:
    type: process
    description: catches file I/O errors (permission denied, file locked, disk error) when reading a module YAML file and records the failure without crashing the compilation run
    files: ["src/compile.ts"]
  UnlistedModuleDetection:
    type: process
    description: compares compiled module files on disk against the ORGANIZATION.md module list and flags modules that exist as YAML files but are not listed in the organization
  ConcurrentWriteDetection:
    type: process
    description: detects when a module file was modified during compilation by comparing file modification timestamps before and after reading, catching half-written files from concurrent LLM edits
  DuplicateJourneyDetection:
    type: process
    description: scans the journey registry for duplicate journey names across all modules, analogous to DuplicateDetection for nodes
  PersistCompilationArtifacts:
    type: process
    description: creates the compiled/ directory as a sibling to the modules directory if needed, then serializes the compiled index and coverage report to index.yaml and coverage.yaml using wide line wrapping and no YAML anchors for human-readable output
    files: [src/cli.ts]
  CoverageComputation:
    type: process
    description: computes per-module coverage metrics including node count, journey count, connection count, cross-module connections, and spec section claims, then derives orphan nodes with zero connections and journey memberships, and isolated modules with more than 3 nodes but zero cross-module connections
    files: [src/compile.ts]
  ModuleCoverageReport:
    type: artifact
    description: the coverage section of the compile result containing per-module metrics, orphan list, and isolated module list returned alongside errors and warnings
  CompileFromModules:
    type: process
    description: in-memory compilation pipeline that accepts a pre-loaded module map and optional external interfaces, first collecting parse errors from malformed modules, then orchestrating node collection, journey resolution, connection computation, validation, stale connection detection, stats, and coverage, merging issues from all five phases into a deterministically sorted flat array and stamping a compiled timestamp on the index
    files: [src/compile.ts]
  NodeTypeValidation:
    type: process
    description: validates that each node's type field is one of the five universal types (actor, process, artifact, interface, rule) and emits an error for any node with an invalid type
    files: [src/compile.ts]
  ExternalInterfaceResolution:
    type: process
    description: resolves cross-engine node references using flexible name matching against the sibling's provides map, emitting an error when the node is not found in a loaded interface, or degrading to a warning when no external interfaces are available so the parent can validate later
    files: [src/compile.ts]
  DefaultMissingModuleFields:
    type: process
    description: defaults missing top-level fields (spec_sections to empty array, nodes to empty map, journeys to empty map) during parsing, tolerating partial module files without schema errors
    files: [src/compile.ts]
  StatsComputation:
    type: process
    description: computes aggregate statistics including total_nodes, total_journeys, total_connections, modules count, orphans, isolated_modules, and duplicate_names from the compiled registries
    files: [src/compile.ts]

journeys:
  ParseAllModules:
    files: [test/journeys/ParseAllModules.test.ts]
    steps:
      - node: _actors/Compiler
        action: scans the modules directory for all .yaml files
      - node: YAMLParsing
        action: reads each YAML file and parses it into structured data
      - node: YAMLErrorReporting
        action: catches syntax errors in any malformed YAML file and records them as _parseError stubs
      - node: DefaultMissingModuleFields
        action: defaults missing spec_sections, nodes, and journeys to empty values for partial module files
      - node: SchemaViolationDetection
        action: validates each parsed module has spec_sections, nodes, and journeys top-level keys with correct types
      - node: graph/ModuleSchemaRule
        action: enforces that malformed modules missing required structure are rejected before content parsing
      - node: graph/NodeDefinition
        action: parses each node entry from the parsed YAML
      - node: NodeTypeValidation
        action: validates each node's type is one of actor, process, artifact, interface, or rule
      - node: NodeNameValidation
        action: validates each node name follows PascalCase format and warns on special characters
      - node: JourneyNameValidation
        action: validates each journey name follows PascalCase format and warns on special characters
      - node: graph/JourneyDefinition
        action: parses each journey entry from the parsed YAML
      - node: graph/NodeRegistry
        action: registers all parsed nodes into the deduplicated map
      - node: graph/JourneyRegistry
        action: registers all parsed journeys into the journey collection
      - node: graph/CompiledIndex
        action: merges all parsed modules into the in-memory compiled structure

  DetectDuplicates:
    files: [test/journeys/DetectDuplicates.test.ts]
    steps:
      - node: graph/CompiledIndex
        action: provides the full node registry for inspection
      - node: DuplicateDetection
        action: scans all node names and flags any name that appears in more than one module
      - node: ErrorReport
        action: records each duplicate as a validation error with both module locations

  DetectDanglingRefs:
    files: [test/journeys/DetectDanglingRefs.test.ts]
    steps:
      - node: graph/CompiledIndex
        action: provides all journey steps and the node registry
      - node: DanglingRefDetection
        action: checks each step's node reference against the registry and flags misses
      - node: ExternalInterfaceResolution
        action: resolves cross-engine refs against published interfaces when external interfaces are provided
      - node: ExternalRefClassification
        action: reclassifies remaining unresolved refs matching sibling-engine patterns as external warnings
      - node: ExternalRefsAreWarnings
        action: enforces that external refs produce warnings not errors at child level
      - node: ErrorReport
        action: records true dangling refs as errors
      - node: WarningReport
        action: records external refs as warnings for parent validation

  DetectOrphans:
    files: [test/journeys/DetectOrphans.test.ts]
    steps:
      - node: graph/CompiledIndex
        action: provides all nodes and all journey steps
      - node: OrphanDetection
        action: compares node registry against step references and flags unreferenced nodes
      - node: ErrorReport
        action: records each orphan node as a validation error

  DetectIsolatedModules:
    files: [test/journeys/DetectIsolatedModules.test.ts]
    steps:
      - node: graph/ConnectionSet
        action: provides all computed edges between nodes
      - node: IsolatedModuleDetection
        action: checks each module for at least one cross-module connection and flags those with none
      - node: ErrorReport
        action: records each isolated module as a validation error

  DetectMissingModules:
    files: [test/journeys/DetectMissingModules.test.ts]
    steps:
      - node: organization/ModuleList
        action: provides the expected list of modules identified from ORGANIZATION.md
      - node: graph/CompiledIndex
        action: provides the set of modules that were successfully compiled into the index
      - node: ValidateModuleCompleteness
        action: compares each expected module name against the compiled set and flags any that are absent
      - node: ErrorReport
        action: records each missing module as a validation error with the expected module name

  DetectStaleConnections:
    files: [test/journeys/DetectStaleConnections.test.ts]
    steps:
      - node: graph/ConnectionSet
        action: provides all computed directed edges between nodes
      - node: graph/NodeRegistry
        action: provides the current set of all defined node names
      - node: StaleConnectionDetection
        action: checks each connection's source and target node against the registry and flags edges referencing nodes that no longer exist
      - node: ErrorReport
        action: records each stale connection as a validation error with the edge endpoints and originating journey

  FullCompilation:
    files: [test/journeys/FullCompilation.test.ts]
    steps:
      - node: _actors/Compiler
        action: initiates a full compilation run
      - node: YAMLParsing
        action: parses all module YAML files
      - node: YAMLErrorReporting
        action: reports any YAML syntax errors found
      - node: graph/ConnectionComputation
        action: computes all connections from journey steps
      - node: graph/CrossModuleRefResolution
        action: resolves all cross-module node references
      - node: graph/ActorRefResolution
        action: resolves all actor references
      - node: DuplicateDetection
        action: checks for duplicate node names
      - node: DanglingRefDetection
        action: checks for unresolved node references
      - node: ExternalRefClassification
        action: classifies external refs as warnings
      - node: OrphanDetection
        action: checks for unreferenced nodes
      - node: IsolatedModuleDetection
        action: checks for modules with no cross-module connections
      - node: StaleConnectionDetection
        action: checks for connections referencing nodes no longer in the registry
      - node: NodeTypeValidation
        action: validates each node's type is one of the five universal types
      - node: NodeNameValidation
        action: validates each node name follows PascalCase format
      - node: JourneyNameValidation
        action: validates each journey name follows PascalCase format
      - node: ValidationAggregation
        action: collects all errors and warnings into a single result
      - node: StatsComputation
        action: computes total_nodes, total_journeys, total_connections, orphans, isolated_modules, and duplicate_names
      - node: CoverageComputation
        action: computes per-module coverage metrics
      - node: DeterministicOrdering
        action: sorts all error, warning, orphan, and duplicate lists by canonical key before output
      - node: CompilationResult
        action: outputs final counts of errors, warnings, orphans, duplicates, and dangling refs
      - node: ZeroErrorConvergence
        action: determines whether the result meets the 0-error 0-orphan threshold for convergence

  CompileFromCLI:
    files: [test/journeys/CompileFromCLI.test.ts]
    steps:
      - node: _actors/HumanDeveloper
        action: runs compile.ts from the command line
      - node: CompileCLI
        action: accepts the command and passes it to the compiler
      - node: _actors/Compiler
        action: executes the full compilation pipeline
      - node: CompilationResult
        action: returns the validation output
      - node: CompileCLI
        action: displays errors, warnings, and summary to the developer

  CompileAfterModuleCreation:
    files: [test/journeys/CompileAfterModuleCreation.test.ts]
    steps:
      - node: convergence/CompileCheck
        action: triggers compilation after LLMWorker creates a single new module
      - node: graph/ModuleFile
        action: provides the newly created module file
      - node: YAMLParsing
        action: parses the new module's YAML content
      - node: YAMLErrorReporting
        action: checks the new module for YAML syntax errors
      - node: SchemaViolationDetection
        action: validates the new module has the required top-level structure before content parsing
      - node: graph/IncrementalMerge
        action: merges the new module into the existing compiled index
      - node: IncrementalValidation
        action: checks the new module's nodes for duplicates against the existing registry
      - node: DanglingRefDetection
        action: checks the new module's journey refs against all known nodes
      - node: ExternalRefClassification
        action: classifies any unresolved refs from the new module as external warnings
      - node: ValidationAggregation
        action: collects errors and warnings from the incremental checks
      - node: CompilationResult
        action: outputs the incremental compilation result for the new module
      - node: convergence/BoundedCreationLoop
        action: receives the result and proceeds to the next module if clean

  CompileAfterAuditFix:
    files: [test/journeys/CompileAfterAuditFix.test.ts]
    steps:
      - node: convergence/RecompileAfterFix
        action: triggers recompilation after an audit gap fix has been applied
      - node: _actors/Compiler
        action: runs full compilation on the patched graph
      - node: YAMLParsing
        action: reparses all modules including the edited one
      - node: YAMLErrorReporting
        action: checks for YAML errors in the edited module
      - node: FieldLossDetection
        action: compares the edited module's YAML before and after the fix to detect any fields silently dropped by the LLM rewrite
      - node: graph/FieldPreservation
        action: verifies that all original fields including extension fields still exist in the rewritten module
      - node: graph/ConnectionComputation
        action: recomputes all connections with the fix applied
      - node: DuplicateDetection
        action: rechecks for duplicates after the fix
      - node: DanglingRefDetection
        action: rechecks for dangling refs after the fix
      - node: OrphanDetection
        action: rechecks for orphans after the fix
      - node: StaleConnectionDetection
        action: checks for connections referencing nodes removed or renamed by the fix
      - node: ValidationAggregation
        action: collects all results from the recompilation
      - node: CompilationResult
        action: outputs the post-fix compilation result
      - node: ZeroErrorConvergence
        action: confirms the fix maintained zero-error status
      - node: convergence/ReauditAfterFix
        action: proceeds to re-audit to verify the gap is closed

  HandlePartialParseFailure:
    files: [test/journeys/HandlePartialParseFailure.test.ts]
    steps:
      - node: _actors/Compiler
        action: begins parsing all module YAML files
      - node: YAMLParsing
        action: attempts to parse each module file
      - node: YAMLErrorReporting
        action: catches a fatal parse error in one or more modules
      - node: ErrorReport
        action: records the parse failure with file name, line number, and error message
      - node: SkipMalformedModule
        action: excludes the malformed module from the compiled index
      - node: graph/NodeDefinition
        action: parses node entries from only the successfully parsed modules
      - node: graph/JourneyDefinition
        action: parses journey entries from only the successfully parsed modules
      - node: graph/CompiledIndex
        action: builds a partial compiled index from the parseable modules
      - node: ValidationAggregation
        action: aggregates errors including the skipped module's parse failure
      - node: CompilationResult
        action: outputs a result with non-zero error count due to the malformed module
      - node: ZeroErrorConvergence
        action: fails the zero-error check, blocking convergence until the module is fixed

  RecoverFromLLMCreatedErrors:
    files: [test/journeys/RecoverFromLLMCreatedErrors.test.ts]
    steps:
      - node: _actors/LLMWorker
        action: creates a module with YAML errors or validation problems during convergence
      - node: graph/ModuleFile
        action: stores the problematic module on disk
      - node: YAMLParsing
        action: attempts to parse the new module's YAML
      - node: YAMLErrorReporting
        action: detects YAML syntax errors or malformed structure in the LLM output
      - node: SchemaViolationDetection
        action: checks whether the LLM output has the required top-level structure (spec_sections, nodes, journeys)
      - node: ErrorReport
        action: records the specific errors with locations and messages
      - node: CompilationResult
        action: outputs a non-zero error result for this module
      - node: convergence/AuditGapFix
        action: receives the error report and delegates a targeted fix to the LLM
      - node: _actors/LLMWorker
        action: reads the error report and edits the module to fix the specific errors
      - node: graph/ModuleFile
        action: stores the corrected module on disk
      - node: FieldLossDetection
        action: compares the original and corrected module files to detect any fields silently dropped during the LLM fix
      - node: graph/FieldPreservation
        action: verifies that extension fields like files were not stripped during the LLM rewrite
      - node: YAMLParsing
        action: reparses the corrected module
      - node: YAMLErrorReporting
        action: confirms no YAML errors remain in the corrected module
      - node: IncrementalValidation
        action: validates the corrected module against the existing graph
      - node: DanglingRefDetection
        action: checks the corrected module's refs resolve correctly
      - node: DuplicateDetection
        action: checks the corrected module introduces no duplicate names
      - node: ValidationAggregation
        action: collects the revalidation results
      - node: CompilationResult
        action: outputs a clean result confirming the fix resolved the errors

  FinalCompilationGate:
    files: [test/journeys/FinalConvergenceGate.test.ts]
    steps:
      - node: convergence/ConvergenceState
        action: indicates all audit fixes are complete and requests the definitive final compilation
      - node: _actors/Compiler
        action: runs the final full compilation across all modules
      - node: YAMLParsing
        action: parses all modules one final time
      - node: YAMLErrorReporting
        action: confirms zero YAML errors across all modules
      - node: organization/ModuleList
        action: provides the expected list of modules from ORGANIZATION.md
      - node: ValidateModuleCompleteness
        action: checks that every expected module from the organization exists in the compiled index
      - node: graph/CompiledIndex
        action: provides the full graph for final validation
      - node: graph/UniqueNodeNameRule
        action: verifies no duplicate node names exist across all modules
      - node: DuplicateDetection
        action: confirms zero duplicates in the final graph
      - node: graph/AllRefsResolveRule
        action: verifies every node reference resolves to a known target
      - node: DanglingRefDetection
        action: confirms zero dangling refs in the final graph
      - node: graph/NoIsolationRule
        action: verifies every node participates in at least one journey
      - node: OrphanDetection
        action: confirms zero orphans in the final graph
      - node: IsolatedModuleDetection
        action: confirms zero isolated modules in the final graph
      - node: StaleConnectionDetection
        action: confirms zero stale connections referencing removed nodes in the final graph
      - node: ValidationAggregation
        action: collects all final validation results
      - node: CompilationResult
        action: outputs the definitive result with zero errors, zero orphans, zero duplicates
      - node: ZeroErrorConvergence
        action: confirms the zero-error threshold is met
      - node: audit/DeclareConverged
        action: receives the clean final compilation and marks the graph as CONVERGED

  ValidateActionDescriptions:
    files: [test/journeys/ValidateActionDescriptions.test.ts]
    steps:
      - node: _actors/Compiler
        action: completes compilation and produces a CompileResult
      - node: CompilationResult
        action: provides the compiled index containing all journeys and their steps
      - node: ValidateActionQuality
        action: iterates every journey step and flags actions that are empty or shorter than 5 characters
      - node: WarningReport
        action: records each low-quality action as a warning with journey name and step number

  VerifyCompilationIdempotency:
    files: [test/journeys/VerifyCompilationIdempotency.test.ts]
    steps:
      - node: _actors/Compiler
        action: runs full compilation on all module files and stores the first CompilationResult
      - node: CompilationResult
        action: records the first compilation output with all counts and sorted lists
      - node: _actors/Compiler
        action: runs full compilation a second time on the same unmodified module files
      - node: CompilationResult
        action: records the second compilation output
      - node: DeterministicOrdering
        action: confirms both results have identically sorted error, warning, orphan, and duplicate lists
      - node: CompilationResultComparison
        action: compares the two results field by field and flags any difference as a non-determinism defect
      - node: ErrorReport
        action: records any differences found between the two compilation runs

  VerifyIncrementalMatchesFull:
    files: [test/journeys/VerifyIncrementalMatchesFull.test.ts]
    steps:
      - node: graph/CompiledIndex
        action: provides the compiled index built incrementally during module-by-module convergence
      - node: _actors/Compiler
        action: runs a from-scratch full compilation over all module files
      - node: CompilationResult
        action: records the from-scratch full compilation result
      - node: CompilationResultComparison
        action: compares the incremental compiled index against the full compilation, checking node registries, journey registries, and connection sets
      - node: ErrorReport
        action: records any structural differences as drift errors indicating merge-order sensitivity

  ScaledParallelValidation:
    files: [test/journeys/ScaledParallelValidation.test.ts]
    steps:
      - node: _actors/Compiler
        action: initiates compilation on a large graph with many modules
      - node: YAMLParsing
        action: parses all module YAML files
      - node: YAMLErrorReporting
        action: reports any YAML syntax errors found
      - node: graph/ConnectionComputation
        action: computes all connections from journey steps
      - node: graph/CrossModuleRefResolution
        action: resolves all cross-module node references
      - node: graph/ActorRefResolution
        action: resolves all actor references
      - node: ParallelValidationDispatch
        action: dispatches DuplicateDetection, DanglingRefDetection, OrphanDetection, IsolatedModuleDetection, and StaleConnectionDetection concurrently
      - node: DuplicateDetection
        action: checks for duplicate node names concurrently with other checks
      - node: DanglingRefDetection
        action: checks for unresolved node references concurrently with other checks
      - node: OrphanDetection
        action: checks for unreferenced nodes concurrently with other checks
      - node: IsolatedModuleDetection
        action: checks for isolated modules concurrently with other checks
      - node: StaleConnectionDetection
        action: checks for stale connections concurrently with other checks
      - node: ParallelValidationDispatch
        action: collects all ErrorReports from completed concurrent checks
      - node: ValidationAggregation
        action: merges the concurrent check results into a single compilation result
      - node: DeterministicOrdering
        action: sorts all output lists by canonical key to ensure parallel execution order does not affect output
      - node: CompilationResult
        action: outputs the final compilation result identical to sequential FullCompilation

  TerminateOnExcessiveErrors:
    files: [test/journeys/TerminateOnExcessiveErrors.test.ts]
    steps:
      - node: _actors/Compiler
        action: begins compilation on a graph with many pre-existing problems
      - node: YAMLParsing
        action: parses all module YAML files
      - node: YAMLErrorReporting
        action: detects YAML syntax errors across multiple modules
      - node: ErrorReport
        action: accumulates errors from the parsing phase
      - node: EarlyTerminationRule
        action: checks accumulated error count against the threshold after parsing
      - node: DuplicateDetection
        action: runs the first validation check and reports errors
      - node: ErrorReport
        action: accumulates errors from duplicate detection
      - node: EarlyTerminationRule
        action: rechecks accumulated error count and triggers termination because the threshold is exceeded
      - node: ValidationAggregation
        action: collects the partial results from completed checks only
      - node: CompilationResult
        action: outputs a partial result flagged as early-terminated with the error count at termination

  RevalidateChangedModulesOnly:
    files: [test/journeys/RevalidateChangedModulesOnly.test.ts]
    steps:
      - node: convergence/RecompileAfterFix
        action: triggers recompilation after an audit fix edited a single module
      - node: DirtyModuleTracking
        action: identifies the edited module and all modules whose journeys reference its nodes
      - node: graph/CompiledIndex
        action: provides the existing compiled index for scoped revalidation
      - node: YAMLParsing
        action: reparses only the edited module file
      - node: YAMLErrorReporting
        action: checks the edited module for YAML syntax errors
      - node: graph/ScopedValidation
        action: extracts the subgraph of nodes and journeys affected by the dirty module set
      - node: DuplicateDetection
        action: checks only nodes from dirty modules against the full registry
      - node: DanglingRefDetection
        action: checks only journey steps in dirty modules for unresolved refs
      - node: OrphanDetection
        action: checks only nodes in dirty modules for orphan status
      - node: StaleConnectionDetection
        action: checks only connections involving dirty module nodes for staleness
      - node: ValidationAggregation
        action: collects results from the scoped checks
      - node: CompilationResult
        action: outputs a scoped revalidation result covering only the affected subgraph

  ValidateModuleStructure:
    files: [test/journeys/ValidateModuleStructure.test.ts]
    steps:
      - node: _actors/Compiler
        action: reads a module YAML file during the parsing phase
      - node: YAMLParsing
        action: parses the raw YAML into a structured object
      - node: SchemaViolationDetection
        action: checks that spec_sections exists and is a number array
      - node: SchemaViolationDetection
        action: checks that nodes exists and is a map where each entry has type and description
      - node: SchemaViolationDetection
        action: checks that journeys exists and is a map where each entry has a steps array
      - node: graph/ModuleSchemaRule
        action: enforces that any module failing these structural checks is rejected before content parsing
      - node: ErrorReport
        action: records each schema violation with the field path and expected structure

  DetectFieldLossAfterRewrite:
    files: [test/journeys/DetectFieldLossAfterRewrite.test.ts]
    steps:
      - node: graph/ModuleFile
        action: provides the original module YAML content before an LLM rewrite
      - node: _actors/LLMWorker
        action: edits the module file to add, modify, or fix nodes or journeys
      - node: graph/ModuleFile
        action: provides the rewritten module YAML content after the LLM edit
      - node: FieldLossDetection
        action: compares original and rewritten YAML field by field to identify any keys that were dropped
      - node: FieldLossDetection
        action: specifically checks that extension fields like files on nodes were preserved through the rewrite
      - node: graph/FieldPreservation
        action: enforces that the rewritten file retains all fields from the original, blocking the write if any were lost
      - node: ErrorReport
        action: records each dropped field as a data-loss error with the node or journey name and the missing field key

  ValidateNodeDescriptions:
    files: [test/journeys/ValidateNodeDescriptions.test.ts]
    steps:
      - node: _actors/Compiler
        action: completes compilation and produces a CompiledIndex with all nodes
      - node: graph/NodeRegistry
        action: provides all nodes with their descriptions across all modules
      - node: ValidateDescriptionQuality
        action: iterates every node and flags descriptions that are empty or shorter than 10 characters
      - node: ValidateDescriptionQuality
        action: flags descriptions that are duplicated verbatim across different nodes
      - node: ErrorReport
        action: records each low-quality or duplicate description as a validation issue with the node name and module

  DetectDuplicateJourneySequences:
    files: [test/journeys/DetectDuplicateJourneySequences.test.ts]
    steps:
      - node: _actors/Compiler
        action: completes full compilation and produces a CompileResult
      - node: CompilationResult
        action: provides the compiled index containing all journeys and their steps
      - node: DetectDuplicateSequences
        action: slides a 3-step window over every journey's node list and groups matching sequences by key
      - node: DetectDuplicateSequences
        action: filters to sequences appearing in two or more distinct journeys
      - node: WarningReport
        action: records each duplicate sequence with the shared node triple and the list of journeys that contain it

  DetectUnlistedModules:
    steps:
      - node: _actors/Compiler
        action: scans the modules directory for all .yaml files present on disk
      - node: organization/ModuleList
        action: provides the expected list of modules from ORGANIZATION.md
      - node: UnlistedModuleDetection
        action: compares disk files against the organization list and identifies files with no matching entry
      - node: UnlistedModuleDetection
        action: checks whether any other module's journeys reference nodes from the unlisted module
      - node: WarningReport
        action: records each unlisted module as a warning with the file name and any cross-module references depending on it

  HandleEmptyModuleDirectory:
    steps:
      - node: _actors/Compiler
        action: scans the modules directory for .yaml files
      - node: EmptyModuleDirectoryDetection
        action: detects that the directory is missing or contains zero YAML files
      - node: ErrorReport
        action: records an error indicating no modules found with the expected directory path
      - node: CompilationResult
        action: outputs a result with one error and zero nodes, journeys, and connections
      - node: ZeroErrorConvergence
        action: fails the zero-error check, blocking convergence until modules exist

  HandleFileReadFailure:
    steps:
      - node: _actors/Compiler
        action: attempts to read a module YAML file from disk
      - node: FileReadFailureHandling
        action: catches the I/O error (permission denied, file locked, or disk error) and records the file path and error message
      - node: ErrorReport
        action: records the unreadable file as a compilation error with the file path and OS error detail
      - node: SkipMalformedModule
        action: excludes the unreadable module from the compiled index, same as a parse failure
      - node: ValidationAggregation
        action: includes the file read error in the aggregated result alongside any other validation errors
      - node: CompilationResult
        action: outputs a result with non-zero error count due to the unreadable module

  DetectConcurrentWrite:
    steps:
      - node: _actors/Compiler
        action: records the modification timestamp of a module file before reading it
      - node: YAMLParsing
        action: reads and parses the module file contents
      - node: ConcurrentWriteDetection
        action: re-checks the file modification timestamp after reading and detects it changed during the read
      - node: SkipMalformedModule
        action: discards the potentially corrupt parse result for the concurrently modified file
      - node: WarningReport
        action: records a warning that the module was modified during compilation and its result was discarded
      - node: _actors/Compiler
        action: re-reads the module file after the concurrent write completes
      - node: YAMLParsing
        action: reparses the module from the now-stable file
      - node: ConcurrentWriteDetection
        action: confirms the file timestamp is stable between pre-read and post-read checks
      - node: graph/IncrementalMerge
        action: merges the cleanly read module into the compiled index

  DetectDuplicateJourneyNames:
    steps:
      - node: graph/CompiledIndex
        action: provides the full journey registry for inspection
      - node: DuplicateJourneyDetection
        action: scans all journey names and flags any name that appears in more than one module
      - node: graph/UniqueJourneyNameRule
        action: enforces that duplicate journey names are rejected as validation errors
      - node: ErrorReport
        action: records each duplicate journey name as a validation error with both module locations

  ComputeModuleCoverage:
    steps:
      - node: graph/CompiledIndex
        action: provides all compiled nodes with their module assignments and connection data
      - node: graph/ConnectionSet
        action: provides all computed edges for counting per-module connections
      - node: CoverageComputation
        action: iterates each module counting nodes, journeys, connections, and cross-module connections
      - node: CoverageComputation
        action: collects orphan nodes and isolated modules into separate lists
      - node: ModuleCoverageReport
        action: stores the per-module coverage metrics alongside orphan and isolated module lists
      - node: CompilationResult
        action: includes the coverage report as part of the compile output

  CompileAndPersistFromCLI:
    steps:
      - node: _actors/HumanDeveloper
        action: runs genome compile from the command line with a modules directory argument
      - node: CompileCLI
        action: parses the compile command and the modules directory path from process.argv
      - node: _actors/Compiler
        action: executes the full compilation pipeline on all module YAML files
      - node: CompilationResult
        action: produces the compiled index with stats, errors, and warnings
      - node: ModuleCoverageReport
        action: produces per-module coverage metrics alongside orphan and isolated module lists
      - node: PersistCompilationArtifacts
        action: creates the compiled/ directory if needed and writes index.yaml and coverage.yaml to disk
      - node: CompileCLI
        action: prints stats as JSON and displays errors and up to 10 warnings to the developer

  CompileFromInMemoryModules:
    steps:
      - node: CompileFromModules
        action: receives a pre-loaded module map and optional external interfaces for cross-engine resolution
      - node: YAMLErrorReporting
        action: surfaces _parseError entries from modules that failed parsing as compilation errors
      - node: DefaultMissingModuleFields
        action: ensures all modules have spec_sections, nodes, and journeys defaulted to empty values
      - node: DuplicateDetection
        action: scans all node names across all modules for duplicates
      - node: NodeTypeValidation
        action: validates each node's type field is one of the five universal types
      - node: NodeNameValidation
        action: validates each node name follows PascalCase format
      - node: JourneyNameValidation
        action: validates each journey name follows PascalCase format
      - node: DanglingRefDetection
        action: checks every journey step ref against the node registry
      - node: ExternalInterfaceResolution
        action: resolves cross-engine refs against published interfaces when provided
      - node: ExternalRefClassification
        action: classifies remaining unresolved external refs as warnings
      - node: graph/ConnectionComputation
        action: computes all connections from consecutive journey steps
      - node: OrphanDetection
        action: identifies nodes not referenced in any journey
      - node: StatsComputation
        action: computes aggregate statistics for the compiled graph
      - node: CoverageComputation
        action: computes per-module coverage metrics with orphan and isolated module lists
      - node: CompilationResult
        action: assembles the compiled index, issues, and coverage into the final result

  DetectYAMLTamperingDuringCompilation:
    steps:
      - node: _actors/YAMLTamperer
        action: injects invalid node definitions or corrupts refs in a module YAML file
      - node: YAMLParsing
        action: parses the tampered file and catches syntax-level corruption
      - node: YAMLErrorReporting
        action: reports parse errors with file path and line number for the tampered content
      - node: DanglingRefDetection
        action: detects dangling refs introduced by the tampered node definitions
      - node: SchemaViolationDetection
        action: catches schema violations such as invalid node types or missing required fields
      - node: ValidationAggregation
        action: aggregates all tampering-induced errors into a single report blocking convergence

  DetectStaleBoxDuringCompilation:
    steps:
      - node: _actors/StaleBox
        action: provides modules with outdated external refs that no longer resolve
      - node: ExternalRefClassification
        action: classifies external refs and flags those pointing to missing or removed interfaces
      - node: StaleConnectionDetection
        action: detects connections referencing published interfaces that no longer match current hashes
      - node: ErrorReport
        action: reports stale connections as compilation warnings requiring upstream reconciliation

  DetectDeprecatedModuleDuringCompilation:
    steps:
      - node: _actors/DeprecatedModule
        action: exists on disk with orphaned nodes no longer referenced by any journey
      - node: OrphanDetection
        action: flags nodes in the deprecated module that have zero inbound or outbound connections
      - node: IsolatedModuleDetection
        action: detects the module has no cross-module connections to any other module
      - node: _actors/Compiler
        action: reports the module as isolated, signaling it should be removed from the graph

  EnforceZeroErrorArchitecturalDecision:
    steps:
      - node: _actors/Compiler
        action: runs compilation after every module change enforcing the zero-error gate
      - node: CompileFromModules
        action: parses all modules and runs the full validation suite
      - node: DuplicateDetection
        action: rejects duplicate node or journey names enforcing graph uniqueness
      - node: DanglingRefDetection
        action: rejects references to nodes that do not exist enforcing referential integrity
      - node: OrphanDetection
        action: flags nodes with zero connections enforcing the no-isolation rule
      - node: ZeroErrorConvergence
        action: enforces that compilation must produce zero errors before audit can proceed
      - node: EarlyTerminationRule
        action: halts the pipeline immediately on error rather than allowing downstream phases to run on bad data
      - node: CompilationResult
        action: produces the compilation result that gates all downstream pipeline phases
