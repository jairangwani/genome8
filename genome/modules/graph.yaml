spec_sections: [2]

nodes:
  NodeDefinition:
    type: process
    description: defines a node with one of 5 universal types (actor, process, artifact, interface, rule) plus name and description
  JourneyDefinition:
    type: process
    description: defines a journey as an ordered sequence of steps, each with a node reference and an action description
  StepDefinition:
    type: process
    description: defines a single journey step binding a node reference to an action, forming a connection to the next step
  ConnectionComputation:
    type: process
    description: derives directed connections between consecutive journey steps, building the edge set of the graph
  CrossModuleRefResolution:
    type: process
    description: resolves node references that use module/NodeName syntax to link nodes across module boundaries
    files: ["src/types.ts"]
  ActorRefResolution:
    type: process
    description: resolves actor references that use _actors/ActorName syntax to link shared actors into journeys
    files: ["src/types.ts"]
  PublishedInterfaceDefinition:
    type: process
    description: defines what a box provides to other boxes as a versioned, hashable set of exported nodes and journeys
  IncrementalMerge:
    type: process
    description: merges a single newly created module into the existing compiled index, adding its nodes, journeys, and connections without full rebuild
  ConnectionDeduplication:
    type: process
    description: merges duplicate directed edges that appear in multiple journeys into unique entries in the ConnectionSet while preserving journey provenance
  BatchMerge:
    type: process
    description: merges multiple newly created modules into the compiled index in a single pass, deferring validation until all modules are integrated
  ScopedValidation:
    type: process
    description: validates only the subgraph affected by a module change, checking rules against changed nodes and their connections rather than the entire graph
  PartialConnectionComputation:
    type: process
    description: recomputes connections only for journeys containing nodes from a changed module, reusing cached connections for unchanged journeys
  FieldPreservation:
    type: process
    description: preserves all YAML fields including unknown or extension fields when a module file is read, modified, and written back, preventing silent data loss on round-trip
  CrossModuleImpactScan:
    type: process
    description: scans all modules' journey steps for cross-module references pointing to a changed module's nodes, identifying which other modules are affected by the change
  ModuleSchemaRule:
    type: rule
    description: enforces that every module file must have the required top-level structure (spec_sections as number array, nodes as a map of name to type+description, journeys as a map of name to steps array)
  NodeTypeSchema:
    type: rule
    description: enforces that every node must be exactly one of the 5 universal types (actor, process, artifact, interface, rule)
  StepFormatRule:
    type: rule
    description: enforces that every journey step must have a node field and an action field, never flat strings
  NoIsolationRule:
    type: rule
    description: every node must participate in at least one journey — no standalone nodes allowed in the graph
  UniqueNodeNameRule:
    type: rule
    description: every node name must be unique across all modules — no two modules may define the same node name
  AllRefsResolveRule:
    type: rule
    description: every node reference in every journey step must resolve to a defined node, actor, or cross-module target
  MinimumStepsRule:
    type: rule
    description: enforces that every journey must have at least 2 steps, since a single-step journey produces no connections and has no graph meaning
  UniqueJourneyNameRule:
    type: rule
    description: enforces that every journey name must be unique across all modules — no two modules may define the same journey name
  ModuleFile:
    type: artifact
    description: a YAML file containing spec_sections, nodes, and journeys that defines one scoped piece of the graph
  CompiledIndex:
    type: artifact
    description: the merged in-memory structure of all modules containing all nodes, journeys, and computed connections
    files: ["src/types.ts"]
  ConnectionSet:
    type: artifact
    description: the set of directed edges derived from consecutive journey steps across all journeys
  NodeRegistry:
    type: artifact
    description: the deduplicated map of all node names to their type and description across all modules
  JourneyRegistry:
    type: artifact
    description: the collection of all journeys with their steps, used for connection computation and test generation

journeys:
  DefineNode:
    steps:
      - node: _actors/HumanDeveloper
        action: writes a node entry in a module YAML file with name, type, and description
      - node: NodeDefinition
        action: parses the node entry and validates it has a name, type, and description
      - node: NodeTypeSchema
        action: checks that the type is one of the 5 universal types
      - node: NodeRegistry
        action: registers the node in the deduplicated map of all nodes

  DefineJourney:
    steps:
      - node: _actors/HumanDeveloper
        action: writes a journey with ordered steps in a module YAML file
      - node: JourneyDefinition
        action: parses the journey entry and validates it has a name and steps array
      - node: StepFormatRule
        action: checks that each step has node and action fields, rejecting flat strings
      - node: StepDefinition
        action: parses each step binding a node reference to an action description
      - node: JourneyRegistry
        action: registers the journey in the collection of all journeys

  AutomatedModuleCreation:
    steps:
      - node: _actors/LLMWorker
        action: writes a complete module YAML file with nodes and journeys during convergence
      - node: ModuleFile
        action: stores the new module on disk
      - node: NodeDefinition
        action: parses all node entries from the new module
      - node: NodeTypeSchema
        action: validates all node types in the new module
      - node: JourneyDefinition
        action: parses all journey entries from the new module
      - node: StepFormatRule
        action: validates all steps have node and action fields
      - node: StepDefinition
        action: parses each step into node reference and action pairs
      - node: convergence/CompileCheck
        action: triggers compilation to validate the new module against the existing graph

  IncrementalGraphBuild:
    steps:
      - node: CompiledIndex
        action: provides the existing compiled graph before the new module
      - node: ModuleFile
        action: provides the newly created module to merge
      - node: NodeDefinition
        action: parses the new module's nodes
      - node: NodeRegistry
        action: adds new nodes to the existing deduplicated map
      - node: JourneyDefinition
        action: parses the new module's journeys
      - node: JourneyRegistry
        action: adds new journeys to the existing collection
      - node: ConnectionComputation
        action: computes connections for the new module's journey steps
      - node: CrossModuleRefResolution
        action: resolves references from the new module to nodes in existing modules
      - node: ActorRefResolution
        action: resolves actor references in the new module's journeys
      - node: ConnectionSet
        action: adds the new edges to the existing connection set
      - node: IncrementalMerge
        action: merges all new nodes, journeys, and connections into the compiled index
      - node: CompiledIndex
        action: updated with the new module's content integrated into the full graph

  ComputeConnections:
    steps:
      - node: JourneyRegistry
        action: provides all journeys with their ordered steps
      - node: ConnectionComputation
        action: walks consecutive step pairs and derives a directed edge for each
      - node: CrossModuleRefResolution
        action: resolves module/NodeName references to nodes in other modules
      - node: ActorRefResolution
        action: resolves _actors/ActorName references to shared actor definitions
      - node: ConnectionSet
        action: stores the complete set of directed edges for the graph

  BuildCompiledIndex:
    steps:
      - node: _actors/Compiler
        action: reads all module YAML files from the modules directory
      - node: ModuleFile
        action: provides raw YAML content for each module
      - node: NodeDefinition
        action: parses every node entry from every module
      - node: NodeTypeSchema
        action: validates all node types are legal
      - node: JourneyDefinition
        action: parses every journey from every module
      - node: StepFormatRule
        action: validates all steps have node and action fields
      - node: ConnectionComputation
        action: computes all connections from all journey steps
      - node: CrossModuleRefResolution
        action: resolves all cross-module node references
      - node: ActorRefResolution
        action: resolves all actor references
      - node: NodeRegistry
        action: builds the deduplicated node map
      - node: JourneyRegistry
        action: builds the journey collection
      - node: ConnectionSet
        action: builds the edge set
      - node: CompiledIndex
        action: merges nodes, journeys, and connections into the final compiled structure

  EnforceNoIsolation:
    steps:
      - node: CompiledIndex
        action: provides the full graph with all nodes and connections
      - node: NoIsolationRule
        action: scans for nodes that appear in no journey and flags them as orphans
      - node: _actors/Compiler
        action: reports orphan nodes as validation errors

  ResolvePublishedInterface:
    steps:
      - node: CompiledIndex
        action: provides the full compiled graph for a box
      - node: PublishedInterfaceDefinition
        action: selects which nodes and journeys to export as the box's public interface
      - node: _actors/DependentBox
        action: references the published interface to connect across box boundaries

  VerifyGraphIntegrity:
    steps:
      - node: _actors/Compiler
        action: initiates a full integrity check on the compiled graph
      - node: CompiledIndex
        action: provides the full graph for verification
      - node: NodeTypeSchema
        action: verifies every node has a valid type
      - node: UniqueNodeNameRule
        action: verifies no duplicate node names exist across all modules
      - node: NodeRegistry
        action: confirms every name in the registry maps to exactly one definition
      - node: StepFormatRule
        action: verifies every journey step has node and action fields
      - node: AllRefsResolveRule
        action: verifies every node reference in every step resolves to a known target
      - node: CrossModuleRefResolution
        action: confirms all cross-module references point to existing nodes
      - node: ActorRefResolution
        action: confirms all actor references point to existing actors
      - node: NoIsolationRule
        action: verifies every node participates in at least one journey
      - node: ConnectionSet
        action: confirms no orphan edges remain pointing to missing nodes
      - node: compilation/CompilationResult
        action: records zero errors, zero orphans, and zero dangling refs as the integrity result

  RemediateOrphanNode:
    steps:
      - node: _actors/Auditor
        action: identifies an orphan node that exists but appears in no journey
      - node: NoIsolationRule
        action: confirms the node violates the no-isolation constraint
      - node: CompiledIndex
        action: provides context about the orphan node's type, module, and neighboring nodes
      - node: excerpt/ExcerptOutput
        action: provides focused context for the module containing the orphan
      - node: _actors/LLMWorker
        action: writes a new journey or adds a step to an existing journey that connects the orphan
      - node: JourneyDefinition
        action: parses the new or updated journey containing the orphan node
      - node: StepDefinition
        action: parses the new step that references the formerly orphan node
      - node: ConnectionComputation
        action: recomputes connections including the new step
      - node: IncrementalMerge
        action: merges the updated journey and connections into the compiled index
      - node: CompiledIndex
        action: updated with the orphan now connected through a journey
      - node: _actors/Compiler
        action: revalidates to confirm the orphan count decreased

  DeduplicateConnections:
    steps:
      - node: JourneyRegistry
        action: provides all journeys whose steps may produce overlapping directed edges
      - node: ConnectionComputation
        action: derives directed edges from all journey steps including potential duplicates
      - node: ConnectionDeduplication
        action: identifies edges that appear in multiple journeys and merges them into unique entries with provenance
      - node: ConnectionSet
        action: stores only unique directed edges with tracking back to their source journeys

  RejectInvalidNodeType:
    steps:
      - node: _actors/HumanDeveloper
        action: writes a node entry with a type value not in the 5 universal types
      - node: NodeDefinition
        action: parses the node entry and extracts the type field
      - node: NodeTypeSchema
        action: rejects the node because the type is not actor, process, artifact, interface, or rule
      - node: _actors/Compiler
        action: reports a validation error identifying the invalid node type and its location

  RejectMalformedStep:
    steps:
      - node: _actors/HumanDeveloper
        action: writes a journey step as a flat string or without the required node and action fields
      - node: JourneyDefinition
        action: parses the journey and encounters the malformed step
      - node: StepFormatRule
        action: rejects the step because it lacks the mandatory node or action field
      - node: _actors/Compiler
        action: reports a validation error identifying the malformed step and its journey

  EnforceMinimumSteps:
    steps:
      - node: JourneyDefinition
        action: parses a journey and finds it has fewer than 2 steps
      - node: MinimumStepsRule
        action: rejects the journey because it cannot produce any connections with fewer than 2 steps
      - node: _actors/Compiler
        action: reports a validation error identifying the journey with insufficient steps

  BatchIncrementalBuild:
    steps:
      - node: CompiledIndex
        action: provides the existing compiled graph as the base for batch integration
      - node: ModuleFile
        action: provides multiple newly created modules queued for merge
      - node: NodeDefinition
        action: parses nodes from all queued modules in a single pass
      - node: NodeRegistry
        action: adds all new nodes to the deduplicated map before any connection computation
      - node: JourneyDefinition
        action: parses journeys from all queued modules
      - node: JourneyRegistry
        action: adds all new journeys to the collection
      - node: ConnectionComputation
        action: computes connections for all new journeys in a single batch
      - node: CrossModuleRefResolution
        action: resolves cross-module references across all queued modules and existing modules
      - node: ActorRefResolution
        action: resolves actor references across all queued modules
      - node: ConnectionDeduplication
        action: deduplicates edges produced by the batch of new journeys
      - node: ConnectionSet
        action: integrates all new edges into the existing connection set
      - node: BatchMerge
        action: merges all queued modules into the compiled index in a single atomic operation
      - node: CompiledIndex
        action: updated with all new modules integrated without intermediate revalidation

  ScopedRevalidation:
    steps:
      - node: CompiledIndex
        action: identifies which nodes and journeys were affected by the latest module change
      - node: ScopedValidation
        action: extracts the subgraph of affected nodes, their journeys, and their connections
      - node: NodeTypeSchema
        action: validates types only for newly added or modified nodes
      - node: UniqueNodeNameRule
        action: checks new node names against the existing registry for collisions
      - node: StepFormatRule
        action: validates step format only in new or modified journeys
      - node: AllRefsResolveRule
        action: checks that references in affected journeys resolve to known targets
      - node: NoIsolationRule
        action: checks that affected nodes still participate in at least one journey
      - node: compilation/CompilationResult
        action: reports validation results scoped to the affected subgraph only

  PartialRecomputeConnections:
    steps:
      - node: CompiledIndex
        action: identifies which module changed and which nodes it defines
      - node: JourneyRegistry
        action: selects only journeys that reference nodes from the changed module
      - node: PartialConnectionComputation
        action: recomputes connections only for the selected journeys
      - node: CrossModuleRefResolution
        action: re-resolves cross-module references in the affected journeys
      - node: ActorRefResolution
        action: re-resolves actor references in the affected journeys
      - node: ConnectionDeduplication
        action: deduplicates recomputed edges against unchanged edges
      - node: ConnectionSet
        action: replaces only the affected edges while preserving all unchanged edges

  EnforceModuleSchema:
    steps:
      - node: ModuleFile
        action: provides the raw YAML content of a module file for structural validation
      - node: ModuleSchemaRule
        action: checks that spec_sections exists and is a number array
      - node: ModuleSchemaRule
        action: checks that nodes exists and is a map where each entry has type and description fields
      - node: ModuleSchemaRule
        action: checks that journeys exists and is a map where each entry has a steps array
      - node: NodeDefinition
        action: validates each node entry has a non-empty description string
      - node: StepFormatRule
        action: validates each step within each journey has node and action fields
      - node: _actors/Compiler
        action: reports schema violations with the specific field path and expected structure

  PreserveFieldsOnRewrite:
    steps:
      - node: ModuleFile
        action: provides the original YAML content of a module before modification
      - node: _actors/LLMWorker
        action: edits the module file to add or modify nodes or journeys
      - node: FieldPreservation
        action: verifies that all fields present in the original file still exist in the rewritten file
      - node: FieldPreservation
        action: verifies that extension fields like files were not stripped during the rewrite
      - node: ModuleSchemaRule
        action: validates the rewritten file still conforms to the required module structure
      - node: ModuleFile
        action: stores the rewritten module only after preservation checks pass

  DetectCrossModuleImpact:
    steps:
      - node: CompiledIndex
        action: identifies which nodes were added, renamed, or removed in the changed module
      - node: JourneyRegistry
        action: provides all journeys across all modules for reference scanning
      - node: CrossModuleImpactScan
        action: scans every journey step for cross-module references targeting the changed module's nodes
      - node: CrossModuleImpactScan
        action: collects the set of other modules whose journeys reference affected nodes
      - node: AllRefsResolveRule
        action: flags cross-module references that now point to renamed or removed nodes as dangling
      - node: compilation/CompilationResult
        action: reports the list of affected modules and their dangling references for targeted revalidation

  PropagateNodeRename:
    steps:
      - node: NodeRegistry
        action: records the old-name-to-new-name mapping for the renamed node
      - node: CrossModuleImpactScan
        action: finds all cross-module references using the old node name across all modules
      - node: JourneyRegistry
        action: identifies specific journeys and steps containing the old reference
      - node: CrossModuleRefResolution
        action: rewrites each old-name reference to the new-name reference in affected journey steps
      - node: ConnectionComputation
        action: recomputes connections for journeys whose steps were updated
      - node: ConnectionSet
        action: replaces edges referencing the old node name with edges using the new name
      - node: CompiledIndex
        action: updated with all references consistently pointing to the renamed node

  RejectDuplicateJourneyName:
    steps:
      - node: _actors/Compiler
        action: reads all module YAML files and collects every journey name with its source module
      - node: JourneyRegistry
        action: detects that two or more modules define a journey with the same name
      - node: UniqueJourneyNameRule
        action: rejects the duplicate because journey names must be unique across all modules
      - node: _actors/Compiler
        action: reports a validation error identifying the duplicate journey name and the conflicting modules

  PropagateNodeRemoval:
    steps:
      - node: NodeRegistry
        action: removes the deleted node from the deduplicated map of all nodes
      - node: JourneyRegistry
        action: identifies all journeys containing steps that reference the removed node
      - node: CrossModuleImpactScan
        action: finds cross-module references from other modules pointing to the removed node
      - node: AllRefsResolveRule
        action: flags every remaining reference to the removed node as dangling
      - node: ConnectionSet
        action: purges all directed edges where the removed node is the source or target
      - node: ConnectionDeduplication
        action: re-deduplicates the connection set after edge removal to maintain provenance accuracy
      - node: CompiledIndex
        action: updated with the node, its edges, and its registry entry fully removed
