  - node: events/EventWatcherSet
    type: added
    impact: 'New artifact: the set of active fs.watch instances monitoring dependency event file paths'
  - node: events/EventPayload
    type: added
    impact: 'New artifact: the parsed content of an event file containing the source box, timestamp, and changed interface hash'
  - node: events/EventLog
    type: added
    impact: >-
      New artifact: append-only log of all received events with timestamps, source boxes, sequence numbers, and
      disposition for observability and debugging
  - node: events/EventDrivenNotPolling
    type: added
    impact: 'New rule: event detection uses fs.watch callbacks only, never periodic polling or timer-based checks'
  - node: events/ZeroCostAtRest
    type: added
