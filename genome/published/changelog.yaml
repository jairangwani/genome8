previous_hash: none
current_hash: sha256:3fac18f704364b040db103148dcab488d7f93ccc9415009c4d547621ebd3f16d
changes:
  - node: actors/DiscoverFromActivities
    type: added
    impact: >-
      New process: analyzes the spec to find actors from the activities perspective — who uses, creates, operates,
      governs, and visits the system
  - node: actors/DiscoverFromThreats
    type: added
    impact: >-
      New process: analyzes the spec to find threat actors — attackers, abusers, failure scenarios, and exploitation
      vectors
  - node: actors/DiscoverFromLifecycle
    type: added
    impact: >-
      New process: analyzes the spec to find lifecycle actors — first visit, onboarding, power use, decline, exit, and
      return
  - node: actors/MergeAndDeduplicate
    type: added
    impact: 'New process: combines actors from all 3 angles, removes duplicates, and keeps the best description for each'
  - node: actors/WriteActorsFile
    type: added
    impact: 'New process: writes the merged actor list to _actors.yaml in the modules directory'
  - node: actors/InheritActorsFromParent
    type: added
    impact: 'New process: copies the parent''s _actors.yaml into a child engine directory so children share the same actor set'
  - node: actors/ValidateActorCoverage
    type: added
    impact: 'New process: checks that every discovered actor appears in at least one journey across all modules'
  - node: actors/ValidateThreeAngleCompleteness
    type: added
    impact: >-
      New process: checks that all 3 discovery angles produced at least one actor each, preventing partial discovery
      from proceeding to merge
  - node: actors/ProvideActorsForModuleCreation
    type: added
    impact: >-
      New process: supplies the actor list to the excerpt generator so module workers know which _actors/ references are
      valid during module creation
  - node: actors/RediscoverActorsOnSpecChange
    type: added
    impact: >-
      New process: re-runs 3-angle discovery when the spec changes during reconvergence, producing a diff of added and
      removed actors against the existing set
  - node: actors/UpdateActorsFileAfterRediscovery
    type: added
    impact: >-
      New process: merges newly discovered actors with the existing set, adding new actors and flagging removed ones for
      orphan detection rather than deleting immediately
  - node: actors/ValidateActorYAMLStructure
    type: added
    impact: >-
      New process: checks that each entry in _actors.yaml has type actor and a non-empty description before the file is
      passed to compilation
  - node: actors/ActorsFile
    type: added
    impact: 'New artifact: the _actors.yaml file containing all discovered actors with type and description'
  - node: actors/ActivitiesActorList
    type: added
    impact: 'New artifact: the list of actors discovered from the activities perspective before merging'
  - node: actors/ThreatsActorList
    type: added
    impact: 'New artifact: the list of actors discovered from the threats perspective before merging'
  - node: actors/LifecycleActorList
    type: added
    impact: 'New artifact: the list of actors discovered from the lifecycle perspective before merging'
  - node: actors/MergedActorList
    type: added
    impact: 'New artifact: the deduplicated combined actor list from all 3 discovery angles'
  - node: actors/ThreeAngleDiscovery
    type: added
    impact: >-
      New rule: actors must be discovered from exactly 3 angles (activities, threats, lifecycle) to ensure comprehensive
      coverage
  - node: actors/ParentDiscoversChildrenInherit
    type: added
    impact: 'New rule: only the parent engine discovers actors — children inherit them to prevent duplication'
  - node: actors/DetectActorImpersonation
    type: added
    impact: >-
      New process: checks that every _actors/ reference in journey steps resolves to a validated actor in the registry,
      flagging references to non-existent or removed actors
  - node: actors/DetectActorDescriptionPoisoning
    type: added
    impact: >-
      New process: scans actor descriptions for adversarial content patterns such as prompt injection fragments, encoded
      instructions, or excessively long text before they are included in excerpt context
  - node: actors/DetectChildActorTampering
    type: added
    impact: >-
      New process: compares a child engine's _actors.yaml content against the parent's original hash to detect
      unauthorized additions, removals, or description modifications
  - node: actors/DetectDiscoveryAngleBias
    type: added
    impact: >-
      New process: checks that no single discovery angle produced more than a threshold proportion of total actors,
      flagging potential angle suppression or spec manipulation
  - node: actors/EnforceActorCountLimit
    type: added
    impact: >-
      New process: caps the maximum number of actors that can be stored in _actors.yaml to prevent graph bloat and
      context window exhaustion from adversarial specs
  - node: audit/CheckSpecCoverage
    type: added
    impact: >-
      New process: auditor 1 compares spec sections against the graph to find sections not represented by any node or
      journey
  - node: audit/CheckActorCoverage
    type: added
    impact: >-
      New process: auditor 2 checks that every actor in _actors.yaml participates in at least one journey across all
      modules
  - node: audit/CheckCrossModuleCoverage
    type: added
    impact: >-
      New process: auditor 3 verifies that every module has at least one cross-module connection and no module is an
      island
  - node: audit/GenerateAuditPrompt
    type: added
    impact: >-
      New process: builds a focused prompt for each auditor containing the compiled graph excerpt and the specific
      coverage angle to check
  - node: audit/CollectAuditFindings
    type: added
    impact: >-
      New process: gathers findings from all 3 auditors into a single list of coverage gaps with locations and
      descriptions
  - node: audit/PrioritizeGaps
    type: added
    impact: 'New process: ranks the collected gaps by severity so the most critical coverage issues are fixed first'
  - node: audit/BuildGapFixPrompt
    type: added
    impact: >-
      New process: builds a targeted fix prompt for each gap specifying exactly which module to edit and what coverage
      to add
  - node: audit/ApplyFix
    type: added
    impact: 'New process: delegates to LLM to edit the specific module YAML file to close the identified coverage gap'
  - node: audit/VerifyFixCompiles
    type: added
    impact: 'New process: runs compile.ts after each fix to ensure the edit did not introduce new errors'
  - node: audit/VerifyGapClosed
    type: added
    impact: 'New process: re-runs the specific auditor that found the gap to confirm the fix actually closed it'
  - node: audit/DeclareConverged
    type: added
    impact: 'New process: marks the graph as CONVERGED after all 3 auditors report zero gaps and compilation shows zero errors'
  - node: audit/SelectNextGapToFix
    type: added
    impact: >-
      New process: picks the highest-priority unfixed gap from the prioritized list and advances the pointer to the next
      gap
  - node: audit/ProvideFixContext
    type: added
    impact: >-
      New process: assembles the target module excerpt, the specific gap description, and surrounding graph context into
      a complete fix payload for the LLM worker
  - node: audit/MergeAuditReports
    type: added
    impact: >-
      New process: combines the 3 individual coverage reports into a unified view with normalized gap format before
      feeding into findings collection
  - node: audit/ConfirmAllGapsResolved
    type: added
    impact: >-
      New process: checks that the re-audit findings list is empty and compilation is clean before allowing convergence
      declaration to proceed
  - node: audit/DetectFixInducedErrors
    type: added
    impact: >-
      New process: compares pre-fix and post-fix compilation results to detect new orphans, duplicates, or dangling refs
      that did not exist before the fix was applied
  - node: audit/DetectFixInducedGaps
    type: added
    impact: >-
      New process: compares pre-fix and post-fix audit findings to detect new coverage gaps opened by a fix that closed
      a different gap
  - node: audit/RejectAndRevertFix
    type: added
    impact: >-
      New process: restores the target module to its pre-fix state when a fix introduced new errors or failed to close
      the target gap
  - node: audit/ValidateGraphInvariantsPostFix
    type: added
    impact: >-
      New process: checks all convergence invariants after a fix round including zero errors, zero orphans, zero
      duplicates, and zero isolated modules
  - node: audit/DetectSelfAuditTarget
    type: added
    impact: >-
      New process: detects when a coverage gap targets audit.yaml itself, flagging the meta-circular dependency so the
      fix process applies extra safeguards
  - node: audit/ValidateAuditModulePresence
    type: added
    impact: >-
      New process: checks that audit.yaml exists as a compiled module in the index since it is infrastructure required
      for the convergence pipeline to function
  - node: audit/DetectSpecChangeToAuditSections
    type: added
    impact: >-
      New process: detects when spec sections referenced by audit.yaml have changed, triggering re-evaluation of audit
      coverage requirements against the updated spec
  - node: audit/ScopeFixToAvoidAuditBreak
    type: added
    impact: >-
      New process: when a fix targets audit.yaml, validates that the proposed edit does not remove or break existing
      audit processes like CheckSpecCoverage, VerifyFixCompiles, or DeclareConverged
  - node: audit/ReauditAfterSelfFix
    type: added
    impact: >-
      New process: after a fix modifies audit.yaml, re-runs the full audit pipeline from scratch to verify the self-fix
      did not invalidate audit's own integrity
  - node: audit/AuditFindingsList
    type: added
    impact: 'New artifact: the collected list of coverage gaps from all 3 auditors with gap type, location, and description'
  - node: audit/SpecCoverageReport
    type: added
    impact: >-
      New artifact: auditor 1's report listing which spec sections are covered and which have no representation in the
      graph
  - node: audit/ActorCoverageReport
    type: added
    impact: 'New artifact: auditor 2''s report listing which actors participate in journeys and which are orphaned'
  - node: audit/CrossModuleCoverageReport
    type: added
    impact: 'New artifact: auditor 3''s report listing which modules have cross-module connections and which are isolated'
  - node: audit/TrackAuditRound
    type: added
    impact: >-
      New artifact: records the current audit-fix-reaudit cycle number and cumulative gaps fixed for progress tracking
      and termination decisions
  - node: audit/ExactlyThreeAuditors
    type: added
    impact: >-
      New rule: depth audit always uses exactly 3 auditors checking spec coverage, actor coverage, and cross-module
      coverage
  - node: audit/TargetedFixesOnly
    type: added
    impact: >-
      New rule: audit gaps are fixed with targeted edits to specific modules, never by re-running the full creation
      pipeline
  - node: audit/AuditAfterZeroErrors
    type: added
    impact: 'New rule: audit only runs after compile.ts reports 0 errors and 0 orphans — never on a broken graph'
  - node: audit/AuditRoundLimit
    type: added
    impact: >-
      New rule: audit-fix-reaudit cycles are capped at a maximum number of rounds to prevent infinite loops when gaps
      cannot be resolved
  - node: codegen/ReadConvergedGraph
    type: added
    impact: >-
      New process: reads the compiled index after convergence to extract all nodes with their types and descriptions for
      skeleton generation
  - node: codegen/GenerateProcessSkeletons
    type: added
    impact: >-
      New process: creates TypeScript function stubs for each process node with name, parameters inferred from
      connections, and return type
  - node: codegen/GenerateArtifactSkeletons
    type: added
    impact: >-
      New process: creates TypeScript interface and class stubs for each artifact node with fields inferred from journey
      usage
  - node: codegen/GenerateInterfaceSkeletons
    type: added
    impact: 'New process: creates TypeScript API endpoint or handler stubs for each interface node'
  - node: codegen/GenerateRuleSkeletons
    type: added
    impact: 'New process: creates TypeScript validation function stubs for each rule node with the constraint logic left empty'
  - node: codegen/MapConnectionsToImports
    type: added
    impact: 'New process: reads cross-module connections to generate import statements linking skeleton files across modules'
  - node: codegen/AssembleModuleFile
    type: added
    impact: >-
      New process: combines all skeletons for a single module into one TypeScript file with imports, types, and function
      stubs
  - node: codegen/FillImplementation
    type: added
    impact: >-
      New process: delegates to LLM to fill the empty function bodies and class methods in a skeleton file with working
      code
  - node: codegen/WriteGeneratedFile
    type: added
    impact: 'New process: writes the filled TypeScript file to disk in the generated code output directory'
  - node: codegen/ValidateFilledSyntax
    type: added
    impact: >-
      New process: runs a TypeScript syntax and type check on the filled source file to catch LLM-generated errors
      before staging
  - node: codegen/StageFilledModule
    type: added
    impact: >-
      New process: writes the validated filled file to the staging directory rather than directly to the final output,
      allowing review before commit
  - node: codegen/SelectNextModuleToFill
    type: added
    impact: 'New process: picks the next unfilled module from the dependency-ordered build list and advances the pointer'
  - node: codegen/ConfirmAllModulesFilled
    type: added
    impact: >-
      New process: checks that every module in the dependency-ordered build list has a filled source file on disk before
      signaling codegen completion
  - node: codegen/ProvideCodegenExcerpt
    type: added
    impact: >-
      New process: assembles codegen-specific excerpt context including node descriptions, journey flows, and
      cross-module imports to guide the LLM fill
  - node: codegen/RetryFillWithErrorFeedback
    type: added
    impact: >-
      New process: sends the syntax or type errors from a failed fill back to the LLM as feedback and re-requests the
      fill with the original skeleton plus the error context
  - node: codegen/DetectWorkerCrashDuringFill
    type: added
    impact: >-
      New process: detects that the LLM worker process crashed, timed out, or disconnected during a fill task before the
      result was fully received
  - node: codegen/ResumeFromLastFilledModule
    type: added
    impact: >-
      New process: on restart after a partial crash, scans the generated code directory to find which modules already
      have filled files and resumes from the next unfilled module in build order
  - node: codegen/SkipAndDeferFailedModule
    type: added
    impact: >-
      New process: when a module fill fails after retries, skips it and continues with independent modules that do not
      depend on the failed one, deferring it for a later attempt
  - node: codegen/RollbackCorruptedFill
    type: added
    impact: >-
      New process: reverts a filled file back to its skeleton state when the fill passes syntax check but causes type
      errors in dependent modules downstream
  - node: codegen/SkeletonFile
    type: added
    impact: 'New artifact: a TypeScript file containing empty stubs for all nodes in a module, ready for LLM to fill'
  - node: codegen/FilledSourceFile
    type: added
    impact: 'New artifact: a TypeScript file with LLM-filled implementations for all node stubs in a module'
  - node: codegen/GeneratedCodeDirectory
    type: added
    impact: 'New artifact: the output directory containing all generated TypeScript files organized by module'
  - node: codegen/CodeComesFromNodes
    type: added
    impact: >-
      New rule: every generated function, class, or interface maps directly to a node in the graph — no code exists
      without a node
  - node: codegen/SkeletonBeforeFill
    type: added
    impact: >-
      New rule: code generation always produces empty skeletons first, then LLM fills — never asks LLM to generate from
      scratch
  - node: compilation/YAMLParsing
    type: added
    impact: 'New process: reads raw YAML module files from disk and parses them into structured data'
  - node: compilation/DuplicateDetection
    type: added
    impact: 'New process: scans the node registry for duplicate node names across all modules'
  - node: compilation/DanglingRefDetection
    type: added
    impact: 'New process: checks every journey step node reference and flags those that resolve to no known node'
  - node: compilation/OrphanDetection
    type: added
    impact: 'New process: identifies nodes that are defined but never referenced in any journey step'
  - node: compilation/IsolatedModuleDetection
    type: added
    impact: 'New process: finds modules whose nodes have zero connections to nodes in any other module'
  - node: compilation/ExternalRefClassification
    type: added
    impact: 'New process: classifies unresolved refs as external sibling-engine references and emits warnings instead of errors'
  - node: compilation/YAMLErrorReporting
    type: added
    impact: 'New process: catches and reports YAML syntax errors with file name and line number for each malformed module'
  - node: compilation/ValidationAggregation
    type: added
    impact: 'New process: collects all errors and warnings from all validation checks into a single compilation result'
  - node: compilation/IncrementalValidation
    type: added
    impact: >-
      New process: validates only the newly added module against the existing graph, checking for new duplicates,
      dangling refs, and type errors without full rebuild
  - node: compilation/SkipMalformedModule
    type: added
    impact: >-
      New process: excludes a module with fatal YAML parse errors from the compiled index, allowing compilation of
      remaining modules to continue
  - node: compilation/ValidateModuleCompleteness
    type: added
    impact: >-
      New process: checks that every module listed in ORGANIZATION.md exists as a compiled module in the index, ensuring
      no module was missed during bounded creation
  - node: compilation/CompilationResult
    type: added
    impact: >-
      New artifact: the output of compile.ts containing error count, warning count, orphan list, duplicate list, and
      dangling ref list
  - node: compilation/ErrorReport
    type: added
    impact: 'New artifact: structured list of all validation errors with type, location, and message for each'
  - node: compilation/WarningReport
    type: added
    impact: 'New artifact: structured list of all warnings including external refs that parent will validate later'
  - node: compilation/CompileCLI
    type: added
    impact: 'New interface: command-line interface to run compile.ts and receive validation output'
  - node: compilation/ZeroErrorConvergence
    type: added
    impact: 'New rule: convergence requires compile.ts to report exactly 0 errors and 0 orphans before proceeding'
  - node: compilation/ExternalRefsAreWarnings
    type: added
    impact: 'New rule: unresolved refs to sibling engines are warnings in children, errors only at parent level'
  - node: convergence/ReadSpec
    type: added
    impact: 'New process: reads spec.md from disk as the sole human input to the convergence pipeline'
  - node: convergence/WriteOrganization
    type: added
    impact: >-
      New process: delegates to LLM to analyze the spec and write ORGANIZATION.md with modules, dependencies, and
      independence
  - node: convergence/DiscoverActors
    type: added
    impact: >-
      New process: delegates to LLM to discover actors from 3 angles (activities, threats, lifecycle) and write
      _actors.yaml
  - node: convergence/HierarchyDecision
    type: added
    impact: >-
      New process: delegates to LLM to decide whether the module set should split into child engines based on
      independence analysis
  - node: convergence/ModuleCreation
    type: added
    impact: 'New process: iterates over modules from ORGANIZATION.md, making one LLM call per module with compile between each'
  - node: convergence/BoundedCreationLoop
    type: added
    impact: 'New process: creates modules in build-order rounds, compiling after each to catch errors before the next module'
  - node: convergence/CompileCheck
    type: added
    impact: 'New process: invokes compile.ts after each module creation and after all modules to verify 0 errors and 0 orphans'
  - node: convergence/TargetedAudit
    type: added
    impact: >-
      New process: dispatches 3 auditors to check spec coverage, actor coverage, and cross-module coverage after
      compilation passes
  - node: convergence/AuditGapFix
    type: added
    impact: >-
      New process: takes audit findings and makes targeted LLM calls to fix specific coverage gaps without re-creating
      from scratch
  - node: convergence/RecompileAfterFix
    type: added
    impact: 'New process: runs compile.ts again after audit fixes to verify the fixes did not introduce new errors'
  - node: convergence/ReauditAfterFix
    type: added
    impact: 'New process: runs targeted audit again after successful recompile to verify gaps are closed'
  - node: convergence/TriggerPublish
    type: added
    impact: 'New process: invokes publish.ts to generate interface.yaml and changelog.yaml after convergence is confirmed'
  - node: convergence/TriggerCodegen
    type: added
    impact: 'New process: invokes codegen.ts to generate TypeScript skeletons from the converged graph'
  - node: convergence/TriggerTestgen
    type: added
    impact: 'New process: invokes testgen.ts to generate test skeletons from journey steps'
  - node: convergence/ExecuteTests
    type: added
    impact: 'New process: executes generated tests and collects pass/fail results'
  - node: convergence/FixTestFailures
    type: added
    impact: 'New process: delegates to LLM to fix failing tests and re-runs until all pass'
  - node: convergence/EnterSleepMode
    type: added
    impact: 'New process: sets up fs.watch on event files and enters zero-cost sleep until a change event arrives'
  - node: convergence/WakeOnEvent
    type: added
    impact: 'New process: wakes from sleep when fs.watch detects an event file change from a dependency'
  - node: convergence/TargetedReconvergence
    type: added
    impact: 'New process: runs compile + audit on only the stale modules identified by sync, skipping full creation'
  - node: convergence/MapPerspectives
    type: added
    impact: >-
      New process: identifies which perspectives are relevant to each module based on its content domain and assigns the
      bounded set of lenses
  - node: convergence/ExamineFromPerspective
    type: added
    impact: >-
      New process: delegates to LLM to examine a single module from a single perspective and add missing nodes and
      journeys
  - node: convergence/RetryModuleCreation
    type: added
    impact: >-
      New process: retries module creation by passing the compilation error report to the LLM so it can fix the specific
      problems in its output
  - node: convergence/RollbackFailedFix
    type: added
    impact: 'New process: reverts a module file to its pre-fix state when an audit fix introduced new compilation errors'
  - node: convergence/ResumePipeline
    type: added
    impact: >-
      New process: reads ConvergenceState on startup to find the last completed pipeline step and resumes execution from
      that point
  - node: convergence/DetectWorkerFailure
    type: added
    impact: 'New process: detects when the LLM worker process has crashed or become unresponsive during a task'
  - node: convergence/RespawnWorker
    type: added
    impact: 'New process: terminates the failed worker process and spawns a fresh one with the same task context'
  - node: convergence/ValidateCreationCompleteness
    type: added
    impact: >-
      New process: checks that every module listed in ORGANIZATION.md exists as a YAML file on disk after the creation
      pipeline finishes
  - node: convergence/ValidatePerspectiveCompleteness
    type: added
    impact: 'New process: checks that every module-perspective pair in the mapping was examined during the enrichment pipeline'
  - node: convergence/ValidateActorCompleteness
    type: added
    impact: >-
      New process: checks that all 3 actor discovery angles produced results and the merged _actors.yaml covers
      activities, threats, and lifecycle
  - node: convergence/PipelineInvariantCheck
    type: added
    impact: >-
      New process: verifies that all pipeline phases completed in the correct order before allowing convergence to be
      declared
  - node: convergence/HandleWorkerCompaction
    type: added
    impact: >-
      New process: orchestrates context compaction in the LLM worker during long creation or enrichment loops so the
      pipeline continues without losing progress
  - node: convergence/SplitIntoChildEngines
    type: added
    impact: >-
      New process: distributes modules to child engines and spawns independent convergence pipelines when hierarchy
      decides to split
  - node: convergence/CollectChildResults
    type: added
    impact: >-
      New process: waits for all child engines to converge and collects their published interfaces for parent-level
      cross-engine validation
  - node: convergence/DetectSelfModification
    type: added
    impact: >-
      New process: detects when reconvergence would modify modules that describe the currently running pipeline such as
      convergence, compilation, or graph
  - node: convergence/StageGeneratedCode
    type: added
    impact: >-
      New process: writes codegen output to a staging directory instead of overwriting the running code, so the active
      pipeline is not modified mid-run
  - node: convergence/SwapGeneratedCode
    type: added
    impact: >-
      New process: atomically replaces the running code with the staged generated code after all tests pass on the
      staged version
  - node: convergence/ValidateSelfConsistency
    type: added
    impact: >-
      New process: checks that self-referential modules accurately describe the behavior of the running code they were
      generated from
  - node: convergence/SpecFile
    type: added
    impact: 'New artifact: the spec.md file written by the ProjectOwner as the sole human input'
  - node: convergence/ConvergenceState
    type: added
    impact: 'New artifact: tracks current pipeline step, completed modules, audit results, and convergence status'
  - node: convergence/StagingDirectory
    type: added
    impact: 'New artifact: temporary directory holding generated code that will replace the running code after tests pass'
  - node: convergence/ConvergenceCLI
    type: added
    impact: 'New interface: command-line interface to trigger and monitor the convergence pipeline'
  - node: convergence/CodeOrchestratesLLMCreates
    type: added
    impact: 'New rule: code decides WHEN to act, LLM only creates content when explicitly asked by code'
  - node: convergence/BoundedCreationRule
    type: added
    impact: 'New rule: creation is bounded by modules times relevant lenses, never an open-ended loop'
  - node: convergence/NeverOpenEndedLoop
    type: added
    impact: 'New rule: LLM is never asked open-ended questions in a loop — bounded creation plus targeted fixes only'
  - node: convergence/DataDecidesWhenToStop
    type: added
    impact: 'New rule: no hardcoded limits on module count or audit rounds — the data determines convergence'
  - node: convergence/OnlyHumanInputIsSpec
    type: added
    impact: 'New rule: spec.md is the only human-written input, everything else is auto-generated'
  - node: convergence/BoundedRetryRule
    type: added
    impact: 'New rule: retry attempts for any single module creation or fix are capped to prevent infinite retry loops'
  - node: convergence/AllPhasesCompleteRule
    type: added
    impact: >-
      New rule: convergence requires organization, actors, hierarchy, creation, perspectives, compilation, and audit all
      recorded as complete in ConvergenceState
  - node: convergence/NeverModifyRunningCode
    type: added
    impact: >-
      New rule: generated code must be staged and tested before replacing the running pipeline code — never overwrite in
      place
  - node: events/RegisterEventWatchers
    type: added
    impact: 'New process: sets up fs.watch on each dependency''s event file directory to monitor for new publish events'
  - node: events/DetectEventFileChange
    type: added
    impact: 'New process: receives a filesystem notification from fs.watch when an event file is created or modified'
  - node: events/ReadEventFile
    type: added
    impact: 'New process: reads the contents of the changed event file to determine which dependency published and what changed'
  - node: events/DelegateToSync
    type: added
    impact: 'New process: passes the event data to sync.ts to check dependency hashes and find affected modules'
  - node: events/EnterSleep
    type: added
    impact: >-
      New process: suspends the engine process after all watchers are registered, consuming zero CPU until an event
      arrives
  - node: events/WakeFromSleep
    type: added
    impact: >-
      New process: resumes the engine process when fs.watch fires a callback, transitioning from sleep to active
      processing
  - node: events/DeregisterEventWatchers
    type: added
    impact: 'New process: tears down all fs.watch watchers when the engine shuts down or the box is removed'
  - node: events/DebounceEvents
    type: added
    impact: 'New process: batches rapid successive events into a single sync trigger to avoid redundant reconvergence'
  - node: events/PropagateRipple
    type: added
    impact: >-
      New process: after this box reconverges and republishes, its own event file triggers watchers in downstream
      dependents
  - node: events/ValidateEventFileFormat
    type: added
    impact: >-
