    type: added
    impact: 'New process: writes stale markers on affected modules so targeted reconvergence knows which modules to reprocess'
  - node: sync/UpdateStoredHashes
    type: added
    impact: 'New process: writes the new dependency hashes to local storage after successful reconvergence'
  - node: sync/SkipIfAllCurrent
    type: added
    impact: 'New process: aborts the sync check early if all dependency hashes match, avoiding unnecessary work'
  - node: sync/ParseEventPayload
    type: added
    impact: >-
      New process: extracts the changelog summary, interface hash, ripple origin chain, and sequence number from the
      incoming event file
  - node: sync/FilterUnrelatedChanges
    type: added
    impact: >-
      New process: compares the changelog's changed node and journey names against local cross-module references and
      discards dependency changes that no local module references
  - node: sync/ComputeStaleModuleCount
    type: added
    impact: >-
