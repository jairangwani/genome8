  - node: events/HandleInvalidEventPayload
    type: added
    impact: >-
      New process: catches validation failures when the event file exists but contains malformed JSON, missing required
      fields, or unparseable values and produces a structured error
  - node: events/ReregisterCrashedWatcher
    type: added
    impact: >-
