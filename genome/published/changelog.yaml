      the OS kernel when a box has many dependencies
  - node: events/TruncateEventLog
    type: added
    impact: >-
      New process: removes the oldest entries from the event log when it exceeds a configured maximum entry count,
      preserving only the most recent entries
  - node: events/PrioritizeEventsByImpact
    type: added
