  - node: events/DetectSyncDelegationFailure
    type: added
    impact: >-
      New process: catches errors thrown by sync.ts when it fails to process the delegated event such as unreachable
      dependency interface or hash store corruption
  - node: events/LogEventFailure
    type: added
    impact: >-
      New process: records event processing failures with error type, source dependency, failing step, and stack trace
      into the event log for diagnosis
  - node: events/RetryEventProcessing
    type: added
