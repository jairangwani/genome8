  - node: sync/FetchDependencyHash
    type: added
    impact: 'New process: reads the SHA256 hash from each dependency''s published interface.yaml'
  - node: sync/CompareStoredHash
    type: added
    impact: 'New process: compares each fetched dependency hash against the locally stored hash from the last sync'
  - node: sync/IdentifyStaleDependencies
    type: added
    impact: 'New process: collects all dependencies whose hash has changed since the last sync'
  - node: sync/FindAffectedModules
    type: added
    impact: 'New process: traces which local modules reference nodes from the changed dependencies and marks them as stale'
