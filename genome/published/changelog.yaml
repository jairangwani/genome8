previous_hash: sha256:3fac18f704364b040db103148dcab488d7f93ccc9415009c4d547621ebd3f16d
current_hash: sha256:6e1bc3867a252899a80719ebf58a531731d550972337da581fd6f3d055e1af92
changes:
  - node: compilation/StaleConnectionDetection
    type: added
    impact: >-
      New process: validates that every edge in the ConnectionSet has both source and target nodes present in the
      NodeRegistry, catching connections left stale after node removal or module rewrite
  - node: compilation/CompilationResultComparison
    type: added
    impact: >-
      New process: compares two CompilationResults or CompiledIndexes field by field for structural equality, flagging
      any differences as non-determinism or merge-order drift
  - node: compilation/ParallelValidationDispatch
    type: added
    impact: >-
      New process: dispatches independent validation checks (duplicates, dangling refs, orphans, isolation, stale
      connections) concurrently on the same CompiledIndex and collects their ErrorReports when all complete
  - node: compilation/DirtyModuleTracking
    type: added
    impact: >-
      New process: tracks which modules changed since the last successful compilation and identifies their cross-module
      dependents, enabling targeted revalidation instead of full recompilation
  - node: compilation/SchemaViolationDetection
    type: added
    impact: >-
      New process: validates each parsed module file has the required top-level structure (spec_sections as number
      array, nodes as map, journeys as map) before content parsing proceeds
  - node: compilation/FieldLossDetection
    type: added
    impact: >-
      New process: compares a module file before and after an LLM rewrite to detect any fields (including extension
      fields like files) that were silently dropped during the edit
  - node: compilation/ValidateDescriptionQuality
    type: added
    impact: >-
      New process: checks that every node has a meaningful description string, flagging nodes with empty or too-short
      descriptions
  - node: compilation/DeterministicOrdering
    type: added
    impact: >-
      New rule: all output lists in CompilationResult, ErrorReport, and WarningReport are sorted by a canonical key
      (module name, then node name, then journey name) so file system read order and check execution order never affect
      the output
  - node: compilation/EarlyTerminationRule
    type: added
    impact: >-
      New rule: halts remaining validation checks when accumulated error count exceeds a configurable threshold,
      returning the partial result immediately to avoid wasted work on a clearly failing compilation
  - node: compilation/ValidateActionQuality
    type: added
    impact: >-
      New process: checks that every journey step has a meaningful action description, flagging steps with empty or
      too-short actions
  - node: convergence/DetectAuditCycleExhaustion
    type: added
    impact: >-
      New process: detects when audit-fix-reaudit cycles have reached the audit round limit without converging to zero
      gaps, halting further audit cycles
  - node: convergence/DetectWakeOscillation
    type: added
    impact: >-
      New process: detects when the sleep-wake-reconverge-publish cycle has repeated beyond the oscillation threshold,
      suppressing further wake responses
  - node: convergence/DetectEnrichmentExhaustion
    type: added
    impact: >-
      New process: detects when a perspective enrichment pass has exhausted its retry budget after repeated compilation
      failures on the same module-perspective pair
  - node: convergence/DetectPipelineStall
    type: added
    impact: >-
      New process: detects when the overall pipeline has not made measurable forward progress across consecutive cycles,
      indicating a stuck state requiring human intervention
  - node: convergence/VerifyReconvergenceIdempotency
    type: added
    impact: >-
      New process: runs targeted reconvergence a second time on the same stale module set and compares the resulting
      graph against the first pass to confirm no additional changes were introduced
  - node: convergence/VerifyAuditDeterminism
    type: added
    impact: >-
      New process: runs the same 3 auditors twice on an identical compiled graph and compares the two sets of findings
      to detect non-deterministic audit results from LLM-based auditors
  - node: convergence/VerifyPublishDeterminism
    type: added
    impact: >-
      New process: runs publish twice on the same converged graph and compares the interface.yaml and changelog.yaml
      outputs byte-for-byte to confirm deterministic publish output
  - node: convergence/VerifyEnrichmentStability
    type: added
    impact: >-
      New process: re-examines an already-enriched module from the same perspective and verifies the LLM proposes no
      further additions, confirming the enrichment reached a stable fixpoint
  - node: convergence/VerifyConvergenceStateDeterminism
    type: added
    impact: >-
      New process: compares two ConvergenceState snapshots produced from identical spec inputs to confirm the pipeline
      produces deterministic end states regardless of timing or execution order
  - node: convergence/ParallelModuleCreation
    type: added
    impact: >-
      New process: identifies modules at the same dependency depth that have no dependencies on each other and
      dispatches their creation to separate workers concurrently, compiling after each batch completes
  - node: convergence/ParallelPerspectiveEnrichment
    type: added
    impact: >-
      New process: identifies independent module-perspective pairs that touch no overlapping modules and dispatches
      their enrichment to separate workers concurrently, compiling after each batch completes
  - node: convergence/ChunkLargeSpec
    type: added
    impact: >-
      New process: splits a spec that exceeds the LLM context limit into overlapping sections with shared context
      headers so each chunk can be processed independently while preserving cross-section references
  - node: convergence/ThrottleWakeEvents
    type: added
    impact: >-
      New process: limits the number of concurrent wake-reconverge cycles when many dependencies publish events
      simultaneously, queuing excess events for sequential processing after the current batch
  - node: convergence/ValidateConvergenceStateIntegrity
    type: added
    impact: >-
      New process: reads the ConvergenceState file on startup and validates its structure including required fields,
      valid phase values, and consistent module lists before the pipeline trusts it
  - node: convergence/RecoverFromCorruptState
    type: added
    impact: >-
      New process: rebuilds ConvergenceState from disk artifacts when the state file is missing, corrupted, or
      structurally invalid by scanning existing module files, compilation results, and published interfaces
  - node: convergence/DetectPartialModuleWrite
    type: added
    impact: >-
      New process: scans module YAML files on disk for truncation or structural damage such as missing required fields
      or broken YAML syntax that could result from a crash during a write operation
  - node: convergence/RecoverSleepWatcher
    type: added
    impact: >-
      New process: detects that the fs.watch file watcher has stopped firing events by using a periodic heartbeat check
      and restarts the watcher to ensure the box does not silently stop monitoring dependency changes
  - node: convergence/RecoverFromChildEngineCrash
    type: added
    impact: >-
      New process: detects when a child engine process has crashed during a hierarchy split and restarts the child from
      its scoped spec and last known module state or escalates to the parent for manual review
  - node: convergence/ConcurrentChildLimit
    type: added
    impact: >-
      New rule: caps the number of child engine processes that can run simultaneously during hierarchy splits, queuing
      remaining children until a running child completes
  - node: convergence/ReconvergenceDepthLimit
    type: added
    impact: >-
      New rule: enforces a maximum nesting depth for targeted reconvergence chains to prevent unbounded
      reconvergence-triggers-reconvergence loops
  - node: events/CrossCheckEventHashAgainstInterface
    type: added
    impact: >-
      New process: fetches the dependency's actual interface.yaml from disk and compares its hash against the hash
      claimed in the event payload to detect stale or spoofed events
  - node: events/DetectDuplicateEventSequence
    type: added
    impact: >-
      New process: compares the incoming event's sequence number against the last-processed sequence for that dependency
      and suppresses the event if the sequence was already processed
  - node: events/DetectMissedEventSequenceGap
    type: added
    impact: >-
      New process: compares the incoming event's sequence number against the last-processed sequence for that dependency
      and flags a gap when numbers are not consecutive
  - node: events/DetectPartiallyWrittenEventFile
    type: added
    impact: >-
      New process: checks that the event file is complete by verifying it ends with valid JSON closure and its byte
      length matches the content-length header if present before parsing
  - node: events/ValidateEventHashFormat
    type: added
    impact: >-
      New process: enforces that the interface hash field in the event payload is a non-empty string matching the
      expected SHA256 hex format before passing to sync
  - node: events/ReadEventFilesInParallel
    type: added
    impact: >-
      New process: reads multiple event files concurrently with a configurable concurrency limit during batch processing
      to reduce total IO wait time when many dependencies change at once
  - node: events/EnforceEventProcessingTimeout
    type: added
    impact: >-
      New process: applies a configurable deadline to the sync delegation and reconvergence cycle for a single event and
      cancels the operation if the timeout is exceeded to prevent pipeline stalls
  - node: events/ShedLowPriorityEventsUnderLoad
    type: added
    impact: >-
      New process: drops lowest-impact events from the processing queue when the pending event count exceeds a
      backpressure threshold to maintain system responsiveness during sustained cascading ripples
  - node: events/PartitionEventsByDependencySubgraph
    type: added
    impact: >-
      New process: groups batched events into independent partitions based on which local modules they affect so that
      unrelated partitions can be processed concurrently without conflicting stale marks
  - node: events/SpillBatchPayloadsToDisk
    type: added
    impact: >-
      New process: writes excess parsed event payloads to temporary disk storage when the in-memory batch exceeds a
      configurable payload count threshold and reads them back during sync delegation
  - node: events/EventBackpressureThreshold
    type: added
    impact: >-
      New rule: enforces a maximum number of pending events in the processing queue and triggers load shedding when
      exceeded to prevent memory exhaustion and pipeline stalls during cascading ripples
  - node: excerpt/ValidateCrossModuleRefIntegrity
    type: added
    impact: >-
      New process: checks that every cross-module node reference included in the excerpt resolves to an actual node in
      the compiled index, flagging dangling references to deleted or renamed nodes
  - node: excerpt/ValidateExcerptCompleteness
    type: added
    impact: >-
      New process: checks that the assembled excerpt contains all mandatory sections for the target module, flagging
      missing local nodes, journeys, or cross-module connections that exist in the compiled index but were not collected
  - node: excerpt/DetectMissingModuleSource
    type: added
    impact: >-
      New process: detects when the target module's YAML file does not exist on disk or is empty, switching to a
      compiled-index-only excerpt that omits the YOUR FILE section
  - node: excerpt/DetectStaleExcerptAtConsumption
    type: added
    impact: >-
      New process: compares the compiled index hash embedded in a cached excerpt against the current compiled index hash
      at the moment a worker consumes it, detecting staleness from intervening graph changes
  - node: excerpt/ValidateExcerptSectionOrder
    type: added
    impact: >-
      New process: checks that the assembled excerpt presents sections in the expected order so the LLM worker can parse
      it reliably, flagging misordered or duplicated sections
  - node: excerpt/CollectSpecSectionText
    type: added
    impact: >-
      New process: reads the spec document and extracts the full text of the sections listed in the target module's
      spec_sections field, providing the authoritative spec content the module must cover
  - node: excerpt/MapNodesToSpecConcepts
    type: added
    impact: >-
      New process: maps each node in the target module to the spec concepts it addresses by matching node descriptions
      against key terms and requirements from the assigned spec sections
  - node: excerpt/DetectUncoveredSpecConcepts
    type: added
    impact: >-
      New process: compares the set of spec concepts from the assigned sections against the mapped node coverage and
      identifies concepts that have no corresponding node or journey in the module
  - node: excerpt/ValidateSpecSectionBoundary
    type: added
    impact: >-
      New process: checks that the target module's nodes and journeys address only concepts from its assigned
      spec_sections, flagging content that belongs to a different module's spec scope
  - node: excerpt/CollectSpecCoverageMapping
    type: added
    impact: >-
      New process: assembles a compact traceability section showing which spec concepts are covered by which nodes and
      journeys, and which concepts remain uncovered
  - node: excerpt/SortCollectedItemsDeterministically
    type: added
    impact: >-
      New process: sorts all collected nodes, journeys, connections, actors, and warnings into a stable alphabetical
      order before assembly, ensuring identical ordering across runs regardless of map iteration or filesystem
      enumeration order
  - node: excerpt/VerifyExcerptReproducibility
    type: added
    impact: >-
      New process: generates the excerpt a second time from the same inputs and compares the two outputs byte-for-byte,
      detecting non-determinism in the generation pipeline
  - node: excerpt/DeduplicateCacheWrite
    type: added
    impact: >-
      New process: before writing a new excerpt to the cache, checks if an identical entry already exists at the same
      module-plus-hash key and skips the write if the content matches, preventing redundant cache churn
  - node: excerpt/DeterministicTruncationBoundary
    type: added
    impact: >-
      New process: when truncation must cut within a section, always cuts at the last complete entry boundary rather
      than at an arbitrary line count, ensuring the same input always produces the same truncation point
  - node: excerpt/NormalizeSpecSectionBoundaries
    type: added
    impact: >-
      New process: normalizes spec section boundary detection by trimming whitespace, standardizing heading formats, and
      using exact section number matching, ensuring the same spec text is extracted regardless of minor formatting
      variations
  - node: excerpt/BatchGenerateExcerpts
    type: added
    impact: >-
      New process: generates excerpts for multiple target modules in a single pass, sharing the compiled index lookup
      and global stats collection across all targets instead of repeating them per module
  - node: excerpt/CollapseDeepHierarchyConnections
    type: added
    impact: >-
      New process: when cross-module connections span multiple hierarchy levels, collapses transitive edges into
      summarized paths showing the chain of boxes rather than listing every intermediate connection
  - node: excerpt/SummarizeOversizedSpecSection
    type: added
    impact: >-
      New process: when a single spec section exceeds a line threshold, produces a condensed summary of key concepts and
      requirements instead of including the full verbatim text in the excerpt
  - node: excerpt/PrioritizeAndCompressWarnings
    type: added
    impact: >-
      New process: when a module has accumulated many warnings, groups them by type, keeps the highest-severity warnings
      in full detail, and compresses the rest into count-per-type summaries to fit within budget
  - node: excerpt/TrackExcerptGenerationCost
    type: added
    impact: >-
      New process: measures the wall-clock time and compiled index traversal count for each excerpt generation, logging
      metrics to identify modules where generation is disproportionately expensive
  - node: graph/ConnectionDeduplication
    type: added
    impact: >-
      New process: merges duplicate directed edges that appear in multiple journeys into unique entries in the
      ConnectionSet while preserving journey provenance
  - node: graph/BatchMerge
    type: added
    impact: >-
      New process: merges multiple newly created modules into the compiled index in a single pass, deferring validation
      until all modules are integrated
  - node: graph/ScopedValidation
    type: added
    impact: >-
      New process: validates only the subgraph affected by a module change, checking rules against changed nodes and
      their connections rather than the entire graph
  - node: graph/PartialConnectionComputation
    type: added
    impact: >-
      New process: recomputes connections only for journeys containing nodes from a changed module, reusing cached
      connections for unchanged journeys
  - node: graph/FieldPreservation
    type: added
    impact: >-
      New process: preserves all YAML fields including unknown or extension fields when a module file is read, modified,
      and written back, preventing silent data loss on round-trip
  - node: graph/ModuleSchemaRule
    type: added
    impact: >-
      New rule: enforces that every module file must have the required top-level structure (spec_sections as number
      array, nodes as a map of name to type+description, journeys as a map of name to steps array)
  - node: graph/MinimumStepsRule
    type: added
    impact: >-
      New rule: enforces that every journey must have at least 2 steps, since a single-step journey produces no
      connections and has no graph meaning
  - node: llm/DetectMalformedYAMLOutput
    type: added
    impact: >-
      New process: checks worker-produced YAML files for structural schema violations beyond basic parsing, including
      wrong node types, flat string journey steps, missing spec_sections, and absent node or action fields in steps
  - node: llm/DetectEmptyWorkerResponse
    type: added
    impact: >-
      New process: detects when a worker completes a task without producing any output file or meaningful response, a
      silent failure mode distinct from crash or timeout where the worker simply returns nothing
  - node: llm/RetryTaskWithFeedback
    type: added
    impact: >-
      New process: resends the same task to the worker with the specific validation errors or failure details appended
      to the context so the worker can self-correct without requiring a full respawn
  - node: llm/ClassifyFailureType
    type: added
    impact: >-
      New process: examines a failure report and classifies it as crash, timeout, malformed output, empty response,
      scope violation, or quality degradation to route to the appropriate recovery strategy
  - node: llm/TrackTaskFailureRate
    type: added
    impact: >-
      New process: tracks the ratio of failed tasks to total tasks for the current worker session and signals when the
      failure rate exceeds the quality threshold indicating the worker should be replaced
  - node: llm/ManageWorkerPool
    type: added
    impact: >-
      New process: coordinates multiple concurrent worker processes during parallel creation or enrichment phases,
      tracking each worker's assigned task, session state, and compaction counter independently
  - node: llm/RouteTaskToAvailableWorker
    type: added
    impact: >-
      New process: selects an idle worker from the active pool for the next task or queues the task if all workers are
      busy, ensuring even distribution across available workers
  - node: llm/HandleLargeModuleFile
    type: added
    impact: >-
      New process: detects when a target module file exceeds the Read tool line limit and reads it in offset-based
      chunks, reassembling the full content before including it in the worker's task context
  - node: llm/EstimateTaskContextCost
    type: added
    impact: >-
      New process: estimates the token count of the next task payload against the worker's remaining context capacity
      and triggers proactive worker replacement if the task would exhaust the context window
  - node: llm/CleanupParallelWorker
    type: added
    impact: >-
      New process: shuts down and cleans up a single worker from the parallel pool after its assigned task completes,
      freeing resources without affecting other active workers in the pool
  - node: llm/DetectStaleWorkerProcess
    type: added
    impact: >-
      New process: sends a lightweight heartbeat probe to an existing worker subprocess and waits for acknowledgment,
      detecting zombies and sleep-corrupted processes that are alive but unresponsive
  - node: llm/RecoverFromSpawnFailure
    type: added
    impact: >-
      New process: handles failure to launch the Claude Code subprocess by checking prerequisites such as API key
      availability, CLI binary existence, and disk space before retrying
  - node: llm/ValidateWorkerHealthBeforeTask
    type: added
    impact: >-
      New process: performs a pre-dispatch liveness check on the worker by sending a no-op probe via the stream-json
      channel and confirming a response within a short timeout
  - node: llm/DetectOrphanWorkerProcess
    type: added
    impact: >-
      New process: scans for leftover Claude Code subprocesses from a previous convergence run that were not properly
      shut down, identifying them by process name and working directory
  - node: llm/ReestablishStreamChannel
    type: added
    impact: >-
      New process: tears down a stale or corrupted stream-json channel and opens a fresh one to the same worker process
      without requiring a full process respawn
  - node: llm/ParallelWorkerPoolLimit
    type: added
    impact: >-
      New rule: caps the maximum number of concurrent worker processes during parallel creation or enrichment
      operations, preventing host machine resource exhaustion from too many simultaneous Claude Code subprocesses
  - node: publish/VerifyPublishedHashIntegrity
    type: added
    impact: >-
      New process: re-reads interface.yaml after write, recomputes SHA256 from the file content, and compares against
      the embedded hash to detect silent corruption or partial write
  - node: publish/CanonicalizeHashInput
    type: added
    impact: >-
      New process: sorts exported nodes alphabetically by name and exported journeys alphabetically by name before hash
      computation to guarantee identical content always produces identical hash regardless of collection order
  - node: publish/CrossCheckEventInterfaceHash
    type: added
    impact: >-
      New process: after both event file and interface.yaml are written, reads the hash from each and verifies they are
      identical, detecting divergence from non-atomic write sequences
  - node: publish/ValidatePreviousHashBaseline
    type: added
    impact: >-
      New process: before hash comparison, reads the hash embedded in the current interface.yaml on disk and verifies it
      matches PreviousHash, detecting baseline drift from crash between writes
  - node: publish/ReconcileHashStateOnStartup
    type: added
    impact: >-
      New process: on startup or after crash recovery, reads PreviousHash file, interface.yaml embedded hash, and last
      event file hash, and reconciles any disagreements to restore a consistent baseline
  - node: publish/CanonicalizeChangelogDiffOutput
    type: added
    impact: >-
      New process: sorts added, removed, and modified lists in the changelog diff alphabetically by name so that
      identical diffs always produce byte-identical changelog.yaml regardless of internal diff ordering
  - node: publish/NormalizeEventTransientFields
    type: added
    impact: >-
      New process: strips or normalizes wall-clock timestamps and other transient fields from event file content before
      deduplication comparison so re-runs on identical input are not falsely considered different
  - node: publish/EnforceDeterministicYamlSerialization
    type: added
    impact: >-
      New process: enforces canonical YAML output for interface.yaml by using sorted keys, consistent quoting, and
      stable whitespace so the same exported content always serializes to identical bytes
  - node: publish/GuardSequenceCounterAgainstRetry
    type: added
    impact: >-
      New process: before incrementing EventSequenceCounter, reads the last event file and checks if its sequence number
      already equals the expected next value, skipping the increment if this is a retry of an already-written event
  - node: publish/VerifyPublishPipelineIdempotency
    type: added
    impact: >-
      New process: runs the full publish pipeline twice on the same compiled index and compares interface.yaml,
      changelog.yaml, and normalized event content to confirm all outputs are byte-identical
  - node: publish/DetectOrphanTempFiles
    type: added
    impact: >-
      New process: on cold start, scans the publish output directory for orphan temp files left by atomic write
      operations that crashed between temp file creation and rename, and removes them to prevent disk accumulation
  - node: publish/DetectPublishInterruptionPoint
    type: added
    impact: >-
      New process: after crash recovery, inspects the state of all publish artifacts on disk to determine exactly which
      pipeline step was interrupted, classifying the state as pre-interface, post-interface-pre-changelog,
      post-changelog-pre-event, post-event-pre-notification, or fully complete
  - node: publish/RecoverMissedPublishNotification
    type: added
    impact: >-
      New process: detects that the event file on disk is newer than the last convergence-acknowledged publish,
      indicating the process crashed after writing the event but before notifying convergence, and sends the missed
      notification without re-running publish
  - node: publish/RestoreSequenceCounterFromDisk
    type: added
    impact: >-
      New process: on cold start, reads the sequence number from the last event file on disk and restores the in-memory
      EventSequenceCounter to that value so the next publish increments from the correct baseline
  - node: publish/ResumePublishFromInterruptionPoint
    type: added
    impact: >-
      New process: given a detected interruption point, skips already-completed pipeline stages and resumes from the
      first incomplete stage, reusing valid artifacts already on disk rather than regenerating them from scratch
  - node: publish/ValidateInterfaceYamlSchema
    type: added
    impact: >-
      New process: validates the in-memory interface structure against the required schema before serialization,
      checking that hash is a 64-char hex string, nodes is a non-empty map with type and description fields, and
      journeys is a map with steps arrays
  - node: publish/ValidateChangelogYamlSchema
    type: added
    impact: >-
      New process: validates the in-memory changelog structure against the required schema before serialization,
      checking that added, removed, and modified are arrays where each entry has a name field and a type indicator
  - node: publish/VerifyInterfaceYamlRoundTrip
    type: added
    impact: >-
      New process: after writing interface.yaml, parses the file back into an in-memory structure and compares each node
      and journey field-by-field against the original export to detect silent data mangling by the YAML serializer
  - node: publish/PreserveExtensionFieldsInInterface
    type: added
    impact: >-
      New process: when collecting nodes for export, copies all fields from the compiled index node entries including
      extension fields like files, not just type and description, preventing silent metadata loss in the published
      interface
  - node: publish/ValidateEventFileYamlParsability
    type: added
    impact: >-
      New process: after writing the event file, parses it back with a standard YAML parser and verifies all expected
      fields are accessible including embedded changelog entries that may contain special YAML characters
  - node: sync/VerifyHashAfterStore
    type: added
    impact: >-
      New process: re-reads stored hashes from DependencyHashStore after UpdateStoredHashes writes them and confirms the
      persisted values match what was written, detecting silent write failures
  - node: sync/CrossValidateEventHashWithFetchedHash
    type: added
    impact: >-
      New process: compares the interface hash embedded in the incoming event payload against the hash fetched directly
      from the dependency's interface.yaml to detect race conditions or stale event data
  - node: sync/DetectPartialHashUpdate
    type: added
    impact: >-
      New process: checks that all dependency hashes in a multi-dependency sync were successfully persisted after a
      batch write, detecting partial writes from crashes or I/O errors
  - node: sync/VerifyStalenessBeforeReconvergence
    type: added
    impact: >-
      New process: re-fetches dependency hashes immediately before reconvergence begins and confirms they still differ
      from stored hashes, preventing reconvergence on already-reverted changes
  - node: sync/EnforceDeterministicStaleOrder
    type: added
    impact: >-
      New process: sorts the stale module list into a canonical alphabetical order by module name before passing it to
      reconvergence, ensuring re-runs produce the same processing sequence
  - node: sync/GuardAgainstConcurrentSync
    type: added
    impact: >-
      New process: checks for an active sync lock before beginning a new sync cycle, preventing concurrent runs from
      mutating shared state like DependencyHashStore and StaleModuleList simultaneously
  - node: sync/VerifySyncIdempotency
    type: added
    impact: >-
      New process: after a sync cycle completes, re-runs the hash comparison and confirms it produces an empty stale
      list, verifying the sync was effective and a re-run would be a no-op
  - node: sync/CanonicalizeChangelogForNarrowing
    type: added
    impact: >-
      New process: sorts changelog entries into deterministic order by category then alphabetically by node or journey
      name before narrowing, ensuring identical output regardless of input iteration order
  - node: sync/FetchDependencyHashesConcurrently
    type: added
    impact: >-
      New process: fetches SHA256 hashes from multiple dependency interface.yaml files in parallel with a configurable
      concurrency limit, reducing total fetch time for boxes with many dependencies
  - node: sync/BatchMarkModulesStale
    type: added
    impact: >-
      New process: writes stale markers on all affected modules in a single batch operation instead of individual
      writes, reducing I/O overhead when hundreds of modules are stale
  - node: sync/ChunkAffectedModuleTracing
    type: added
    impact: >-
      New process: partitions the cross-module connection set into chunks and traces affected modules incrementally,
      preventing memory exhaustion when the graph has thousands of edges
  - node: sync/CheckRippleDepthLimit
    type: added
    impact: >-
      New process: reads the ripple depth from the origin chain length and compares it against a configured maximum,
      suppressing propagation when the chain exceeds the depth limit to prevent cascade storms
  - node: sync/DetectAndClearOrphanSyncLock
    type: added
    impact: >-
      New process: checks on startup whether a SyncLock exists from a previous crashed process, validates no sync is
      actually running, and clears the stale lock to unblock new sync cycles
  - node: sync/ScanForMissedEventsDuringSleep
    type: added
    impact: >-
      New process: on wake or restart, reads the current event file sequence numbers from all dependencies and compares
      them against LastProcessedSequence to discover events that arrived while the process was not running
  - node: sync/ValidateHashStoreIntegrityOnStartup
    type: added
    impact: >-
      New process: reads the DependencyHashStore file on cold start and validates its structural integrity including
      correct entry count, valid SHA256 format for each hash, and no truncation from a prior crash
  - node: sync/RecoverInterruptedStaleMarking
    type: added
    impact: >-
      New process: on startup, detects a partially-written StaleModuleList by comparing its entries against the current
      SyncResult and re-derives the complete stale list from stored hashes to replace the incomplete one
  - node: sync/ReconcileSequenceNumbersOnRestart
    type: added
    impact: >-
      New process: on restart after crash, compares each dependency's current event sequence number against the locally
      stored LastProcessedSequence and fast-forwards to the latest sequence when the stored value is behind
  - node: sync/SyncLock
    type: added
    impact: >-
      New artifact: a lock file or flag that indicates a sync cycle is in progress, consumed by
      GuardAgainstConcurrentSync to detect and block overlapping sync runs
  - node: sync/EnforceAtomicHashUpdate
    type: added
    impact: >-
      New rule: requires that when multiple dependency hashes are updated in a single sync cycle, either all are
      persisted or none are, preventing inconsistent stored state
  - node: sync/DependencyFanOutLimit
    type: added
    impact: >-
      New rule: enforces a maximum number of dependencies a single box may declare, preventing sync from becoming
      unresponsive due to excessive upstream watchers and hash fetches
