previous_hash: sha256:df86a7f54a5fcfec537be797a760a2ace54fea85a00c31d6a772d0a0d7946c03
current_hash: sha256:392e0a54298bdccb74129a8326c61b9184e30e7f15c0189df3a9d7c177a6f3d9
changes:
  - node: actors/ValidateActorNameFormat
    type: added
    impact: >-
      New process: checks that each discovered actor name uses valid PascalCase identifier format without spaces or
      special characters that would break _actors/ reference resolution in journey steps
  - node: audit/DetectFixContentLoss
    type: added
    impact: >-
      New process: compares pre-fix and post-fix node and journey counts in the target module to detect a fix that
      removed existing content, implementing spec section 9's destructive edit protection for the audit fix pipeline
  - node: codegen/ProcessNodesOnly
    type: added
    impact: >-
      New rule: skeleton generation only targets process-type nodes, excluding artifact, interface, and rule nodes
      entirely regardless of whether they declare a files field
  - node: codegen/EnforceFillRetryLimit
    type: added
    impact: >-
      New process: tracks fill retry count per module and triggers skip-and-defer when the configured maximum is
      exceeded, preventing infinite retry loops on persistently failing modules
  - node: codegen/DetectNodeStubMismatch
    type: added
    impact: >-
      New process: compares function and class exports in a filled file against the module's node list to detect added
      or removed stubs that violate CodeComesFromNodes
  - node: codegen/DetectPlaceholderFill
    type: added
    impact: >-
      New process: scans filled function bodies for placeholder patterns like throw-not-implemented, TODO comments,
      empty bodies, and return-undefined stubs that indicate the LLM did not produce real implementations
  - node: codegen/DispatchByFileExtension
    type: added
    impact: >-
      New process: selects the language-specific skeleton generator based on file extension, routing .ts and .js files
      to the TypeScript generator and all others to a generic comment skeleton
  - node: codegen/EnrichSkeletonWithConnectionContext
    type: added
    impact: >-
      New process: embeds node name, description, in_journeys, preceded_by, followed_by, and triggered_by_actors
      metadata as JSDoc comments in the skeleton header so the LLM understands the node's identity and graph context
      during fill
  - node: codegen/GenerateConfigInterface
    type: added
    impact: >-
      New process: generates a named Config interface from the node's properties map when properties exist, inferring
      TypeScript types from runtime value types via typeof, providing typed configuration for the implementation class
  - node: codegen/GenerateJourneyMethodStubs
    type: added
    impact: >-
      New process: creates one deduplicated async method stub per journey the node participates in, stripping step
      numbers and non-alphanumeric characters to produce camelCase method names, each annotated with a JSDoc journey
      reference and throwing NotImplemented
  - node: codegen/CodegenResultSummary
    type: added
    impact: >-
      New artifact: the exported CodegenResult interface returned by generateCodeSkeletons containing a generated list
      of bare file paths and a skipped list of reason-annotated diagnostic strings explaining why each node or file was
      excluded
  - node: compilation/CompileFromModules
    type: added
    impact: >-
      New process: in-memory compilation pipeline that accepts a pre-loaded module map and optional external interfaces,
      first collecting parse errors from malformed modules, then orchestrating node collection, journey resolution,
      connection computation, validation, stats, and coverage, merging issues from all four phases into a single flat
      array and stamping a compiled timestamp on the index
  - node: compilation/NodeTypeValidation
    type: added
    impact: >-
      New process: validates that each node's type field is one of the five universal types (actor, process, artifact,
      interface, rule) and emits an error for any node with an invalid type
  - node: compilation/ExternalInterfaceResolution
    type: added
    impact: >-
      New process: resolves cross-engine node references using flexible name matching against the sibling's provides
      map, emitting an error when the node is not found in a loaded interface, or degrading to a warning when no
      external interfaces are available so the parent can validate later
  - node: compilation/DefaultMissingModuleFields
    type: added
    impact: >-
      New process: defaults missing top-level fields (spec_sections to empty array, nodes to empty map, journeys to
      empty map) during parsing, tolerating partial module files without schema errors
  - node: compilation/StatsComputation
    type: added
    impact: >-
      New process: computes aggregate statistics including total_nodes, total_journeys, total_connections, modules
      count, orphans, isolated_modules, and duplicate_names from the compiled registries
  - node: convergence/RetryHierarchyDecision
    type: added
    impact: >-
      New process: retries the hierarchy decision step when the LLM produces an unparseable or invalid split-or-no-split
      response by passing the validation errors as context for a corrected attempt
  - node: convergence/EnsureOutputDirectories
    type: added
    impact: >-
      New process: creates the modules, compiled, and published directories under genome/ with recursive mkdir if they
      do not already exist
  - node: convergence/SinglePassMode
    type: added
    impact: >-
      New rule: when the --once flag is passed, runs a single convergence pass and exits instead of entering the watch
      loop, used for testing and child engine processes
  - node: convergence/GenomeIsProtocolNotTool
    type: added
    impact: >-
      New rule: genome8 is a self-describing protocol that manages itself — same convergence.ts runs at every level, the
      graph describes its own architecture, and the protocol applies to any system
  - node: convergence/ProductionReadyNoShortcuts
    type: added
    impact: >-
      New rule: no hacks or shortcuts — every change is validated by compilation, tested by journey tests, protected by
      destructive edit detection, bounded by retry limits, and staged before deployment
  - node: convergence/SelfSustainingWithoutHumans
    type: added
    impact: >-
      New rule: the system runs autonomously after initial spec — sleep/wake cycle monitors for changes at zero cost,
      event-driven ripple propagates updates, and reconvergence restores consistency without human intervention
  - node: convergence/WarmWorkersAcrossPhases
    type: added
    impact: >-
      New rule: never kill LLM workers between pipeline phases — warm workers are more reliable than fresh spawns,
      Claude Code handles its own compaction
  - node: convergence/JourneyTestsAreValidation
    type: added
    impact: >-
      New rule: run real tests from real journeys instead of relying on LLM-judged validation — journey steps are test
      cases, compile-and-run proves correctness
  - node: convergence/BatchHeavyOperations
    type: added
    impact: >-
      New rule: error fixes in batches of 5, test fills in batches of 10 — single massive LLM calls timeout, bounded
      batches complete reliably
  - node: convergence/AutoScaffoldProjectFiles
    type: added
    impact: >-
      New rule: auto-create package.json and tsconfig.json so the user writes ONLY spec.md — no manual project setup
      required
  - node: convergence/SourceOfTruthHierarchy
    type: added
    impact: >-
      New rule: spec.md is authority, graph derives from spec, code derives from graph, tests derive from journeys —
      conflicts are always resolved by re-deriving from the higher authority
  - node: convergence/EveryChangeStartsInSpec
    type: added
    impact: >-
      New rule: to add features, edit the spec first then converge — never edit code to add features, the graph and code
      follow automatically
  - node: convergence/CodeFixesAreOKForBugs
    type: added
    impact: >-
      New rule: code-only fixes are permitted for bugs that journey tests validate — Step 4d syncs code changes back to
      graph
  - node: convergence/NoSeparateDocumentationFiles
    type: added
    impact: >-
      New rule: the graph IS the documentation — no standalone goal docs, architecture docs, or roadmap files; they all
      live as nodes and journeys
  - node: convergence/NoIgnoredTestFailures
    type: added
    impact: >-
      New rule: every test failure must be diagnosed (code bug, test bug, or graph bug) and fixed — never skip or
      suppress failing tests
  - node: convergence/NoDriftBetweenLayers
    type: added
    impact: >-
      New rule: spec, graph, code, and tests must never drift apart — the source of truth hierarchy and reconvergence
      enforce alignment at every level
  - node: events/DeferWatcherForMissingPath
    type: added
    impact: >-
      New process: records a dependency whose event file path does not exist when watcher registration is attempted, and
      retries registration during the next watcher update cycle when the dependency may have published
  - node: events/WatcherCrashRetryLimit
    type: added
    impact: >-
      New rule: enforces a maximum number of consecutive re-registration attempts for the same dependency's watcher
      before removing it from the active set, preventing infinite crash-reregister oscillation loops
  - node: excerpt/ExcerptCLI
    type: added
    impact: 'New interface: command-line interface to run excerpt generation for a target module with an optional round number'
  - node: graph/CompiledIndexSnapshot
    type: added
    impact: >-
      New artifact: a point-in-time copy of the CompiledIndex taken before a merge operation, used to restore graph
      state if the merge fails or is destructive
  - node: graph/DestructiveEditDetection
    type: added
    impact: >-
      New process: compares node and journey counts before and after a module rewrite to detect content loss caused by
      LLM overwrites
  - node: graph/DestructiveEditProtectionRule
    type: added
    impact: >-
      New rule: a module rewrite must not decrease the node count without explicit intent — blocks merge and triggers
      revert if node count drops
  - node: graph/JourneyMembershipTracking
    type: added
    impact: >-
      New process: records each node's participation in journeys as in_journeys entries formatted as "JourneyName (step
      N)" during connection computation
  - node: graph/ActorTriggerTracking
    type: added
    impact: >-
      New process: propagates the journey's initiating actor to all nodes in the journey's steps, populating each node's
      triggered_by_actors list
  - node: graph/JourneyActorAssignment
    type: added
    impact: >-
      New process: assigns the first actor-type node encountered in a journey's steps as the journey's initiating actor
      field
  - node: graph/ModulesTouchedTracking
    type: added
    impact: >-
      New process: tracks the set of distinct modules referenced by a journey's steps, stored as modules_touched on the
      compiled journey
  - node: hierarchy/ValidateSplitDecision
    type: added
    impact: >-
      New process: validates the LLM-produced split decision for semantic correctness including that every module from
      ORGANIZATION.md is assigned to exactly one child, no module is duplicated across children, and no child group is
      empty
  - node: organization/DetectDuplicateModuleNames
    type: added
    impact: >-
      New process: scans the identified module list for entries sharing the same name, which would cause YAML filename
      collisions and node name ambiguity in the compiled graph
  - node: organization/ValidateDependencyTargetsExist
    type: added
    impact: >-
      New process: checks that every module name referenced as a dependency target in the dependency graph exists in the
      identified module list, catching dangling references the LLM may produce
  - node: organization/DetectUngroundedModules
    type: added
    impact: >-
      New process: checks that every identified module maps to at least one spec section, catching hallucinated modules
      the LLM invented without spec basis
  - node: publish/PublishCLI
    type: added
    impact: >-
      New interface: command-line interface to run publish and display interface stats, version hash, and changelog
      summary
  - node: sync/RejectMalformedEvent
    type: added
    impact: >-
      New rule: requires that incoming event files contain valid YAML with all mandatory fields including interface
      hash, sequence number, and origin chain, and rejects sync when parsing fails
  - node: sync/RetryDeferredSync
    type: added
    impact: >-
      New process: re-queues a sync cycle that was blocked by GuardAgainstConcurrentSync so it runs after the active
      sync releases the lock, preventing silently lost dependency changes that would leave modules stale
  - node: sync/VerifyOutgoingEventWritten
    type: added
    impact: >-
      New process: reads the outgoing event file back after WriteEventFile and confirms its content matches the expected
      changelog, origin chain, and sequence number, detecting silent write failures that would break the ripple chain
  - node: testgen/DiagnoseFailureRoot
    type: added
    impact: >-
      New process: after fix retries are exhausted for a test failure, analyzes the failure pattern to determine whether
      the root cause is a code bug, test bug, or graph bug per spec section 9
  - node: testgen/DetectMissingImplementation
    type: added
    impact: >-
      New process: checks whether the implementation file for a module exists on disk before generating or filling its
      test skeleton, preventing wasted effort on modules codegen could not fill
  - node: testgen/DetectTrivialAssertions
    type: added
    impact: >-
      New process: scans filled test assertions for trivial patterns like expect(true).toBe(true), toBeDefined-only
      checks, and empty test bodies that pass without verifying actual journey step behavior
  - node: testgen/ValidateTestCaseStructure
    type: added
    impact: >-
      New process: compares the describe and it blocks in a filled test file against the journey's step list to detect
      added, removed, or merged test cases that violate StepsAreTestCases
  - node: testgen/TestGenCLI
    type: added
    impact: >-
      New interface: command-line interface to run test skeleton generation from journeys and display the generated file
      list
  - node: _goals/SolveContextProblem
    type: added
    impact: 'New rule: any system at any scale gets scoped, connected, synced context — no single brain required'
  - node: _goals/BuildPando
    type: added
    impact: 'New rule: decentralized AI platform ships as the first real proof that genome works at scale'
  - node: _goals/GenomeIsTheProduct
    type: added
    impact: 'New rule: genome is a protocol others adopt, not just an internal tool'
  - node: _goals/ProductionReady
    type: added
    impact: 'New rule: no hacks, no shortcuts — every component reliable enough for real workloads'
  - node: _goals/SelfSustaining
    type: added
    impact: 'New rule: the system runs, converges, and heals without human intervention'
  - node: codegen/GenerateArtifactSkeletons
    type: removed
    impact: >-
      Removed process: creates TypeScript interface and class stubs for each artifact node with fields inferred from
      journey usage. Dependents must find alternative.
  - node: codegen/GenerateInterfaceSkeletons
    type: removed
    impact: >-
      Removed process: creates TypeScript API endpoint or handler stubs for each interface node. Dependents must find
      alternative.
  - node: codegen/GenerateRuleSkeletons
    type: removed
    impact: >-
      Removed process: creates TypeScript validation function stubs for each rule node with the constraint logic left
      empty. Dependents must find alternative.
  - node: codegen/MapConnectionsToImports
    type: removed
    impact: >-
      Removed process: reads cross-module connections to generate import statements linking skeleton files across
      modules. Dependents must find alternative.
  - node: codegen/AssembleModuleFile
    type: removed
    impact: >-
      Removed process: combines all skeletons for a single module into one TypeScript file with imports, types, and
      function stubs. Dependents must find alternative.
  - node: codegen/ReadConvergedGraph
    type: modified
    field: description
    was: >-
      reads the compiled index after convergence to extract all nodes with their types and descriptions for skeleton
      generation
    now: >-
      reads the compiled index after convergence to extract all nodes with their types, descriptions, file paths,
      connection context (preceded_by, followed_by, triggered_by_actors), journey participation, and properties for
      skeleton generation
    impact: codegen/ReadConvergedGraph description changed. Dependents should review.
  - node: codegen/GenerateProcessSkeletons
    type: modified
    field: description
    was: >-
      creates TypeScript function stubs for each process node with name, parameters inferred from connections, and
      return type
    now: >-
      creates a TypeScript class skeleton for each process node with a JSDoc header, optional config interface, and
      journey-derived method stubs
    impact: codegen/GenerateProcessSkeletons description changed. Dependents should review.
  - node: codegen/SkeletonFile
    type: modified
    field: description
    was: a TypeScript file containing empty stubs for all nodes in a module, ready for LLM to fill
    now: >-
      a per-node TypeScript class file for a process node containing JSDoc context, optional config interface, and
      journey-derived method stubs ready for LLM to fill
    impact: codegen/SkeletonFile description changed. Dependents should review.
  - node: compilation/YAMLParsing
    type: modified
    field: description
    was: reads raw YAML module files from disk and parses them into structured data
    now: >-
      reads .yaml and .yml files from the modules directory, derives the module name from each filename, parses raw YAML
      into structured data, and normalizes missing top-level fields (spec_sections, nodes, journeys) with empty defaults
      so downstream consumers never see undefined
    impact: compilation/YAMLParsing description changed. Dependents should review.
  - node: compilation/IsolatedModuleDetection
    type: modified
    field: description
    was: finds modules whose nodes have zero connections to nodes in any other module
    now: >-
      finds modules with more than 3 nodes whose nodes have zero cross-module connections, exempting small modules with
      3 or fewer nodes from isolation checks
    impact: compilation/IsolatedModuleDetection description changed. Dependents should review.
  - node: compilation/CompilationResult
    type: modified
    field: description
    was: the output of compile.ts containing error count, warning count, orphan list, duplicate list, and dangling ref list
    now: >-
      the full output of compile.ts containing the CompiledIndex (all nodes with connections, all journeys with
      metadata, aggregate stats), a flat issues array of errors and warnings, and a per-module CoverageReport
    impact: compilation/CompilationResult description changed. Dependents should review.
  - node: compilation/ValidateActionQuality
    type: modified
    field: description
    was: checks that every journey step has a meaningful action description, flagging steps with empty or too-short actions
    now: >-
      post-compilation check that iterates every journey step and emits a warning for actions that are empty or shorter
      than 5 characters, reporting the journey name, step number, and module for each violation
    impact: compilation/ValidateActionQuality description changed. Dependents should review.
  - node: compilation/DetectDuplicateSequences
    type: modified
    field: description
    was: >-
      scans all journeys for identical 3-step consecutive node sequences shared across two or more journeys, flagging
      potential copy-paste or redundant journey definitions
    now: >-
      post-compilation analysis that slides a 3-step window across every journey's node sequence, deduplicates journey
      names per window, and returns structured records of sequences shared by two or more distinct journeys indicating
      potential copy-paste or redundancy
    impact: compilation/DetectDuplicateSequences description changed. Dependents should review.
  - node: compilation/PersistCompilationArtifacts
    type: modified
    field: description
    was: >-
      writes the compiled index as index.yaml and the coverage report as coverage.yaml to the compiled/ directory after
      a successful compilation
    now: >-
      creates the compiled/ directory as a sibling to the modules directory if needed, then serializes the compiled
      index and coverage report to index.yaml and coverage.yaml using wide line wrapping and no YAML anchors for
      human-readable output
    impact: compilation/PersistCompilationArtifacts description changed. Dependents should review.
  - node: compilation/CoverageComputation
    type: modified
    field: description
    was: >-
      computes per-module coverage metrics including node count, journey count, connection count, cross-module
      connections, and spec section claims for every compiled module
    now: >-
      computes per-module coverage metrics including node count, journey count, connection count, cross-module
      connections, and spec section claims, then derives orphan nodes with zero connections and journey memberships, and
      isolated modules with more than 3 nodes but zero cross-module connections
    impact: compilation/CoverageComputation description changed. Dependents should review.
  - node: convergence/RetryOnLLMTimeout
    type: modified
    field: description
    was: when an LLM call times out, automatically retries up to 3 times with exponential backoff before failing
    now: >-
      wraps worker.call with retry logic that detects timeout errors by string matching, retries up to 3 times with
      fixed backoff delays of 5s, 15s, and 45s, and propagates non-timeout errors immediately
    impact: convergence/RetryOnLLMTimeout description changed. Dependents should review.
  - node: convergence/CheckConvergenceStatus
    type: modified
    field: description
    was: >-
      compiles the graph and evaluates whether zero errors, zero orphans, zero isolated modules, and zero duplicates are
      met, printing actionable fix guidance if not
    now: >-
      evaluates whether zero errors, zero orphans, zero isolated modules, and zero duplicates are met against compiled
      stats, generating actionable fix guidance for each unmet criterion
    impact: convergence/CheckConvergenceStatus description changed. Dependents should review.
  - node: convergence/LoadProjectConfig
    type: modified
    field: description
    was: >-
      reads genome/config.json if it exists and merges user overrides with default values for maxRounds, model,
      maxFixAttempts, maxZeroDelta, minModulesForSplit, watchIntervalMs, and sessionResetChars
    now: >-
      reads genome/config.json if it exists and merges user overrides with default values for maxRounds, model,
      maxFixAttempts, maxZeroDelta, minModulesForSplit, watchIntervalMs, sessionResetChars, and messageTimeoutMs
    impact: convergence/LoadProjectConfig description changed. Dependents should review.
  - node: convergence/SkipToWatchIfConverged
    type: modified
    field: description
    was: >-
      on startup checks convergence-state.json and compares the current interface hash against the stored hash, skipping
      the full pipeline and entering watch mode directly if already converged
    now: >-
      on startup checks convergence-state.json and compares the current interface hash against the stored hash, skipping
      the full pipeline and entering watch mode directly if already converged, bypassed when --once flag is set
    impact: convergence/SkipToWatchIfConverged description changed. Dependents should review.
  - node: excerpt/AssembleExcerpt
    type: modified
    field: description
    was: combines local nodes, journeys, cross-module connections, actors, and warnings into a single focused output
    now: >-
      combines module status with node-type breakdown, local nodes, local journeys, cross-module connections,
      triggered-by actors, issues, all-modules overview, global stats, optional spec sections, and raw module YAML
      source into a single focused output
    impact: excerpt/AssembleExcerpt description changed. Dependents should review.
  - node: llm/DetectRateLimitResponse
    type: modified
    field: description
    was: detects API rate limit (429) or quota exceeded responses in worker output and kills the process for delayed retry
    now: >-
      detects API rate limit responses by matching error text against patterns including hit your limit, rate limit, too
      many requests, and 429, then kills the worker process for retry
    impact: llm/DetectRateLimitResponse description changed. Dependents should review.
  - node: llm/WaitForWorkerInit
    type: modified
    field: description
    was: >-
      polls for the system init message from the spawned Claude Code process every 200ms with a 60-second safety timeout
      before sending the first task
    now: >-
      waits a flat 2-second delay before the first task to give the spawned Claude Code process time to initialize,
      setting the initialized flag afterward
    impact: llm/WaitForWorkerInit description changed. Dependents should review.
  - node: metrics/ConvergenceMetricsRecord
    type: modified
    field: description
    was: >-
      in-memory accumulator that holds LLM call count, total tokens, per-step wall-clock timings, modules processed,
      nodes created, and journeys created
    now: >-
      in-memory accumulator that holds LLM call count, total tokens, per-step wall-clock timings, start and completion
      timestamps, modules processed, nodes created, and journeys created
    impact: metrics/ConvergenceMetricsRecord description changed. Dependents should review.
  - node: publish/GenerateInterfaceYaml
    type: modified
    field: description
    was: writes interface.yaml containing the exported nodes, journeys, and their SHA256 hash
    now: >-
      writes interface.yaml containing the engine name, provided nodes with type and journey count, required external
      references, and a SHA256 version hash
    impact: publish/GenerateInterfaceYaml description changed. Dependents should review.
  - node: publish/InterfaceYamlFile
    type: modified
    field: description
    was: the published interface.yaml file containing exported nodes, journeys, and SHA256 hash for this box
    now: >-
      the published interface.yaml file containing engine name, provided nodes with type and journey count, required
      external references, and a SHA256 version hash
    impact: publish/InterfaceYamlFile description changed. Dependents should review.
