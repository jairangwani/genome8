  - node: publish/InterfaceYamlFile
    type: added
    impact: 'New artifact: the published interface.yaml file containing exported nodes, journeys, and SHA256 hash for this box'
  - node: publish/ChangelogYamlFile
    type: added
    impact: 'New artifact: the published changelog.yaml file describing what changed in the latest publish'
  - node: publish/InterfaceHash
    type: added
    impact: 'New artifact: the SHA256 hash of the current interface content used for change detection by dependent boxes'
  - node: publish/PreviousHash
    type: added
    impact: 'New artifact: the SHA256 hash from the last published interface, stored for comparison'
  - node: publish/EventSequenceCounter
    type: added
