  - node: sync/ValidateDependencyConfig
    type: added
    impact: >-
      New process: checks that each entry in the dependency list points to a real box directory with a reachable
      interface.yaml file before attempting any hash fetch
  - node: sync/DetectOscillationInOriginChain
    type: added
    impact: >-
      New process: reads the ripple origin chain from the parsed event payload and checks whether this box's ID already
      appears in the chain, detecting A→B→A sync loops
  - node: sync/CheckEventSequenceNumber
    type: added
    impact: >-
