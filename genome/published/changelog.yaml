previous_hash: sha256:7b1577303fe6261282bb0c1fdc5ef580aded5eca869527f07483a239c81e8f88
current_hash: sha256:3ff765bf348546f686b471026d389f7852db72102ec445bcc49f0146c387a768
changes:
  - node: organization/HandleEmptySpecContent
    type: added
    impact: >-
      New process: detects that spec.md exists on disk but contains no parseable sections — either zero bytes,
      whitespace only, or content that yields zero numbered sections — and reports a fatal error distinct from missing
      file
  - node: compilation/YAMLErrorReporting
    type: modified
    field: description
    was: >-
      collects _parseError tags from malformed modules and promotes them to severity-error ValidationIssues with file
      name and line number so parse failures appear in the final compilation report
    now: >-
      collects _parseError tags from malformed modules and promotes them to severity-error ValidationIssues with module
      name and error message so parse failures appear in the final compilation report
    impact: compilation/YAMLErrorReporting description changed. Dependents should review.
  - node: compilation/ValidateDescriptionQuality
    type: modified
    field: description
    was: >-
      checks that every node has a meaningful description string, flagging nodes with empty or too-short descriptions as
      errors and descriptions exceeding 500 characters as warnings to prevent context window exhaustion
    now: >-
      checks that every node has a meaningful description string, flagging nodes with missing or empty descriptions as
      warnings and descriptions exceeding 500 characters as warnings to prevent context window exhaustion
    impact: compilation/ValidateDescriptionQuality description changed. Dependents should review.
  - node: compilation/EmptyModuleDirectoryDetection
    type: modified
    field: description
    was: >-
      detects when the modules directory is missing or contains zero YAML files and reports a clear error instead of
      producing an empty compiled index
    now: >-
      detects when the modules directory contains zero YAML files and reports a tagged _parseError on an _empty module
      entry instead of producing a silent empty compiled index, while a missing directory returns an empty module map
      without error
    impact: compilation/EmptyModuleDirectoryDetection description changed. Dependents should review.
