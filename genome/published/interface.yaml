engine: genome8
version_hash: sha256:e63ebc392ea228f2bd86f36fd879bdd4638b46df8449e43e03db3628d98f8b86
provides:
  actors/DiscoverFromActivities:
    type: process
    description: >-
      analyzes the spec to find actors from the activities perspective — who uses, creates, operates, governs, and
      visits the system
    in_journeys: 11
  actors/DiscoverFromThreats:
    type: process
    description: analyzes the spec to find threat actors — attackers, abusers, failure scenarios, and exploitation vectors
    in_journeys: 8
  actors/DiscoverFromLifecycle:
    type: process
    description: analyzes the spec to find lifecycle actors — first visit, onboarding, power use, decline, exit, and return
    in_journeys: 8
  actors/MergeAndDeduplicate:
    type: process
    description: combines actors from all 3 angles, removes duplicates, and keeps the best description for each
    in_journeys: 8
  actors/WriteActorsFile:
    type: process
    description: writes the merged actor list to _actors.yaml in the modules directory
    in_journeys: 7
  actors/InheritActorsFromParent:
    type: process
    description: copies the parent's _actors.yaml into a child engine directory so children share the same actor set
    in_journeys: 2
  actors/ValidateActorCoverage:
    type: process
    description: checks that every discovered actor appears in at least one journey across all modules
    in_journeys: 3
  actors/ValidateThreeAngleCompleteness:
    type: process
    description: >-
      checks that all 3 discovery angles produced at least one actor each, preventing partial discovery from proceeding
      to merge
    in_journeys: 4
  actors/ProvideActorsForModuleCreation:
    type: process
    description: >-
      supplies the actor list to the excerpt generator so module workers know which _actors/ references are valid during
      module creation
    in_journeys: 5
  actors/RediscoverActorsOnSpecChange:
    type: process
    description: >-
      re-runs 3-angle discovery when the spec changes during reconvergence, producing a diff of added and removed actors
      against the existing set
    in_journeys: 1
  actors/UpdateActorsFileAfterRediscovery:
    type: process
    description: >-
      merges newly discovered actors with the existing set, adding new actors and flagging removed ones for orphan
      detection rather than deleting immediately
    in_journeys: 2
  actors/ValidateActorYAMLStructure:
    type: process
    description: >-
      checks that each entry in _actors.yaml has type actor and a non-empty description before the file is passed to
      compilation
    in_journeys: 4
  actors/ActorsFile:
    type: artifact
    description: the _actors.yaml file containing all discovered actors with type and description
    in_journeys: 16
  actors/ActivitiesActorList:
    type: artifact
    description: the list of actors discovered from the activities perspective before merging
    in_journeys: 4
  actors/ThreatsActorList:
    type: artifact
    description: the list of actors discovered from the threats perspective before merging
    in_journeys: 4
  actors/LifecycleActorList:
    type: artifact
    description: the list of actors discovered from the lifecycle perspective before merging
    in_journeys: 4
  actors/MergedActorList:
    type: artifact
    description: the deduplicated combined actor list from all 3 discovery angles
    in_journeys: 6
  actors/ThreeAngleDiscovery:
    type: rule
    description: actors must be discovered from exactly 3 angles (activities, threats, lifecycle) to ensure comprehensive coverage
    in_journeys: 4
  actors/ParentDiscoversChildrenInherit:
    type: rule
    description: only the parent engine discovers actors — children inherit them to prevent duplication
    in_journeys: 2
  actors/DetectActorImpersonation:
    type: process
    description: >-
      checks that every _actors/ reference in journey steps resolves to a validated actor in the registry, flagging
      references to non-existent or removed actors
    in_journeys: 2
  actors/DetectActorDescriptionPoisoning:
    type: process
    description: >-
      scans actor descriptions for adversarial content patterns such as prompt injection fragments, encoded
      instructions, or excessively long text before they are included in excerpt context
    in_journeys: 2
  actors/DetectChildActorTampering:
    type: process
    description: >-
      compares a child engine's _actors.yaml content against the parent's original hash to detect unauthorized
      additions, removals, or description modifications
    in_journeys: 3
  actors/DetectDiscoveryAngleBias:
    type: process
    description: >-
      checks that no single discovery angle produced more than a threshold proportion of total actors, flagging
      potential angle suppression or spec manipulation
    in_journeys: 2
  actors/EnforceActorCountLimit:
    type: process
    description: >-
      caps the maximum number of actors that can be stored in _actors.yaml to prevent graph bloat and context window
      exhaustion from adversarial specs
    in_journeys: 2
  actors/ValidateActorNameFormat:
    type: process
    description: >-
      checks that each discovered actor name uses valid PascalCase identifier format without spaces or special
      characters that would break _actors/ reference resolution in journey steps
    in_journeys: 3
  audit/CheckSpecCoverage:
    type: process
    description: auditor 1 compares spec sections against the graph to find sections not represented by any node or journey
    in_journeys: 12
  audit/CheckActorCoverage:
    type: process
    description: auditor 2 checks that every actor in _actors.yaml participates in at least one journey across all modules
    in_journeys: 10
  audit/CheckCrossModuleCoverage:
    type: process
    description: auditor 3 verifies that every module has at least one cross-module connection and no module is an island
    in_journeys: 10
  audit/GenerateAuditPrompt:
    type: process
    description: >-
      builds a focused prompt for each auditor containing the compiled graph excerpt and the specific coverage angle to
      check
    in_journeys: 17
  audit/CollectAuditFindings:
    type: process
    description: gathers findings from all 4 auditors into a single list of coverage gaps with locations and descriptions
    in_journeys: 19
  audit/PrioritizeGaps:
    type: process
    description: ranks the collected gaps by severity so the most critical coverage issues are fixed first
    in_journeys: 8
  audit/BuildGapFixPrompt:
    type: process
    description: builds a targeted fix prompt for each gap specifying exactly which module to edit and what coverage to add
    in_journeys: 9
  audit/ApplyFix:
    type: process
    description: delegates to LLM to edit the specific module YAML file to close the identified coverage gap
    in_journeys: 10
  audit/VerifyFixCompiles:
    type: process
    description: runs compile.ts after each fix to ensure the edit did not introduce new errors
    in_journeys: 7
  audit/VerifyGapClosed:
    type: process
    description: re-runs the specific auditor that found the gap to confirm the fix actually closed it
    in_journeys: 6
  audit/DeclareConverged:
    type: process
    description: marks the graph as CONVERGED after all 4 auditors report zero gaps and compilation shows zero errors
    in_journeys: 6
  audit/SelectNextGapToFix:
    type: process
    description: picks the highest-priority unfixed gap from the prioritized list and advances the pointer to the next gap
    in_journeys: 9
  audit/ProvideFixContext:
    type: process
    description: >-
      assembles the target module excerpt, the specific gap description, and surrounding graph context into a complete
      fix payload for the LLM worker
    in_journeys: 6
  audit/MergeAuditReports:
    type: process
    description: >-
      combines the 4 individual coverage reports into a unified view with normalized gap format before feeding into
      findings collection
    in_journeys: 8
  audit/ConfirmAllGapsResolved:
    type: process
    description: >-
      checks that the re-audit findings list is empty and compilation is clean before allowing convergence declaration
      to proceed
    in_journeys: 3
  audit/DetectFixInducedErrors:
    type: process
    description: >-
      compares pre-fix and post-fix compilation results to detect new orphans, duplicates, or dangling refs that did not
      exist before the fix was applied
    in_journeys: 5
  audit/DetectFixInducedGaps:
    type: process
    description: >-
      compares pre-fix and post-fix audit findings to detect new coverage gaps opened by a fix that closed a different
      gap
    in_journeys: 3
  audit/RejectAndRevertFix:
    type: process
    description: restores the target module to its pre-fix state when a fix introduced new errors or failed to close the target gap
    in_journeys: 6
  audit/ValidateGraphInvariantsPostFix:
    type: process
    description: >-
      checks all convergence invariants after a fix round including zero errors, zero orphans, zero duplicates, and zero
      isolated modules
    in_journeys: 8
  audit/DetectSelfAuditTarget:
    type: process
    description: >-
      detects when a coverage gap targets audit.yaml itself, flagging the meta-circular dependency so the fix process
      applies extra safeguards
    in_journeys: 4
  audit/ValidateAuditModulePresence:
    type: process
    description: >-
      checks that audit.yaml exists as a compiled module in the index since it is infrastructure required for the
      convergence pipeline to function
    in_journeys: 3
  audit/DetectSpecChangeToAuditSections:
    type: process
    description: >-
      detects when spec sections referenced by audit.yaml have changed, triggering re-evaluation of audit coverage
      requirements against the updated spec
    in_journeys: 3
  audit/ScopeFixToAvoidAuditBreak:
    type: process
    description: >-
      when a fix targets audit.yaml, validates that the proposed edit does not remove or break existing audit processes
      like CheckSpecCoverage, VerifyFixCompiles, or DeclareConverged
    in_journeys: 3
  audit/ReauditAfterSelfFix:
    type: process
    description: >-
      after a fix modifies audit.yaml, re-runs the full audit pipeline from scratch to verify the self-fix did not
      invalidate audit's own integrity
    in_journeys: 2
  audit/AuditFindingsList:
    type: artifact
    description: the collected list of coverage gaps from all 4 auditors with gap type, location, and description
    in_journeys: 26
  audit/SpecCoverageReport:
    type: artifact
    description: auditor 1's report listing which spec sections are covered and which have no representation in the graph
    in_journeys: 3
  audit/ActorCoverageReport:
    type: artifact
    description: auditor 2's report listing which actors participate in journeys and which are orphaned
    in_journeys: 3
  audit/CrossModuleCoverageReport:
    type: artifact
    description: auditor 3's report listing which modules have cross-module connections and which are isolated
    in_journeys: 2
  audit/TrackAuditRound:
    type: artifact
    description: >-
      records the current audit-fix-reaudit cycle number and cumulative gaps fixed for progress tracking and termination
      decisions
    in_journeys: 21
  audit/ExactlyFourAuditors:
    type: rule
    description: >-
      depth audit always uses exactly 4 auditors checking spec coverage, actor coverage, cross-module coverage, and goal
      coverage
    in_journeys: 1
  audit/TargetedFixesOnly:
    type: rule
    description: audit gaps are fixed with targeted edits to specific modules, never by re-running the full creation pipeline
    in_journeys: 1
  audit/AuditAfterZeroErrors:
    type: rule
    description: audit only runs after compile.ts reports 0 errors and 0 orphans — never on a broken graph
    in_journeys: 3
  audit/AuditRoundLimit:
    type: rule
    description: >-
      audit-fix-reaudit cycles are capped at a maximum number of rounds to prevent infinite loops when gaps cannot be
      resolved
    in_journeys: 4
  audit/DetectFixContentLoss:
    type: process
    description: >-
      compares pre-fix and post-fix node and journey counts in the target module to detect a fix that removed existing
      content, implementing spec section 9's destructive edit protection for the audit fix pipeline
    in_journeys: 4
  audit/CheckGoalCoverage:
    type: process
    description: >-
      auditor 4 checks that each goal rule node derived from spec §8 is connected to at least one journey that exercises
      the goal's achievement path, flagging goals with no proving journeys
    in_journeys: 9
  audit/GoalCoverageReport:
    type: artifact
    description: >-
      auditor 4's report listing which goal rule nodes are connected to journeys proving achievement and which goals are
      orphaned or only referenced without an achievement path
    in_journeys: 3
  audit/DeterministicGapOrdering:
    type: rule
    description: >-
      gaps with equal severity must be ordered by a deterministic tiebreaker such as module name then gap type so that
      fix order is reproducible across runs and the audit-fix cycle produces the same final graph regardless of timing
    in_journeys: 2
  audit/VerifyAuditFindingStability:
    type: process
    description: >-
      compares two audit finding sets produced from identical compiled graph inputs to detect LLM-induced
      non-determinism, flagging findings that appear in one run but not the other as unstable
    in_journeys: 6
  audit/PerGapFixAttemptLimit:
    type: rule
    description: >-
      caps the number of fix attempts for any single gap to prevent an unfixable gap from consuming all LLM calls within
      a round, marking the gap as unresolvable after the limit is reached
    in_journeys: 3
  audit/SkipUnresolvableGap:
    type: process
    description: >-
      marks a gap as unresolvable after it has exhausted its per-gap fix attempt limit and advances to the next gap in
      the prioritized list so the fix round can continue making progress on other gaps
    in_journeys: 2
  audit/DetectFixIntroducedDependency:
    type: process
    description: >-
      after a fix adds cross-module journey steps to a target module, extracts the new module references and compares
      them against the declared dependency graph in ORGANIZATION.md to detect undeclared dependencies that the fix
      introduced
    in_journeys: 5
  audit/SafeguardNodesAreImmutableDuringFix:
    type: rule
    description: >-
      the self-reference safety nodes (ScopeFixToAvoidAuditBreak, DetectSelfAuditTarget, ReauditAfterSelfFix,
      DetectFixContentLoss) must not be modified or removed by any audit fix — they can only be changed through
      spec-driven reconvergence, preventing a fix from disabling its own safety checks
    in_journeys: 3
  audit/ValidateAuditorOutput:
    type: process
    description: >-
      checks that each auditor's raw LLM output is parseable into structured coverage findings with valid module names
      that exist in the compiled index, non-empty gap descriptions, and a recognized gap type before the output enters
      the findings collection pipeline
    in_journeys: 4
  codegen/ReadConvergedGraph:
    type: process
    description: >-
      reads the compiled index after convergence to extract all nodes with their types, descriptions, file paths,
      connection context (preceded_by, followed_by, triggered_by_actors), journey participation, and properties for
      skeleton generation
    in_journeys: 14
  codegen/GenerateProcessSkeletons:
    type: process
    description: >-
      creates a TypeScript class skeleton for each process node with a JSDoc header, optional config interface, and
      journey-derived method stubs
    in_journeys: 7
  codegen/FillImplementation:
    type: process
    description: delegates to LLM to fill the empty function bodies and class methods in a skeleton file with working code
    in_journeys: 22
  codegen/WriteGeneratedFile:
    type: process
    description: >-
      writes a generated TypeScript file to disk — either an unfilled skeleton during skeleton generation or a filled
      implementation during LLM fill — at the path declared in the node's files field
    in_journeys: 19
  codegen/ValidateFilledSyntax:
    type: process
    description: runs a TypeScript syntax and type check on the filled source file to catch LLM-generated errors before staging
    in_journeys: 24
  codegen/StageFilledModule:
    type: process
    description: >-
      writes the validated filled file to the staging directory rather than directly to the final output, allowing
      review before commit
    in_journeys: 5
  codegen/SelectNextModuleToFill:
    type: process
    description: picks the next unfilled module from the dependency-ordered build list and advances the pointer
    in_journeys: 9
  codegen/ConfirmAllModulesFilled:
    type: process
    description: >-
      checks that every module in the dependency-ordered build list has a filled source file on disk before signaling
      codegen completion
    in_journeys: 8
  codegen/BuildFillPrompt:
    type: process
    description: >-
      builds a structured fill prompt from the skeleton content, node name, description, and connection context
      (preceded_by, followed_by, triggered_by_actors) with rules instructing the LLM to replace stubs with working code
      while preserving signatures
    in_journeys: 4
  codegen/ProvideCodegenExcerpt:
    type: process
    description: >-
      assembles codegen-specific excerpt context including node descriptions, journey flows, and cross-module imports to
      guide the LLM fill
    in_journeys: 5
  codegen/RetryFillWithErrorFeedback:
    type: process
    description: >-
      sends the syntax or type errors from a failed fill back to the LLM as feedback and re-requests the fill with the
      original skeleton plus the error context
    in_journeys: 9
  codegen/DetectWorkerCrashDuringFill:
    type: process
    description: >-
      detects that the LLM worker process crashed, timed out, or disconnected during a fill task before the result was
      fully received
    in_journeys: 2
  codegen/ResumeFromLastFilledModule:
    type: process
    description: >-
      on restart after a partial crash, scans the generated code directory to find which modules already have filled
      files and resumes from the next unfilled module in build order
    in_journeys: 3
  codegen/SkipAndDeferFailedModule:
    type: process
    description: >-
      when a module fill fails after retries, skips it and continues with independent modules that do not depend on the
      failed one, deferring it for a later attempt
    in_journeys: 5
  codegen/RollbackCorruptedFill:
    type: process
    description: >-
      reverts a filled file back to its skeleton state when the fill passes syntax check but causes type errors in
      dependent modules downstream
    in_journeys: 5
  codegen/SkeletonFile:
    type: artifact
    description: >-
      a per-node TypeScript class file for a process node containing JSDoc context, optional config interface, and
      journey-derived method stubs ready for LLM to fill
    in_journeys: 15
  codegen/FilledSourceFile:
    type: artifact
    description: a TypeScript file with LLM-filled implementations for all node stubs in a module
    in_journeys: 19
  codegen/GeneratedCodeDirectory:
    type: artifact
    description: the output directory containing all generated TypeScript files organized by module
    in_journeys: 9
  codegen/ProcessNodesOnly:
    type: rule
    description: >-
      skeleton generation only targets process-type nodes, excluding artifact, interface, and rule nodes entirely
      regardless of whether they declare a files field
    in_journeys: 3
  codegen/FilesFieldRequired:
    type: rule
    description: >-
      skeleton generation only targets nodes that declare a files field, skipping all nodes without explicit file path
      mappings
    in_journeys: 2
  codegen/NeverOverwriteExisting:
    type: rule
    description: >-
      skeleton generation skips any file path where a file already exists on disk, preventing accidental overwrite of
      filled implementations
    in_journeys: 8
  codegen/EnsureOutputDirectory:
    type: process
    description: creates the output directory tree for a skeleton file if it does not already exist on disk before writing
    in_journeys: 3
  codegen/CodeComesFromNodes:
    type: rule
    description: every generated function, class, or interface maps directly to a node in the graph — no code exists without a node
    in_journeys: 4
  codegen/SkeletonBeforeFill:
    type: rule
    description: code generation always produces empty skeletons first, then LLM fills — never asks LLM to generate from scratch
    in_journeys: 1
  codegen/EnforceFillRetryLimit:
    type: process
    description: >-
      tracks fill retry count per module and triggers skip-and-defer when the configured maximum is exceeded, preventing
      infinite retry loops on persistently failing modules
    in_journeys: 2
  codegen/DetectNodeStubMismatch:
    type: process
    description: >-
      compares function and class exports in a filled file against the module's node list to detect added or removed
      stubs that violate CodeComesFromNodes
    in_journeys: 5
  codegen/DetectPlaceholderFill:
    type: process
    description: >-
      scans filled function bodies for placeholder patterns like throw-not-implemented, TODO comments, empty bodies, and
      return-undefined stubs that indicate the LLM did not produce real implementations
    in_journeys: 4
  codegen/DispatchByFileExtension:
    type: process
    description: >-
      selects the language-specific skeleton generator based on file extension, routing .ts and .js files to the
      TypeScript generator and all others to a generic comment skeleton
    in_journeys: 4
  codegen/EnrichSkeletonWithConnectionContext:
    type: process
    description: >-
      embeds node name, description, in_journeys, preceded_by, followed_by, and triggered_by_actors metadata as JSDoc
      comments in the skeleton header so the LLM understands the node's identity and graph context during fill
    in_journeys: 3
  codegen/GenerateConfigInterface:
    type: process
    description: >-
      generates a named Config interface from the node's properties map when properties exist, inferring TypeScript
      types from runtime value types via typeof, providing typed configuration for the implementation class
    in_journeys: 2
  codegen/GenerateJourneyMethodStubs:
    type: process
    description: >-
      creates one deduplicated async method stub per journey the node participates in, stripping step numbers and
      non-alphanumeric characters to produce camelCase method names, each annotated with a JSDoc journey reference and
      throwing NotImplemented
    in_journeys: 2
  codegen/CodegenResultSummary:
    type: artifact
    description: >-
      the exported CodegenResult interface returned by generateCodeSkeletons containing a generated list of bare file
      paths and a skipped list of reason-annotated diagnostic strings explaining why each node or file was excluded
    in_journeys: 3
  codegen/DetectCodeNeedsUpdate:
    type: process
    description: >-
      compares the current graph node metadata against the existing source file to determine if the code has drifted
      from the graph and needs an edit-based update rather than a fresh skeleton
    in_journeys: 2
  codegen/GenerateUpdateContext:
    type: process
    description: >-
      assembles the diff between the previous graph state and the current graph state for a node, producing targeted
      edit instructions that describe what changed in the node's description, connections, or journey participation
    in_journeys: 2
  codegen/ApplyEditToExistingCode:
    type: process
    description: >-
      sends the update context to the LLM worker with instructions to use Edit on the existing source file rather than
      regenerating it, preserving working code while updating only the parts that changed
    in_journeys: 4
  codegen/Mode2UpdateExisting:
    type: rule
    description: >-
      when a source file already exists for a node, codegen must update it via Edit rather than regenerating from
      scratch because full rewrites mask bugs
    in_journeys: 2
  compilation/YAMLParsing:
    type: process
    description: >-
      reads .yaml and .yml files from the modules directory, derives the module name from each filename, parses raw YAML
      into structured data, normalizes missing top-level fields (spec_sections, nodes, journeys) with empty defaults so
      downstream consumers never see undefined, and catches parse errors to surface them as tagged _parseError entries
      with empty defaults rather than crashing the compilation
    in_journeys: 21
  compilation/DuplicateDetection:
    type: process
    description: scans the node registry for duplicate node names across all modules
    in_journeys: 11
  compilation/DanglingRefDetection:
    type: process
    description: checks every journey step node reference and flags those that resolve to no known node
    in_journeys: 16
  compilation/OrphanDetection:
    type: process
    description: identifies nodes that are defined but never referenced in any journey step
    in_journeys: 12
  compilation/IsolatedModuleDetection:
    type: process
    description: >-
      finds modules with more than 3 nodes whose nodes have zero cross-module connections, exempting small modules with
      3 or fewer nodes from isolation checks
    in_journeys: 7
  compilation/ExternalRefClassification:
    type: process
    description: classifies unresolved refs as external sibling-engine references and emits warnings instead of errors
    in_journeys: 5
  compilation/YAMLErrorReporting:
    type: process
    description: >-
      collects _parseError tags from malformed modules and promotes them to severity-error ValidationIssues with module
      name and error message so parse failures appear in the final compilation report
    in_journeys: 14
  compilation/ValidationAggregation:
    type: process
    description: collects all errors and warnings from all validation checks into a single compilation result
    in_journeys: 12
  compilation/IncrementalValidation:
    type: process
    description: >-
      validates only the newly added module against the existing graph, checking for new duplicates, dangling refs, and
      type errors without full rebuild
    in_journeys: 2
  compilation/SkipMalformedModule:
    type: process
    description: >-
      excludes a module with fatal YAML parse errors from the compiled index, allowing compilation of remaining modules
      to continue
    in_journeys: 3
  compilation/ValidateModuleCompleteness:
    type: process
    description: >-
      checks that every module listed in ORGANIZATION.md exists as a compiled module in the index, ensuring no module
      was missed during bounded creation
    in_journeys: 6
  compilation/StaleConnectionDetection:
    type: process
    description: >-
      validates that every edge in the ConnectionSet has both source and target nodes present in the NodeRegistry,
      catching connections left stale after node removal or module rewrite
    in_journeys: 7
  compilation/CompilationResultComparison:
    type: process
    description: >-
      compares two CompilationResults or CompiledIndexes field by field for structural equality, flagging any
      differences as non-determinism or merge-order drift
    in_journeys: 4
  compilation/ParallelValidationDispatch:
    type: process
    description: >-
      dispatches independent validation checks (duplicates, dangling refs, orphans, isolation, stale connections)
      concurrently on the same CompiledIndex and collects their ErrorReports when all complete
    in_journeys: 2
  compilation/DirtyModuleTracking:
    type: process
    description: >-
      tracks which modules changed since the last successful compilation and identifies their cross-module dependents,
      enabling targeted revalidation instead of full recompilation
    in_journeys: 1
  compilation/SchemaViolationDetection:
    type: process
    description: >-
      validates each parsed module file has the required top-level structure (spec_sections as number array, nodes as
      map, journeys as map) before content parsing proceeds
    in_journeys: 7
  compilation/FieldLossDetection:
    type: process
    description: >-
      compares a module file before and after an LLM rewrite to detect any fields (including extension fields like
      files) that were silently dropped during the edit
    in_journeys: 4
  compilation/ValidateDescriptionQuality:
    type: process
    description: >-
      checks that every node has a meaningful description string, flagging nodes with missing or empty descriptions as
      warnings and descriptions exceeding 500 characters as warnings to prevent context window exhaustion
    in_journeys: 2
  compilation/NodeNameValidation:
    type: process
    description: >-
      validates that each node name follows PascalCase format (uppercase letter followed by letters and digits only) and
      emits a warning for names containing special characters or path separators
    in_journeys: 3
  compilation/JourneyNameValidation:
    type: process
    description: >-
      validates that each journey name follows PascalCase format (uppercase letter followed by letters and digits only)
      and emits a warning for names containing special characters or path separators
    in_journeys: 3
  compilation/CompilationResult:
    type: artifact
    description: >-
      the full output of compile.ts containing the CompiledIndex (all nodes with connections, all journeys with
      metadata, aggregate stats), a flat issues array of errors and warnings, and a per-module CoverageReport
    in_journeys: 93
  compilation/ErrorReport:
    type: artifact
    description: structured list of all validation errors with type, location, and message for each
    in_journeys: 58
  compilation/WarningReport:
    type: artifact
    description: structured list of all warnings including external refs that parent will validate later
    in_journeys: 8
  compilation/CompileCLI:
    type: interface
    description: >-
      command-line entry point for the compile command that invokes compile() on the given modules directory and prints
      aggregate stats as JSON followed by categorized error and warning counts to stdout
    in_journeys: 4
  compilation/ZeroErrorConvergence:
    type: rule
    description: convergence requires compile.ts to report exactly 0 errors and 0 orphans before proceeding
    in_journeys: 11
  compilation/DeterministicOrdering:
    type: rule
    description: >-
      all output lists in CompilationResult, ErrorReport, and WarningReport are sorted by a canonical key (module name,
      then node name, then journey name) so file system read order and check execution order never affect the output
    in_journeys: 3
  compilation/EarlyTerminationRule:
    type: rule
    description: >-
      halts remaining validation checks when accumulated error count exceeds a configurable threshold, returning the
      partial result immediately to avoid wasted work on a clearly failing compilation
    in_journeys: 5
  compilation/ValidateActionQuality:
    type: process
    description: >-
      post-compilation check that iterates every journey step and emits a warning for actions that are empty or shorter
      than 5 characters, reporting the journey name, step number, and module for each violation
    in_journeys: 1
  compilation/DetectDuplicateSequences:
    type: process
    description: >-
      post-compilation analysis that slides a 3-step window across every journey's node sequence, deduplicates journey
      names per window, and returns structured records of sequences shared by two or more distinct journeys indicating
      potential copy-paste or redundancy
    in_journeys: 2
  compilation/ExternalRefsAreWarnings:
    type: rule
    description: unresolved refs to sibling engines are warnings in children, errors only at parent level
    in_journeys: 1
  compilation/EmptyModuleDirectoryDetection:
    type: process
    description: >-
      detects when the modules directory contains zero YAML files and reports a tagged _parseError on an _empty module
      entry instead of producing a silent empty compiled index, while a missing directory returns an empty module map
      without error
    in_journeys: 1
  compilation/FileReadFailureHandling:
    type: process
    description: >-
      catches file I/O errors (permission denied, file locked, disk error) when reading a module YAML file and records
      the failure without crashing the compilation run
    in_journeys: 1
  compilation/UnlistedModuleDetection:
    type: process
    description: >-
      compares compiled module files on disk against the ORGANIZATION.md module list and flags modules that exist as
      YAML files but are not listed in the organization
    in_journeys: 2
  compilation/ConcurrentWriteDetection:
    type: process
    description: >-
      detects when a module file was modified during compilation by comparing file modification timestamps before and
      after reading, catching half-written files from concurrent LLM edits
    in_journeys: 2
  compilation/DuplicateJourneyDetection:
    type: process
    description: >-
      scans the journey registry for duplicate journey names across all modules, analogous to DuplicateDetection for
      nodes
    in_journeys: 1
  compilation/PersistCompilationArtifacts:
    type: process
    description: >-
      creates the compiled/ directory as a sibling to the modules directory if needed, then serializes the compiled
      index and coverage report to index.yaml and coverage.yaml using wide line wrapping and no YAML anchors for
      human-readable output
    in_journeys: 1
  compilation/CoverageComputation:
    type: process
    description: >-
      computes per-module coverage metrics including node count, journey count, connection count, cross-module
      connections, and spec section claims, then derives orphan nodes with zero connections and journey memberships, and
      isolated modules with more than 3 nodes but zero cross-module connections
    in_journeys: 4
  compilation/ModuleCoverageReport:
    type: artifact
    description: >-
      the coverage section of the compile result containing per-module metrics, orphan list, and isolated module list
      returned alongside errors and warnings
    in_journeys: 2
  compilation/CompileFromModules:
    type: process
    description: >-
      in-memory compilation pipeline that accepts a pre-loaded module map and optional external interfaces, first
      collecting parse errors from malformed modules, then orchestrating node collection, journey resolution, connection
      computation, validation, stale connection detection, stats, and coverage, merging issues from all five phases into
      a deterministically sorted flat array and stamping a compiled timestamp on the index
    in_journeys: 4
  compilation/NodeTypeValidation:
    type: process
    description: >-
      validates that each node's type field is one of the five universal types (actor, process, artifact, interface,
      rule) and emits an error for any node with an invalid type
    in_journeys: 3
  compilation/ExternalInterfaceResolution:
    type: process
    description: >-
      resolves cross-engine node references using flexible name matching against the sibling's provides map, emitting an
      error when the node is not found in a loaded interface, or degrading to a warning when no external interfaces are
      available so the parent can validate later
    in_journeys: 2
  compilation/DefaultMissingModuleFields:
    type: process
    description: >-
      defaults missing top-level fields (spec_sections to empty array, nodes to empty map, journeys to empty map) during
      parsing, tolerating partial module files without schema errors
    in_journeys: 2
  compilation/StatsComputation:
    type: process
    description: >-
      computes aggregate statistics including total_nodes, total_journeys, total_connections, modules count, orphans,
      isolated_modules, and duplicate_names from the compiled registries
    in_journeys: 2
  convergence/ReadSpec:
    type: process
    description: reads spec.md from disk as the sole human input to the convergence pipeline
    in_journeys: 31
  convergence/RetryOnLLMTimeout:
    type: process
    description: >-
      wraps worker.call with retry logic that detects timeout errors by string matching, retries up to 3 times with
      fixed backoff delays of 5s, 15s, and 45s, and propagates non-timeout errors immediately
    in_journeys: 3
  convergence/WriteOrganization:
    type: process
    description: delegates to LLM to analyze the spec and write ORGANIZATION.md with modules, dependencies, and independence
    in_journeys: 13
  convergence/DiscoverActors:
    type: process
    description: delegates to LLM to discover actors from 3 angles (activities, threats, lifecycle) and write _actors.yaml
    in_journeys: 10
  convergence/HierarchyDecision:
    type: process
    description: delegates to LLM to decide whether the module set should split into child engines based on independence analysis
    in_journeys: 14
  convergence/ModuleCreation:
    type: process
    description: iterates over modules from ORGANIZATION.md, making one LLM call per module with compile between each
    in_journeys: 21
  convergence/BoundedCreationLoop:
    type: process
    description: creates modules in build-order rounds, compiling after each to catch errors before the next module
    in_journeys: 20
  convergence/CompileCheck:
    type: process
    description: invokes compile.ts after each module creation and after all modules to verify 0 errors and 0 orphans
    in_journeys: 58
  convergence/TargetedAudit:
    type: process
    description: dispatches 3 auditors to check spec coverage, actor coverage, and cross-module coverage after compilation passes
    in_journeys: 19
  convergence/AuditGapFix:
    type: process
    description: takes audit findings and makes targeted LLM calls to fix specific coverage gaps without re-creating from scratch
    in_journeys: 12
  convergence/RecompileAfterFix:
    type: process
    description: runs compile.ts again after audit fixes to verify the fixes did not introduce new errors
    in_journeys: 8
  convergence/ReauditAfterFix:
    type: process
    description: runs targeted audit again after successful recompile to verify gaps are closed
    in_journeys: 4
  convergence/TriggerPublish:
    type: process
    description: invokes publish.ts to generate interface.yaml and changelog.yaml after convergence is confirmed
    in_journeys: 33
  convergence/TriggerCodegen:
    type: process
    description: invokes codegen.ts to generate TypeScript skeletons from the converged graph
    in_journeys: 15
  convergence/TriggerTestgen:
    type: process
    description: invokes testgen.ts to generate test skeletons from journey steps
    in_journeys: 13
  convergence/ExecuteTests:
    type: process
    description: executes generated tests and collects pass/fail results
    in_journeys: 27
  convergence/FixTestFailures:
    type: process
    description: delegates to LLM to fix failing tests and re-runs until all pass
    in_journeys: 9
  convergence/EnterSleepMode:
    type: process
    description: sets up fs.watch on event files and enters zero-cost sleep until a change event arrives
    in_journeys: 31
  convergence/WakeOnEvent:
    type: process
    description: wakes from sleep when fs.watch detects an event file change from a dependency
    in_journeys: 14
  convergence/TargetedReconvergence:
    type: process
    description: runs compile + audit on only the stale modules identified by sync, skipping full creation
    in_journeys: 55
  convergence/MapPerspectives:
    type: process
    description: >-
      identifies which perspectives are relevant to each module based on its content domain and assigns the bounded set
      of lenses
    in_journeys: 3
  convergence/ExamineFromPerspective:
    type: process
    description: delegates to LLM to examine a single module from a single perspective and add missing nodes and journeys
    in_journeys: 8
  convergence/RetryModuleCreation:
    type: process
    description: >-
      retries module creation by passing the compilation error report to the LLM so it can fix the specific problems in
      its output
    in_journeys: 1
  convergence/RollbackFailedFix:
    type: process
    description: reverts a module file to its pre-fix state when an audit fix introduced new compilation errors
    in_journeys: 7
  convergence/ResumePipeline:
    type: process
    description: reads ConvergenceState on startup to find the last completed pipeline step and resumes execution from that point
    in_journeys: 6
  convergence/DetectWorkerFailure:
    type: process
    description: detects when the LLM worker process has crashed or become unresponsive during a task
    in_journeys: 9
  convergence/RespawnWorker:
    type: process
    description: terminates the failed worker process and spawns a fresh one with the same task context
    in_journeys: 3
  convergence/ValidateCreationCompleteness:
    type: process
    description: >-
      checks that every module listed in ORGANIZATION.md exists as a YAML file on disk after the creation pipeline
      finishes
    in_journeys: 2
  convergence/ValidatePerspectiveCompleteness:
    type: process
    description: checks that every module-perspective pair in the mapping was examined during the enrichment pipeline
    in_journeys: 2
  convergence/ValidateActorCompleteness:
    type: process
    description: >-
      checks that all 3 actor discovery angles produced results and the merged _actors.yaml covers activities, threats,
      and lifecycle
    in_journeys: 6
  convergence/PipelineInvariantCheck:
    type: process
    description: verifies that all pipeline phases completed in the correct order before allowing convergence to be declared
    in_journeys: 9
  convergence/HandleWorkerCompaction:
    type: process
    description: >-
      orchestrates context compaction in the LLM worker during long creation or enrichment loops so the pipeline
      continues without losing progress
    in_journeys: 1
  convergence/SplitIntoChildEngines:
    type: process
    description: distributes modules to child engines and spawns independent convergence pipelines when hierarchy decides to split
    in_journeys: 6
  convergence/CollectChildResults:
    type: process
    description: >-
      waits for all child engines to converge and collects their published interfaces for parent-level cross-engine
      validation
    in_journeys: 2
  convergence/DetectSelfModification:
    type: process
    description: >-
      detects when reconvergence would modify modules that describe the currently running pipeline such as convergence,
      compilation, or graph
    in_journeys: 7
  convergence/StageGeneratedCode:
    type: process
    description: >-
      writes codegen output to a staging directory instead of overwriting the running code, so the active pipeline is
      not modified mid-run
    in_journeys: 3
  convergence/SwapGeneratedCode:
    type: process
    description: atomically replaces the running code with the staged generated code after all tests pass on the staged version
    in_journeys: 2
  convergence/ValidateSelfConsistency:
    type: process
    description: checks that self-referential modules accurately describe the behavior of the running code they were generated from
    in_journeys: 8
  convergence/DetectAuditCycleExhaustion:
    type: process
    description: >-
      detects when audit-fix-reaudit cycles have reached the audit round limit without converging to zero gaps, halting
      further audit cycles
    in_journeys: 2
  convergence/DetectWakeOscillation:
    type: process
    description: >-
      detects when the sleep-wake-reconverge-publish cycle has repeated beyond the oscillation threshold, suppressing
      further wake responses
    in_journeys: 2
  convergence/DetectEnrichmentExhaustion:
    type: process
    description: >-
      detects when a perspective enrichment pass has exhausted its retry budget after repeated compilation failures on
      the same module-perspective pair
    in_journeys: 1
  convergence/DetectPipelineStall:
    type: process
    description: >-
      detects when the overall pipeline has not made measurable forward progress across consecutive cycles, indicating a
      stuck state requiring human intervention
    in_journeys: 5
  convergence/VerifyReconvergenceIdempotency:
    type: process
    description: >-
      runs targeted reconvergence a second time on the same stale module set and compares the resulting graph against
      the first pass to confirm no additional changes were introduced
    in_journeys: 3
  convergence/VerifyAuditDeterminism:
    type: process
    description: >-
      runs the same 3 auditors twice on an identical compiled graph and compares the two sets of findings to detect
      non-deterministic audit results from LLM-based auditors
    in_journeys: 3
  convergence/VerifyPublishDeterminism:
    type: process
    description: >-
      runs publish twice on the same converged graph and compares the interface.yaml and changelog.yaml outputs
      byte-for-byte to confirm deterministic publish output
    in_journeys: 5
  convergence/VerifyEnrichmentStability:
    type: process
    description: >-
      re-examines an already-enriched module from the same perspective and verifies the LLM proposes no further
      additions, confirming the enrichment reached a stable fixpoint
    in_journeys: 5
  convergence/VerifyConvergenceStateDeterminism:
    type: process
    description: >-
      compares two ConvergenceState snapshots produced from identical spec inputs to confirm the pipeline produces
      deterministic end states regardless of timing or execution order
    in_journeys: 5
  convergence/ParallelModuleCreation:
    type: process
    description: >-
      identifies modules at the same dependency depth that have no dependencies on each other and dispatches their
      creation to separate workers concurrently, compiling after each batch completes
    in_journeys: 8
  convergence/ParallelPerspectiveEnrichment:
    type: process
    description: >-
      identifies independent module-perspective pairs that touch no overlapping modules and dispatches their enrichment
      to separate workers concurrently, compiling after each batch completes
    in_journeys: 3
  convergence/ChunkLargeSpec:
    type: process
    description: >-
      splits a spec that exceeds the LLM context limit into overlapping sections with shared context headers so each
      chunk can be processed independently while preserving cross-section references
    in_journeys: 4
  convergence/ThrottleWakeEvents:
    type: process
    description: >-
      limits the number of concurrent wake-reconverge cycles when many dependencies publish events simultaneously,
      queuing excess events for sequential processing after the current batch
    in_journeys: 5
  convergence/ValidateConvergenceStateIntegrity:
    type: process
    description: >-
      reads the ConvergenceState file on startup and validates its structure including required fields, valid phase
      values, and consistent module lists before the pipeline trusts it
    in_journeys: 7
  convergence/RecoverFromCorruptState:
    type: process
    description: >-
      rebuilds ConvergenceState from disk artifacts when the state file is missing, corrupted, or structurally invalid
      by scanning existing module files, compilation results, and published interfaces
    in_journeys: 5
  convergence/DetectPartialModuleWrite:
    type: process
    description: >-
      scans module YAML files on disk for truncation or structural damage such as missing required fields or broken YAML
      syntax that could result from a crash during a write operation
    in_journeys: 6
  convergence/RecoverSleepWatcher:
    type: process
    description: >-
      detects that the fs.watch file watcher has stopped firing events by using a periodic heartbeat check and restarts
      the watcher to ensure the box does not silently stop monitoring dependency changes
    in_journeys: 5
  convergence/RecoverFromChildEngineCrash:
    type: process
    description: >-
      detects when a child engine process has crashed during a hierarchy split and restarts the child from its scoped
      spec and last known module state or escalates to the parent for manual review
    in_journeys: 4
  convergence/RetryOrganization:
    type: process
    description: >-
      retries the organization step when the LLM produces an invalid or incomplete ORGANIZATION.md by passing the
      validation errors as context for a corrected attempt
    in_journeys: 1
  convergence/RetryActorDiscovery:
    type: process
    description: >-
      retries actor discovery when the LLM produces an invalid or incomplete _actors.yaml by passing the validation
      errors as context for a corrected attempt
    in_journeys: 1
  convergence/RetryHierarchyDecision:
    type: process
    description: >-
      retries the hierarchy decision step when the LLM produces an unparseable or invalid split-or-no-split response by
      passing the validation errors as context for a corrected attempt
    in_journeys: 1
  convergence/FullGraphCheckAfterReconvergence:
    type: process
    description: >-
      runs a full compilation across all modules after targeted reconvergence completes to catch cross-module breakage
      from changes to stale modules before publishing
    in_journeys: 2
  convergence/SelfAuditOwnCode:
    type: process
    description: >-
      reads the running source code and goal nodes to identify what is preventing each goal from being actually
      achieved, producing a list of blockers
    in_journeys: 9
  convergence/ClassifyBlockerType:
    type: process
    description: >-
      classifies each self-audit blocker as a code bug, missing feature, or spec gap and routes it to the appropriate
      fix or notification path
    in_journeys: 5
  convergence/FlagSpecGap:
    type: process
    description: records spec gaps found during self-audit that require human updates to spec.md and notifies the ProjectOwner
    in_journeys: 2
  convergence/CreateBlockerJourney:
    type: process
    description: >-
      creates a new journey in the relevant module that exercises the specific blocked goal path so a test can be
      generated for it
    in_journeys: 3
  convergence/VerifyGoalsAgainstEvidence:
    type: process
    description: >-
      re-evaluates each goal against real runtime evidence including test results, code behavior, and outputs to
      classify goals as PROVEN or UNPROVEN
    in_journeys: 5
  convergence/SkipPublishOnUnchangedHash:
    type: process
    description: >-
      compares the post-reconvergence interface hash against the previously published hash and skips publish when they
      match, preventing unnecessary wake cascades to downstream boxes
    in_journeys: 7
  convergence/ConcurrentChildLimit:
    type: rule
    description: >-
      caps the number of child engine processes that can run simultaneously during hierarchy splits, queuing remaining
      children until a running child completes
    in_journeys: 3
  convergence/SpecFile:
    type: artifact
    description: the spec.md file written by the ProjectOwner as the sole human input
    in_journeys: 9
  convergence/ConvergenceState:
    type: artifact
    description: tracks current pipeline step, completed modules, audit results, and convergence status
    in_journeys: 192
  convergence/StagingDirectory:
    type: artifact
    description: temporary directory holding generated code that will replace the running code after tests pass
    in_journeys: 2
  convergence/ConvergenceCLI:
    type: interface
    description: command-line interface to trigger and monitor the convergence pipeline
    in_journeys: 16
  convergence/StopConvergenceProcesses:
    type: process
    description: >-
      reads pids.json to find running convergence process tree, kills children first then main process with
      cross-platform support, and deletes the pid file
    in_journeys: 4
  convergence/ShowRunningProcesses:
    type: process
    description: >-
      reads pids.json and convergence-state.json to display running convergence processes with their PIDs, child
      engines, and current graph stats
    in_journeys: 2
  convergence/CheckConvergenceStatus:
    type: process
    description: >-
      evaluates whether zero errors, zero orphans, zero isolated modules, and zero duplicates are met against compiled
      stats, generating actionable fix guidance for each unmet criterion
    in_journeys: 2
  convergence/LoadProjectConfig:
    type: process
    description: >-
      reads genome/config.json if it exists and merges user overrides with default values for maxRounds, model,
      maxFixAttempts, maxZeroDelta, minModulesForSplit, watchIntervalMs, sessionResetChars, messageTimeoutMs,
      maxHierarchyDepth, maxAuditCycles, eventDebounceMs, and maxConcurrentChildren
    in_journeys: 4
  convergence/ProjectConfig:
    type: artifact
    description: >-
      the merged configuration controlling pipeline behavior including LLM model, retry limits, split thresholds, and
      watch intervals
    in_journeys: 1
  convergence/EnsureOutputDirectories:
    type: process
    description: >-
      creates the modules, .internal, compiled, and published directories under genome/ with recursive mkdir if they do
      not already exist
    in_journeys: 2
  convergence/WritePidFile:
    type: process
    description: >-
      writes genome/pids.json tracking the convergence process PID, worker status, child engine PIDs, and start
      timestamp for clean shutdown via the stop command
    in_journeys: 3
  convergence/SkipToWatchIfConverged:
    type: process
    description: >-
      on startup checks convergence-state.json, validates state structure against allowed statuses, compares both the
      current interface hash and spec hash against stored values, skipping the full pipeline and entering watch mode
      directly if already converged with unchanged spec, bypassed when --once flag is set
    in_journeys: 3
  convergence/SinglePassMode:
    type: rule
    description: >-
      when the --once flag is passed, runs a single convergence pass and exits instead of entering the watch loop, used
      for testing and child engine processes
    in_journeys: 1
  convergence/CodeOrchestratesLLMCreates:
    type: rule
    description: code decides WHEN to act, LLM only creates content when explicitly asked by code
    in_journeys: 1
  convergence/BoundedCreationRule:
    type: rule
    description: creation is bounded by modules times relevant lenses, never an open-ended loop
    in_journeys: 6
  convergence/NeverOpenEndedLoop:
    type: rule
    description: LLM is never asked open-ended questions in a loop — bounded creation plus targeted fixes only
    in_journeys: 14
  convergence/DataDecidesWhenToStop:
    type: rule
    description: no hardcoded limits on module count or audit rounds — the data determines convergence
    in_journeys: 10
  convergence/OnlyHumanInputIsSpec:
    type: rule
    description: spec.md is the only human-written input, everything else is auto-generated
    in_journeys: 3
  convergence/BoundedRetryRule:
    type: rule
    description: retry attempts for any single module creation or fix are capped to prevent infinite retry loops
    in_journeys: 23
  convergence/AllPhasesCompleteRule:
    type: rule
    description: >-
      convergence requires organization, actors, hierarchy, creation, perspectives, compilation, and audit all recorded
      as complete in ConvergenceState
    in_journeys: 1
  convergence/NeverModifyRunningCode:
    type: rule
    description: generated code must be staged and tested before replacing the running pipeline code — never overwrite in place
    in_journeys: 4
  convergence/ReconvergenceDepthLimit:
    type: rule
    description: >-
      enforces a maximum nesting depth for targeted reconvergence chains to prevent unbounded
      reconvergence-triggers-reconvergence loops
    in_journeys: 2
  convergence/GenomeIsProtocolNotTool:
    type: rule
    description: >-
      genome8 is a self-describing protocol that manages itself — same convergence.ts runs at every level, the graph
      describes its own architecture, and the protocol applies to any system
    in_journeys: 3
  convergence/ProductionReadyNoShortcuts:
    type: rule
    description: >-
      no hacks or shortcuts — every change is validated by compilation, tested by journey tests, protected by
      destructive edit detection, bounded by retry limits, and staged before deployment
    in_journeys: 3
  convergence/SelfSustainingWithoutHumans:
    type: rule
    description: >-
      the system runs autonomously after initial spec — sleep/wake cycle monitors for changes at zero cost, event-driven
      ripple propagates updates, and reconvergence restores consistency without human intervention
    in_journeys: 3
  convergence/WarmWorkersAcrossPhases:
    type: rule
    description: >-
      never kill LLM workers between pipeline phases — warm workers are more reliable than fresh spawns, Claude Code
      handles its own compaction
    in_journeys: 1
  convergence/JourneyTestsAreValidation:
    type: rule
    description: >-
      run real tests from real journeys instead of relying on LLM-judged validation — journey steps are test cases,
      compile-and-run proves correctness
    in_journeys: 2
  convergence/BatchHeavyOperations:
    type: rule
    description: >-
      error fixes in batches of 5, test fills in batches of 10 — single massive LLM calls timeout, bounded batches
      complete reliably
    in_journeys: 2
  convergence/AutoScaffoldProjectFiles:
    type: rule
    description: auto-create package.json and tsconfig.json so the user writes ONLY spec.md — no manual project setup required
    in_journeys: 2
  convergence/SourceOfTruthHierarchy:
    type: rule
    description: >-
      spec.md is authority, graph derives from spec, code derives from graph, tests derive from journeys — conflicts are
      always resolved by re-deriving from the higher authority
    in_journeys: 6
  convergence/EveryChangeStartsInSpec:
    type: rule
    description: >-
      to add features, edit the spec first then converge — never edit code to add features, the graph and code follow
      automatically
    in_journeys: 1
  convergence/CodeFixesAreOKForBugs:
    type: rule
    description: code-only fixes are permitted for bugs that journey tests validate — Step 4d syncs code changes back to graph
    in_journeys: 1
  convergence/NoSeparateDocumentationFiles:
    type: rule
    description: >-
      the graph IS the documentation — no standalone goal docs, architecture docs, or roadmap files; they all live as
      nodes and journeys
    in_journeys: 2
  convergence/NoIgnoredTestFailures:
    type: rule
    description: >-
      every test failure must be diagnosed (code bug, test bug, or graph bug) and fixed — never skip or suppress failing
      tests
    in_journeys: 2
  convergence/NoDriftBetweenLayers:
    type: rule
    description: >-
      spec, graph, code, and tests must never drift apart — the source of truth hierarchy and reconvergence enforce
      alignment at every level
    in_journeys: 5
  convergence/ScaffoldProject:
    type: process
    description: >-
      detects the project language from spec hints or existing files, then auto-creates package.json and tsconfig.json
      so the user writes only spec.md
    in_journeys: 5
  convergence/ExtractGoals:
    type: process
    description: >-
      reads spec §8 goals and derives rule nodes from each goal, writing them to _goals.yaml as the authoritative goal
      set for audit and self-healing verification
    in_journeys: 6
  convergence/ReconcileCodeWithGraph:
    type: process
    description: >-
      compares existing source code files against graph nodes to detect drift where code has diverged from the graph,
      updating the relevant module to reflect the actual code behavior
    in_journeys: 8
  convergence/WakeOnSpecChange:
    type: process
    description: >-
      detects spec.md modification via fs.watch, computes a hash diff against the stored spec hash, and identifies which
      modules are affected by the change via LLM analysis of the diff
    in_journeys: 5
  convergence/WakeOnCodeChange:
    type: process
    description: >-
      detects src/ file modification via fs.watch and routes the changed file to code-to-graph reconciliation instead of
      the dependency-triggered reconvergence path
    in_journeys: 5
  convergence/RetryGoalExtraction:
    type: process
    description: >-
      retries goal extraction when the LLM produces invalid or incomplete _goals.yaml by passing the validation errors
      as context for a corrected attempt
    in_journeys: 1
  convergence/RetryCodegenPipeline:
    type: process
    description: >-
      retries the codegen step when skeleton generation or implementation filling fails at the orchestrator level by
      passing the failure details as context for a fresh attempt
    in_journeys: 1
  convergence/RetryPublish:
    type: process
    description: >-
      retries the publish step when interface.yaml writing, changelog generation, or event file writing fails due to
      disk errors or hash computation failures
    in_journeys: 1
  convergence/RetryReconciliation:
    type: process
    description: >-
      retries code-to-graph reconciliation when the graph update produces compilation errors by passing the error report
      as context for a corrected reconciliation attempt
    in_journeys: 1
  convergence/VerifyCreationOrderIndependence:
    type: process
    description: >-
      compares the compiled graph produced by parallel module creation against the graph produced by sequential creation
      on the same module set to confirm order does not affect the result
    in_journeys: 5
  convergence/VerifySelfAuditDeterminism:
    type: process
    description: >-
      runs self-audit twice on the same converged code and goals and compares the two blocker lists to detect
      non-deterministic LLM output in the self-healing pipeline
    in_journeys: 5
  convergence/DetectSelfHealingExhaustion:
    type: process
    description: >-
      detects when the self-audit → fix → re-verify cycle has reached the configured maximum number of self-improvement
      rounds without all goals reaching PROVEN status
    in_journeys: 2
  convergence/HandleStalledChildEngine:
    type: process
    description: >-
      detects when a child engine exits cleanly with STALLED status instead of CONVERGED and decides whether to retry
      the child, absorb its partial results, or escalate to the parent for manual review
    in_journeys: 5
  convergence/ValidateDependencyGraphAccuracy:
    type: process
    description: >-
      after compilation, compares actual cross-module references extracted from journey steps against the declared
      dependency graph in ORGANIZATION.md to detect undeclared dependencies that break build order and unused declared
      dependencies that indicate unnecessary coupling
    in_journeys: 6
  convergence/FlagRestartRequired:
    type: process
    description: >-
      records that the running pipeline code differs from the on-disk code after a direct code edit to a
      self-referential file, flagging that a process restart is needed before the pipeline can trust its own behavior
    in_journeys: 2
  convergence/PrioritizeMixedWakeEvents:
    type: process
    description: >-
      when spec change, code change, and dependency events arrive simultaneously during the same debounce window, orders
      processing by source of truth hierarchy — spec first, then code reconciliation, then dependency reconvergence — to
      prevent lower-priority changes from being overwritten by higher-priority ones
    in_journeys: 4
  convergence/SerializeConvergenceStateWrites:
    type: rule
    description: >-
      ensures only one worker updates ConvergenceState at a time during parallel module creation or parallel perspective
      enrichment by acquiring an exclusive write lock before modifying the state file
    in_journeys: 4
  convergence/PreventDuplicateInstance:
    type: process
    description: >-
      on startup reads pids.json and checks whether the recorded process is still alive — if a convergence process is
      already running on this project directory, exits with an error instead of starting a second concurrent instance
    in_journeys: 5
  convergence/CreateTemporaryTestProject:
    type: process
    description: >-
      creates a temporary directory with a minimal spec.md describing a small system (e.g., greeting app) for
      integration self-testing
    in_journeys: 4
  convergence/RunConvergenceOnTestProject:
    type: process
    description: spawns a child convergence process on the temporary test project and waits for it to reach CONVERGED status
    in_journeys: 5
  convergence/VerifyTestProjectProducesCode:
    type: process
    description: checks that the temporary test project has generated working code by verifying output files exist and compile
    in_journeys: 3
  convergence/EditTestProjectSpec:
    type: process
    description: modifies the temporary test project's spec.md to trigger a spec-change wake event
    in_journeys: 2
  convergence/VerifyWatchModeWakes:
    type: process
    description: confirms the convergence process on the test project detected the spec change and performed targeted reconvergence
    in_journeys: 4
  convergence/EditTestProjectCode:
    type: process
    description: modifies a generated source file in the temporary test project to trigger a code-change wake event
    in_journeys: 2
  convergence/VerifyCodeToGraphSyncWorks:
    type: process
    description: confirms the convergence process detected the code change and reconciled it back to the graph
    in_journeys: 4
  convergence/CleanupTemporaryTestProject:
    type: process
    description: removes the temporary test project directory and kills any child processes spawned for it
    in_journeys: 4
  convergence/IntegrationSelfTestResult:
    type: artifact
    description: records PASS or FAIL for each integration self-test scenario with failure details if any behavior broke
    in_journeys: 4
  events/RegisterEventWatchers:
    type: process
    description: sets up fs.watch on each dependency's event file directory to monitor for new publish events
    in_journeys: 11
  events/DetectEventFileChange:
    type: process
    description: receives a filesystem notification from fs.watch when an event file is created or modified
    in_journeys: 25
  events/ReadEventFile:
    type: process
    description: reads the contents of the changed event file to determine which dependency published and what changed
    in_journeys: 36
  events/DelegateToSync:
    type: process
    description: passes the event data to sync.ts to check dependency hashes and find affected modules
    in_journeys: 24
  events/EnterSleep:
    type: process
    description: suspends the engine process after all watchers are registered, consuming zero CPU until an event arrives
    in_journeys: 14
  events/WakeFromSleep:
    type: process
    description: resumes the engine process when fs.watch fires a callback, transitioning from sleep to active processing
    in_journeys: 4
  events/DeregisterEventWatchers:
    type: process
    description: tears down all fs.watch watchers when the engine shuts down or the box is removed
    in_journeys: 3
  events/DebounceEvents:
    type: process
    description: batches rapid successive events into a single sync trigger to avoid redundant reconvergence
    in_journeys: 19
  events/PropagateRipple:
    type: process
    description: after this box reconverges and republishes, its own event file triggers watchers in downstream dependents
    in_journeys: 8
  events/ValidateEventFileFormat:
    type: process
    description: >-
      checks that the event file contains valid JSON with required fields including interface hash, sequence number,
      origin chain, and changelog before passing to sync
    in_journeys: 20
  events/LogEventReceived:
    type: process
    description: >-
      records the received event with timestamp, source dependency, sequence number, and disposition into the event log
      for observability
    in_journeys: 26
  events/UpdateWatcherAfterDependencyChange:
    type: process
    description: >-
      adds fs.watch instances for newly added dependencies and removes instances for dropped dependencies without
      tearing down existing watchers
    in_journeys: 4
  events/ConfirmWatcherHealth:
    type: process
    description: >-
      checks that all registered fs.watch instances are still active and responsive, detecting any that were silently
      dropped by the OS
    in_journeys: 7
  events/DetectWatcherCrash:
    type: process
    description: >-
      detects when an fs.watch instance emits an error event or throws an exception instead of delivering a normal
      change notification
    in_journeys: 5
  events/HandleEventReadFailure:
    type: process
    description: >-
      catches IO errors when reading an event file from disk including file deleted between notification and read,
      permission denied, or disk IO error
    in_journeys: 3
  events/HandleInvalidEventPayload:
    type: process
    description: >-
      catches validation failures when the event file exists but contains malformed JSON, missing required fields, or
      unparseable values and produces a structured error
    in_journeys: 5
  events/ReregisterCrashedWatcher:
    type: process
    description: >-
      tears down the failed fs.watch instance, releases its kernel handle, and creates a replacement watcher for the
      same dependency event file path
    in_journeys: 5
  events/DetectSyncDelegationFailure:
    type: process
    description: >-
      catches errors thrown by sync.ts when it fails to process the delegated event such as unreachable dependency
      interface or hash store corruption
    in_journeys: 3
  events/LogEventFailure:
    type: process
    description: >-
      records event processing failures with error type, source dependency, failing step, and stack trace into the event
      log for diagnosis
    in_journeys: 13
  events/RetryEventProcessing:
    type: process
    description: >-
      re-reads and re-processes a failed event file after a brief delay, attempting recovery before escalating to
      convergence
    in_journeys: 3
  events/ExtractOriginChain:
    type: process
    description: >-
      reads the ripple origin chain from the validated event payload and makes it available for oscillation detection by
      sync before delegation
    in_journeys: 5
  events/ExtractEventSequenceNumber:
    type: process
    description: >-
      reads the event sequence number from the validated event payload and makes it available for ordering and dedup
      checks by sync before delegation
    in_journeys: 6
  events/SuppressUnchangedRipple:
    type: process
    description: >-
      blocks event file write and outgoing propagation when publish reports that the interface hash did not change after
      reconvergence, absorbing the ripple at this box
    in_journeys: 3
  events/AdjustCooldownWindow:
    type: process
    description: >-
      widens the oscillation cooldown window when multiple events arrive in rapid succession and narrows it back during
      stable periods with no events
    in_journeys: 3
  events/TrackRippleDepth:
    type: process
    description: >-
      reads the origin chain length from the incoming event and records the current ripple depth for logging and
      enforcement by downstream propagation checks
    in_journeys: 2
  events/BatchWatcherRegistration:
    type: process
    description: >-
      registers fs.watch instances in batches with a configurable concurrency limit to avoid overwhelming the OS kernel
      when a box has many dependencies
    in_journeys: 4
  events/TruncateEventLog:
    type: process
    description: >-
      removes the oldest entries from the event log when it exceeds a configured maximum entry count, preserving only
      the most recent entries
    in_journeys: 2
  events/PrioritizeEventsByImpact:
    type: process
    description: >-
      when a debounce batch contains many events, sorts them by the number of local modules each dependency affects so
      the highest-impact changes are processed first
    in_journeys: 6
  events/StreamLargeEventPayload:
    type: process
    description: >-
      reads oversized event files in a streaming fashion rather than loading the full content into memory, extracting
      only the required hash, sequence, origin chain, and changelog fields
    in_journeys: 4
  events/CrossCheckEventHashAgainstInterface:
    type: process
    description: >-
      fetches the dependency's actual interface.yaml from disk and compares its hash against the hash claimed in the
      event payload to detect stale or spoofed events
    in_journeys: 3
  events/DetectDuplicateEventSequence:
    type: process
    description: >-
      compares the incoming event's sequence number against the last-processed sequence for that dependency and
      suppresses the event if the sequence was already processed
    in_journeys: 2
  events/DetectMissedEventSequenceGap:
    type: process
    description: >-
      compares the incoming event's sequence number against the last-processed sequence for that dependency and flags a
      gap when numbers are not consecutive
    in_journeys: 2
  events/DetectPartiallyWrittenEventFile:
    type: process
    description: >-
      checks that the event file is complete by verifying it ends with valid JSON closure and its byte length matches
      the content-length header if present before parsing
    in_journeys: 3
  events/ValidateEventHashFormat:
    type: process
    description: >-
      enforces that the interface hash field in the event payload is a non-empty string matching the expected SHA256 hex
      format before passing to sync
    in_journeys: 3
  events/ReadEventFilesInParallel:
    type: process
    description: >-
      reads multiple event files concurrently with a configurable concurrency limit during batch processing to reduce
      total IO wait time when many dependencies change at once
    in_journeys: 6
  events/EnforceEventProcessingTimeout:
    type: process
    description: >-
      applies a configurable deadline to the sync delegation and reconvergence cycle for a single event and cancels the
      operation if the timeout is exceeded to prevent pipeline stalls
    in_journeys: 3
  events/ShedLowPriorityEventsUnderLoad:
    type: process
    description: >-
      drops lowest-impact events from the processing queue when the pending event count exceeds a backpressure threshold
      to maintain system responsiveness during sustained cascading ripples
    in_journeys: 4
  events/PartitionEventsByDependencySubgraph:
    type: process
    description: >-
      groups batched events into independent partitions based on which local modules they affect so that unrelated
      partitions can be processed concurrently without conflicting stale marks
    in_journeys: 3
  events/SpillBatchPayloadsToDisk:
    type: process
    description: >-
      writes excess parsed event payloads to temporary disk storage when the in-memory batch exceeds a configurable
      payload count threshold and reads them back during sync delegation
    in_journeys: 5
  events/EventWatcherSet:
    type: artifact
    description: the set of active fs.watch instances monitoring dependency event file paths
    in_journeys: 20
  events/EventPayload:
    type: artifact
    description: the parsed content of an event file containing the source box, timestamp, and changed interface hash
    in_journeys: 14
  events/EventLog:
    type: artifact
    description: >-
      append-only log of all received events with timestamps, source boxes, sequence numbers, and disposition for
      observability and debugging
    in_journeys: 33
  events/EventDrivenNotPolling:
    type: rule
    description: event detection uses fs.watch callbacks only, never periodic polling or timer-based checks
    in_journeys: 1
  events/ZeroCostAtRest:
    type: rule
    description: >-
      when no events are pending the engine consumes zero CPU and zero network, only fs.watch kernel handles remain
      active
    in_journeys: 1
  events/OscillationCooldown:
    type: rule
    description: prevents infinite ripple by suppressing re-trigger if the same dependency fires again within a cooldown window
    in_journeys: 9
  events/MaxRetryExceeded:
    type: rule
    description: >-
      after a configured number of retry attempts for the same event file, stop retrying and escalate the failure to
      convergence for operator review
    in_journeys: 2
  events/RippleAbsorbedAtLeaf:
    type: rule
    description: >-
      when a box has no downstream dependents the ripple terminates naturally and no event file is written regardless of
      whether the interface changed
    in_journeys: 1
  events/EventLogSizeLimit:
    type: rule
    description: >-
      the event log must not grow beyond a configured maximum number of entries to prevent unbounded disk usage during
      sustained ripple activity
    in_journeys: 1
  events/WatcherCountLimit:
    type: rule
    description: >-
      enforces a maximum number of concurrent fs.watch instances per box to prevent file descriptor exhaustion on boxes
      with many dependencies
    in_journeys: 2
  events/EventBackpressureThreshold:
    type: rule
    description: >-
      enforces a maximum number of pending events in the processing queue and triggers load shedding when exceeded to
      prevent memory exhaustion and pipeline stalls during cascading ripples
    in_journeys: 1
  events/DeferWatcherForMissingPath:
    type: process
    description: >-
      records a dependency whose event file path does not exist when watcher registration is attempted, and retries
      registration during the next watcher update cycle when the dependency may have published
    in_journeys: 2
  events/WatcherCrashRetryLimit:
    type: rule
    description: >-
      enforces a maximum number of consecutive re-registration attempts for the same dependency's watcher before
      removing it from the active set, preventing infinite crash-reregister oscillation loops
    in_journeys: 2
  events/DetectTotalWatcherLoss:
    type: process
    description: >-
      after a watcher crash or termination, checks EventWatcherSet and detects when zero active watchers remain,
      indicating complete event blindness requiring immediate bulk re-registration or critical escalation
    in_journeys: 3
  events/EnforceDeterministicBatchOrder:
    type: process
    description: >-
      after PrioritizeEventsByImpact sorts events by impact count, breaks ties among equal-impact events by sorting on
      dependency name alphabetically, ensuring the same batch always produces the same processing, shedding, and spill
      order regardless of fs.watch arrival order
    in_journeys: 2
  excerpt/SelectTargetModule:
    type: process
    description: identifies which module to generate an excerpt for based on the current convergence step
    in_journeys: 48
  excerpt/CollectLocalNodes:
    type: process
    description: gathers all nodes defined within the target module from the compiled index
    in_journeys: 21
  excerpt/CollectLocalJourneys:
    type: process
    description: gathers all journeys defined within the target module from the compiled index
    in_journeys: 20
  excerpt/CollectCrossModuleConnections:
    type: process
    description: finds all connections where one endpoint is in the target module and the other is in a different module
    in_journeys: 24
  excerpt/CollectReferencedActors:
    type: process
    description: finds all _actors/ references used in the target module's journeys
    in_journeys: 10
  excerpt/CollectWarnings:
    type: process
    description: gathers all compilation warnings relevant to the target module including external refs and orphans
    in_journeys: 11
  excerpt/AssembleExcerpt:
    type: process
    description: >-
      combines module status with node-type breakdown, local nodes, local journeys, cross-module connections,
      triggered-by actors, issues, all-modules overview, global stats, optional spec sections, and raw module YAML
      source into a single focused output
    in_journeys: 54
  excerpt/TruncateToLimit:
    type: process
    description: trims the assembled excerpt to approximately 200 lines while preserving completeness of each section
    in_journeys: 28
  excerpt/CollectModuleSource:
    type: process
    description: reads the target module's raw YAML file content for inclusion in the YOUR FILE section of the excerpt
    in_journeys: 7
  excerpt/CollectGlobalStats:
    type: process
    description: >-
      gathers global compilation statistics including total nodes, journeys, connections, orphan count, and duplicate
      count
    in_journeys: 4
  excerpt/CollectAllModuleSummaries:
    type: process
    description: gathers one-line summaries for every module showing node count, journey count, and cross-module connection count
    in_journeys: 6
  excerpt/CollectTriggeredByActors:
    type: process
    description: identifies which actors trigger journeys in the target module by scanning journey first-steps for actor references
    in_journeys: 3
  excerpt/RankCrossModuleByRelevance:
    type: process
    description: >-
      ranks cross-module connections by relevance when the full set exceeds the budget, keeping direct dependencies and
      demoting distant transitive connections
    in_journeys: 5
  excerpt/SummarizeLargeModuleSource:
    type: process
    description: >-
      when the module YAML exceeds a line threshold, produces a compact summary listing node names with types and
      journey names instead of the raw source
    in_journeys: 3
  excerpt/CompressModuleSummaries:
    type: process
    description: >-
      when there are many modules, abbreviates the ALL MODULES section to show directly-connected modules in full detail
      and group the rest into a count line
    in_journeys: 2
  excerpt/CacheExcerptByState:
    type: process
    description: >-
      caches generated excerpts keyed by module name and compiled index hash, serving cached results when the graph has
      not changed since last generation
    in_journeys: 7
  excerpt/InvalidateExcerptCache:
    type: process
    description: >-
      clears all cached excerpts when compilation produces a new compiled index, ensuring stale context is never served
      to workers
    in_journeys: 3
  excerpt/ValidateCrossModuleRefIntegrity:
    type: process
    description: >-
      checks that every cross-module node reference included in the excerpt resolves to an actual node in the compiled
      index, flagging dangling references to deleted or renamed nodes
    in_journeys: 3
  excerpt/ValidateExcerptCompleteness:
    type: process
    description: >-
      checks that the assembled excerpt contains all mandatory sections for the target module, flagging missing local
      nodes, journeys, or cross-module connections that exist in the compiled index but were not collected
    in_journeys: 3
  excerpt/DetectMissingModuleSource:
    type: process
    description: >-
      detects when the target module's YAML file does not exist on disk or is empty, switching to a compiled-index-only
      excerpt that omits the YOUR FILE section
    in_journeys: 2
  excerpt/DetectStaleExcerptAtConsumption:
    type: process
    description: >-
      compares the compiled index hash embedded in a cached excerpt against the current compiled index hash at the
      moment a worker consumes it, detecting staleness from intervening graph changes
    in_journeys: 3
  excerpt/ValidateExcerptSectionOrder:
    type: process
    description: >-
      checks that the assembled excerpt presents sections in the expected order so the LLM worker can parse it reliably,
      flagging misordered or duplicated sections
    in_journeys: 2
  excerpt/CollectSpecSectionText:
    type: process
    description: >-
      reads the spec document and extracts the full text of the sections listed in the target module's spec_sections
      field, providing the authoritative spec content the module must cover
    in_journeys: 10
  excerpt/MapNodesToSpecConcepts:
    type: process
    description: >-
      maps each node in the target module to the spec concepts it addresses by matching node descriptions against key
      terms and requirements from the assigned spec sections
    in_journeys: 3
  excerpt/DetectUncoveredSpecConcepts:
    type: process
    description: >-
      compares the set of spec concepts from the assigned sections against the mapped node coverage and identifies
      concepts that have no corresponding node or journey in the module
    in_journeys: 3
  excerpt/ValidateSpecSectionBoundary:
    type: process
    description: >-
      checks that the target module's nodes and journeys address only concepts from its assigned spec_sections, flagging
      content that belongs to a different module's spec scope
    in_journeys: 2
  excerpt/CollectSpecCoverageMapping:
    type: process
    description: >-
      assembles a compact traceability section showing which spec concepts are covered by which nodes and journeys, and
      which concepts remain uncovered
    in_journeys: 2
  excerpt/SortCollectedItemsDeterministically:
    type: process
    description: >-
      sorts all collected nodes, journeys, connections, actors, and warnings into a stable alphabetical order before
      assembly, ensuring identical ordering across runs regardless of map iteration or filesystem enumeration order
    in_journeys: 4
  excerpt/VerifyExcerptReproducibility:
    type: process
    description: >-
      generates the excerpt a second time from the same inputs and compares the two outputs byte-for-byte, detecting
      non-determinism in the generation pipeline
    in_journeys: 8
  excerpt/DeduplicateCacheWrite:
    type: process
    description: >-
      before writing a new excerpt to the cache, checks if an identical entry already exists at the same
      module-plus-hash key and skips the write if the content matches, preventing redundant cache churn
    in_journeys: 3
  excerpt/DeterministicTruncationBoundary:
    type: process
    description: >-
      when truncation must cut within a section, always cuts at the last complete entry boundary rather than at an
      arbitrary line count, ensuring the same input always produces the same truncation point
    in_journeys: 3
  excerpt/NormalizeSpecSectionBoundaries:
    type: process
    description: >-
      normalizes spec section boundary detection by trimming whitespace, standardizing heading formats, and using exact
      section number matching, ensuring the same spec text is extracted regardless of minor formatting variations
    in_journeys: 3
  excerpt/BatchGenerateExcerpts:
    type: process
    description: >-
      generates excerpts for multiple target modules in a single pass, sharing the compiled index lookup and global
      stats collection across all targets instead of repeating them per module
    in_journeys: 3
  excerpt/CollapseDeepHierarchyConnections:
    type: process
    description: >-
      when cross-module connections span multiple hierarchy levels, collapses transitive edges into summarized paths
      showing the chain of boxes rather than listing every intermediate connection
    in_journeys: 3
  excerpt/SummarizeOversizedSpecSection:
    type: process
    description: >-
      when a single spec section exceeds a line threshold, produces a condensed summary of key concepts and requirements
      instead of including the full verbatim text in the excerpt
    in_journeys: 3
  excerpt/PrioritizeAndCompressWarnings:
    type: process
    description: >-
      when a module has accumulated many warnings, groups them by type, keeps the highest-severity warnings in full
      detail, and compresses the rest into count-per-type summaries to fit within budget
    in_journeys: 3
  excerpt/TrackExcerptGenerationCost:
    type: process
    description: >-
      measures the wall-clock time and compiled index traversal count for each excerpt generation, logging metrics to
      identify modules where generation is disproportionately expensive
    in_journeys: 3
  excerpt/ExcerptOutput:
    type: artifact
    description: the final ~200 line focused context document for a single module
    in_journeys: 52
  excerpt/ExcerptLineLimit:
    type: rule
    description: each excerpt must be approximately 200 lines to provide focused context without overwhelming the LLM
    in_journeys: 2
  excerpt/LensRelevance:
    type: rule
    description: excerpt content is scoped to what is relevant for the target module, filtering out unrelated graph data
    in_journeys: 8
  excerpt/AdaptiveBudgetAllocation:
    type: rule
    description: >-
      the ~200 line budget is allocated dynamically across sections based on module complexity, giving more space to
      cross-module connections for highly-connected modules and more to source for complex modules
    in_journeys: 7
  excerpt/StabilizeRelevanceRankTiebreaking:
    type: process
    description: >-
      when two cross-module connections share the same relevance score during ranking, breaks ties using deterministic
      alphabetical ordering of module name then node name to prevent non-deterministic output ordering across runs
    in_journeys: 2
  excerpt/CompressLocalNodeList:
    type: process
    description: >-
      when a module's node count exceeds the per-section budget threshold, groups nodes by type with counts and lists
      only the most-connected node names per type instead of enumerating every node
    in_journeys: 3
  excerpt/CompressLocalJourneyList:
    type: process
    description: >-
      when a module's journey count exceeds the per-section budget threshold, groups journeys by category and lists only
      the most cross-connected journey names instead of enumerating every journey
    in_journeys: 3
  excerpt/TargetedCacheInvalidation:
    type: process
    description: >-
      when compilation changes specific modules, invalidates only cache entries for those modules and their direct
      cross-module neighbors instead of clearing the entire cache
    in_journeys: 3
  excerpt/ExcerptCLI:
    type: interface
    description: command-line interface to run excerpt generation for a target module with an optional round number
    in_journeys: 3
  graph/NodeDefinition:
    type: process
    description: defines a node with one of 5 universal types (actor, process, artifact, interface, rule) plus name and description
    in_journeys: 14
  graph/JourneyDefinition:
    type: process
    description: defines a journey as an ordered sequence of steps, each with a node reference and an action description
    in_journeys: 14
  graph/StepDefinition:
    type: process
    description: defines a single journey step binding a node reference to an action, forming a connection to the next step
    in_journeys: 6
  graph/ConnectionComputation:
    type: process
    description: derives directed connections between consecutive journey steps, building the edge set of the graph
    in_journeys: 14
  graph/CrossModuleRefResolution:
    type: process
    description: resolves node references that use module/NodeName syntax to link nodes across module boundaries
    in_journeys: 13
  graph/ActorRefResolution:
    type: process
    description: resolves actor references that use _actors/ActorName syntax to link shared actors into journeys
    in_journeys: 9
  graph/PublishedInterfaceDefinition:
    type: process
    description: defines what a box provides to other boxes as a versioned, hashable set of exported nodes and journeys
    in_journeys: 1
  graph/IncrementalMerge:
    type: process
    description: >-
      merges a single newly created module into the existing compiled index, adding its nodes, journeys, and connections
      without full rebuild
    in_journeys: 7
  graph/ConnectionDeduplication:
    type: process
    description: >-
      merges duplicate directed edges that appear in multiple journeys into unique entries in the ConnectionSet while
      preserving journey provenance
    in_journeys: 6
  graph/BatchMerge:
    type: process
    description: >-
      merges multiple newly created modules into the compiled index in a single pass, deferring validation until all
      modules are integrated
    in_journeys: 1
  graph/ScopedValidation:
    type: process
    description: >-
      validates only the subgraph affected by a module change, checking rules against changed nodes and their
      connections rather than the entire graph
    in_journeys: 2
  graph/PartialConnectionComputation:
    type: process
    description: >-
      recomputes connections only for journeys containing nodes from a changed module, reusing cached connections for
      unchanged journeys
    in_journeys: 1
  graph/FieldPreservation:
    type: process
    description: >-
      preserves all YAML fields including unknown or extension fields when a module file is read, modified, and written
      back, preventing silent data loss on round-trip
    in_journeys: 6
  graph/CrossModuleImpactScan:
    type: process
    description: >-
      scans all modules' journey steps for cross-module references pointing to a changed module's nodes, identifying
      which other modules are affected by the change
    in_journeys: 5
  graph/ModuleSchemaRule:
    type: rule
    description: >-
      enforces that every module file must have the required top-level structure (spec_sections as number array, nodes
      as a map of name to type+description, journeys as a map of name to steps array)
    in_journeys: 7
  graph/NodeTypeSchema:
    type: rule
    description: enforces that every node must be exactly one of the 5 universal types (actor, process, artifact, interface, rule)
    in_journeys: 9
  graph/StepFormatRule:
    type: rule
    description: enforces that every journey step must have a node field and an action field, never flat strings
    in_journeys: 9
  graph/NoIsolationRule:
    type: rule
    description: every node must participate in at least one journey — no standalone nodes allowed in the graph
    in_journeys: 8
  graph/UniqueNodeNameRule:
    type: rule
    description: every node name must be unique across all modules — no two modules may define the same node name
    in_journeys: 5
  graph/AllRefsResolveRule:
    type: rule
    description: every node reference in every journey step must resolve to a defined node, actor, or cross-module target
    in_journeys: 9
  graph/MinimumStepsRule:
    type: rule
    description: >-
      enforces that every journey must have at least 2 steps, since a single-step journey produces no connections and
      has no graph meaning
    in_journeys: 1
  graph/UniqueJourneyNameRule:
    type: rule
    description: >-
      enforces that every journey name must be unique across all modules — no two modules may define the same journey
      name
    in_journeys: 2
  graph/ModuleFile:
    type: artifact
    description: a YAML file containing spec_sections, nodes, and journeys that defines one scoped piece of the graph
    in_journeys: 41
  graph/CompiledIndex:
    type: artifact
    description: the merged in-memory structure of all modules containing all nodes, journeys, and computed connections
    in_journeys: 127
  graph/ConnectionSet:
    type: artifact
    description: the set of directed edges derived from consecutive journey steps across all journeys
    in_journeys: 40
  graph/NodeRegistry:
    type: artifact
    description: the deduplicated map of all node names to their type and description across all modules
    in_journeys: 20
  graph/JourneyRegistry:
    type: artifact
    description: the collection of all journeys with their steps, used for connection computation and test generation
    in_journeys: 19
  graph/CompiledIndexSnapshot:
    type: artifact
    description: >-
      a point-in-time copy of the CompiledIndex taken before a merge operation, used to restore graph state if the merge
      fails or is destructive
    in_journeys: 2
  graph/DestructiveEditDetection:
    type: process
    description: >-
      compares per-module node counts before and after a module rewrite to detect content loss caused by LLM overwrites,
      returning which nodes were lost
    in_journeys: 3
  graph/DestructiveEditProtectionRule:
    type: rule
    description: >-
      a module rewrite must not decrease the node count without explicit intent — blocks merge and triggers revert if
      node count drops
    in_journeys: 3
  graph/JourneyMembershipTracking:
    type: process
    description: >-
      records each node's participation in journeys as in_journeys entries formatted as "JourneyName (step N)" during
      connection computation
    in_journeys: 4
  graph/ActorTriggerTracking:
    type: process
    description: >-
      propagates the journey's initiating actor to all nodes in the journey's steps, populating each node's
      triggered_by_actors list
    in_journeys: 3
  graph/JourneyActorAssignment:
    type: process
    description: assigns the first actor-type node encountered in a journey's steps as the journey's initiating actor field
    in_journeys: 1
  graph/ModulesTouchedTracking:
    type: process
    description: >-
      tracks the set of distinct modules referenced by a journey's steps, stored as modules_touched on the compiled
      journey
    in_journeys: 2
  graph/ValidateNodeNameFormat:
    type: process
    description: >-
      checks that each node name is a valid PascalCase identifier without path separators, YAML special characters, or
      shell metacharacters that would break compilation, excerpt generation, or codegen output
    in_journeys: 1
  graph/ValidateJourneyNameFormat:
    type: process
    description: >-
      checks that each journey name is a valid PascalCase identifier without path separators, YAML special characters,
      or shell metacharacters that would break test file generation or connection provenance tracking
    in_journeys: 1
  graph/EnforceDescriptionSizeLimit:
    type: process
    description: >-
      rejects node and journey descriptions that exceed a configurable character threshold, preventing context window
      exhaustion when excerpts embed descriptions
    in_journeys: 1
  graph/DetectSelfLoopStep:
    type: process
    description: >-
      detects consecutive journey steps that reference the same node, rejecting self-loop edges that produce meaningless
      connections and waste computation
    in_journeys: 1
  graph/ClassifyExternalRef:
    type: process
    description: >-
      classifies an unresolvable cross-module reference as either external (targeting a sibling engine's published
      interface namespace) or dangling (truly missing), enabling AllRefsResolveRule to treat external refs as deferred
      warnings rather than errors
    in_journeys: 2
  graph/ModulePurge:
    type: process
    description: >-
      removes all nodes, journeys, and connections contributed by a specific module from the compiled index in a single
      atomic operation, the inverse of IncrementalMerge
    in_journeys: 2
  graph/CanonicalCollectionOrderRule:
    type: rule
    description: >-
      enforces that NodeRegistry is sorted by node name, JourneyRegistry by journey name, and ConnectionSet by
      source-target-journey tuple, ensuring identical output regardless of module processing order
    in_journeys: 3
  hierarchy/AnalyzeModuleIndependence:
    type: process
    description: reads ORGANIZATION.md independence section to identify which module groups could form separate child engines
    in_journeys: 9
  hierarchy/DecideSplit:
    type: process
    description: >-
      LLM-based decision on whether to split, using module count, independence, and coupling analysis — no hardcoded
      threshold
    in_journeys: 15
  hierarchy/CreateChildDirectory:
    type: process
    description: creates a new directory for each child engine with its own modules/ folder structure
    in_journeys: 8
  hierarchy/GenerateScopedSpec:
    type: process
    description: writes a scoped spec.md for each child containing only the sections relevant to that child's module group
    in_journeys: 11
  hierarchy/DistributeSharedActors:
    type: process
    description: copies the parent's _actors.yaml into each child directory so all children inherit the same shared actors
    in_journeys: 8
  hierarchy/AssignModulesToChildren:
    type: process
    description: maps each module from ORGANIZATION.md to exactly one child engine based on the grouping decision
    in_journeys: 10
  hierarchy/SpawnChildEngine:
    type: process
    description: launches a child convergence.ts process for each child directory as an independent subprocess
    in_journeys: 24
  hierarchy/WaitForAllChildren:
    type: process
    description: blocks until every spawned child engine has completed its convergence and published its interface
    in_journeys: 17
  hierarchy/CollectChildInterfaces:
    type: process
    description: reads each child's published interface.yaml to gather their exported nodes and journeys
    in_journeys: 23
  hierarchy/CreateCrossEngineJourneys:
    type: process
    description: creates journeys at the parent level that connect nodes across different children's published interfaces
    in_journeys: 11
  hierarchy/ValidateCrossEngineRefs:
    type: process
    description: checks that all external refs in children (warnings) resolve to actual nodes in sibling child interfaces
    in_journeys: 14
  hierarchy/PromoteExternalRefsToErrors:
    type: process
    description: converts unresolved external refs from warnings to errors at the parent level where all children are visible
    in_journeys: 8
  hierarchy/ContinueWithoutSplit:
    type: process
    description: >-
      bypasses the entire hierarchy pipeline and proceeds directly to bounded module creation when the LLM decides not
      to split
    in_journeys: 5
  hierarchy/MonitorChildConvergence:
    type: process
    description: >-
      polls each child engine's published output directory to track whether it has completed convergence or is still
      running
    in_journeys: 8
  hierarchy/MergeChildGraphsIntoParent:
    type: process
    description: >-
      incorporates all child interface nodes and journeys into the parent's compiled index as resolved external
      references
    in_journeys: 10
  hierarchy/GenerateChildOrganization:
    type: process
    description: creates a scoped ORGANIZATION.md for each child listing only the modules assigned to that child's group
    in_journeys: 5
  hierarchy/TrackHierarchyDepth:
    type: process
    description: reads the depth parameter passed at spawn time and records the current nesting level for this engine instance
    in_journeys: 8
  hierarchy/EnforceMaxDepth:
    type: process
    description: >-
      compares the current hierarchy depth against the maximum allowed and forces a no-split decision if the limit is
      reached
    in_journeys: 4
  hierarchy/FlattenGrandchildInterfaces:
    type: process
    description: >-
      when a child engine has split into grandchildren, merges all grandchild published interfaces into the child's own
      interface as a flat node and journey set
    in_journeys: 4
  hierarchy/PropagateUnresolvedRefsUpward:
    type: process
    description: >-
      collects external ref warnings that a child could not resolve against its own grandchildren and passes them up to
      the parent level for cross-engine resolution
    in_journeys: 4
  hierarchy/NarrowScopedSpec:
    type: process
    description: >-
      further narrows an already-scoped spec when a child itself splits, producing sub-scoped specs containing only
      sections relevant to each grandchild group
    in_journeys: 2
  hierarchy/LimitConcurrentChildren:
    type: process
    description: >-
      caps the number of simultaneously running child engine subprocesses by maintaining a queue and spawning the next
      child only when a running one completes
    in_journeys: 7
  hierarchy/BatchChildDirectoryCreation:
    type: process
    description: >-
      creates all child directories, scoped specs, scoped organizations, and actor copies in a single batch pass to
      reduce disk I/O overhead when child count is high
    in_journeys: 4
  hierarchy/StreamingInterfaceMerge:
    type: process
    description: >-
      merges child interfaces into the parent compiled index one at a time in sequence instead of loading all interfaces
      into memory simultaneously
    in_journeys: 6
  hierarchy/DetectChildTimeout:
    type: process
    description: >-
      compares each running child engine's wall-clock elapsed time against the configured timeout threshold and flags
      children that exceed it
    in_journeys: 4
  hierarchy/CompactSplitDecisionContext:
    type: process
    description: >-
      summarizes the organization and independence analysis into a compact form that fits within LLM context limits when
      the full module list and coupling data is too large
    in_journeys: 3
  hierarchy/IndexChildNodesForRefLookup:
    type: process
    description: >-
      builds a hash-indexed lookup table of all child interface node names to accelerate cross-engine ref validation
      when child count is high
    in_journeys: 1
  hierarchy/ChildDirectory:
    type: artifact
    description: a directory containing scoped spec.md, shared _actors.yaml, and modules/ for one child engine
    in_journeys: 5
  hierarchy/ScopedSpecFile:
    type: artifact
    description: a child-specific spec.md containing only the sections relevant to that child's module group
    in_journeys: 3
  hierarchy/CrossEngineJourneySet:
    type: artifact
    description: the set of parent-level journeys connecting nodes across children's published interfaces
    in_journeys: 5
  hierarchy/ChildInterfaceCollection:
    type: artifact
    description: the collected interface.yaml files from all children, used for cross-engine validation
    in_journeys: 6
  hierarchy/ChildConvergenceStatus:
    type: artifact
    description: >-
      tracks the current state of each child engine — running, converged, or failed — used by the parent to determine
      when all children are done
    in_journeys: 11
  hierarchy/ChildOrganizationFile:
    type: artifact
    description: a child-specific ORGANIZATION.md listing only the modules assigned to that child engine
    in_journeys: 5
  hierarchy/HierarchyDepthCounter:
    type: artifact
    description: >-
      the current nesting depth passed to each engine at spawn time — 0 for root, 1 for child, 2 for grandchild, and so
      on
    in_journeys: 4
  hierarchy/SameCodeEveryLevel:
    type: rule
    description: convergence.ts is the exact same code at parent, child, and grandchild levels — no level-specific logic
    in_journeys: 6
  hierarchy/SharedActorsNoduplicates:
    type: rule
    description: parent discovers actors once, children inherit them — no child re-discovers or duplicates actors
    in_journeys: 4
  hierarchy/ExternalRefsWarningsInChildrenErrorsInParent:
    type: rule
    description: children emit warnings for unresolved cross-engine refs, parent promotes them to errors if they remain unresolved
    in_journeys: 1
  hierarchy/MaxDepthLimit:
    type: rule
    description: >-
      hierarchy depth is bounded to a configurable maximum to prevent infinite recursive splitting — engines at the
      limit always choose no-split
    in_journeys: 3
  hierarchy/ChildConcurrencyLimit:
    type: rule
    description: >-
      maximum number of child engine subprocesses that may run simultaneously — additional children are queued until a
      running child completes
    in_journeys: 3
  hierarchy/ChildTimeoutThreshold:
    type: rule
    description: maximum wall-clock time a child engine may run before being flagged as timed out and reported to the parent
    in_journeys: 1
  hierarchy/DetectChildProcessFailure:
    type: process
    description: >-
      detects when a child engine subprocess exits with non-zero status or crashes before publishing its interface,
      distinguishing process failure from timeout
    in_journeys: 1
  hierarchy/FallbackToNoSplitOnFailure:
    type: process
    description: >-
      defaults to no-split when the LLM-based hierarchy decision fails or returns unparseable output, ensuring
      convergence can always proceed
    in_journeys: 3
  hierarchy/DetectChildSpawnFailure:
    type: process
    description: >-
      detects when a child engine subprocess fails to launch due to OS-level errors such as resource exhaustion or
      permission denial
    in_journeys: 1
  hierarchy/ValidateChildInterfaceIntegrity:
    type: process
    description: >-
      checks that each child's published interface.yaml exists on disk and is valid parseable YAML with the expected
      node and journey structure before merging
    in_journeys: 3
  hierarchy/DetectInheritedActors:
    type: process
    description: >-
      checks whether _actors.yaml was placed in the engine's directory by a parent, indicating actors are inherited and
      actor discovery should be skipped at this level
    in_journeys: 3
  hierarchy/DetectInheritedOrganization:
    type: process
    description: >-
      checks whether a scoped ORGANIZATION.md was placed in the engine's directory by a parent, indicating the module
      list was pre-assigned and organization generation should be skipped
    in_journeys: 1
  hierarchy/ValidateSplitDecision:
    type: process
    description: >-
      validates the LLM-produced split decision for semantic correctness including that every module from
      ORGANIZATION.md is assigned to exactly one child, no module is duplicated across children, and no child group is
      empty
    in_journeys: 10
  hierarchy/DetectChildPreparationFailure:
    type: process
    description: >-
      detects when CreateChildDirectory, GenerateScopedSpec, GenerateChildOrganization, or DistributeSharedActors fails
      due to disk I/O error during the child preparation phase, captures which children were fully prepared and which
      were not, and removes any partially created directories to prevent stale state
    in_journeys: 4
  hierarchy/DetectOrphanedChildState:
    type: process
    description: >-
      on engine startup before hierarchy decision, scans for existing child directories from a previous hierarchy run
      and checks each for a published interface.yaml to determine whether completed child results can be adopted or
      stale incomplete directories must be cleaned up before re-preparing
    in_journeys: 4
  hierarchy/IdentifyChildrenAffectedBySpecChange:
    type: process
    description: >-
      when the parent's spec changes, diffs old vs new spec to find changed section numbers, maps those sections to
      modules via spec_sections metadata, then maps affected modules to children using the stored split decision to
      produce the list of children whose scoped specs need regeneration
    in_journeys: 3
  hierarchy/TerminateChildEngines:
    type: process
    description: >-
      sends a shutdown signal to all running child engine subprocesses, waits for each to exit within the configured
      timeout, and force-kills any child that fails to exit gracefully before the parent proceeds with its own shutdown
    in_journeys: 3
  llm/SpawnWorkerProcess:
    type: process
    description: launches a persistent Claude Code subprocess that stays alive for the duration of the convergence pipeline
    in_journeys: 20
  llm/InjectSystemPrompt:
    type: process
    description: >-
      sends the genome worker system prompt to the freshly spawned worker, establishing its role, YAML format rules, and
      operational constraints
    in_journeys: 11
  llm/SendTask:
    type: process
    description: sends a structured task to the worker process via stream-json protocol with prompt, context, and expected output
    in_journeys: 47
  llm/ReceiveResult:
    type: process
    description: reads the worker's streamed response, parsing the stream-json output into structured result data
    in_journeys: 24
  llm/BuildTaskContext:
    type: process
    description: >-
      assembles task-specific context from excerpt output, compiled state snapshot, and cross-module relationship data
      before packaging into the payload
    in_journeys: 11
  llm/ValidateWorkerOutput:
    type: process
    description: >-
      confirms the worker produced expected output by checking that files exist on disk, content is valid YAML or
      TypeScript, and task requirements are met
    in_journeys: 12
  llm/WriteFile:
    type: process
    description: worker uses its native Write tool to create or overwrite a file on disk
    in_journeys: 9
  llm/ReadFile:
    type: process
    description: worker uses its native Read tool to read file contents from disk
    in_journeys: 7
  llm/EditFile:
    type: process
    description: worker uses its native Edit tool to make targeted edits to an existing file
    in_journeys: 1
  llm/RunBash:
    type: process
    description: worker uses its native Bash tool to execute shell commands
    in_journeys: 2
  llm/HandleCompaction:
    type: process
    description: Claude automatically compacts prior messages as the conversation approaches context limits
    in_journeys: 3
  llm/ShutdownWorker:
    type: process
    description: terminates the persistent worker process after all tasks are complete or on pipeline abort
    in_journeys: 12
  llm/DetectProcessExit:
    type: process
    description: monitors the worker subprocess and detects unexpected termination via non-zero exit code or signal
    in_journeys: 4
  llm/DetectStreamInterruption:
    type: process
    description: detects when stream-json data stops mid-response indicating a broken pipe or process death
    in_journeys: 2
  llm/DetectTaskTimeout:
    type: process
    description: fires when a task exceeds the maximum expected duration without producing a complete response
    in_journeys: 1
  llm/HandleToolCallFailure:
    type: process
    description: captures when a worker native tool call returns an error and records the tool name, arguments, and error message
    in_journeys: 4
  llm/DrainPartialOutput:
    type: process
    description: reads any files written to disk and partial stream data the worker produced before the failure occurred
    in_journeys: 6
  llm/CleanupFailedSession:
    type: process
    description: tears down the broken worker session and closes the stream-json channel so a clean respawn can proceed
    in_journeys: 12
  llm/ScopeWritesToAllowedPaths:
    type: process
    description: >-
      validates every Write tool call targets only the allowed path for the current task, rejecting path traversal or
      out-of-scope writes
    in_journeys: 3
  llm/ScopeReadsToProjectDir:
    type: process
    description: >-
      validates every Read tool call targets only files within the project directory, blocking reads of credentials, env
      files, or system files
    in_journeys: 2
  llm/FilterBashCommands:
    type: process
    description: >-
      inspects every Bash tool call and blocks dangerous commands including network access, process spawning, file
      deletion, and permission changes
    in_journeys: 2
  llm/DetectPromptInjection:
    type: process
    description: >-
      scans task context for prompt injection patterns before sending to the worker, flagging content that attempts to
      override system prompt instructions
    in_journeys: 2
  llm/ValidateOutputScope:
    type: process
    description: >-
      after task completion verifies the worker only modified the assigned target file and no other files in the project
      were changed
    in_journeys: 3
  llm/DetectToolCallLoop:
    type: process
    description: >-
      monitors tool call count and pattern during task execution, terminating the worker if it enters a repetitive
      unbounded loop
    in_journeys: 2
  llm/EnforceFileSizeLimit:
    type: process
    description: rejects Write tool calls that would create files exceeding the maximum allowed size, preventing disk exhaustion
    in_journeys: 1
  llm/TruncatePayloadToFit:
    type: process
    description: >-
      truncates lower-priority context sections when the assembled task payload exceeds the maximum message size,
      preserving critical instructions and target module context
    in_journeys: 2
  llm/TrackCompactionCount:
    type: process
    description: >-
      counts compaction events for the current worker and signals when the degradation threshold is reached, indicating
      the worker should be replaced
    in_journeys: 3
  llm/ProactiveWorkerReplacement:
    type: process
    description: >-
      shuts down the current worker and spawns a fresh instance when compaction count exceeds the quality threshold,
      before output quality visibly degrades
    in_journeys: 1
  llm/ReinjectSystemPromptAfterCompaction:
    type: process
    description: >-
      re-sends critical system prompt instructions to the worker after heavy compaction to prevent instruction drift
      from compressed context
    in_journeys: 2
  llm/PrioritizeContextByRelevance:
    type: process
    description: >-
      when the compiled index contains many modules, selects only the modules and connections most relevant to the
      current task for payload inclusion
    in_journeys: 6
  llm/DetectMalformedYAMLOutput:
    type: process
    description: >-
      checks worker-produced YAML files for structural schema violations beyond basic parsing, including wrong node
      types, flat string journey steps, missing spec_sections, and absent node or action fields in steps
    in_journeys: 5
  llm/DetectEmptyWorkerResponse:
    type: process
    description: >-
      detects when a worker completes a task without producing any output file or meaningful response, a silent failure
      mode distinct from crash or timeout where the worker simply returns nothing
    in_journeys: 2
  llm/RetryTaskWithFeedback:
    type: process
    description: >-
      resends the same task to the worker with the specific validation errors or failure details appended to the context
      so the worker can self-correct without requiring a full respawn
    in_journeys: 4
  llm/ClassifyFailureType:
    type: process
    description: >-
      examines a failure report and classifies it as crash, timeout, malformed output, empty response, scope violation,
      or quality degradation to route to the appropriate recovery strategy
    in_journeys: 6
  llm/TrackTaskFailureRate:
    type: process
    description: >-
      tracks the ratio of failed tasks to total tasks for the current worker session and signals when the failure rate
      exceeds the quality threshold indicating the worker should be replaced
    in_journeys: 5
  llm/ManageWorkerPool:
    type: process
    description: >-
      coordinates multiple concurrent worker processes during parallel creation or enrichment phases, tracking each
      worker's assigned task, session state, and compaction counter independently
    in_journeys: 6
  llm/RouteTaskToAvailableWorker:
    type: process
    description: >-
      selects an idle worker from the active pool for the next task or queues the task if all workers are busy, ensuring
      even distribution across available workers
    in_journeys: 2
  llm/HandleLargeModuleFile:
    type: process
    description: >-
      detects when a target module file exceeds the Read tool line limit and reads it in offset-based chunks,
      reassembling the full content before including it in the worker's task context
    in_journeys: 4
  llm/EstimateTaskContextCost:
    type: process
    description: >-
      estimates the token count of the next task payload against the worker's remaining context capacity and triggers
      proactive worker replacement if the task would exhaust the context window
    in_journeys: 3
  llm/CleanupParallelWorker:
    type: process
    description: >-
      shuts down and cleans up a single worker from the parallel pool after its assigned task completes, freeing
      resources without affecting other active workers in the pool
    in_journeys: 1
  llm/DetectStaleWorkerProcess:
    type: process
    description: >-
      sends a lightweight heartbeat probe to an existing worker subprocess and waits for acknowledgment, detecting
      zombies and sleep-corrupted processes that are alive but unresponsive
    in_journeys: 3
  llm/RecoverFromSpawnFailure:
    type: process
    description: >-
      handles failure to launch the Claude Code subprocess by checking prerequisites such as API key availability, CLI
      binary existence, and disk space before retrying
    in_journeys: 4
  llm/ValidateWorkerHealthBeforeTask:
    type: process
    description: >-
      performs a pre-dispatch liveness check on the worker by sending a no-op probe via the stream-json channel and
      confirming a response within a short timeout
    in_journeys: 3
  llm/DetectOrphanWorkerProcess:
    type: process
    description: >-
      scans for leftover Claude Code subprocesses from a previous convergence run that were not properly shut down,
      identifying them by process name and working directory
    in_journeys: 3
  llm/ReestablishStreamChannel:
    type: process
    description: >-
      tears down a stale or corrupted stream-json channel and opens a fresh one to the same worker process without
      requiring a full process respawn
    in_journeys: 2
  llm/StreamJsonProtocol:
    type: interface
    description: the stream-json communication protocol between convergence.ts and the Claude Code worker process
    in_journeys: 19
  llm/NativeToolSet:
    type: interface
    description: the set of native tools (Read, Write, Edit, Bash) available to the worker for file and shell operations
    in_journeys: 8
  llm/WorkerSession:
    type: artifact
    description: the persistent Claude Code process state including conversation history and compacted context
    in_journeys: 14
  llm/TaskPayload:
    type: artifact
    description: the structured input sent to the worker containing prompt, relevant context, and output expectations
    in_journeys: 21
  llm/TaskResult:
    type: artifact
    description: the structured output returned by the worker containing created content and tool call results
    in_journeys: 16
  llm/SystemPrompt:
    type: artifact
    description: >-
      the instruction template sent at initialization that defines the worker's genome role, YAML format rules, node
      types, step format, and operational constraints
    in_journeys: 9
  llm/CrashReport:
    type: artifact
    description: >-
      structured failure record containing exit code, last task payload, partial output collected, error details, and
      tool call history at time of failure
    in_journeys: 12
  llm/CompactionCounter:
    type: artifact
    description: >-
      tracks the number of compaction events, estimated context quality level, and total task count for the current
      worker session
    in_journeys: 11
  llm/AlwaysOpus:
    type: rule
    description: the worker always uses Opus model with 1M context window, no model selection or fallback
    in_journeys: 1
  llm/NoSessionManagement:
    type: rule
    description: convergence.ts does not manage sessions — Claude handles its own context compaction transparently
    in_journeys: 1
  llm/NoPrintMode:
    type: rule
    description: worker uses interactive mode with native tools, never --print mode which lacks tool access
    in_journeys: 1
  llm/WorkerCreatesCodeOrchestrates:
    type: rule
    description: the worker only creates content when asked — it never decides when to act, code orchestrates all decisions
    in_journeys: 2
  llm/SingleWorkerConstraint:
    type: rule
    description: only one worker process may exist at a time, cleanup must fully complete before any respawn can begin
    in_journeys: 6
  llm/AllowedWritePaths:
    type: rule
    description: >-
      worker may only write to genome/modules/ during creation and enrichment, genome/generated/ during codegen, and
      genome/tests/ during testgen — all other paths are rejected
    in_journeys: 1
  llm/NoBashNetworkAccess:
    type: rule
    description: >-
      worker Bash tool calls must never use network commands (curl, wget, nc, ssh) or spawn background processes or
      delete files outside the output directory
    in_journeys: 1
  llm/SingleFilePerTask:
    type: rule
    description: >-
      each task assigns the worker exactly one target file to create or edit, any write to a different path is treated
      as a scope violation
    in_journeys: 2
  llm/PayloadSizeBudget:
    type: rule
    description: >-
      task payloads must not exceed the maximum message size and context is truncated by priority to meet the budget,
      preserving system prompt and target module above all else
    in_journeys: 4
  llm/ReplaceAfterNCompactions:
    type: rule
    description: >-
      worker is proactively replaced after N compaction events to maintain output quality rather than waiting for
      observable degradation
    in_journeys: 2
  llm/ParallelWorkerPoolLimit:
    type: rule
    description: >-
      caps the maximum number of concurrent worker processes during parallel creation or enrichment operations,
      preventing host machine resource exhaustion from too many simultaneous Claude Code subprocesses
    in_journeys: 1
  llm/DetectRateLimitResponse:
    type: process
    description: >-
      detects API rate limit responses by matching error text against patterns including hit your limit, rate limit, too
      many requests, and 429, then kills the worker process for retry
    in_journeys: 2
  llm/HandleStdinBackpressure:
    type: process
    description: >-
      detects when stdin write buffer is full on large prompts and waits for drain event with 60-second timeout to
      prevent hangs
    in_journeys: 3
  llm/PlatformSpecificProcessKill:
    type: process
    description: >-
      kills the worker process tree using platform-appropriate method — taskkill /T /F on Windows, SIGTERM then SIGKILL
      after 5 seconds on Unix
    in_journeys: 3
  llm/ResolveClaudeBinary:
    type: process
    description: >-
      locates the Claude CLI binary path at module load time, using where on Windows and falling back to bare command
      name
    in_journeys: 3
  llm/BypassNestingDetection:
    type: process
    description: >-
      removes Claude Code nesting-detection environment variables before spawning the worker to prevent the subprocess
      from refusing to start
    in_journeys: 2
  llm/WaitForWorkerInit:
    type: process
    description: >-
      waits a flat 2-second delay before the first task to give the spawned Claude Code process time to initialize,
      setting the initialized flag afterward
    in_journeys: 2
  llm/DetectSessionError:
    type: process
    description: detects error_during_execution subtype in worker result messages and kills the process for a fresh start
    in_journeys: 1
  metrics/ConvergenceMetricsRecord:
    type: artifact
    description: >-
      in-memory accumulator that holds LLM call count, total tokens, per-step wall-clock timings, start and completion
      timestamps, modules processed, nodes created, and journeys created
    in_journeys: 13
  metrics/MetricsJsonFile:
    type: artifact
    description: genome/metrics.json written to disk after each convergence with the finalized metrics snapshot
    in_journeys: 1
  metrics/TrackLLMCall:
    type: process
    description: increments the LLM call counter and adds the token count from a single call to the running total
    in_journeys: 1
  metrics/StartStepTimer:
    type: process
    description: records the wall-clock start time for a named pipeline step in the step timings map
    in_journeys: 10
  metrics/EndStepTimer:
    type: process
    description: computes elapsed milliseconds for a named pipeline step by subtracting its start time from the current time
    in_journeys: 10
  metrics/TrackModuleCount:
    type: process
    description: records the number of modules processed during convergence into the metrics accumulator
    in_journeys: 1
  metrics/TrackGraphCounts:
    type: process
    description: records the total node count and journey count from the compiled graph into the metrics accumulator
    in_journeys: 2
  metrics/FinalizeMetrics:
    type: process
    description: stamps the completion timestamp and returns a frozen snapshot of the accumulated metrics
    in_journeys: 1
  metrics/WriteMetricsToDisk:
    type: process
    description: serializes the finalized metrics snapshot to JSON and writes it to genome/metrics.json
    in_journeys: 1
  metrics/StepTimingInvariant:
    type: rule
    description: >-
      endStep silently skips if startStep was never called for that step name, preventing negative or nonsensical
      elapsed times
    in_journeys: 1
  organization/ReadSpecFile:
    type: process
    description: reads spec.md from disk as the input for organizational analysis
    in_journeys: 8
  organization/ParseSpecSections:
    type: process
    description: splits the spec into numbered sections so each module can reference which sections it covers
    in_journeys: 4
  organization/IdentifyScope:
    type: process
    description: extracts a 1-2 sentence scope statement describing what the project is and does
    in_journeys: 2
  organization/IdentifyModules:
    type: process
    description: analyzes the spec to discover all independent concerns, each becoming a named module with a description
    in_journeys: 20
  organization/AnalyzeDependencies:
    type: process
    description: determines which modules depend on which others and produces a build order
    in_journeys: 9
  organization/AnalyzeIndependence:
    type: process
    description: >-
      classifies modules by how standalone they are — fully independent, standalone with dependencies, or tightly
      coupled
    in_journeys: 1
  organization/AssembleOrganization:
    type: process
    description: combines scope, modules, dependencies, and independence into the final ORGANIZATION.md structure
    in_journeys: 6
  organization/WriteOrganizationFile:
    type: process
    description: writes the assembled organization to ORGANIZATION.md on disk
    in_journeys: 7
  organization/AssignSpecSectionsToModules:
    type: process
    description: >-
      maps each identified module to the spec section numbers it covers based on the module's domain and the section
      content
    in_journeys: 6
  organization/ValidateBuildOrder:
    type: process
    description: checks the dependency graph for circular dependencies and confirms a valid topological ordering exists
    in_journeys: 5
  organization/ValidateSpecCoverage:
    type: process
    description: checks that every numbered spec section is covered by at least one module ensuring no requirements are dropped
    in_journeys: 4
  organization/DetectNewModulesInSpec:
    type: process
    description: >-
      compares the current module list against the spec to find newly added concerns that would require new modules
      during reconvergence
    in_journeys: 1
  organization/ProvideSpecSectionsToExcerpt:
    type: process
    description: >-
      supplies each module's assigned spec_sections to the excerpt generator so workers know which spec sections are
      relevant to their module
    in_journeys: 5
  organization/HandleMissingSpecFile:
    type: process
    description: >-
      detects that spec.md does not exist or is unreadable on disk and reports a fatal error blocking the convergence
      pipeline
    in_journeys: 2
  organization/ValidateLLMOrganizationOutput:
    type: process
    description: >-
      checks that the LLM-produced organization contains all required sections — scope, module list with names and
      descriptions, dependency graph, and independence classification
    in_journeys: 9
  organization/RepairCircularDependency:
    type: process
    description: >-
      sends the detected cycle path back to the LLM with an error message so it can propose a corrected dependency
      ordering
    in_journeys: 2
  organization/RepairSpecCoverageGap:
    type: process
    description: >-
      sends the list of uncovered spec sections back to the LLM to either assign them to existing modules or propose new
      modules to cover them
    in_journeys: 2
  organization/HandleEmptyModuleList:
    type: process
    description: >-
      detects that the LLM identified zero modules from the spec and retries with an explicit prompt explaining the
      expected output format
    in_journeys: 2
  organization/HandleOrganizationWriteFailure:
    type: process
    description: >-
      detects a disk write failure when creating ORGANIZATION.md and retries the write or reports the error to
      convergence
    in_journeys: 3
  organization/DetectSelfReferentialModules:
    type: process
    description: >-
      identifies modules in the list that describe parts of the convergence pipeline itself such as organization,
      convergence, compilation, and graph
    in_journeys: 2
  organization/ValidateMetaModulePresence:
    type: process
    description: >-
      checks that all required infrastructure modules are present in the module list when the spec describes a
      self-referential system like genome
    in_journeys: 5
  organization/DetectSpecChangeToOwnSections:
    type: process
    description: >-
      determines whether changed spec sections overlap with the sections organization itself covers, indicating the
      organization step must re-analyze its own structure
    in_journeys: 2
  organization/DiffModuleListAgainstExisting:
    type: process
    description: >-
      compares the newly identified module list against module YAML files already on disk to detect additions, removals,
      and renames
    in_journeys: 5
  organization/PreserveExistingModulesOnReorganize:
    type: process
    description: >-
      ensures existing module YAML files are not deleted when the module list changes during reconvergence, flagging
      removed modules for human review instead
    in_journeys: 3
  organization/DetectModuleRename:
    type: process
    description: >-
      compares descriptions of newly added modules against descriptions of modules flagged for removal to identify
      semantic renames, preventing false add/remove pairs caused by LLM non-determinism in naming
    in_journeys: 3
  organization/OrganizationFile:
    type: artifact
    description: the ORGANIZATION.md file containing scope, module list, dependency order, and independence analysis
    in_journeys: 17
  organization/SpecSectionIndex:
    type: artifact
    description: the parsed index of spec sections with their numbers, used by modules to declare which sections they cover
    in_journeys: 5
  organization/ModuleList:
    type: artifact
    description: the list of identified modules with names and descriptions, consumed by convergence for module creation
    in_journeys: 28
  organization/DependencyGraph:
    type: artifact
    description: the directed graph of module dependencies defining the build order for module creation
    in_journeys: 23
  organization/IndependenceClassification:
    type: artifact
    description: the classification of each module's standalone capability, used by hierarchy for split decisions
    in_journeys: 2
  organization/ModuleSpecSectionMap:
    type: artifact
    description: the mapping from each module name to its assigned spec section numbers used in each module's spec_sections field
    in_journeys: 12
  organization/DetectDuplicateModuleNames:
    type: process
    description: >-
      scans the identified module list for entries sharing the same name, which would cause YAML filename collisions and
      node name ambiguity in the compiled graph
    in_journeys: 3
  organization/ValidateDependencyTargetsExist:
    type: process
    description: >-
      checks that every module name referenced as a dependency target in the dependency graph exists in the identified
      module list, catching dangling references the LLM may produce
    in_journeys: 3
  organization/DetectUngroundedModules:
    type: process
    description: >-
      checks that every identified module maps to at least one spec section, catching hallucinated modules the LLM
      invented without spec basis
    in_journeys: 3
  organization/HandleOrganizationRepairExhaustion:
    type: process
    description: >-
      detects when an organization-level repair loop — malformed output, circular dependency, spec coverage gap, empty
      module list, duplicate names, dangling dependency ref, or ungrounded module — has exhausted its bounded retry
      budget without producing valid output, and reports the unresolvable validation failure to convergence to halt the
      pipeline
    in_journeys: 3
  organization/HandleEmptySpecContent:
    type: process
    description: >-
      detects that spec.md exists on disk but contains no parseable sections — either zero bytes, whitespace only, or
      content that yields zero numbered sections — and reports a fatal error distinct from missing file
    in_journeys: 3
  publish/CollectExportedNodes:
    type: process
    description: selects which nodes from the compiled index should be exported as the box's public interface
    in_journeys: 18
  publish/CollectExportedJourneys:
    type: process
    description: selects which journeys from the compiled index should be exported as the box's public interface
    in_journeys: 15
  publish/ComputeInterfaceHash:
    type: process
    description: computes a full SHA256 hash over the exported nodes and journeys to detect changes
    in_journeys: 33
  publish/ComparePreviousHash:
    type: process
    description: compares the new interface hash against the previously published hash to determine if anything changed
    in_journeys: 18
  publish/GenerateInterfaceYaml:
    type: process
    description: >-
      writes interface.yaml containing the engine name, provided nodes with type and journey count, required external
      references, and a SHA256 version hash
    in_journeys: 35
  publish/GenerateChangelogYaml:
    type: process
    description: writes changelog.yaml describing what changed between the previous and current interface
    in_journeys: 16
  publish/WriteEventFile:
    type: process
    description: writes an event file to disk signaling that this box has published a new interface
    in_journeys: 32
  publish/SkipPublishIfUnchanged:
    type: process
    description: aborts the publish pipeline if the new hash matches the previous hash, avoiding unnecessary ripple
    in_journeys: 2
  publish/StorePreviousHash:
    type: process
    description: >-
      writes the newly computed InterfaceHash to disk as the PreviousHash, ready for comparison on the next publish
      cycle
    in_journeys: 9
  publish/ComputeChangelogDiff:
    type: process
    description: >-
      diffs the previous exported content against the current exported content, identifying specifically which nodes and
      journeys were added, removed, or modified
    in_journeys: 16
  publish/ValidateExportedInterface:
    type: process
    description: >-
      checks that the exported subset is self-consistent with all journey refs resolving to exported nodes or explicitly
      marked external refs
    in_journeys: 6
  publish/NotifyPublishComplete:
    type: process
    description: signals convergence that publish finished successfully and the pipeline can proceed to codegen and testgen
    in_journeys: 12
  publish/DetectWriteFailure:
    type: process
    description: >-
      detects when any file write operation during publish fails due to disk full, permission denied, or IO error and
      captures the specific error details
    in_journeys: 4
  publish/RollbackPartialPublish:
    type: process
    description: >-
      removes partially written publish artifacts from disk to restore the pre-publish state after a mid-pipeline
      failure
    in_journeys: 4
  publish/DetectCorruptedPreviousHash:
    type: process
    description: >-
      validates the PreviousHash file is readable, valid hex, and the expected 64-character length, flagging corruption
      if any check fails
    in_journeys: 3
  publish/ReportPublishFailure:
    type: process
    description: >-
      builds a structured failure report with the failing step, error details, and partial state, then sends it to
      convergence for retry or abort decision
    in_journeys: 15
  publish/DetectRippleOscillation:
    type: process
    description: >-
      reads the ripple origin chain from an incoming event and checks whether the current box ID already appears in it,
      detecting A→B→A publish cycles
    in_journeys: 4
  publish/TrackRippleOrigin:
    type: process
    description: >-
      appends the current box ID and event sequence number to the ripple origin chain before writing the outgoing event
      file
    in_journeys: 5
  publish/DeduplicateEventFile:
    type: process
    description: >-
      compares the new event file's interface hash against the last written event file and skips writing if the hash is
      identical
    in_journeys: 4
  publish/EmbedChangelogInEvent:
    type: process
    description: >-
      embeds the changelog diff summary listing added, removed, and modified nodes and journeys into the event file so
      dependents can scope their reconvergence
    in_journeys: 7
  publish/SuppressNoOpRipple:
    type: process
    description: >-
      after reconvergence produces an interface hash identical to the pre-reconvergence hash, suppresses event file
      write to stop the ripple chain from propagating further
    in_journeys: 5
  publish/VerifyPublishedHashIntegrity:
    type: process
    description: >-
      re-reads interface.yaml after write, recomputes SHA256 from the file content, and compares against the embedded
      hash to detect silent corruption or partial write
    in_journeys: 5
  publish/CanonicalizeHashInput:
    type: process
    description: >-
      sorts exported nodes alphabetically by name and exported journeys alphabetically by name before hash computation
      to guarantee identical content always produces identical hash regardless of collection order
    in_journeys: 4
  publish/CrossCheckEventInterfaceHash:
    type: process
    description: >-
      after both event file and interface.yaml are written, reads the hash from each and verifies they are identical,
      detecting divergence from non-atomic write sequences
    in_journeys: 3
  publish/ValidatePreviousHashBaseline:
    type: process
    description: >-
      before hash comparison, reads the hash embedded in the current interface.yaml on disk and verifies it matches
      PreviousHash, detecting baseline drift from crash between writes
    in_journeys: 3
  publish/ReconcileHashStateOnStartup:
    type: process
    description: >-
      on startup or after crash recovery, reads PreviousHash file, interface.yaml embedded hash, and last event file
      hash, and reconciles any disagreements to restore a consistent baseline
    in_journeys: 5
  publish/CanonicalizeChangelogDiffOutput:
    type: process
    description: >-
      sorts added, removed, and modified lists in the changelog diff alphabetically by name so that identical diffs
      always produce byte-identical changelog.yaml regardless of internal diff ordering
    in_journeys: 3
  publish/NormalizeEventTransientFields:
    type: process
    description: >-
      strips or normalizes wall-clock timestamps and other transient fields from event file content before deduplication
      comparison so re-runs on identical input are not falsely considered different
    in_journeys: 3
  publish/EnforceDeterministicYamlSerialization:
    type: process
    description: >-
      enforces canonical YAML output for interface.yaml by using sorted keys, consistent quoting, and stable whitespace
      so the same exported content always serializes to identical bytes
    in_journeys: 3
  publish/GuardSequenceCounterAgainstRetry:
    type: process
    description: >-
      before incrementing EventSequenceCounter, reads the last event file and checks if its sequence number already
      equals the expected next value, skipping the increment if this is a retry of an already-written event
    in_journeys: 4
  publish/VerifyPublishPipelineIdempotency:
    type: process
    description: >-
      runs the full publish pipeline twice on the same compiled index and compares interface.yaml, changelog.yaml, and
      normalized event content to confirm all outputs are byte-identical
    in_journeys: 4
  publish/DetectOrphanTempFiles:
    type: process
    description: >-
      on cold start, scans the publish output directory for orphan temp files left by atomic write operations that
      crashed between temp file creation and rename, and removes them to prevent disk accumulation
    in_journeys: 3
  publish/DetectPublishInterruptionPoint:
    type: process
    description: >-
      after crash recovery, inspects the state of all publish artifacts on disk to determine exactly which pipeline step
      was interrupted, classifying the state as pre-interface, post-interface-pre-changelog, post-changelog-pre-event,
      post-event-pre-notification, or fully complete
    in_journeys: 7
  publish/RecoverMissedPublishNotification:
    type: process
    description: >-
      detects that the event file on disk is newer than the last convergence-acknowledged publish, indicating the
      process crashed after writing the event but before notifying convergence, and sends the missed notification
      without re-running publish
    in_journeys: 3
  publish/RestoreSequenceCounterFromDisk:
    type: process
    description: >-
      on cold start, reads the sequence number from the last event file on disk and restores the in-memory
      EventSequenceCounter to that value so the next publish increments from the correct baseline
    in_journeys: 5
  publish/ResumePublishFromInterruptionPoint:
    type: process
    description: >-
      given a detected interruption point, skips already-completed pipeline stages and resumes from the first incomplete
      stage, reusing valid artifacts already on disk rather than regenerating them from scratch
    in_journeys: 4
  publish/ValidateInterfaceYamlSchema:
    type: process
    description: >-
      validates the in-memory interface structure against the required schema before serialization, checking that hash
      is a 64-char hex string, nodes is a non-empty map with type and description fields, and journeys is a map with
      steps arrays
    in_journeys: 5
  publish/ValidateChangelogYamlSchema:
    type: process
    description: >-
      validates the in-memory changelog structure against the required schema before serialization, checking that added,
      removed, and modified are arrays where each entry has a name field and a type indicator
    in_journeys: 4
  publish/VerifyInterfaceYamlRoundTrip:
    type: process
    description: >-
      after writing interface.yaml, parses the file back into an in-memory structure and compares each node and journey
      field-by-field against the original export to detect silent data mangling by the YAML serializer
    in_journeys: 4
  publish/PreserveExtensionFieldsInInterface:
    type: process
    description: >-
      when collecting nodes for export, copies all fields from the compiled index node entries including extension
      fields like files, not just type and description, preventing silent metadata loss in the published interface
    in_journeys: 3
  publish/ValidateEventFileYamlParsability:
    type: process
    description: >-
      after writing the event file, parses it back with a standard YAML parser and verifies all expected fields are
      accessible including embedded changelog entries that may contain special YAML characters
    in_journeys: 5
  publish/CollectExternalRequires:
    type: process
    description: >-
      scans cross-module connections and journey steps for unresolved external references and builds the requires map of
      dependencies this engine needs from other boxes
    in_journeys: 3
  publish/EnsurePublishDirectory:
    type: process
    description: >-
      creates the published output directory with recursive mkdir if it does not exist before writing interface and
      changelog files
    in_journeys: 2
  publish/ReadPreviousInterface:
    type: process
    description: >-
      reads and parses the previous interface.yaml from disk to extract the prior PublishedInterface for changelog
      diffing and hash comparison
    in_journeys: 4
  publish/InterfaceYamlFile:
    type: artifact
    description: >-
      the published interface.yaml file containing engine name, provided nodes with type and journey count, required
      external references, and a SHA256 version hash
    in_journeys: 24
  publish/ChangelogYamlFile:
    type: artifact
    description: the published changelog.yaml file describing what changed in the latest publish
    in_journeys: 10
  publish/InterfaceHash:
    type: artifact
    description: the SHA256 hash of the current interface content used for change detection by dependent boxes
    in_journeys: 16
  publish/PreviousHash:
    type: artifact
    description: the SHA256 hash from the last published interface, stored for comparison
    in_journeys: 10
  publish/EventSequenceCounter:
    type: artifact
    description: >-
      monotonically increasing integer embedded in each event file to allow dependents to detect out-of-order or
      duplicate events
    in_journeys: 7
  publish/EventFile:
    type: interface
    description: the event file written after publish that dependent boxes watch via fs.watch to trigger reconvergence
    in_journeys: 25
  publish/HashBasedChangeDetection:
    type: rule
    description: change detection uses full SHA256 hash comparison, not timestamp or file-size heuristics
    in_journeys: 3
  publish/PublishAfterConvergenceOnly:
    type: rule
    description: publish.ts only runs after convergence confirms 0 errors and 0 audit gaps
    in_journeys: 2
  publish/AtomicFileWrite:
    type: rule
    description: >-
      all publish files are written atomically via write-to-temp-then-rename to prevent partial file corruption on crash
      or power loss
    in_journeys: 3
  publish/RippleDepthLimit:
    type: rule
    description: >-
      enforces a maximum ripple depth to prevent unbounded propagation chains, blocking further event writes when the
      origin chain exceeds the configured limit
    in_journeys: 3
  publish/MonotonicEventSequencing:
    type: rule
    description: >-
      event sequence numbers must be monotonically increasing and dependents must ignore events with sequence number
      less than or equal to the last processed event
    in_journeys: 4
  publish/ChangelogScopedReconvergence:
    type: rule
    description: >-
      dependents must use the embedded changelog in the event file to scope reconvergence to only the modules affected
      by upstream changes rather than full reconvergence
    in_journeys: 1
  publish/DetectCorruptedPreviousInterface:
    type: process
    description: >-
      detects when the previous interface.yaml on disk is present but unparsable as YAML or missing required fields like
      provides or version_hash, flagging it as corrupted so the pipeline falls back to first-time publish behavior
    in_journeys: 2
  publish/PublishCLI:
    type: interface
    description: command-line interface to run publish and display interface stats, version hash, and changelog summary
    in_journeys: 2
  sync/ReadDependencyList:
    type: process
    description: reads the list of dependencies for a box from its configuration to know which interfaces to check
    in_journeys: 30
  sync/FetchDependencyHash:
    type: process
    description: reads the SHA256 hash from each dependency's published interface.yaml
    in_journeys: 28
  sync/CompareStoredHash:
    type: process
    description: compares each fetched dependency hash against the locally stored hash from the last sync
    in_journeys: 31
  sync/IdentifyStaleDependencies:
    type: process
    description: collects all dependencies whose hash has changed since the last sync
    in_journeys: 11
  sync/FindAffectedModules:
    type: process
    description: traces which local modules reference nodes from the changed dependencies and marks them as stale
    in_journeys: 37
  sync/MarkModulesStale:
    type: process
    description: writes stale markers on affected modules so targeted reconvergence knows which modules to reprocess
    in_journeys: 29
  sync/UpdateStoredHashes:
    type: process
    description: writes the new dependency hashes to local storage after successful reconvergence
    in_journeys: 20
  sync/SkipIfAllCurrent:
    type: process
    description: aborts the sync check early if all dependency hashes match, avoiding unnecessary work
    in_journeys: 3
  sync/ParseEventPayload:
    type: process
    description: >-
      extracts the changelog summary, interface hash, ripple origin chain, and sequence number from the incoming event
      file
    in_journeys: 13
  sync/FilterUnrelatedChanges:
    type: process
    description: >-
      compares the changelog's changed node and journey names against local cross-module references and discards
      dependency changes that no local module references
    in_journeys: 10
  sync/ComputeStaleModuleCount:
    type: process
    description: >-
      counts the number of stale modules and records the count in the sync result for convergence logging and progress
      tracking
    in_journeys: 8
  sync/ValidateDependencyConfig:
    type: process
    description: >-
      checks that each entry in the dependency list points to a real box directory with a reachable interface.yaml file
      before attempting any hash fetch
    in_journeys: 4
  sync/DetectOscillationInOriginChain:
    type: process
    description: >-
      reads the ripple origin chain from the parsed event payload and checks whether this box's ID already appears in
      the chain, detecting A→B→A sync loops
    in_journeys: 9
  sync/CheckEventSequenceNumber:
    type: process
    description: >-
      compares the incoming event's sequence number against the last processed sequence number for that dependency and
      rejects events that are stale or duplicate
    in_journeys: 7
  sync/SuppressSyncOnOscillation:
    type: process
    description: >-
      aborts the entire sync pipeline when oscillation is detected, preventing reconvergence and republish that would
      perpetuate the cycle
    in_journeys: 3
  sync/AppendBoxToOriginChain:
    type: process
    description: >-
      adds this box's ID to the ripple origin chain before the outgoing event is written so downstream boxes can detect
      cycles that include this box
    in_journeys: 7
  sync/ComputeRippleScope:
    type: process
    description: >-
      determines the minimal set of interface nodes that actually crossed into this box by intersecting the incoming
      changelog with local cross-module references
    in_journeys: 3
  sync/NarrowOutgoingChangelog:
    type: process
    description: >-
      rewrites the outgoing event's changelog to include only the changes that affected this box, preventing
      upstream-only changes from rippling further downstream
    in_journeys: 10
  sync/VerifyHashAfterStore:
    type: process
    description: >-
      re-reads stored hashes from DependencyHashStore after UpdateStoredHashes writes them and confirms the persisted
      values match what was written, detecting silent write failures
    in_journeys: 4
  sync/CrossValidateEventHashWithFetchedHash:
    type: process
    description: >-
      compares the interface hash embedded in the incoming event payload against the hash fetched directly from the
      dependency's interface.yaml to detect race conditions or stale event data
    in_journeys: 4
  sync/DetectPartialHashUpdate:
    type: process
    description: >-
      checks that all dependency hashes in a multi-dependency sync were successfully persisted after a batch write,
      detecting partial writes from crashes or I/O errors
    in_journeys: 2
  sync/VerifyStalenessBeforeReconvergence:
    type: process
    description: >-
      re-fetches dependency hashes immediately before reconvergence begins and confirms they still differ from stored
      hashes, preventing reconvergence on already-reverted changes
    in_journeys: 3
  sync/EnforceDeterministicStaleOrder:
    type: process
    description: >-
      sorts the stale module list into a canonical alphabetical order by module name before passing it to reconvergence,
      ensuring re-runs produce the same processing sequence
    in_journeys: 2
  sync/GuardAgainstConcurrentSync:
    type: process
    description: >-
      checks for an active sync lock before beginning a new sync cycle, preventing concurrent runs from mutating shared
      state like DependencyHashStore and StaleModuleList simultaneously
    in_journeys: 7
  sync/VerifySyncIdempotency:
    type: process
    description: >-
      after a sync cycle completes, re-runs the hash comparison and confirms it produces an empty stale list, verifying
      the sync was effective and a re-run would be a no-op
    in_journeys: 5
  sync/CanonicalizeChangelogForNarrowing:
    type: process
    description: >-
      sorts changelog entries into deterministic order by category then alphabetically by node or journey name before
      narrowing, ensuring identical output regardless of input iteration order
    in_journeys: 3
  sync/FetchDependencyHashesConcurrently:
    type: process
    description: >-
      fetches SHA256 hashes from multiple dependency interface.yaml files in parallel with a configurable concurrency
      limit, reducing total fetch time for boxes with many dependencies
    in_journeys: 3
  sync/BatchMarkModulesStale:
    type: process
    description: >-
      writes stale markers on all affected modules in a single batch operation instead of individual writes, reducing
      I/O overhead when hundreds of modules are stale
    in_journeys: 2
  sync/ChunkAffectedModuleTracing:
    type: process
    description: >-
      partitions the cross-module connection set into chunks and traces affected modules incrementally, preventing
      memory exhaustion when the graph has thousands of edges
    in_journeys: 4
  sync/CheckRippleDepthLimit:
    type: process
    description: >-
      reads the ripple depth from the origin chain length and compares it against a configured maximum, suppressing
      propagation when the chain exceeds the depth limit to prevent cascade storms
    in_journeys: 3
  sync/DetectAndClearOrphanSyncLock:
    type: process
    description: >-
      checks on startup whether a SyncLock exists from a previous crashed process, validates no sync is actually
      running, and clears the stale lock to unblock new sync cycles
    in_journeys: 3
  sync/ScanForMissedEventsDuringSleep:
    type: process
    description: >-
      on wake or restart, reads the current event file sequence numbers from all dependencies and compares them against
      LastProcessedSequence to discover events that arrived while the process was not running
    in_journeys: 5
  sync/ValidateHashStoreIntegrityOnStartup:
    type: process
    description: >-
      reads the DependencyHashStore file on cold start and validates its structural integrity including correct entry
      count, valid SHA256 format for each hash, and no truncation from a prior crash
    in_journeys: 3
  sync/RecoverInterruptedStaleMarking:
    type: process
    description: >-
      on startup, detects a partially-written StaleModuleList by comparing its entries against the current SyncResult
      and re-derives the complete stale list from stored hashes to replace the incomplete one
    in_journeys: 2
  sync/ReconcileSequenceNumbersOnRestart:
    type: process
    description: >-
      on restart after crash, compares each dependency's current event sequence number against the locally stored
      LastProcessedSequence and fast-forwards to the latest sequence when the stored value is behind
    in_journeys: 4
  sync/CheckVersionPin:
    type: process
    description: >-
      checks whether a dependency is pinned to a specific version hash and skips reconvergence when the current
      interface hash does not match the pinned version
    in_journeys: 2
  sync/AlertOnPinnedUpdate:
    type: process
    description: >-
      when a pinned dependency has a new version available and alert_on_update is configured, records the new hash in
      sync state without triggering reconvergence
    in_journeys: 1
  sync/FallbackToLastKnownGood:
    type: process
    description: >-
      continues with cached dependency state when the dependency interface.yaml is unavailable and the fallback
      configuration is set to last_known_good
    in_journeys: 2
  sync/ReadDependencyChangelog:
    type: process
    description: >-
      reads changelog.yaml from the dependency published directory and attaches the parsed changelog to the sync change
      entry
    in_journeys: 5
  sync/SkipAlreadyStaleModule:
    type: process
    description: >-
      checks whether a module file already contains a _stale marker and skips redundant stale marking to prevent
      duplicate markers
    in_journeys: 2
  sync/DependencyHashStore:
    type: artifact
    description: local storage of the last-known SHA256 hash for each dependency interface
    in_journeys: 32
  sync/StaleModuleList:
    type: artifact
    description: the list of local modules marked as stale due to dependency changes, consumed by targeted reconvergence
    in_journeys: 23
  sync/SyncResult:
    type: artifact
    description: the output of sync.ts containing changed dependencies, affected modules, and stale markers
    in_journeys: 41
  sync/LastProcessedSequence:
    type: artifact
    description: >-
      stores the last successfully processed event sequence number per dependency for detecting out-of-order or
      duplicate events
    in_journeys: 14
  sync/SyncLock:
    type: artifact
    description: >-
      a lock file or flag that indicates a sync cycle is in progress, consumed by GuardAgainstConcurrentSync to detect
      and block overlapping sync runs
    in_journeys: 8
  sync/HashMismatchMeansStale:
    type: rule
    description: any difference between stored and fetched hash means the dependency changed and affected modules are stale
    in_journeys: 3
  sync/TargetedNotFull:
    type: rule
    description: sync triggers targeted reconvergence on only the affected modules, never a full re-creation pipeline
    in_journeys: 5
  sync/SyncTriggeredByEvent:
    type: rule
    description: sync only runs in response to an event file change detected by fs.watch, never on a timer or polling loop
    in_journeys: 4
  sync/DiscardStaleEvent:
    type: rule
    description: >-
      events with sequence number less than or equal to the last processed sequence for that dependency must be silently
      discarded without triggering sync
    in_journeys: 3
  sync/OscillationBlocksSync:
    type: rule
    description: >-
      if this box's ID appears in the ripple origin chain of an incoming event, sync must abort without marking any
      modules stale or triggering reconvergence
    in_journeys: 3
  sync/EnforceAtomicHashUpdate:
    type: rule
    description: >-
      requires that when multiple dependency hashes are updated in a single sync cycle, either all are persisted or none
      are, preventing inconsistent stored state
    in_journeys: 1
  sync/DependencyFanOutLimit:
    type: rule
    description: >-
      enforces a maximum number of dependencies a single box may declare, preventing sync from becoming unresponsive due
      to excessive upstream watchers and hash fetches
    in_journeys: 4
  sync/RejectMalformedEvent:
    type: rule
    description: >-
      requires that incoming event files contain valid YAML with all mandatory fields including interface hash, sequence
      number, and origin chain, and rejects sync when parsing fails
    in_journeys: 2
  sync/ReleaseSyncLockOnError:
    type: process
    description: >-
      ensures the SyncLock is released in a finally block when any step in the sync pipeline throws an unexpected error
      after lock acquisition, preventing permanent lock deadlock that would block all future sync cycles
    in_journeys: 2
  sync/DetectStaleMarkingWriteFailure:
    type: process
    description: >-
      after MarkModulesStale runs, reads back each expected stale marker from the module files on disk and identifies
      any modules where the marker write silently failed or was lost due to I/O error
    in_journeys: 3
  sync/RetryDeferredSync:
    type: process
    description: >-
      re-queues a sync cycle that was blocked by GuardAgainstConcurrentSync so it runs after the active sync releases
      the lock, preventing silently lost dependency changes that would leave modules stale
    in_journeys: 3
  sync/VerifyOutgoingEventWritten:
    type: process
    description: >-
      reads the outgoing event file back after WriteEventFile and confirms its content matches the expected changelog,
      origin chain, and sequence number, detecting silent write failures that would break the ripple chain
    in_journeys: 3
  testgen/ReadJourneySteps:
    type: process
    description: reads all journeys from the compiled index and extracts their ordered steps as the basis for test cases
    in_journeys: 10
  testgen/GenerateTestFilePerJourney:
    type: process
    description: creates one TypeScript test file per journey with a describe block and one test case per step
    in_journeys: 6
  testgen/GenerateStepTestCase:
    type: process
    description: creates an empty test case for a single journey step with the step's node and action as the test name
    in_journeys: 4
  testgen/GenerateConnectionAssertions:
    type: process
    description: creates assertion stubs for each consecutive step pair verifying the output of one step feeds into the next
    in_journeys: 2
  testgen/MapTestImports:
    type: process
    description: reads the generated code files from codegen to produce import statements linking tests to implementations
    in_journeys: 4
  testgen/FillTestAssertions:
    type: process
    description: delegates to LLM to fill empty assertion bodies with concrete checks based on the step actions and node types
    in_journeys: 15
  testgen/WriteTestFile:
    type: process
    description: writes the filled test file to disk in the test output directory
    in_journeys: 8
  testgen/RunTests:
    type: process
    description: executes all generated test files and collects pass/fail results for each test case
    in_journeys: 5
  testgen/CollectFailures:
    type: process
    description: gathers all failing test cases with their error messages and stack traces
    in_journeys: 7
  testgen/GenerateFixPrompt:
    type: process
    description: builds a targeted prompt for each failure specifying the test, the implementation, and the error to fix
    in_journeys: 3
  testgen/ApplyTestFix:
    type: process
    description: delegates to LLM to fix either the test assertion or the implementation code based on the failure
    in_journeys: 4
  testgen/RerunAfterFix:
    type: process
    description: re-executes only the previously failing tests to verify the fix worked
    in_journeys: 5
  testgen/SelectNextTestToFill:
    type: process
    description: picks the next unfilled test skeleton from the journey list and advances the pointer through the fill sequence
    in_journeys: 9
  testgen/ProvideTestgenExcerpt:
    type: process
    description: >-
      assembles testgen-specific excerpt context including node behaviors, journey flows, and implementation code to
      guide LLM assertion writing
    in_journeys: 7
  testgen/ConfirmAllTestsFilled:
    type: process
    description: verifies that every journey has a filled test file on disk before proceeding to test execution
    in_journeys: 3
  testgen/ConfirmAllTestsPassing:
    type: process
    description: verifies that the test result report shows zero failures as a gate for pipeline completion
    in_journeys: 4
  testgen/SelectNextFailureToFix:
    type: process
    description: picks the next unfixed failure from the prioritized failure list and advances through the fix queue
    in_journeys: 5
  testgen/ValidateFilledTestSyntax:
    type: process
    description: >-
      runs a TypeScript syntax check on the filled test file to catch LLM-generated compilation errors before test
      execution
    in_journeys: 10
  testgen/RetryFillWithAssertionErrors:
    type: process
    description: >-
      sends the syntax or compilation errors from a failed test fill back to the LLM as feedback and re-requests the
      fill with the original skeleton plus error context
    in_journeys: 4
  testgen/DetectTestExecutionCrash:
    type: process
    description: >-
      detects when the test runner process itself crashes or exits abnormally rather than producing a clean pass/fail
      result, distinguishing runner failures from test failures
    in_journeys: 4
  testgen/DetectFixInducedRegression:
    type: process
    description: compares pre-fix and post-fix test results to detect new failures that did not exist before the fix was applied
    in_journeys: 3
  testgen/RevertFailedTestFix:
    type: process
    description: >-
      restores the test or implementation file to its pre-fix state when a fix introduced regressions or failed to
      resolve the targeted failure
    in_journeys: 3
  testgen/TestSkeletonFile:
    type: artifact
    description: a TypeScript test file with empty assertion bodies for all steps in a journey
    in_journeys: 12
  testgen/FilledTestFile:
    type: artifact
    description: a TypeScript test file with LLM-filled assertions ready to execute
    in_journeys: 12
  testgen/TestResultReport:
    type: artifact
    description: the collected pass/fail results from running all test files with error details for failures
    in_journeys: 18
  testgen/FailureFixList:
    type: artifact
    description: the list of failing tests with error messages, used to drive targeted LLM fixes
    in_journeys: 6
  testgen/TestsFromJourneys:
    type: rule
    description: every test case maps directly to a journey step — no tests exist without a corresponding journey
    in_journeys: 1
  testgen/StepsAreTestCases:
    type: rule
    description: each journey step with its node and action becomes exactly one test case, ensuring 1-to-1 coverage
    in_journeys: 3
  testgen/DiagnoseFailureRoot:
    type: process
    description: >-
      after fix retries are exhausted for a test failure, analyzes the failure pattern to determine whether the root
      cause is a code bug, test bug, or graph bug per spec section 9
    in_journeys: 8
  testgen/DetectMissingImplementation:
    type: process
    description: >-
      checks whether the implementation file for a module exists on disk before generating or filling its test skeleton,
      preventing wasted effort on modules codegen could not fill
    in_journeys: 3
  testgen/DetectTrivialAssertions:
    type: process
    description: >-
      scans filled test assertions for trivial patterns like expect(true).toBe(true), toBeDefined-only checks, and empty
      test bodies that pass without verifying actual journey step behavior
    in_journeys: 3
  testgen/ValidateTestCaseStructure:
    type: process
    description: >-
      compares the describe and it blocks in a filled test file against the journey's step list to detect added,
      removed, or merged test cases that violate StepsAreTestCases
    in_journeys: 6
  testgen/TestGenCLI:
    type: interface
    description: command-line interface to run test skeleton generation from journeys and display the generated file list
    in_journeys: 2
  _actors/ProjectOwner:
    type: actor
    description: describes a project via spec.md and triggers convergence
    in_journeys: 41
  _actors/HumanDeveloper:
    type: actor
    description: reads, edits, and maintains modules and spec files directly
    in_journeys: 24
  _actors/LLMWorker:
    type: actor
    description: persistent Claude Code process that creates module content, fills code, and fills test assertions when asked
    in_journeys: 180
  _actors/Compiler:
    type: actor
    description: validates the graph by checking for duplicates, dangling refs, YAML errors, orphans, and isolated modules
    in_journeys: 159
  _actors/Auditor:
    type: actor
    description: LLM that checks coverage from a specific angle (spec, actor, or cross-module) and identifies gaps
    in_journeys: 62
  _actors/ParentEngine:
    type: actor
    description: >-
      convergence.ts instance that splits organization into children, validates cross-engine refs, and publishes parent
      interface
    in_journeys: 19
  _actors/ChildEngine:
    type: actor
    description: convergence.ts instance running at a scoped level with inherited actors, converging independently
    in_journeys: 21
  _actors/DependentBox:
    type: actor
    description: a box that watches another box's event files via fs.watch and triggers targeted reconvergence on change
    in_journeys: 31
  _actors/FileSystem:
    type: actor
    description: the OS file system that delivers watch events, stores modules, and hosts event files for ripple propagation
    in_journeys: 55
  _actors/MaliciousSpecAuthor:
    type: actor
    description: injects prompt-injection or adversarial content into spec.md to manipulate LLM behavior during convergence
    in_journeys: 3
  _actors/YAMLTamperer:
    type: actor
    description: directly edits module YAML files to introduce invalid refs, corrupt hashes, or inject malicious node definitions
    in_journeys: 5
  _actors/RogueWorker:
    type: actor
    description: >-
      an LLMWorker that produces subtly wrong content — hallucinated nodes, phantom connections, or code with hidden
      vulnerabilities
    in_journeys: 4
  _actors/EventSpoofer:
    type: actor
    description: writes fake event files to trigger unnecessary reconvergence cascades or inject stale data into dependent boxes
    in_journeys: 3
  _actors/InfiniteLoopTrigger:
    type: actor
    description: >-
      crafts circular dependencies or oscillating changes between boxes that cause unbounded ripple chains despite
      convergence rules
    in_journeys: 3
  _actors/HashCollisionExploiter:
    type: actor
    description: manipulates artifact content to produce identical SHA256 hashes, causing sync.ts to miss real changes
    in_journeys: 3
  _actors/PrivilegeEscalator:
    type: actor
    description: >-
      exploits LLMWorker's native tool access (Read, Write, Edit, Bash) to touch files outside the box scope or execute
      arbitrary commands
    in_journeys: 4
  _actors/ResourceExhauster:
    type: actor
    description: >-
      submits specs or triggers hierarchies designed to spawn unbounded child engines, exhausting memory, disk, or API
      quota
    in_journeys: 3
  _actors/NewProjectAdopter:
    type: actor
    description: >-
      encounters genome8 for the first time, runs convergence on their first spec.md, and evaluates whether the protocol
      fits their system
    in_journeys: 3
  _actors/MigratingProject:
    type: actor
    description: >-
      an existing codebase with legacy documentation being onboarded into genome8, requiring initial graph bootstrapping
      from pre-existing artifacts
    in_journeys: 3
  _actors/StaleBox:
    type: actor
    description: >-
      a box whose event watcher has stopped or whose upstream dependencies have been removed, silently drifting out of
      sync with the living graph
    in_journeys: 3
  _actors/DeprecatedModule:
    type: actor
    description: >-
      a module that is no longer relevant to the current spec but still exists on disk with orphaned nodes and dangling
      inbound references
    in_journeys: 3
  _actors/ReturningOwner:
    type: actor
    description: >-
      a ProjectOwner who re-triggers convergence after a long period of inactivity, facing stale hashes, outdated
      interfaces, and potentially broken child engines
    in_journeys: 3
  _goals/SolveContextProblem:
    type: rule
    description: any system at any scale gets scoped, connected, synced context — no single brain required
    in_journeys: 2
  _goals/BuildPando:
    type: rule
    description: decentralized AI platform ships as the first real proof that genome works at scale
    in_journeys: 2
  _goals/GenomeIsTheProduct:
    type: rule
    description: genome is a protocol others adopt, not just an internal tool
    in_journeys: 2
  _goals/ProductionReady:
    type: rule
    description: no hacks, no shortcuts — every component reliable enough for real workloads
    in_journeys: 2
  _goals/SelfSustaining:
    type: rule
    description: the system runs, converges, and heals without human intervention
    in_journeys: 2
requires: {}
