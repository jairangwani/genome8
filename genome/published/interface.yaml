engine: genome8
version_hash: sha256:3fac18f704364b040db103148dcab488d7f93ccc9415009c4d547621ebd3f16d
provides:
  actors/DiscoverFromActivities:
    type: process
    description: >-
      analyzes the spec to find actors from the activities perspective — who uses, creates, operates, governs, and
      visits the system
    in_journeys: 9
  actors/DiscoverFromThreats:
    type: process
    description: analyzes the spec to find threat actors — attackers, abusers, failure scenarios, and exploitation vectors
    in_journeys: 6
  actors/DiscoverFromLifecycle:
    type: process
    description: analyzes the spec to find lifecycle actors — first visit, onboarding, power use, decline, exit, and return
    in_journeys: 6
  actors/MergeAndDeduplicate:
    type: process
    description: combines actors from all 3 angles, removes duplicates, and keeps the best description for each
    in_journeys: 5
  actors/WriteActorsFile:
    type: process
    description: writes the merged actor list to _actors.yaml in the modules directory
    in_journeys: 6
  actors/InheritActorsFromParent:
    type: process
    description: copies the parent's _actors.yaml into a child engine directory so children share the same actor set
    in_journeys: 2
  actors/ValidateActorCoverage:
    type: process
    description: checks that every discovered actor appears in at least one journey across all modules
    in_journeys: 1
  actors/ValidateThreeAngleCompleteness:
    type: process
    description: >-
      checks that all 3 discovery angles produced at least one actor each, preventing partial discovery from proceeding
      to merge
    in_journeys: 4
  actors/ProvideActorsForModuleCreation:
    type: process
    description: >-
      supplies the actor list to the excerpt generator so module workers know which _actors/ references are valid during
      module creation
    in_journeys: 2
  actors/RediscoverActorsOnSpecChange:
    type: process
    description: >-
      re-runs 3-angle discovery when the spec changes during reconvergence, producing a diff of added and removed actors
      against the existing set
    in_journeys: 1
  actors/UpdateActorsFileAfterRediscovery:
    type: process
    description: >-
      merges newly discovered actors with the existing set, adding new actors and flagging removed ones for orphan
      detection rather than deleting immediately
    in_journeys: 2
  actors/ValidateActorYAMLStructure:
    type: process
    description: >-
      checks that each entry in _actors.yaml has type actor and a non-empty description before the file is passed to
      compilation
    in_journeys: 4
  actors/ActorsFile:
    type: artifact
    description: the _actors.yaml file containing all discovered actors with type and description
    in_journeys: 9
  actors/ActivitiesActorList:
    type: artifact
    description: the list of actors discovered from the activities perspective before merging
    in_journeys: 4
  actors/ThreatsActorList:
    type: artifact
    description: the list of actors discovered from the threats perspective before merging
    in_journeys: 4
  actors/LifecycleActorList:
    type: artifact
    description: the list of actors discovered from the lifecycle perspective before merging
    in_journeys: 4
  actors/MergedActorList:
    type: artifact
    description: the deduplicated combined actor list from all 3 discovery angles
    in_journeys: 1
  actors/ThreeAngleDiscovery:
    type: rule
    description: actors must be discovered from exactly 3 angles (activities, threats, lifecycle) to ensure comprehensive coverage
    in_journeys: 3
  actors/ParentDiscoversChildrenInherit:
    type: rule
    description: only the parent engine discovers actors — children inherit them to prevent duplication
    in_journeys: 2
  actors/DetectActorImpersonation:
    type: process
    description: >-
      checks that every _actors/ reference in journey steps resolves to a validated actor in the registry, flagging
      references to non-existent or removed actors
    in_journeys: 2
  actors/DetectActorDescriptionPoisoning:
    type: process
    description: >-
      scans actor descriptions for adversarial content patterns such as prompt injection fragments, encoded
      instructions, or excessively long text before they are included in excerpt context
    in_journeys: 2
  actors/DetectChildActorTampering:
    type: process
    description: >-
      compares a child engine's _actors.yaml content against the parent's original hash to detect unauthorized
      additions, removals, or description modifications
    in_journeys: 3
  actors/DetectDiscoveryAngleBias:
    type: process
    description: >-
      checks that no single discovery angle produced more than a threshold proportion of total actors, flagging
      potential angle suppression or spec manipulation
    in_journeys: 2
  actors/EnforceActorCountLimit:
    type: process
    description: >-
      caps the maximum number of actors that can be stored in _actors.yaml to prevent graph bloat and context window
      exhaustion from adversarial specs
    in_journeys: 2
  audit/CheckSpecCoverage:
    type: process
    description: auditor 1 compares spec sections against the graph to find sections not represented by any node or journey
    in_journeys: 6
  audit/CheckActorCoverage:
    type: process
    description: auditor 2 checks that every actor in _actors.yaml participates in at least one journey across all modules
    in_journeys: 5
  audit/CheckCrossModuleCoverage:
    type: process
    description: auditor 3 verifies that every module has at least one cross-module connection and no module is an island
    in_journeys: 5
  audit/GenerateAuditPrompt:
    type: process
    description: >-
      builds a focused prompt for each auditor containing the compiled graph excerpt and the specific coverage angle to
      check
    in_journeys: 8
  audit/CollectAuditFindings:
    type: process
    description: gathers findings from all 3 auditors into a single list of coverage gaps with locations and descriptions
    in_journeys: 6
  audit/PrioritizeGaps:
    type: process
    description: ranks the collected gaps by severity so the most critical coverage issues are fixed first
    in_journeys: 4
  audit/BuildGapFixPrompt:
    type: process
    description: builds a targeted fix prompt for each gap specifying exactly which module to edit and what coverage to add
    in_journeys: 5
  audit/ApplyFix:
    type: process
    description: delegates to LLM to edit the specific module YAML file to close the identified coverage gap
    in_journeys: 8
  audit/VerifyFixCompiles:
    type: process
    description: runs compile.ts after each fix to ensure the edit did not introduce new errors
    in_journeys: 5
  audit/VerifyGapClosed:
    type: process
    description: re-runs the specific auditor that found the gap to confirm the fix actually closed it
    in_journeys: 5
  audit/DeclareConverged:
    type: process
    description: marks the graph as CONVERGED after all 3 auditors report zero gaps and compilation shows zero errors
    in_journeys: 4
  audit/SelectNextGapToFix:
    type: process
    description: picks the highest-priority unfixed gap from the prioritized list and advances the pointer to the next gap
    in_journeys: 5
  audit/ProvideFixContext:
    type: process
    description: >-
      assembles the target module excerpt, the specific gap description, and surrounding graph context into a complete
      fix payload for the LLM worker
    in_journeys: 5
  audit/MergeAuditReports:
    type: process
    description: >-
      combines the 3 individual coverage reports into a unified view with normalized gap format before feeding into
      findings collection
    in_journeys: 4
  audit/ConfirmAllGapsResolved:
    type: process
    description: >-
      checks that the re-audit findings list is empty and compilation is clean before allowing convergence declaration
      to proceed
    in_journeys: 2
  audit/DetectFixInducedErrors:
    type: process
    description: >-
      compares pre-fix and post-fix compilation results to detect new orphans, duplicates, or dangling refs that did not
      exist before the fix was applied
    in_journeys: 5
  audit/DetectFixInducedGaps:
    type: process
    description: >-
      compares pre-fix and post-fix audit findings to detect new coverage gaps opened by a fix that closed a different
      gap
    in_journeys: 3
  audit/RejectAndRevertFix:
    type: process
    description: restores the target module to its pre-fix state when a fix introduced new errors or failed to close the target gap
    in_journeys: 3
  audit/ValidateGraphInvariantsPostFix:
    type: process
    description: >-
      checks all convergence invariants after a fix round including zero errors, zero orphans, zero duplicates, and zero
      isolated modules
    in_journeys: 8
  audit/DetectSelfAuditTarget:
    type: process
    description: >-
      detects when a coverage gap targets audit.yaml itself, flagging the meta-circular dependency so the fix process
      applies extra safeguards
    in_journeys: 3
  audit/ValidateAuditModulePresence:
    type: process
    description: >-
      checks that audit.yaml exists as a compiled module in the index since it is infrastructure required for the
      convergence pipeline to function
    in_journeys: 3
  audit/DetectSpecChangeToAuditSections:
    type: process
    description: >-
      detects when spec sections referenced by audit.yaml have changed, triggering re-evaluation of audit coverage
      requirements against the updated spec
    in_journeys: 3
  audit/ScopeFixToAvoidAuditBreak:
    type: process
    description: >-
      when a fix targets audit.yaml, validates that the proposed edit does not remove or break existing audit processes
      like CheckSpecCoverage, VerifyFixCompiles, or DeclareConverged
    in_journeys: 2
  audit/ReauditAfterSelfFix:
    type: process
    description: >-
      after a fix modifies audit.yaml, re-runs the full audit pipeline from scratch to verify the self-fix did not
      invalidate audit's own integrity
    in_journeys: 2
  audit/AuditFindingsList:
    type: artifact
    description: the collected list of coverage gaps from all 3 auditors with gap type, location, and description
    in_journeys: 16
  audit/SpecCoverageReport:
    type: artifact
    description: auditor 1's report listing which spec sections are covered and which have no representation in the graph
    in_journeys: 2
  audit/ActorCoverageReport:
    type: artifact
    description: auditor 2's report listing which actors participate in journeys and which are orphaned
    in_journeys: 1
  audit/CrossModuleCoverageReport:
    type: artifact
    description: auditor 3's report listing which modules have cross-module connections and which are isolated
    in_journeys: 1
  audit/TrackAuditRound:
    type: artifact
    description: >-
      records the current audit-fix-reaudit cycle number and cumulative gaps fixed for progress tracking and termination
      decisions
    in_journeys: 12
  audit/ExactlyThreeAuditors:
    type: rule
    description: depth audit always uses exactly 3 auditors checking spec coverage, actor coverage, and cross-module coverage
    in_journeys: 1
  audit/TargetedFixesOnly:
    type: rule
    description: audit gaps are fixed with targeted edits to specific modules, never by re-running the full creation pipeline
    in_journeys: 1
  audit/AuditAfterZeroErrors:
    type: rule
    description: audit only runs after compile.ts reports 0 errors and 0 orphans — never on a broken graph
    in_journeys: 3
  audit/AuditRoundLimit:
    type: rule
    description: >-
      audit-fix-reaudit cycles are capped at a maximum number of rounds to prevent infinite loops when gaps cannot be
      resolved
    in_journeys: 2
  codegen/ReadConvergedGraph:
    type: process
    description: >-
      reads the compiled index after convergence to extract all nodes with their types and descriptions for skeleton
      generation
    in_journeys: 4
  codegen/GenerateProcessSkeletons:
    type: process
    description: >-
      creates TypeScript function stubs for each process node with name, parameters inferred from connections, and
      return type
    in_journeys: 2
  codegen/GenerateArtifactSkeletons:
    type: process
    description: creates TypeScript interface and class stubs for each artifact node with fields inferred from journey usage
    in_journeys: 2
  codegen/GenerateInterfaceSkeletons:
    type: process
    description: creates TypeScript API endpoint or handler stubs for each interface node
    in_journeys: 2
  codegen/GenerateRuleSkeletons:
    type: process
    description: creates TypeScript validation function stubs for each rule node with the constraint logic left empty
    in_journeys: 2
  codegen/MapConnectionsToImports:
    type: process
    description: reads cross-module connections to generate import statements linking skeleton files across modules
    in_journeys: 2
  codegen/AssembleModuleFile:
    type: process
    description: combines all skeletons for a single module into one TypeScript file with imports, types, and function stubs
    in_journeys: 2
  codegen/FillImplementation:
    type: process
    description: delegates to LLM to fill the empty function bodies and class methods in a skeleton file with working code
    in_journeys: 11
  codegen/WriteGeneratedFile:
    type: process
    description: writes the filled TypeScript file to disk in the generated code output directory
    in_journeys: 12
  codegen/ValidateFilledSyntax:
    type: process
    description: runs a TypeScript syntax and type check on the filled source file to catch LLM-generated errors before staging
    in_journeys: 11
  codegen/StageFilledModule:
    type: process
    description: >-
      writes the validated filled file to the staging directory rather than directly to the final output, allowing
      review before commit
    in_journeys: 2
  codegen/SelectNextModuleToFill:
    type: process
    description: picks the next unfilled module from the dependency-ordered build list and advances the pointer
    in_journeys: 8
  codegen/ConfirmAllModulesFilled:
    type: process
    description: >-
      checks that every module in the dependency-ordered build list has a filled source file on disk before signaling
      codegen completion
    in_journeys: 6
  codegen/ProvideCodegenExcerpt:
    type: process
    description: >-
      assembles codegen-specific excerpt context including node descriptions, journey flows, and cross-module imports to
      guide the LLM fill
    in_journeys: 3
  codegen/RetryFillWithErrorFeedback:
    type: process
    description: >-
      sends the syntax or type errors from a failed fill back to the LLM as feedback and re-requests the fill with the
      original skeleton plus the error context
    in_journeys: 3
  codegen/DetectWorkerCrashDuringFill:
    type: process
    description: >-
      detects that the LLM worker process crashed, timed out, or disconnected during a fill task before the result was
      fully received
    in_journeys: 2
  codegen/ResumeFromLastFilledModule:
    type: process
    description: >-
      on restart after a partial crash, scans the generated code directory to find which modules already have filled
      files and resumes from the next unfilled module in build order
    in_journeys: 3
  codegen/SkipAndDeferFailedModule:
    type: process
    description: >-
      when a module fill fails after retries, skips it and continues with independent modules that do not depend on the
      failed one, deferring it for a later attempt
    in_journeys: 4
  codegen/RollbackCorruptedFill:
    type: process
    description: >-
      reverts a filled file back to its skeleton state when the fill passes syntax check but causes type errors in
      dependent modules downstream
    in_journeys: 1
  codegen/SkeletonFile:
    type: artifact
    description: a TypeScript file containing empty stubs for all nodes in a module, ready for LLM to fill
    in_journeys: 10
  codegen/FilledSourceFile:
    type: artifact
    description: a TypeScript file with LLM-filled implementations for all node stubs in a module
    in_journeys: 16
  codegen/GeneratedCodeDirectory:
    type: artifact
    description: the output directory containing all generated TypeScript files organized by module
    in_journeys: 8
  codegen/CodeComesFromNodes:
    type: rule
    description: every generated function, class, or interface maps directly to a node in the graph — no code exists without a node
    in_journeys: 2
  codegen/SkeletonBeforeFill:
    type: rule
    description: code generation always produces empty skeletons first, then LLM fills — never asks LLM to generate from scratch
    in_journeys: 1
  compilation/YAMLParsing:
    type: process
    description: reads raw YAML module files from disk and parses them into structured data
    in_journeys: 11
  compilation/DuplicateDetection:
    type: process
    description: scans the node registry for duplicate node names across all modules
    in_journeys: 6
  compilation/DanglingRefDetection:
    type: process
    description: checks every journey step node reference and flags those that resolve to no known node
    in_journeys: 9
  compilation/OrphanDetection:
    type: process
    description: identifies nodes that are defined but never referenced in any journey step
    in_journeys: 6
  compilation/IsolatedModuleDetection:
    type: process
    description: finds modules whose nodes have zero connections to nodes in any other module
    in_journeys: 5
  compilation/ExternalRefClassification:
    type: process
    description: classifies unresolved refs as external sibling-engine references and emits warnings instead of errors
    in_journeys: 3
  compilation/YAMLErrorReporting:
    type: process
    description: catches and reports YAML syntax errors with file name and line number for each malformed module
    in_journeys: 9
  compilation/ValidationAggregation:
    type: process
    description: collects all errors and warnings from all validation checks into a single compilation result
    in_journeys: 6
  compilation/IncrementalValidation:
    type: process
    description: >-
      validates only the newly added module against the existing graph, checking for new duplicates, dangling refs, and
      type errors without full rebuild
    in_journeys: 2
  compilation/SkipMalformedModule:
    type: process
    description: >-
      excludes a module with fatal YAML parse errors from the compiled index, allowing compilation of remaining modules
      to continue
    in_journeys: 1
  compilation/ValidateModuleCompleteness:
    type: process
    description: >-
      checks that every module listed in ORGANIZATION.md exists as a compiled module in the index, ensuring no module
      was missed during bounded creation
    in_journeys: 5
  compilation/CompilationResult:
    type: artifact
    description: the output of compile.ts containing error count, warning count, orphan list, duplicate list, and dangling ref list
    in_journeys: 48
  compilation/ErrorReport:
    type: artifact
    description: structured list of all validation errors with type, location, and message for each
    in_journeys: 15
  compilation/WarningReport:
    type: artifact
    description: structured list of all warnings including external refs that parent will validate later
    in_journeys: 2
  compilation/CompileCLI:
    type: interface
    description: command-line interface to run compile.ts and receive validation output
    in_journeys: 2
  compilation/ZeroErrorConvergence:
    type: rule
    description: convergence requires compile.ts to report exactly 0 errors and 0 orphans before proceeding
    in_journeys: 8
  compilation/ExternalRefsAreWarnings:
    type: rule
    description: unresolved refs to sibling engines are warnings in children, errors only at parent level
    in_journeys: 1
  convergence/ReadSpec:
    type: process
    description: reads spec.md from disk as the sole human input to the convergence pipeline
    in_journeys: 10
  convergence/WriteOrganization:
    type: process
    description: delegates to LLM to analyze the spec and write ORGANIZATION.md with modules, dependencies, and independence
    in_journeys: 3
  convergence/DiscoverActors:
    type: process
    description: delegates to LLM to discover actors from 3 angles (activities, threats, lifecycle) and write _actors.yaml
    in_journeys: 5
  convergence/HierarchyDecision:
    type: process
    description: delegates to LLM to decide whether the module set should split into child engines based on independence analysis
    in_journeys: 6
  convergence/ModuleCreation:
    type: process
    description: iterates over modules from ORGANIZATION.md, making one LLM call per module with compile between each
    in_journeys: 10
  convergence/BoundedCreationLoop:
    type: process
    description: creates modules in build-order rounds, compiling after each to catch errors before the next module
    in_journeys: 12
  convergence/CompileCheck:
    type: process
    description: invokes compile.ts after each module creation and after all modules to verify 0 errors and 0 orphans
    in_journeys: 17
  convergence/TargetedAudit:
    type: process
    description: dispatches 3 auditors to check spec coverage, actor coverage, and cross-module coverage after compilation passes
    in_journeys: 7
  convergence/AuditGapFix:
    type: process
    description: takes audit findings and makes targeted LLM calls to fix specific coverage gaps without re-creating from scratch
    in_journeys: 11
  convergence/RecompileAfterFix:
    type: process
    description: runs compile.ts again after audit fixes to verify the fixes did not introduce new errors
    in_journeys: 6
  convergence/ReauditAfterFix:
    type: process
    description: runs targeted audit again after successful recompile to verify gaps are closed
    in_journeys: 3
  convergence/TriggerPublish:
    type: process
    description: invokes publish.ts to generate interface.yaml and changelog.yaml after convergence is confirmed
    in_journeys: 9
  convergence/TriggerCodegen:
    type: process
    description: invokes codegen.ts to generate TypeScript skeletons from the converged graph
    in_journeys: 4
  convergence/TriggerTestgen:
    type: process
    description: invokes testgen.ts to generate test skeletons from journey steps
    in_journeys: 7
  convergence/ExecuteTests:
    type: process
    description: executes generated tests and collects pass/fail results
    in_journeys: 9
  convergence/FixTestFailures:
    type: process
    description: delegates to LLM to fix failing tests and re-runs until all pass
    in_journeys: 4
  convergence/EnterSleepMode:
    type: process
    description: sets up fs.watch on event files and enters zero-cost sleep until a change event arrives
    in_journeys: 5
  convergence/WakeOnEvent:
    type: process
    description: wakes from sleep when fs.watch detects an event file change from a dependency
    in_journeys: 2
  convergence/TargetedReconvergence:
    type: process
    description: runs compile + audit on only the stale modules identified by sync, skipping full creation
    in_journeys: 25
  convergence/MapPerspectives:
    type: process
    description: >-
      identifies which perspectives are relevant to each module based on its content domain and assigns the bounded set
      of lenses
    in_journeys: 2
  convergence/ExamineFromPerspective:
    type: process
    description: delegates to LLM to examine a single module from a single perspective and add missing nodes and journeys
    in_journeys: 3
  convergence/RetryModuleCreation:
    type: process
    description: >-
      retries module creation by passing the compilation error report to the LLM so it can fix the specific problems in
      its output
    in_journeys: 1
  convergence/RollbackFailedFix:
    type: process
    description: reverts a module file to its pre-fix state when an audit fix introduced new compilation errors
    in_journeys: 1
  convergence/ResumePipeline:
    type: process
    description: reads ConvergenceState on startup to find the last completed pipeline step and resumes execution from that point
    in_journeys: 2
  convergence/DetectWorkerFailure:
    type: process
    description: detects when the LLM worker process has crashed or become unresponsive during a task
    in_journeys: 5
  convergence/RespawnWorker:
    type: process
    description: terminates the failed worker process and spawns a fresh one with the same task context
    in_journeys: 3
  convergence/ValidateCreationCompleteness:
    type: process
    description: >-
      checks that every module listed in ORGANIZATION.md exists as a YAML file on disk after the creation pipeline
      finishes
    in_journeys: 2
  convergence/ValidatePerspectiveCompleteness:
    type: process
    description: checks that every module-perspective pair in the mapping was examined during the enrichment pipeline
    in_journeys: 2
  convergence/ValidateActorCompleteness:
    type: process
    description: >-
      checks that all 3 actor discovery angles produced results and the merged _actors.yaml covers activities, threats,
      and lifecycle
    in_journeys: 4
  convergence/PipelineInvariantCheck:
    type: process
    description: verifies that all pipeline phases completed in the correct order before allowing convergence to be declared
    in_journeys: 7
  convergence/HandleWorkerCompaction:
    type: process
    description: >-
      orchestrates context compaction in the LLM worker during long creation or enrichment loops so the pipeline
      continues without losing progress
    in_journeys: 1
  convergence/SplitIntoChildEngines:
    type: process
    description: distributes modules to child engines and spawns independent convergence pipelines when hierarchy decides to split
    in_journeys: 1
  convergence/CollectChildResults:
    type: process
    description: >-
      waits for all child engines to converge and collects their published interfaces for parent-level cross-engine
      validation
    in_journeys: 1
  convergence/DetectSelfModification:
    type: process
    description: >-
      detects when reconvergence would modify modules that describe the currently running pipeline such as convergence,
      compilation, or graph
    in_journeys: 2
  convergence/StageGeneratedCode:
    type: process
    description: >-
      writes codegen output to a staging directory instead of overwriting the running code, so the active pipeline is
      not modified mid-run
    in_journeys: 2
  convergence/SwapGeneratedCode:
    type: process
    description: atomically replaces the running code with the staged generated code after all tests pass on the staged version
    in_journeys: 1
  convergence/ValidateSelfConsistency:
    type: process
    description: checks that self-referential modules accurately describe the behavior of the running code they were generated from
    in_journeys: 5
  convergence/SpecFile:
    type: artifact
    description: the spec.md file written by the ProjectOwner as the sole human input
    in_journeys: 6
  convergence/ConvergenceState:
    type: artifact
    description: tracks current pipeline step, completed modules, audit results, and convergence status
    in_journeys: 91
  convergence/StagingDirectory:
    type: artifact
    description: temporary directory holding generated code that will replace the running code after tests pass
    in_journeys: 1
  convergence/ConvergenceCLI:
    type: interface
    description: command-line interface to trigger and monitor the convergence pipeline
    in_journeys: 4
  convergence/CodeOrchestratesLLMCreates:
    type: rule
    description: code decides WHEN to act, LLM only creates content when explicitly asked by code
    in_journeys: 1
  convergence/BoundedCreationRule:
    type: rule
    description: creation is bounded by modules times relevant lenses, never an open-ended loop
    in_journeys: 3
  convergence/NeverOpenEndedLoop:
    type: rule
    description: LLM is never asked open-ended questions in a loop — bounded creation plus targeted fixes only
    in_journeys: 3
  convergence/DataDecidesWhenToStop:
    type: rule
    description: no hardcoded limits on module count or audit rounds — the data determines convergence
    in_journeys: 5
  convergence/OnlyHumanInputIsSpec:
    type: rule
    description: spec.md is the only human-written input, everything else is auto-generated
    in_journeys: 1
  convergence/BoundedRetryRule:
    type: rule
    description: retry attempts for any single module creation or fix are capped to prevent infinite retry loops
    in_journeys: 5
  convergence/AllPhasesCompleteRule:
    type: rule
    description: >-
      convergence requires organization, actors, hierarchy, creation, perspectives, compilation, and audit all recorded
      as complete in ConvergenceState
    in_journeys: 1
  convergence/NeverModifyRunningCode:
    type: rule
    description: generated code must be staged and tested before replacing the running pipeline code — never overwrite in place
    in_journeys: 1
  events/RegisterEventWatchers:
    type: process
    description: sets up fs.watch on each dependency's event file directory to monitor for new publish events
    in_journeys: 6
  events/DetectEventFileChange:
    type: process
    description: receives a filesystem notification from fs.watch when an event file is created or modified
    in_journeys: 11
  events/ReadEventFile:
    type: process
    description: reads the contents of the changed event file to determine which dependency published and what changed
    in_journeys: 20
  events/DelegateToSync:
    type: process
    description: passes the event data to sync.ts to check dependency hashes and find affected modules
    in_journeys: 11
  events/EnterSleep:
    type: process
    description: suspends the engine process after all watchers are registered, consuming zero CPU until an event arrives
    in_journeys: 9
  events/WakeFromSleep:
    type: process
    description: resumes the engine process when fs.watch fires a callback, transitioning from sleep to active processing
    in_journeys: 4
  events/DeregisterEventWatchers:
    type: process
    description: tears down all fs.watch watchers when the engine shuts down or the box is removed
    in_journeys: 2
  events/DebounceEvents:
    type: process
    description: batches rapid successive events into a single sync trigger to avoid redundant reconvergence
    in_journeys: 11
  events/PropagateRipple:
    type: process
    description: after this box reconverges and republishes, its own event file triggers watchers in downstream dependents
    in_journeys: 3
  events/ValidateEventFileFormat:
    type: process
    description: >-
      checks that the event file contains valid JSON with required fields including interface hash, sequence number,
      origin chain, and changelog before passing to sync
    in_journeys: 9
  events/LogEventReceived:
    type: process
    description: >-
      records the received event with timestamp, source dependency, sequence number, and disposition into the event log
      for observability
    in_journeys: 19
  events/UpdateWatcherAfterDependencyChange:
    type: process
    description: >-
      adds fs.watch instances for newly added dependencies and removes instances for dropped dependencies without
      tearing down existing watchers
    in_journeys: 3
  events/ConfirmWatcherHealth:
    type: process
    description: >-
      checks that all registered fs.watch instances are still active and responsive, detecting any that were silently
      dropped by the OS
    in_journeys: 5
  events/DetectWatcherCrash:
    type: process
    description: >-
      detects when an fs.watch instance emits an error event or throws an exception instead of delivering a normal
      change notification
    in_journeys: 2
  events/HandleEventReadFailure:
    type: process
    description: >-
      catches IO errors when reading an event file from disk including file deleted between notification and read,
      permission denied, or disk IO error
    in_journeys: 3
  events/HandleInvalidEventPayload:
    type: process
    description: >-
      catches validation failures when the event file exists but contains malformed JSON, missing required fields, or
      unparseable values and produces a structured error
    in_journeys: 4
  events/ReregisterCrashedWatcher:
    type: process
    description: >-
      tears down the failed fs.watch instance, releases its kernel handle, and creates a replacement watcher for the
      same dependency event file path
    in_journeys: 2
  events/DetectSyncDelegationFailure:
    type: process
    description: >-
      catches errors thrown by sync.ts when it fails to process the delegated event such as unreachable dependency
      interface or hash store corruption
    in_journeys: 3
  events/LogEventFailure:
    type: process
    description: >-
      records event processing failures with error type, source dependency, failing step, and stack trace into the event
      log for diagnosis
    in_journeys: 7
  events/RetryEventProcessing:
    type: process
    description: >-
      re-reads and re-processes a failed event file after a brief delay, attempting recovery before escalating to
      convergence
    in_journeys: 2
  events/ExtractOriginChain:
    type: process
    description: >-
      reads the ripple origin chain from the validated event payload and makes it available for oscillation detection by
      sync before delegation
    in_journeys: 4
  events/ExtractEventSequenceNumber:
    type: process
    description: >-
      reads the event sequence number from the validated event payload and makes it available for ordering and dedup
      checks by sync before delegation
    in_journeys: 4
  events/SuppressUnchangedRipple:
    type: process
    description: >-
      blocks event file write and outgoing propagation when publish reports that the interface hash did not change after
      reconvergence, absorbing the ripple at this box
    in_journeys: 2
  events/AdjustCooldownWindow:
    type: process
    description: >-
      widens the oscillation cooldown window when multiple events arrive in rapid succession and narrows it back during
      stable periods with no events
    in_journeys: 3
  events/TrackRippleDepth:
    type: process
    description: >-
      reads the origin chain length from the incoming event and records the current ripple depth for logging and
      enforcement by downstream propagation checks
    in_journeys: 2
  events/BatchWatcherRegistration:
    type: process
    description: >-
      registers fs.watch instances in batches with a configurable concurrency limit to avoid overwhelming the OS kernel
      when a box has many dependencies
    in_journeys: 4
  events/TruncateEventLog:
    type: process
    description: >-
      removes the oldest entries from the event log when it exceeds a configured maximum entry count, preserving only
      the most recent entries
    in_journeys: 2
  events/PrioritizeEventsByImpact:
    type: process
    description: >-
      when a debounce batch contains many events, sorts them by the number of local modules each dependency affects so
      the highest-impact changes are processed first
    in_journeys: 4
  events/StreamLargeEventPayload:
    type: process
    description: >-
      reads oversized event files in a streaming fashion rather than loading the full content into memory, extracting
      only the required hash, sequence, origin chain, and changelog fields
    in_journeys: 4
  events/EventWatcherSet:
    type: artifact
    description: the set of active fs.watch instances monitoring dependency event file paths
    in_journeys: 13
  events/EventPayload:
    type: artifact
    description: the parsed content of an event file containing the source box, timestamp, and changed interface hash
    in_journeys: 8
  events/EventLog:
    type: artifact
    description: >-
      append-only log of all received events with timestamps, source boxes, sequence numbers, and disposition for
      observability and debugging
    in_journeys: 20
  events/EventDrivenNotPolling:
    type: rule
    description: event detection uses fs.watch callbacks only, never periodic polling or timer-based checks
    in_journeys: 1
  events/ZeroCostAtRest:
    type: rule
    description: >-
      when no events are pending the engine consumes zero CPU and zero network, only fs.watch kernel handles remain
      active
    in_journeys: 1
  events/OscillationCooldown:
    type: rule
    description: prevents infinite ripple by suppressing re-trigger if the same dependency fires again within a cooldown window
    in_journeys: 6
  events/MaxRetryExceeded:
    type: rule
    description: >-
      after a configured number of retry attempts for the same event file, stop retrying and escalate the failure to
      convergence for operator review
    in_journeys: 2
  events/RippleAbsorbedAtLeaf:
    type: rule
    description: >-
      when a box has no downstream dependents the ripple terminates naturally and no event file is written regardless of
      whether the interface changed
    in_journeys: 1
  events/EventLogSizeLimit:
    type: rule
    description: >-
      the event log must not grow beyond a configured maximum number of entries to prevent unbounded disk usage during
      sustained ripple activity
    in_journeys: 1
  events/WatcherCountLimit:
    type: rule
    description: >-
      enforces a maximum number of concurrent fs.watch instances per box to prevent file descriptor exhaustion on boxes
      with many dependencies
    in_journeys: 2
  excerpt/SelectTargetModule:
    type: process
    description: identifies which module to generate an excerpt for based on the current convergence step
    in_journeys: 20
  excerpt/CollectLocalNodes:
    type: process
    description: gathers all nodes defined within the target module from the compiled index
    in_journeys: 12
  excerpt/CollectLocalJourneys:
    type: process
    description: gathers all journeys defined within the target module from the compiled index
    in_journeys: 12
  excerpt/CollectCrossModuleConnections:
    type: process
    description: finds all connections where one endpoint is in the target module and the other is in a different module
    in_journeys: 13
  excerpt/CollectReferencedActors:
    type: process
    description: finds all _actors/ references used in the target module's journeys
    in_journeys: 5
  excerpt/CollectWarnings:
    type: process
    description: gathers all compilation warnings relevant to the target module including external refs and orphans
    in_journeys: 5
  excerpt/AssembleExcerpt:
    type: process
    description: combines local nodes, journeys, cross-module connections, actors, and warnings into a single focused output
    in_journeys: 21
  excerpt/TruncateToLimit:
    type: process
    description: trims the assembled excerpt to approximately 200 lines while preserving completeness of each section
    in_journeys: 12
  excerpt/CollectModuleSource:
    type: process
    description: reads the target module's raw YAML file content for inclusion in the YOUR FILE section of the excerpt
    in_journeys: 5
  excerpt/CollectGlobalStats:
    type: process
    description: >-
      gathers global compilation statistics including total nodes, journeys, connections, orphan count, and duplicate
      count
    in_journeys: 3
  excerpt/CollectAllModuleSummaries:
    type: process
    description: gathers one-line summaries for every module showing node count, journey count, and cross-module connection count
    in_journeys: 3
  excerpt/CollectTriggeredByActors:
    type: process
    description: identifies which actors trigger journeys in the target module by scanning journey first-steps for actor references
    in_journeys: 2
  excerpt/RankCrossModuleByRelevance:
    type: process
    description: >-
      ranks cross-module connections by relevance when the full set exceeds the budget, keeping direct dependencies and
      demoting distant transitive connections
    in_journeys: 2
  excerpt/SummarizeLargeModuleSource:
    type: process
    description: >-
      when the module YAML exceeds a line threshold, produces a compact summary listing node names with types and
      journey names instead of the raw source
    in_journeys: 3
  excerpt/CompressModuleSummaries:
    type: process
    description: >-
      when there are many modules, abbreviates the ALL MODULES section to show directly-connected modules in full detail
      and group the rest into a count line
    in_journeys: 0
  excerpt/CacheExcerptByState:
    type: process
    description: >-
      caches generated excerpts keyed by module name and compiled index hash, serving cached results when the graph has
      not changed since last generation
    in_journeys: 3
  excerpt/InvalidateExcerptCache:
    type: process
    description: >-
      clears all cached excerpts when compilation produces a new compiled index, ensuring stale context is never served
      to workers
    in_journeys: 2
  excerpt/ExcerptOutput:
    type: artifact
    description: the final ~200 line focused context document for a single module
    in_journeys: 27
  excerpt/ExcerptLineLimit:
    type: rule
    description: each excerpt must be approximately 200 lines to provide focused context without overwhelming the LLM
    in_journeys: 1
  excerpt/LensRelevance:
    type: rule
    description: excerpt content is scoped to what is relevant for the target module, filtering out unrelated graph data
    in_journeys: 5
  excerpt/AdaptiveBudgetAllocation:
    type: rule
    description: >-
      the ~200 line budget is allocated dynamically across sections based on module complexity, giving more space to
      cross-module connections for highly-connected modules and more to source for complex modules
    in_journeys: 2
  graph/NodeDefinition:
    type: process
    description: defines a node with one of 5 universal types (actor, process, artifact, interface, rule) plus name and description
    in_journeys: 7
  graph/JourneyDefinition:
    type: process
    description: defines a journey as an ordered sequence of steps, each with a node reference and an action description
    in_journeys: 8
  graph/StepDefinition:
    type: process
    description: defines a single journey step binding a node reference to an action, forming a connection to the next step
    in_journeys: 4
  graph/ConnectionComputation:
    type: process
    description: derives directed connections between consecutive journey steps, building the edge set of the graph
    in_journeys: 7
  graph/CrossModuleRefResolution:
    type: process
    description: resolves node references that use module/NodeName syntax to link nodes across module boundaries
    in_journeys: 6
  graph/ActorRefResolution:
    type: process
    description: resolves actor references that use _actors/ActorName syntax to link shared actors into journeys
    in_journeys: 5
  graph/PublishedInterfaceDefinition:
    type: process
    description: defines what a box provides to other boxes as a versioned, hashable set of exported nodes and journeys
    in_journeys: 1
  graph/IncrementalMerge:
    type: process
    description: >-
      merges a single newly created module into the existing compiled index, adding its nodes, journeys, and connections
      without full rebuild
    in_journeys: 3
  graph/NodeTypeSchema:
    type: rule
    description: enforces that every node must be exactly one of the 5 universal types (actor, process, artifact, interface, rule)
    in_journeys: 7
  graph/StepFormatRule:
    type: rule
    description: enforces that every journey step must have a node field and an action field, never flat strings
    in_journeys: 6
  graph/NoIsolationRule:
    type: rule
    description: every node must participate in at least one journey — no standalone nodes allowed in the graph
    in_journeys: 5
  graph/UniqueNodeNameRule:
    type: rule
    description: every node name must be unique across all modules — no two modules may define the same node name
    in_journeys: 3
  graph/AllRefsResolveRule:
    type: rule
    description: every node reference in every journey step must resolve to a defined node, actor, or cross-module target
    in_journeys: 3
  graph/ModuleFile:
    type: artifact
    description: a YAML file containing spec_sections, nodes, and journeys that defines one scoped piece of the graph
    in_journeys: 17
  graph/CompiledIndex:
    type: artifact
    description: the merged in-memory structure of all modules containing all nodes, journeys, and computed connections
    in_journeys: 57
  graph/ConnectionSet:
    type: artifact
    description: the set of directed edges derived from consecutive journey steps across all journeys
    in_journeys: 16
  graph/NodeRegistry:
    type: artifact
    description: the deduplicated map of all node names to their type and description across all modules
    in_journeys: 7
  graph/JourneyRegistry:
    type: artifact
    description: the collection of all journeys with their steps, used for connection computation and test generation
    in_journeys: 5
  hierarchy/AnalyzeModuleIndependence:
    type: process
    description: reads ORGANIZATION.md independence section to identify which module groups could form separate child engines
    in_journeys: 7
  hierarchy/DecideSplit:
    type: process
    description: >-
      LLM-based decision on whether to split, using module count, independence, and coupling analysis — no hardcoded
      threshold
    in_journeys: 11
  hierarchy/CreateChildDirectory:
    type: process
    description: creates a new directory for each child engine with its own modules/ folder structure
    in_journeys: 5
  hierarchy/GenerateScopedSpec:
    type: process
    description: writes a scoped spec.md for each child containing only the sections relevant to that child's module group
    in_journeys: 4
  hierarchy/DistributeSharedActors:
    type: process
    description: copies the parent's _actors.yaml into each child directory so all children inherit the same shared actors
    in_journeys: 6
  hierarchy/AssignModulesToChildren:
    type: process
    description: maps each module from ORGANIZATION.md to exactly one child engine based on the grouping decision
    in_journeys: 6
  hierarchy/SpawnChildEngine:
    type: process
    description: launches a child convergence.ts process for each child directory as an independent subprocess
    in_journeys: 11
  hierarchy/WaitForAllChildren:
    type: process
    description: blocks until every spawned child engine has completed its convergence and published its interface
    in_journeys: 9
  hierarchy/CollectChildInterfaces:
    type: process
    description: reads each child's published interface.yaml to gather their exported nodes and journeys
    in_journeys: 9
  hierarchy/CreateCrossEngineJourneys:
    type: process
    description: creates journeys at the parent level that connect nodes across different children's published interfaces
    in_journeys: 3
  hierarchy/ValidateCrossEngineRefs:
    type: process
    description: checks that all external refs in children (warnings) resolve to actual nodes in sibling child interfaces
    in_journeys: 9
  hierarchy/PromoteExternalRefsToErrors:
    type: process
    description: converts unresolved external refs from warnings to errors at the parent level where all children are visible
    in_journeys: 6
  hierarchy/ContinueWithoutSplit:
    type: process
    description: >-
      bypasses the entire hierarchy pipeline and proceeds directly to bounded module creation when the LLM decides not
      to split
    in_journeys: 2
  hierarchy/MonitorChildConvergence:
    type: process
    description: >-
      polls each child engine's published output directory to track whether it has completed convergence or is still
      running
    in_journeys: 7
  hierarchy/MergeChildGraphsIntoParent:
    type: process
    description: >-
      incorporates all child interface nodes and journeys into the parent's compiled index as resolved external
      references
    in_journeys: 7
  hierarchy/GenerateChildOrganization:
    type: process
    description: creates a scoped ORGANIZATION.md for each child listing only the modules assigned to that child's group
    in_journeys: 5
  hierarchy/TrackHierarchyDepth:
    type: process
    description: reads the depth parameter passed at spawn time and records the current nesting level for this engine instance
    in_journeys: 8
  hierarchy/EnforceMaxDepth:
    type: process
    description: >-
      compares the current hierarchy depth against the maximum allowed and forces a no-split decision if the limit is
      reached
    in_journeys: 3
  hierarchy/FlattenGrandchildInterfaces:
    type: process
    description: >-
      when a child engine has split into grandchildren, merges all grandchild published interfaces into the child's own
      interface as a flat node and journey set
    in_journeys: 3
  hierarchy/PropagateUnresolvedRefsUpward:
    type: process
    description: >-
      collects external ref warnings that a child could not resolve against its own grandchildren and passes them up to
      the parent level for cross-engine resolution
    in_journeys: 4
  hierarchy/NarrowScopedSpec:
    type: process
    description: >-
      further narrows an already-scoped spec when a child itself splits, producing sub-scoped specs containing only
      sections relevant to each grandchild group
    in_journeys: 2
  hierarchy/LimitConcurrentChildren:
    type: process
    description: >-
      caps the number of simultaneously running child engine subprocesses by maintaining a queue and spawning the next
      child only when a running one completes
    in_journeys: 5
  hierarchy/BatchChildDirectoryCreation:
    type: process
    description: >-
      creates all child directories, scoped specs, scoped organizations, and actor copies in a single batch pass to
      reduce disk I/O overhead when child count is high
    in_journeys: 4
  hierarchy/StreamingInterfaceMerge:
    type: process
    description: >-
      merges child interfaces into the parent compiled index one at a time in sequence instead of loading all interfaces
      into memory simultaneously
    in_journeys: 6
  hierarchy/DetectChildTimeout:
    type: process
    description: >-
      compares each running child engine's wall-clock elapsed time against the configured timeout threshold and flags
      children that exceed it
    in_journeys: 3
  hierarchy/CompactSplitDecisionContext:
    type: process
    description: >-
      summarizes the organization and independence analysis into a compact form that fits within LLM context limits when
      the full module list and coupling data is too large
    in_journeys: 3
  hierarchy/IndexChildNodesForRefLookup:
    type: process
    description: >-
      builds a hash-indexed lookup table of all child interface node names to accelerate cross-engine ref validation
      when child count is high
    in_journeys: 1
  hierarchy/ChildDirectory:
    type: artifact
    description: a directory containing scoped spec.md, shared _actors.yaml, and modules/ for one child engine
    in_journeys: 1
  hierarchy/ScopedSpecFile:
    type: artifact
    description: a child-specific spec.md containing only the sections relevant to that child's module group
    in_journeys: 2
  hierarchy/CrossEngineJourneySet:
    type: artifact
    description: the set of parent-level journeys connecting nodes across children's published interfaces
    in_journeys: 3
  hierarchy/ChildInterfaceCollection:
    type: artifact
    description: the collected interface.yaml files from all children, used for cross-engine validation
    in_journeys: 4
  hierarchy/ChildConvergenceStatus:
    type: artifact
    description: >-
      tracks the current state of each child engine — running, converged, or failed — used by the parent to determine
      when all children are done
    in_journeys: 6
  hierarchy/ChildOrganizationFile:
    type: artifact
    description: a child-specific ORGANIZATION.md listing only the modules assigned to that child engine
    in_journeys: 3
  hierarchy/HierarchyDepthCounter:
    type: artifact
    description: >-
      the current nesting depth passed to each engine at spawn time — 0 for root, 1 for child, 2 for grandchild, and so
      on
    in_journeys: 4
  hierarchy/SameCodeEveryLevel:
    type: rule
    description: convergence.ts is the exact same code at parent, child, and grandchild levels — no level-specific logic
    in_journeys: 2
  hierarchy/SharedActorsNoduplicates:
    type: rule
    description: parent discovers actors once, children inherit them — no child re-discovers or duplicates actors
    in_journeys: 1
  hierarchy/ExternalRefsWarningsInChildrenErrorsInParent:
    type: rule
    description: children emit warnings for unresolved cross-engine refs, parent promotes them to errors if they remain unresolved
    in_journeys: 1
  hierarchy/MaxDepthLimit:
    type: rule
    description: >-
      hierarchy depth is bounded to a configurable maximum to prevent infinite recursive splitting — engines at the
      limit always choose no-split
    in_journeys: 2
  hierarchy/ChildConcurrencyLimit:
    type: rule
    description: >-
      maximum number of child engine subprocesses that may run simultaneously — additional children are queued until a
      running child completes
    in_journeys: 2
  hierarchy/ChildTimeoutThreshold:
    type: rule
    description: maximum wall-clock time a child engine may run before being flagged as timed out and reported to the parent
    in_journeys: 1
  llm/SpawnWorkerProcess:
    type: process
    description: launches a persistent Claude Code subprocess that stays alive for the duration of the convergence pipeline
    in_journeys: 5
  llm/InjectSystemPrompt:
    type: process
    description: >-
      sends the genome worker system prompt to the freshly spawned worker, establishing its role, YAML format rules, and
      operational constraints
    in_journeys: 3
  llm/SendTask:
    type: process
    description: sends a structured task to the worker process via stream-json protocol with prompt, context, and expected output
    in_journeys: 16
  llm/ReceiveResult:
    type: process
    description: reads the worker's streamed response, parsing the stream-json output into structured result data
    in_journeys: 8
  llm/BuildTaskContext:
    type: process
    description: >-
      assembles task-specific context from excerpt output, compiled state snapshot, and cross-module relationship data
      before packaging into the payload
    in_journeys: 4
  llm/ValidateWorkerOutput:
    type: process
    description: >-
      confirms the worker produced expected output by checking that files exist on disk, content is valid YAML or
      TypeScript, and task requirements are met
    in_journeys: 4
  llm/WriteFile:
    type: process
    description: worker uses its native Write tool to create or overwrite a file on disk
    in_journeys: 5
  llm/ReadFile:
    type: process
    description: worker uses its native Read tool to read file contents from disk
    in_journeys: 7
  llm/EditFile:
    type: process
    description: worker uses its native Edit tool to make targeted edits to an existing file
    in_journeys: 1
  llm/RunBash:
    type: process
    description: worker uses its native Bash tool to execute shell commands
    in_journeys: 2
  llm/HandleCompaction:
    type: process
    description: Claude automatically compacts prior messages as the conversation approaches context limits
    in_journeys: 3
  llm/ShutdownWorker:
    type: process
    description: terminates the persistent worker process after all tasks are complete or on pipeline abort
    in_journeys: 5
  llm/DetectProcessExit:
    type: process
    description: monitors the worker subprocess and detects unexpected termination via non-zero exit code or signal
    in_journeys: 3
  llm/DetectStreamInterruption:
    type: process
    description: detects when stream-json data stops mid-response indicating a broken pipe or process death
    in_journeys: 1
  llm/DetectTaskTimeout:
    type: process
    description: fires when a task exceeds the maximum expected duration without producing a complete response
    in_journeys: 1
  llm/HandleToolCallFailure:
    type: process
    description: captures when a worker native tool call returns an error and records the tool name, arguments, and error message
    in_journeys: 4
  llm/DrainPartialOutput:
    type: process
    description: reads any files written to disk and partial stream data the worker produced before the failure occurred
    in_journeys: 5
  llm/CleanupFailedSession:
    type: process
    description: tears down the broken worker session and closes the stream-json channel so a clean respawn can proceed
    in_journeys: 5
  llm/ScopeWritesToAllowedPaths:
    type: process
    description: >-
      validates every Write tool call targets only the allowed path for the current task, rejecting path traversal or
      out-of-scope writes
    in_journeys: 2
  llm/ScopeReadsToProjectDir:
    type: process
    description: >-
      validates every Read tool call targets only files within the project directory, blocking reads of credentials, env
      files, or system files
    in_journeys: 2
  llm/FilterBashCommands:
    type: process
    description: >-
      inspects every Bash tool call and blocks dangerous commands including network access, process spawning, file
      deletion, and permission changes
    in_journeys: 2
  llm/DetectPromptInjection:
    type: process
    description: >-
      scans task context for prompt injection patterns before sending to the worker, flagging content that attempts to
      override system prompt instructions
    in_journeys: 2
  llm/ValidateOutputScope:
    type: process
    description: >-
      after task completion verifies the worker only modified the assigned target file and no other files in the project
      were changed
    in_journeys: 3
  llm/DetectToolCallLoop:
    type: process
    description: >-
      monitors tool call count and pattern during task execution, terminating the worker if it enters a repetitive
      unbounded loop
    in_journeys: 2
  llm/EnforceFileSizeLimit:
    type: process
    description: rejects Write tool calls that would create files exceeding the maximum allowed size, preventing disk exhaustion
    in_journeys: 1
  llm/TruncatePayloadToFit:
    type: process
    description: >-
      truncates lower-priority context sections when the assembled task payload exceeds the maximum message size,
      preserving critical instructions and target module context
    in_journeys: 1
  llm/TrackCompactionCount:
    type: process
    description: >-
      counts compaction events for the current worker and signals when the degradation threshold is reached, indicating
      the worker should be replaced
    in_journeys: 3
  llm/ProactiveWorkerReplacement:
    type: process
    description: >-
      shuts down the current worker and spawns a fresh instance when compaction count exceeds the quality threshold,
      before output quality visibly degrades
    in_journeys: 0
  llm/ReinjectSystemPromptAfterCompaction:
    type: process
    description: >-
      re-sends critical system prompt instructions to the worker after heavy compaction to prevent instruction drift
      from compressed context
    in_journeys: 1
  llm/PrioritizeContextByRelevance:
    type: process
    description: >-
      when the compiled index contains many modules, selects only the modules and connections most relevant to the
      current task for payload inclusion
    in_journeys: 5
  llm/StreamJsonProtocol:
    type: interface
    description: the stream-json communication protocol between convergence.ts and the Claude Code worker process
    in_journeys: 7
  llm/NativeToolSet:
    type: interface
    description: the set of native tools (Read, Write, Edit, Bash) available to the worker for file and shell operations
    in_journeys: 7
  llm/WorkerSession:
    type: artifact
    description: the persistent Claude Code process state including conversation history and compacted context
    in_journeys: 7
  llm/TaskPayload:
    type: artifact
    description: the structured input sent to the worker containing prompt, relevant context, and output expectations
    in_journeys: 14
  llm/TaskResult:
    type: artifact
    description: the structured output returned by the worker containing created content and tool call results
    in_journeys: 8
  llm/SystemPrompt:
    type: artifact
    description: >-
      the instruction template sent at initialization that defines the worker's genome role, YAML format rules, node
      types, step format, and operational constraints
    in_journeys: 4
  llm/CrashReport:
    type: artifact
    description: >-
      structured failure record containing exit code, last task payload, partial output collected, error details, and
      tool call history at time of failure
    in_journeys: 6
  llm/CompactionCounter:
    type: artifact
    description: >-
      tracks the number of compaction events, estimated context quality level, and total task count for the current
      worker session
    in_journeys: 5
  llm/AlwaysOpus:
    type: rule
    description: the worker always uses Opus model with 1M context window, no model selection or fallback
    in_journeys: 1
  llm/NoSessionManagement:
    type: rule
    description: convergence.ts does not manage sessions — Claude handles its own context compaction transparently
    in_journeys: 1
  llm/NoPrintMode:
    type: rule
    description: worker uses interactive mode with native tools, never --print mode which lacks tool access
    in_journeys: 1
  llm/WorkerCreatesCodeOrchestrates:
    type: rule
    description: the worker only creates content when asked — it never decides when to act, code orchestrates all decisions
    in_journeys: 1
  llm/SingleWorkerConstraint:
    type: rule
    description: only one worker process may exist at a time, cleanup must fully complete before any respawn can begin
    in_journeys: 2
  llm/AllowedWritePaths:
    type: rule
    description: >-
      worker may only write to genome/modules/ during creation and enrichment, genome/generated/ during codegen, and
      genome/tests/ during testgen — all other paths are rejected
    in_journeys: 1
  llm/NoBashNetworkAccess:
    type: rule
    description: >-
      worker Bash tool calls must never use network commands (curl, wget, nc, ssh) or spawn background processes or
      delete files outside the output directory
    in_journeys: 1
  llm/SingleFilePerTask:
    type: rule
    description: >-
      each task assigns the worker exactly one target file to create or edit, any write to a different path is treated
      as a scope violation
    in_journeys: 1
  llm/PayloadSizeBudget:
    type: rule
    description: >-
      task payloads must not exceed the maximum message size and context is truncated by priority to meet the budget,
      preserving system prompt and target module above all else
    in_journeys: 2
  llm/ReplaceAfterNCompactions:
    type: rule
    description: >-
      worker is proactively replaced after N compaction events to maintain output quality rather than waiting for
      observable degradation
    in_journeys: 2
  organization/ReadSpecFile:
    type: process
    description: reads spec.md from disk as the input for organizational analysis
    in_journeys: 6
  organization/ParseSpecSections:
    type: process
    description: splits the spec into numbered sections so each module can reference which sections it covers
    in_journeys: 2
  organization/IdentifyScope:
    type: process
    description: extracts a 1-2 sentence scope statement describing what the project is and does
    in_journeys: 1
  organization/IdentifyModules:
    type: process
    description: analyzes the spec to discover all independent concerns, each becoming a named module with a description
    in_journeys: 15
  organization/AnalyzeDependencies:
    type: process
    description: determines which modules depend on which others and produces a build order
    in_journeys: 6
  organization/AnalyzeIndependence:
    type: process
    description: >-
      classifies modules by how standalone they are — fully independent, standalone with dependencies, or tightly
      coupled
    in_journeys: 1
  organization/AssembleOrganization:
    type: process
    description: combines scope, modules, dependencies, and independence into the final ORGANIZATION.md structure
    in_journeys: 5
  organization/WriteOrganizationFile:
    type: process
    description: writes the assembled organization to ORGANIZATION.md on disk
    in_journeys: 5
  organization/AssignSpecSectionsToModules:
    type: process
    description: >-
      maps each identified module to the spec section numbers it covers based on the module's domain and the section
      content
    in_journeys: 4
  organization/ValidateBuildOrder:
    type: process
    description: checks the dependency graph for circular dependencies and confirms a valid topological ordering exists
    in_journeys: 5
  organization/ValidateSpecCoverage:
    type: process
    description: checks that every numbered spec section is covered by at least one module ensuring no requirements are dropped
    in_journeys: 4
  organization/DetectNewModulesInSpec:
    type: process
    description: >-
      compares the current module list against the spec to find newly added concerns that would require new modules
      during reconvergence
    in_journeys: 1
  organization/ProvideSpecSectionsToExcerpt:
    type: process
    description: >-
      supplies each module's assigned spec_sections to the excerpt generator so workers know which spec sections are
      relevant to their module
    in_journeys: 1
  organization/HandleMissingSpecFile:
    type: process
    description: >-
      detects that spec.md does not exist or is unreadable on disk and reports a fatal error blocking the convergence
      pipeline
    in_journeys: 2
  organization/ValidateLLMOrganizationOutput:
    type: process
    description: >-
      checks that the LLM-produced organization contains all required sections — scope, module list with names and
      descriptions, dependency graph, and independence classification
    in_journeys: 6
  organization/RepairCircularDependency:
    type: process
    description: >-
      sends the detected cycle path back to the LLM with an error message so it can propose a corrected dependency
      ordering
    in_journeys: 2
  organization/RepairSpecCoverageGap:
    type: process
    description: >-
      sends the list of uncovered spec sections back to the LLM to either assign them to existing modules or propose new
      modules to cover them
    in_journeys: 2
  organization/HandleEmptyModuleList:
    type: process
    description: >-
      detects that the LLM identified zero modules from the spec and retries with an explicit prompt explaining the
      expected output format
    in_journeys: 2
  organization/HandleOrganizationWriteFailure:
    type: process
    description: >-
      detects a disk write failure when creating ORGANIZATION.md and retries the write or reports the error to
      convergence
    in_journeys: 3
  organization/DetectSelfReferentialModules:
    type: process
    description: >-
      identifies modules in the list that describe parts of the convergence pipeline itself such as organization,
      convergence, compilation, and graph
    in_journeys: 2
  organization/ValidateMetaModulePresence:
    type: process
    description: >-
      checks that all required infrastructure modules are present in the module list when the spec describes a
      self-referential system like genome
    in_journeys: 5
  organization/DetectSpecChangeToOwnSections:
    type: process
    description: >-
      determines whether changed spec sections overlap with the sections organization itself covers, indicating the
      organization step must re-analyze its own structure
    in_journeys: 2
  organization/DiffModuleListAgainstExisting:
    type: process
    description: >-
      compares the newly identified module list against module YAML files already on disk to detect additions, removals,
      and renames
    in_journeys: 3
  organization/PreserveExistingModulesOnReorganize:
    type: process
    description: >-
      ensures existing module YAML files are not deleted when the module list changes during reconvergence, flagging
      removed modules for human review instead
    in_journeys: 2
  organization/OrganizationFile:
    type: artifact
    description: the ORGANIZATION.md file containing scope, module list, dependency order, and independence analysis
    in_journeys: 10
  organization/SpecSectionIndex:
    type: artifact
    description: the parsed index of spec sections with their numbers, used by modules to declare which sections they cover
    in_journeys: 3
  organization/ModuleList:
    type: artifact
    description: the list of identified modules with names and descriptions, consumed by convergence for module creation
    in_journeys: 17
  organization/DependencyGraph:
    type: artifact
    description: the directed graph of module dependencies defining the build order for module creation
    in_journeys: 14
  organization/IndependenceClassification:
    type: artifact
    description: the classification of each module's standalone capability, used by hierarchy for split decisions
    in_journeys: 2
  organization/ModuleSpecSectionMap:
    type: artifact
    description: the mapping from each module name to its assigned spec section numbers used in each module's spec_sections field
    in_journeys: 7
  publish/CollectExportedNodes:
    type: process
    description: selects which nodes from the compiled index should be exported as the box's public interface
    in_journeys: 9
  publish/CollectExportedJourneys:
    type: process
    description: selects which journeys from the compiled index should be exported as the box's public interface
    in_journeys: 9
  publish/ComputeInterfaceHash:
    type: process
    description: computes a full SHA256 hash over the exported nodes and journeys to detect changes
    in_journeys: 19
  publish/ComparePreviousHash:
    type: process
    description: compares the new interface hash against the previously published hash to determine if anything changed
    in_journeys: 13
  publish/GenerateInterfaceYaml:
    type: process
    description: writes interface.yaml containing the exported nodes, journeys, and their SHA256 hash
    in_journeys: 15
  publish/GenerateChangelogYaml:
    type: process
    description: writes changelog.yaml describing what changed between the previous and current interface
    in_journeys: 8
  publish/WriteEventFile:
    type: process
    description: writes an event file to disk signaling that this box has published a new interface
    in_journeys: 18
  publish/SkipPublishIfUnchanged:
    type: process
    description: aborts the publish pipeline if the new hash matches the previous hash, avoiding unnecessary ripple
    in_journeys: 2
  publish/StorePreviousHash:
    type: process
    description: >-
      writes the newly computed InterfaceHash to disk as the PreviousHash, ready for comparison on the next publish
      cycle
    in_journeys: 7
  publish/ComputeChangelogDiff:
    type: process
    description: >-
      diffs the previous exported content against the current exported content, identifying specifically which nodes and
      journeys were added, removed, or modified
    in_journeys: 10
  publish/ValidateExportedInterface:
    type: process
    description: >-
      checks that the exported subset is self-consistent with all journey refs resolving to exported nodes or explicitly
      marked external refs
    in_journeys: 6
  publish/NotifyPublishComplete:
    type: process
    description: signals convergence that publish finished successfully and the pipeline can proceed to codegen and testgen
    in_journeys: 7
  publish/DetectWriteFailure:
    type: process
    description: >-
      detects when any file write operation during publish fails due to disk full, permission denied, or IO error and
      captures the specific error details
    in_journeys: 3
  publish/RollbackPartialPublish:
    type: process
    description: >-
      removes partially written publish artifacts from disk to restore the pre-publish state after a mid-pipeline
      failure
    in_journeys: 3
  publish/DetectCorruptedPreviousHash:
    type: process
    description: >-
      validates the PreviousHash file is readable, valid hex, and the expected 64-character length, flagging corruption
      if any check fails
    in_journeys: 2
  publish/ReportPublishFailure:
    type: process
    description: >-
      builds a structured failure report with the failing step, error details, and partial state, then sends it to
      convergence for retry or abort decision
    in_journeys: 5
  publish/DetectRippleOscillation:
    type: process
    description: >-
      reads the ripple origin chain from an incoming event and checks whether the current box ID already appears in it,
      detecting A→B→A publish cycles
    in_journeys: 4
  publish/TrackRippleOrigin:
    type: process
    description: >-
      appends the current box ID and event sequence number to the ripple origin chain before writing the outgoing event
      file
    in_journeys: 5
  publish/DeduplicateEventFile:
    type: process
    description: >-
      compares the new event file's interface hash against the last written event file and skips writing if the hash is
      identical
    in_journeys: 3
  publish/EmbedChangelogInEvent:
    type: process
    description: >-
      embeds the changelog diff summary listing added, removed, and modified nodes and journeys into the event file so
      dependents can scope their reconvergence
    in_journeys: 6
  publish/SuppressNoOpRipple:
    type: process
    description: >-
      after reconvergence produces an interface hash identical to the pre-reconvergence hash, suppresses event file
      write to stop the ripple chain from propagating further
    in_journeys: 4
  publish/InterfaceYamlFile:
    type: artifact
    description: the published interface.yaml file containing exported nodes, journeys, and SHA256 hash for this box
    in_journeys: 12
  publish/ChangelogYamlFile:
    type: artifact
    description: the published changelog.yaml file describing what changed in the latest publish
    in_journeys: 8
  publish/InterfaceHash:
    type: artifact
    description: the SHA256 hash of the current interface content used for change detection by dependent boxes
    in_journeys: 10
  publish/PreviousHash:
    type: artifact
    description: the SHA256 hash from the last published interface, stored for comparison
    in_journeys: 7
  publish/EventSequenceCounter:
    type: artifact
    description: >-
      monotonically increasing integer embedded in each event file to allow dependents to detect out-of-order or
      duplicate events
    in_journeys: 4
  publish/EventFile:
    type: interface
    description: the event file written after publish that dependent boxes watch via fs.watch to trigger reconvergence
    in_journeys: 14
  publish/HashBasedChangeDetection:
    type: rule
    description: change detection uses full SHA256 hash comparison, not timestamp or file-size heuristics
    in_journeys: 1
  publish/PublishAfterConvergenceOnly:
    type: rule
    description: publish.ts only runs after convergence confirms 0 errors and 0 audit gaps
    in_journeys: 2
  publish/AtomicFileWrite:
    type: rule
    description: >-
      all publish files are written atomically via write-to-temp-then-rename to prevent partial file corruption on crash
      or power loss
    in_journeys: 1
  publish/RippleDepthLimit:
    type: rule
    description: >-
      enforces a maximum ripple depth to prevent unbounded propagation chains, blocking further event writes when the
      origin chain exceeds the configured limit
    in_journeys: 3
  publish/MonotonicEventSequencing:
    type: rule
    description: >-
      event sequence numbers must be monotonically increasing and dependents must ignore events with sequence number
      less than or equal to the last processed event
    in_journeys: 1
  publish/ChangelogScopedReconvergence:
    type: rule
    description: >-
      dependents must use the embedded changelog in the event file to scope reconvergence to only the modules affected
      by upstream changes rather than full reconvergence
    in_journeys: 1
  sync/ReadDependencyList:
    type: process
    description: reads the list of dependencies for a box from its configuration to know which interfaces to check
    in_journeys: 16
  sync/FetchDependencyHash:
    type: process
    description: reads the SHA256 hash from each dependency's published interface.yaml
    in_journeys: 13
  sync/CompareStoredHash:
    type: process
    description: compares each fetched dependency hash against the locally stored hash from the last sync
    in_journeys: 16
  sync/IdentifyStaleDependencies:
    type: process
    description: collects all dependencies whose hash has changed since the last sync
    in_journeys: 7
  sync/FindAffectedModules:
    type: process
    description: traces which local modules reference nodes from the changed dependencies and marks them as stale
    in_journeys: 15
  sync/MarkModulesStale:
    type: process
    description: writes stale markers on affected modules so targeted reconvergence knows which modules to reprocess
    in_journeys: 12
  sync/UpdateStoredHashes:
    type: process
    description: writes the new dependency hashes to local storage after successful reconvergence
    in_journeys: 10
  sync/SkipIfAllCurrent:
    type: process
    description: aborts the sync check early if all dependency hashes match, avoiding unnecessary work
    in_journeys: 3
  sync/ParseEventPayload:
    type: process
    description: >-
      extracts the changelog summary, interface hash, ripple origin chain, and sequence number from the incoming event
      file
    in_journeys: 6
  sync/FilterUnrelatedChanges:
    type: process
    description: >-
      compares the changelog's changed node and journey names against local cross-module references and discards
      dependency changes that no local module references
    in_journeys: 7
  sync/ComputeStaleModuleCount:
    type: process
    description: >-
      counts the number of stale modules and records the count in the sync result for convergence logging and progress
      tracking
    in_journeys: 5
  sync/ValidateDependencyConfig:
    type: process
    description: >-
      checks that each entry in the dependency list points to a real box directory with a reachable interface.yaml file
      before attempting any hash fetch
    in_journeys: 4
  sync/DetectOscillationInOriginChain:
    type: process
    description: >-
      reads the ripple origin chain from the parsed event payload and checks whether this box's ID already appears in
      the chain, detecting A→B→A sync loops
    in_journeys: 7
  sync/CheckEventSequenceNumber:
    type: process
    description: >-
      compares the incoming event's sequence number against the last processed sequence number for that dependency and
      rejects events that are stale or duplicate
    in_journeys: 6
  sync/SuppressSyncOnOscillation:
    type: process
    description: >-
      aborts the entire sync pipeline when oscillation is detected, preventing reconvergence and republish that would
      perpetuate the cycle
    in_journeys: 1
  sync/AppendBoxToOriginChain:
    type: process
    description: >-
      adds this box's ID to the ripple origin chain before the outgoing event is written so downstream boxes can detect
      cycles that include this box
    in_journeys: 6
  sync/ComputeRippleScope:
    type: process
    description: >-
      determines the minimal set of interface nodes that actually crossed into this box by intersecting the incoming
      changelog with local cross-module references
    in_journeys: 3
  sync/NarrowOutgoingChangelog:
    type: process
    description: >-
      rewrites the outgoing event's changelog to include only the changes that affected this box, preventing
      upstream-only changes from rippling further downstream
    in_journeys: 7
  sync/DependencyHashStore:
    type: artifact
    description: local storage of the last-known SHA256 hash for each dependency interface
    in_journeys: 12
  sync/StaleModuleList:
    type: artifact
    description: the list of local modules marked as stale due to dependency changes, consumed by targeted reconvergence
    in_journeys: 10
  sync/SyncResult:
    type: artifact
    description: the output of sync.ts containing changed dependencies, affected modules, and stale markers
    in_journeys: 12
  sync/LastProcessedSequence:
    type: artifact
    description: >-
      stores the last successfully processed event sequence number per dependency for detecting out-of-order or
      duplicate events
    in_journeys: 8
  sync/HashMismatchMeansStale:
    type: rule
    description: any difference between stored and fetched hash means the dependency changed and affected modules are stale
    in_journeys: 3
  sync/TargetedNotFull:
    type: rule
    description: sync triggers targeted reconvergence on only the affected modules, never a full re-creation pipeline
    in_journeys: 4
  sync/SyncTriggeredByEvent:
    type: rule
    description: sync only runs in response to an event file change detected by fs.watch, never on a timer or polling loop
    in_journeys: 2
  sync/DiscardStaleEvent:
    type: rule
    description: >-
      events with sequence number less than or equal to the last processed sequence for that dependency must be silently
      discarded without triggering sync
    in_journeys: 3
  sync/OscillationBlocksSync:
    type: rule
    description: >-
      if this box's ID appears in the ripple origin chain of an incoming event, sync must abort without marking any
      modules stale or triggering reconvergence
    in_journeys: 2
  testgen/ReadJourneySteps:
    type: process
    description: reads all journeys from the compiled index and extracts their ordered steps as the basis for test cases
    in_journeys: 4
  testgen/GenerateTestFilePerJourney:
    type: process
    description: creates one TypeScript test file per journey with a describe block and one test case per step
    in_journeys: 2
  testgen/GenerateStepTestCase:
    type: process
    description: creates an empty test case for a single journey step with the step's node and action as the test name
    in_journeys: 2
  testgen/GenerateConnectionAssertions:
    type: process
    description: creates assertion stubs for each consecutive step pair verifying the output of one step feeds into the next
    in_journeys: 2
  testgen/MapTestImports:
    type: process
    description: reads the generated code files from codegen to produce import statements linking tests to implementations
    in_journeys: 4
  testgen/FillTestAssertions:
    type: process
    description: delegates to LLM to fill empty assertion bodies with concrete checks based on the step actions and node types
    in_journeys: 8
  testgen/WriteTestFile:
    type: process
    description: writes the filled test file to disk in the test output directory
    in_journeys: 5
  testgen/RunTests:
    type: process
    description: executes all generated test files and collects pass/fail results for each test case
    in_journeys: 4
  testgen/CollectFailures:
    type: process
    description: gathers all failing test cases with their error messages and stack traces
    in_journeys: 7
  testgen/GenerateFixPrompt:
    type: process
    description: builds a targeted prompt for each failure specifying the test, the implementation, and the error to fix
    in_journeys: 2
  testgen/ApplyTestFix:
    type: process
    description: delegates to LLM to fix either the test assertion or the implementation code based on the failure
    in_journeys: 3
  testgen/RerunAfterFix:
    type: process
    description: re-executes only the previously failing tests to verify the fix worked
    in_journeys: 5
  testgen/SelectNextTestToFill:
    type: process
    description: picks the next unfilled test skeleton from the journey list and advances the pointer through the fill sequence
    in_journeys: 6
  testgen/ProvideTestgenExcerpt:
    type: process
    description: >-
      assembles testgen-specific excerpt context including node behaviors, journey flows, and implementation code to
      guide LLM assertion writing
    in_journeys: 5
  testgen/ConfirmAllTestsFilled:
    type: process
    description: verifies that every journey has a filled test file on disk before proceeding to test execution
    in_journeys: 3
  testgen/ConfirmAllTestsPassing:
    type: process
    description: verifies that the test result report shows zero failures as a gate for pipeline completion
    in_journeys: 4
  testgen/SelectNextFailureToFix:
    type: process
    description: picks the next unfixed failure from the prioritized failure list and advances through the fix queue
    in_journeys: 4
  testgen/ValidateFilledTestSyntax:
    type: process
    description: >-
      runs a TypeScript syntax check on the filled test file to catch LLM-generated compilation errors before test
      execution
    in_journeys: 7
  testgen/RetryFillWithAssertionErrors:
    type: process
    description: >-
      sends the syntax or compilation errors from a failed test fill back to the LLM as feedback and re-requests the
      fill with the original skeleton plus error context
    in_journeys: 2
  testgen/DetectTestExecutionCrash:
    type: process
    description: >-
      detects when the test runner process itself crashes or exits abnormally rather than producing a clean pass/fail
      result, distinguishing runner failures from test failures
    in_journeys: 4
  testgen/DetectFixInducedRegression:
    type: process
    description: compares pre-fix and post-fix test results to detect new failures that did not exist before the fix was applied
    in_journeys: 3
  testgen/RevertFailedTestFix:
    type: process
    description: >-
      restores the test or implementation file to its pre-fix state when a fix introduced regressions or failed to
      resolve the targeted failure
    in_journeys: 2
  testgen/TestSkeletonFile:
    type: artifact
    description: a TypeScript test file with empty assertion bodies for all steps in a journey
    in_journeys: 7
  testgen/FilledTestFile:
    type: artifact
    description: a TypeScript test file with LLM-filled assertions ready to execute
    in_journeys: 9
  testgen/TestResultReport:
    type: artifact
    description: the collected pass/fail results from running all test files with error details for failures
    in_journeys: 13
  testgen/FailureFixList:
    type: artifact
    description: the list of failing tests with error messages, used to drive targeted LLM fixes
    in_journeys: 5
  testgen/TestsFromJourneys:
    type: rule
    description: every test case maps directly to a journey step — no tests exist without a corresponding journey
    in_journeys: 1
  testgen/StepsAreTestCases:
    type: rule
    description: each journey step with its node and action becomes exactly one test case, ensuring 1-to-1 coverage
    in_journeys: 1
  _actors/ProjectOwner:
    type: actor
    description: describes a project via spec.md and triggers convergence
    in_journeys: 7
  _actors/HumanDeveloper:
    type: actor
    description: reads, edits, and maintains modules and spec files directly
    in_journeys: 6
  _actors/LLMWorker:
    type: actor
    description: persistent Claude Code process that creates module content, fills code, and fills test assertions when asked
    in_journeys: 86
  _actors/Compiler:
    type: actor
    description: validates the graph by checking for duplicates, dangling refs, YAML errors, orphans, and isolated modules
    in_journeys: 60
  _actors/Auditor:
    type: actor
    description: LLM that checks coverage from a specific angle (spec, actor, or cross-module) and identifies gaps
    in_journeys: 30
  _actors/ParentEngine:
    type: actor
    description: >-
      convergence.ts instance that splits organization into children, validates cross-engine refs, and publishes parent
      interface
    in_journeys: 14
  _actors/ChildEngine:
    type: actor
    description: convergence.ts instance running at a scoped level with inherited actors, converging independently
    in_journeys: 13
  _actors/DependentBox:
    type: actor
    description: a box that watches another box's event files via fs.watch and triggers targeted reconvergence on change
    in_journeys: 14
  _actors/FileSystem:
    type: actor
    description: the OS file system that delivers watch events, stores modules, and hosts event files for ripple propagation
    in_journeys: 22
  _actors/MaliciousSpecAuthor:
    type: actor
    description: injects prompt-injection or adversarial content into spec.md to manipulate LLM behavior during convergence
    in_journeys: 3
  _actors/YAMLTamperer:
    type: actor
    description: directly edits module YAML files to introduce invalid refs, corrupt hashes, or inject malicious node definitions
    in_journeys: 1
  _actors/RogueWorker:
    type: actor
    description: >-
      an LLMWorker that produces subtly wrong content — hallucinated nodes, phantom connections, or code with hidden
      vulnerabilities
    in_journeys: 3
  _actors/EventSpoofer:
    type: actor
    description: writes fake event files to trigger unnecessary reconvergence cascades or inject stale data into dependent boxes
    in_journeys: 1
  _actors/InfiniteLoopTrigger:
    type: actor
    description: >-
      crafts circular dependencies or oscillating changes between boxes that cause unbounded ripple chains despite
      convergence rules
    in_journeys: 1
  _actors/HashCollisionExploiter:
    type: actor
    description: manipulates artifact content to produce identical SHA256 hashes, causing sync.ts to miss real changes
    in_journeys: 1
  _actors/PrivilegeEscalator:
    type: actor
    description: >-
